# GoAccess configuration for FreeToolKit nginx access logs
# Log format must match nginx's "combined" log format.
log-format COMBINED

# Time zone used for date/time grouping
time-zone Etc/UTC

# Store parsed data in a DB for accumulation across log rotations
db-path /reports/db

# Exclude your own IP from stats (set to your actual server IP or remove this line)
# exclude-ip 1.2.3.4

# Do not include spider/bot traffic in stats
ignore-crawlers true

# Include static files in traffic stats (turned off to keep tool-page stats clean)
static-file .css
static-file .js
static-file .svg
static-file .ico
