server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # Serve pre-compressed files when available
    gzip_static on;
    gzip on;
    gzip_types text/html text/css application/javascript text/xml application/xml image/svg+xml;

    # Static assets — long cache, immutable once deployed (rebuild changes paths)
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # sitemap and robots — short cache
    location ~ ^/(sitemap\.xml|robots\.txt)$ {
        expires 1d;
        add_header Cache-Control "public";
    }

    # Every other path: serve file or directory index; fall through to 404.html
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # __CSP_NONCE__ is replaced at image build time (see infra/Dockerfile) with
    # the same nonce build.py stamped onto every inline <script> in dist/.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'nonce-__CSP_NONCE__' https://pagead2.googlesyndication.com https://www.googletagservices.com https://adservice.google.com https://fundingchoicesmessages.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://pagead2.googlesyndication.com https://googleads.g.doubleclick.net https://fundingchoicesmessages.google.com; font-src 'self'; frame-src https://googleads.g.doubleclick.net https://www.google.com https://fundingchoicesmessages.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://formspree.io; object-src 'none'; upgrade-insecure-requests;" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # Log access to /var/log/nginx/access.log so GoAccess can parse it
    access_log /var/log/nginx/access.log combined;
    error_log  /var/log/nginx/error.log warn;
}
