{% extends "base.html" %}
{% block content %}
<section class="wrap content-page">
  <h1>Glossary</h1>
  <p class="tool-short">Plain-language definitions for the finance and SaaS terms used across FounderCalc's calculators.</p>
  <ul class="glossary-index-list">
    {% for entry in glossary %}
    <li><a href="/glossary/{{ entry.slug }}/">{{ entry.term }}</a> — {{ entry.short }}</li>
    {% endfor %}
  </ul>
</section>
{% endblock %}
