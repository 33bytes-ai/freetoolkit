<div class="field-row">
  <div class="field">
    <label for="aov-revenue">Total revenue ($)</label>
    <input type="number" autocomplete="off" id="aov-revenue" value="50000" min="0" step="1000">
  </div>
  <div class="field">
    <label for="aov-orders">Number of orders</label>
    <input type="number" autocomplete="off" id="aov-orders" value="250" min="1" step="10">
  </div>
</div>
<div class="field-row">
  <div class="field">
    <label for="aov-visitors">Monthly visitors <span style="font-size:0.8em;color:var(--text-muted)">(for revenue per visitor)</span></label>
    <input type="number" autocomplete="off" id="aov-visitors" value="10000" min="0" step="100">
  </div>
  <div class="field">
    <label for="aov-target">Target AOV ($) <span style="font-size:0.8em;color:var(--text-muted)">(model AOV increase impact)</span></label>
    <input type="number" autocomplete="off" id="aov-target" value="0" min="0" step="5">
  </div>
</div>
<div class="stats-grid">
  <div class="stat" data-tooltip="Total Revenue ÷ Number of Orders. Average revenue per transaction. Increasing AOV is often the highest-ROI growth lever — no extra traffic or acquisition cost required."><span class="stat-label">Average Order Value</span><span class="stat-value" id="aov-result">—</span></div>
  <div class="stat" data-tooltip="Total Revenue ÷ Visitors. Revenue generated per website visit. E-commerce benchmark: $1–5 RPV for general retail; $5–20 for high-intent/luxury."><span class="stat-label">Revenue per Visitor</span><span class="stat-value" id="aov-rpv">—</span></div>
  <div class="stat" data-tooltip="Target Revenue ÷ AOV. Orders needed at current AOV to reach your target revenue. If this exceeds your traffic capacity, you need to raise AOV."><span class="stat-label">Orders Needed (target)</span><span class="stat-value" id="aov-needed">—</span></div>
  <div class="stat" data-tooltip="(Target AOV − Current AOV) × Monthly Orders. Additional monthly revenue from raising AOV to target, at the same order volume."><span class="stat-label">Revenue Impact of Target AOV</span><span class="stat-value" id="aov-impact">—</span></div>
</div>
<div id="aov-insight" class="calc-insight" style="display:none"></div>
<div class="btn-row" style="margin-top:0.75rem">
  <button id="aov-copy" class="secondary">Copy results</button>
  <button id="aov-share" class="secondary">Share results</button>
</div>
