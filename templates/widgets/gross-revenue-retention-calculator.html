<div class="field-row">
  <div class="field">
    <label for="grr-start-mrr">Starting MRR ($)</label>
    <input type="number" autocomplete="off" id="grr-start-mrr" value="100000" min="0" step="1000">
  </div>
  <div class="field">
    <label for="grr-churned-mrr">Churned MRR ($) <span style="font-size:0.8em;color:var(--text-muted)">cancelled accounts</span></label>
    <input type="number" autocomplete="off" id="grr-churned-mrr" value="3000" min="0" step="500">
  </div>
</div>
<div class="field" style="max-width:260px">
  <label for="grr-contracted-mrr">Contracted MRR ($) <span style="font-size:0.8em;color:var(--text-muted)">downgrades only</span></label>
  <input type="number" autocomplete="off" id="grr-contracted-mrr" value="1500" min="0" step="500">
</div>
<div class="stats-grid">
  <div class="stat result-hero" data-tooltip="(Starting MRR − Churned − Contracted) ÷ Starting MRR × 100. GRR excludes expansion revenue — it only measures revenue retention from existing customers. Always ≤ 100%."><span class="stat-label">Monthly GRR</span><span class="stat-value" id="grr-result">—</span></div>
  <div class="stat" data-tooltip="Monthly GRR^12. Annualized retention rate, compounded monthly. Useful for comparing against annual benchmarks. At 95.5% monthly GRR, annual GRR ≈ 58% — the compounding effect of monthly churn is significant."><span class="stat-label">Implied Annual GRR</span><span class="stat-value" id="grr-annual">—</span></div>
  <div class="stat" data-tooltip="Churned MRR + Contracted (downgrade) MRR. Total recurring revenue lost to negative churn events this period, before accounting for any expansion."><span class="stat-label">MRR Lost</span><span class="stat-value" id="grr-mrr-lost">—</span></div>
</div>
<div id="grr-insight" class="calc-insight" style="display:none"></div>
<div class="btn-row" style="margin-top:0.75rem">
  <button id="grr-copy" class="secondary">Copy results</button>
  <button id="grr-share" class="secondary">Share results</button>
</div>
