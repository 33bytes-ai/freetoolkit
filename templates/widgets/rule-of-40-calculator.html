<div class="field-row">
  <div class="field">
    <label for="r40-growth">Annual revenue growth rate (%)</label>
    <input type="number" autocomplete="off" id="r40-growth" value="60" step="1">
  </div>
  <div class="field">
    <label for="r40-margin">Net profit margin (%) — negative for unprofitable</label>
    <input type="number" autocomplete="off" id="r40-margin" value="-15" step="1">
  </div>
</div>
<div class="stats-grid">
  <div class="stat result-hero" data-tooltip="Revenue growth rate % + profit margin %. Score ≥40 is the industry benchmark. Score ≥60 is exceptional; correlates with premium ARR multiples."><div class="num" id="r40-out-score" style="font-size:2rem">0</div><div class="label">Rule of 40 Score</div></div>
</div>
<p id="r40-out-label" class="tool-short" style="margin-top:0.75rem"></p>
<div id="r40-insight" class="calc-insight" style="display:none"></div>
<div class="btn-row" style="margin-top:0.75rem">
  <button id="r40-copy" class="secondary">Copy results</button>
  <button id="r40-share" class="secondary">Share results</button>
</div>
