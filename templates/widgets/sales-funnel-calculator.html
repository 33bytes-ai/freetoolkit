<div class="field-row">
  <div class="field">
    <label for="sf-leads">Monthly leads (top of funnel)</label>
    <input type="number" autocomplete="off" id="sf-leads" value="1000" min="0" step="10">
  </div>
  <div class="field">
    <label for="sf-acv">ACV / monthly deal value ($)</label>
    <input type="number" autocomplete="off" id="sf-acv" value="500" min="0" step="10">
  </div>
</div>
<div class="field-row">
  <div class="field">
    <label for="sf-mql-rate">Lead → MQL rate (%)</label>
    <input type="number" autocomplete="off" id="sf-mql-rate" value="30" min="0" max="100" step="1">
  </div>
  <div class="field">
    <label for="sf-sql-rate">MQL → SQL rate (%)</label>
    <input type="number" autocomplete="off" id="sf-sql-rate" value="40" min="0" max="100" step="1">
  </div>
</div>
<div class="field-row">
  <div class="field">
    <label for="sf-opp-rate">SQL → Opportunity rate (%)</label>
    <input type="number" autocomplete="off" id="sf-opp-rate" value="50" min="0" max="100" step="1">
  </div>
  <div class="field">
    <label for="sf-close-rate">Opportunity close rate (%)</label>
    <input type="number" autocomplete="off" id="sf-close-rate" value="25" min="0" max="100" step="1">
  </div>
</div>
<div class="stats-grid">
  <div class="stat" data-tooltip="Leads × MQL rate. Marketing Qualified Leads — prospects who meet your lead-scoring threshold and are worth pursuing."><span class="stat-label">MQLs / month</span><span class="stat-value" id="sf-mqls">—</span></div>
  <div class="stat" data-tooltip="MQLs × SQL rate. Sales Qualified Leads — MQLs accepted by sales as ready for direct engagement."><span class="stat-label">SQLs / month</span><span class="stat-value" id="sf-sqls">—</span></div>
  <div class="stat" data-tooltip="SQLs × opportunity rate. Prospects formally entered into the deal pipeline with a real chance of closing."><span class="stat-label">Opportunities</span><span class="stat-value" id="sf-opps">—</span></div>
  <div class="stat" data-tooltip="Opportunities × close rate. New customers won per month. Multiply by ACV to get MRR/ARR impact."><span class="stat-label">New Customers</span><span class="stat-value" id="sf-customers">—</span></div>
  <div class="stat" data-tooltip="New customers × ACV. Monthly recurring (or one-time) revenue generated by this month's closed deals."><span class="stat-label">MRR from Funnel</span><span class="stat-value" id="sf-mrr">—</span></div>
  <div class="stat" data-tooltip="New customers ÷ Leads. The end-to-end conversion from top-of-funnel to closed-won. Industry median: 1–3%. Above 5% is excellent."><span class="stat-label">Overall Conversion</span><span class="stat-value" id="sf-conversion">—</span></div>
</div>
<div id="sf-insight" class="calc-insight" style="display:none"></div>
<div class="btn-row" style="margin-top:0.75rem">
  <button id="sf-copy" class="secondary">Copy results</button>
  <button id="sf-share" class="secondary">Share results</button>
</div>
