<div class="field-row">
  <div class="field">
    <label for="dte-debt">Total debt ($) <span style="font-size:0.8em;color:var(--text-muted)">(short + long term)</span></label>
    <input type="number" autocomplete="off" id="dte-debt" value="500000" min="0" step="10000">
  </div>
  <div class="field">
    <label for="dte-equity">Total shareholders' equity ($)</label>
    <input type="number" autocomplete="off" id="dte-equity" value="750000" min="1" step="10000">
  </div>
</div>
<div class="field">
  <label for="dte-assets">Total assets ($) <span style="font-size:0.8em;color:var(--text-muted)">(optional — for equity &amp; debt ratios)</span></label>
  <input type="number" autocomplete="off" id="dte-assets" value="1250000" min="0" step="10000">
</div>
<div class="stats-grid">
  <div class="stat result-hero" data-tooltip="Total Debt ÷ Total Equity. How much debt is used for every dollar of equity. Below 1× = more equity-financed; above 2× = highly leveraged. Capital-intensive industries (manufacturing, real estate) typically run higher."><span class="stat-label">Debt-to-Equity Ratio</span><span class="stat-value" id="dte-result">—</span></div>
  <div class="stat" data-tooltip="Equity ÷ Total Assets × 100. What percentage of assets are financed by shareholders. Higher equity ratio = lower financial risk."><span class="stat-label">Equity Ratio</span><span class="stat-value" id="dte-eq-ratio">—</span></div>
  <div class="stat" data-tooltip="Total Debt ÷ Total Assets × 100. Percentage of assets financed by debt. Above 60% is considered high leverage by most lenders."><span class="stat-label">Debt Ratio</span><span class="stat-value" id="dte-debt-ratio">—</span></div>
  <div class="stat" data-tooltip="Total Assets ÷ Total Equity. Financial leverage multiplier. ROE = ROA × Financial Leverage. Higher leverage amplifies returns in good times and losses in bad times."><span class="stat-label">Financial Leverage</span><span class="stat-value" id="dte-leverage">—</span></div>
</div>
<div id="dte-insight" class="calc-insight" style="display:none"></div>
<div class="btn-row" style="margin-top:0.75rem">
  <button id="dte-copy" class="secondary">Copy results</button>
  <button id="dte-share" class="secondary">Share results</button>
</div>
