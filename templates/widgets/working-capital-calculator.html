<div class="field-row">
  <div class="field">
    <label for="wc-curr-assets">Current Assets ($)</label>
    <input type="number" autocomplete="off" id="wc-curr-assets" value="1800000" min="0" step="100000">
  </div>
  <div class="field">
    <label for="wc-curr-liab">Current Liabilities ($)</label>
    <input type="number" autocomplete="off" id="wc-curr-liab" value="900000" min="1" step="100000">
  </div>
</div>
<div class="stats-grid">
  <div class="stat result-hero" data-tooltip="Current Assets minus Current Liabilities. Positive = buffer to absorb short-term obligations. Negative = technically insolvent on a short-term basis."><span class="stat-label">Working Capital</span><span class="stat-value" id="wc-result">--</span></div>
  <div class="stat" data-tooltip="Current Assets divided by Current Liabilities. Also called the current ratio. Below 1.0 = liquidity risk; 1.5-2.5 = healthy; above 3 may indicate idle assets or excess inventory."><span class="stat-label">Current Ratio</span><span class="stat-value" id="wc-ratio">--</span></div>
  <div class="stat" data-tooltip="Qualitative assessment based on the current ratio: Well-funded (2x or more), Healthy (1.5-2x), Adequate (1-1.5x), or Underfunded (below 1x)."><span class="stat-label">Assessment</span><span class="stat-value" id="wc-label">--</span></div>
</div>
<div id="wc-insight" class="calc-insight" style="display:none"></div>
<div class="btn-row" style="margin-top:0.75rem">
  <button id="wc-copy" class="secondary">Copy results</button>
  <button id="wc-share" class="secondary">Share results</button>
</div>
