<p style="font-size:0.85rem;color:var(--text-muted);margin:0 0 0.75rem">Enter net income and total shareholders' equity to calculate Return on Equity.</p>

<div class="input-grid">
  <div class="input-group">
    <label for="roe-net-income">Net Income ($)</label>
    <input type="number" id="roe-net-income" min="0" step="10000" value="500000" autocomplete="off">
    <span class="input-hint">Annual net income (after tax)</span>
  </div>
  <div class="input-group">
    <label for="roe-equity">Shareholders' Equity ($)</label>
    <input type="number" id="roe-equity" min="1" step="10000" value="2500000" autocomplete="off">
    <span class="input-hint">Total equity from balance sheet</span>
  </div>
</div>

<div class="stat-grid">
  <div class="stat-card result-hero" data-tooltip="Net Income ÷ Shareholders' Equity. Measures how efficiently a company generates profit from equity. S&P 500 average: ~15%. Buffett target: 15%+.">
    <span class="stat-label">Return on Equity (ROE)</span>
    <span class="stat-value" id="roe-out-roe">--</span>
  </div>
  <div class="stat-card" data-tooltip="Qualitative rating based on ROE benchmarks: Exceptional (>20%), Good (15–20%), Moderate (10–15%), Below average (<10%). Capital-light businesses (tech, SaaS) typically have higher ROE.">
    <span class="stat-label">Performance Rating</span>
    <span class="stat-value" id="roe-out-label">--</span>
  </div>
</div>

<div id="roe-insight" class="insight-box" aria-live="polite"></div>

<div class="calc-actions">
  <button id="roe-share" class="btn-secondary">Share</button>
  <button id="roe-copy" class="btn-secondary">Copy results</button>
</div>
