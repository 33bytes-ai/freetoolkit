<div class="field-row">
  <div class="field">
    <label for="agr-current">Current ARR ($)</label>
    <input type="number" autocomplete="off" id="agr-current" value="1200000" min="0" step="1000">
  </div>
  <div class="field">
    <label for="agr-previous">ARR 12 months ago ($)</label>
    <input type="number" autocomplete="off" id="agr-previous" value="600000" min="0" step="1000">
  </div>
  <div class="field">
    <label for="agr-target">ARR target ($, optional)</label>
    <input type="number" autocomplete="off" id="agr-target" value="10000000" min="0" step="100000">
  </div>
</div>
<div class="stats-grid">
  <div class="stat" data-tooltip="(Current ARR − Prior ARR) ÷ Prior ARR. Year-over-year growth. T2D3 (triple twice, double 3 times) = 100%+ growth in early years."><span class="stat-label">YoY growth rate</span><span class="stat-value" id="agr-growth-rate">—</span></div>
  <div class="stat" data-tooltip="Current ARR minus ARR 12 months ago. The absolute dollar increase in ARR over one year."><span class="stat-label">Net new ARR</span><span class="stat-value" id="agr-net-new-arr">—</span></div>
  <div class="stat" data-tooltip="Current ARR × (1 + YoY growth rate)^3. Projected ARR in 3 years if you maintain your current growth rate."><span class="stat-label">ARR in 3 years</span><span class="stat-value" id="agr-arr-3y">—</span></div>
  <div class="stat" data-tooltip="Current ARR × (1 + YoY growth rate)^5. Five-year projection at current growth. The Rule of 72 applies: at 72% growth, ARR doubles every year."><span class="stat-label">ARR in 5 years</span><span class="stat-value" id="agr-arr-5y">—</span></div>
  <div class="stat" data-tooltip="How many years at your current growth rate until you reach your ARR target. Calculated using log(target/current) ÷ log(1 + growth rate)."><span class="stat-label">Years to target</span><span class="stat-value" id="agr-years-to-target">—</span></div>
</div>
<div id="agr-insight" class="calc-insight" style="display:none"></div>
<div class="btn-row" style="margin-top:0.75rem">
  <button id="agr-copy" class="secondary">Copy results</button>
  <button id="agr-share" class="secondary">Share results</button>
</div>
