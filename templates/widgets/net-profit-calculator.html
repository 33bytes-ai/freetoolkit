<div class="field-row">
  <div class="field">
    <label for="np-revenue">Revenue ($)</label>
    <input type="number" autocomplete="off" id="np-revenue" value="1000000" min="0" step="10000">
  </div>
  <div class="field">
    <label for="np-cogs">Cost of Goods Sold ($)</label>
    <input type="number" autocomplete="off" id="np-cogs" value="400000" min="0" step="10000">
  </div>
</div>
<div class="field-row">
  <div class="field">
    <label for="np-opex">Operating Expenses ($)</label>
    <input type="number" autocomplete="off" id="np-opex" value="250000" min="0" step="10000">
  </div>
  <div class="field">
    <label for="np-interest">Interest Expense ($)</label>
    <input type="number" autocomplete="off" id="np-interest" value="20000" min="0" step="1000">
  </div>
</div>
<div class="field" style="max-width:260px">
  <label for="np-taxes">Taxes ($)</label>
  <input type="number" autocomplete="off" id="np-taxes" value="82500" min="0" step="1000">
</div>
<div class="stats-grid">
  <div class="stat" data-tooltip="Revenue − COGS. Profit after direct production costs before operating expenses, interest, and taxes."><span class="stat-label">Gross Profit</span><span class="stat-value" id="np-gross-profit">—</span></div>
  <div class="stat" data-tooltip="Gross Profit − Operating Expenses. Also called EBIT. Profit from core operations before financing costs and taxes."><span class="stat-label">Operating Income</span><span class="stat-value" id="np-operating">—</span></div>
  <div class="stat result-hero" data-tooltip="Operating Income − Interest − Taxes. The bottom-line profit available to shareholders after all expenses."><span class="stat-label">Net Profit</span><span class="stat-value" id="np-result">—</span></div>
  <div class="stat" data-tooltip="Net Profit ÷ Revenue × 100. Industry benchmarks: SaaS 15–30%, retail 2–5%, consulting 15–25%. Negative = operating at a loss."><span class="stat-label">Net Margin</span><span class="stat-value" id="np-net-margin">—</span></div>
</div>
<div id="np-insight" class="calc-insight" style="display:none"></div>
<div class="btn-row" style="margin-top:0.75rem">
  <button id="np-copy" class="secondary">Copy results</button>
  <button id="np-share" class="secondary">Share results</button>
</div>
