<div class="field-row">
  <div class="field">
    <label for="ltv-arpu">ARPU (monthly $)</label>
    <input type="number" autocomplete="off" id="ltv-arpu" value="99" min="0" step="1">
  </div>
  <div class="field">
    <label for="ltv-margin">Gross margin (%)</label>
    <input type="number" autocomplete="off" id="ltv-margin" value="75" min="0" max="100" step="1">
  </div>
  <div class="field">
    <label for="ltv-churn">Monthly churn rate (%)</label>
    <input type="number" autocomplete="off" id="ltv-churn" value="3" min="0.01" max="100" step="0.1">
  </div>
</div>
<div class="field-row">
  <div class="field">
    <label for="ltv-spend">Sales & marketing spend ($/month)</label>
    <input type="number" autocomplete="off" id="ltv-spend" value="5000" min="0" step="100">
  </div>
  <div class="field">
    <label for="ltv-new-customers">New customers acquired (same period)</label>
    <input type="number" autocomplete="off" id="ltv-new-customers" value="20" min="1" step="1">
  </div>
</div>
<div class="stats-grid">
  <div class="stat" data-tooltip="Average Revenue per User × Gross Margin ÷ Monthly Churn Rate. The total gross profit expected from a customer over their lifetime."><div class="num" id="ltv-out-ltv">$0</div><div class="label">Customer LTV</div></div>
  <div class="stat" data-tooltip="Sales & marketing spend ÷ new customers acquired. How much it costs to acquire one customer. Best kept to ≤ LTV/3."><div class="num" id="ltv-out-cac">$0</div><div class="label">CAC</div></div>
  <div class="stat result-hero" data-tooltip="LTV ÷ CAC. Industry benchmark: ≥3× is healthy. Below 1× = you're losing money on every customer. Above 5× = may be under-investing in growth."><div class="num" id="ltv-out-ratio">0</div><div class="label">LTV : CAC ratio</div></div>
  <div class="stat" data-tooltip="CAC ÷ (ARPU × gross margin). Months until a customer's gross profit equals what you spent acquiring them."><div class="num" id="ltv-out-payback">0 mo</div><div class="label">Payback period</div></div>
</div>
<p id="ltv-health" class="tool-short" style="margin-top:0.75rem"></p>
<div id="ltv-insight" class="calc-insight" style="display:none"></div>
<div class="btn-row" style="margin-top:0.75rem">
  <button id="ltv-copy" class="secondary">Copy results</button>
  <span class="copy-feedback" id="ltv-copy-feedback"></span>
</div>
