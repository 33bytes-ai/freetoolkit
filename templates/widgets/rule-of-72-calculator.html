<div class="tool-widget" role="main">
  <div class="field-row">
    <div class="field">
      <label for="r72-rate">Annual growth / interest rate (%)</label>
      <input id="r72-rate" type="number" min="0.1" max="200" step="0.5" value="8" placeholder="e.g. 8">
      <span class="field__error-msg"></span>
    </div>
    <div class="field">
      <label for="r72-principal">Starting amount ($)</label>
      <input id="r72-principal" type="number" min="0" step="1000" value="10000" placeholder="e.g. 10000">
      <span class="field__error-msg"></span>
    </div>
  </div>
  <div class="field" style="max-width:280px">
    <label for="r72-years">Target doubling time (years) <span style="font-size:0.8em;color:var(--text-muted)">→ required rate</span></label>
    <input id="r72-years" type="number" min="0.5" max="100" step="0.5" value="9" placeholder="e.g. 9">
    <span class="field__error-msg"></span>
  </div>
  <div class="output-grid">
    <div class="output-box result-hero" data-tooltip="72 ÷ annual rate. How long it takes to double your money at this rate. Rule of 72 is a quick mental math approximation.">
      <span class="label">Doubling time (Rule of 72)</span>
      <span class="value" id="r72-out-double">—</span>
    </div>
    <div class="output-box" data-tooltip="Exact doubling time using log(2) ÷ log(1 + rate). The Rule of 72 is accurate to within 1–2% for rates between 6–10%.">
      <span class="label">Exact doubling time</span>
      <span class="value" id="r72-out-exact">—</span>
    </div>
    <div class="output-box" data-tooltip="72 ÷ target years. The annual return you need to achieve your target doubling time. Useful for setting investment return expectations.">
      <span class="label">Rate for target doubling</span>
      <span class="value" id="r72-out-rate-for-target">—</span>
    </div>
    <div class="output-box" data-tooltip="Your starting amount after it has doubled once at the given rate. Confirms the Rule of 72 estimate is approximately 2× your principal.">
      <span class="label">Doubled value</span>
      <span class="value" id="r72-out-fv">—</span>
    </div>
  </div>
  <div id="r72-insight" class="calc-insight" style="display:none"></div>
</div>
<script src="/static/js/tools/rule-of-72-calculator.js" defer></script>
