<div class="field-row">
  <div class="field">
    <label for="ocf-net-income">Net income ($)</label>
    <input type="number" autocomplete="off" id="ocf-net-income" value="80000" step="1000">
  </div>
  <div class="field">
    <label for="ocf-da">Depreciation &amp; amortization ($)</label>
    <input type="number" autocomplete="off" id="ocf-da" value="15000" min="0" step="1000">
  </div>
  <div class="field">
    <label for="ocf-wc">Working capital change ($) <span style="font-size:0.8em;color:var(--text-muted)">(negative = more cash tied up)</span></label>
    <input type="number" autocomplete="off" id="ocf-wc" value="-10000" step="1000">
  </div>
  <div class="field">
    <label for="ocf-capex">CapEx ($) <span style="font-size:0.8em;color:var(--text-muted)">(for FCF)</span></label>
    <input type="number" autocomplete="off" id="ocf-capex" value="5000" min="0" step="1000">
  </div>
</div>
<div class="stats-grid">
  <div class="stat" data-tooltip="Accounting profit after all expenses and taxes. Net income is the starting point for the indirect method of cash flow calculation."><span class="stat-label">Net Income</span><span class="stat-value" id="ocf-ni-display">—</span></div>
  <div class="stat result-hero" data-tooltip="Net Income + D&A + Working Capital Change. Cash generated by operations before capital expenditure. More reliable than net income — harder to manipulate."><span class="stat-label">Operating Cash Flow</span><span class="stat-value" id="ocf-result">—</span></div>
  <div class="stat" data-tooltip="Operating Cash Flow ÷ Net Income. Values above 1 mean you're converting profits to cash efficiently. Below 1 suggests aggressive accrual accounting or AR buildup."><span class="stat-label">Cash Conversion Ratio</span><span class="stat-value" id="ocf-ccr">—</span></div>
  <div class="stat" data-tooltip="Operating Cash Flow − CapEx. Cash available after maintaining and growing the asset base. The truest measure of a business's cash-generating power."><span class="stat-label">Free Cash Flow</span><span class="stat-value" id="ocf-fcf">—</span></div>
</div>
<div id="ocf-insight" class="calc-insight" style="display:none"></div>
<div class="btn-row" style="margin-top:0.75rem">
  <button id="ocf-copy" class="secondary">Copy results</button>
  <button id="ocf-share" class="secondary">Share results</button>
</div>
