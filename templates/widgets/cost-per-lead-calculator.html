<div class="tool-widget" role="main">
  <div class="field-row">
    <div class="field">
      <label for="cpl-spend">Total marketing spend ($)</label>
      <input id="cpl-spend" type="number" min="0" step="100" value="5000" placeholder="e.g. 5000">
    </div>
    <div class="field">
      <label for="cpl-leads">Leads generated</label>
      <input id="cpl-leads" type="number" min="0" step="1" value="100" placeholder="e.g. 100">
    </div>
  </div>
  <div class="field-row">
    <div class="field">
      <label for="cpl-conv">Lead-to-customer rate (%)</label>
      <input id="cpl-conv" type="number" min="0" max="100" step="0.1" value="5" placeholder="e.g. 5">
    </div>
    <div class="field">
      <label for="cpl-acv">Average contract value ($)</label>
      <input id="cpl-acv" type="number" min="0" step="100" value="2000" placeholder="e.g. 2000">
    </div>
    <div class="field">
      <label for="cpl-margin">Gross margin (%)</label>
      <input id="cpl-margin" type="number" min="0" max="100" step="1" value="70" placeholder="e.g. 70">
    </div>
  </div>
  <div class="output-grid">
    <div class="output-box" data-tooltip="Total spend ÷ leads generated. The average cost to acquire one lead. Benchmark against your max allowable CPL to gauge efficiency.">
      <span class="label">Cost Per Lead</span>
      <span class="value" id="cpl-out-cpl">—</span>
    </div>
    <div class="output-box" data-tooltip="ACV × lead-to-customer conversion rate. The average revenue generated per lead that enters your funnel.">
      <span class="label">Revenue Per Lead</span>
      <span class="value" id="cpl-out-rpl">—</span>
    </div>
    <div class="output-box" data-tooltip="ACV × conversion rate × gross margin. The most you can spend on a lead and still break even. Keep CPL below this number.">
      <span class="label">Max Allowable CPL</span>
      <span class="value" id="cpl-out-maxcpl">—</span>
    </div>
    <div class="output-box" data-tooltip="(Revenue generated − marketing spend) ÷ marketing spend. How much return you get for each dollar invested in lead gen.">
      <span class="label">Marketing ROI</span>
      <span class="value" id="cpl-out-roi">—</span>
    </div>
  </div>
  <div id="cpl-insight" class="calc-insight" style="display:none"></div>
</div>
<script src="/static/js/tools/cost-per-lead-calculator.js" defer></script>
