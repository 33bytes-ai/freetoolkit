<div class="field-row">
  <div class="field">
    <label for="fr-target">Annual take-home target ($)</label>
    <input type="number" autocomplete="off" id="fr-target" value="80000" min="0" step="1000">
  </div>
  <div class="field">
    <label for="fr-tax">Estimated effective tax rate (%)</label>
    <input type="number" autocomplete="off" id="fr-tax" value="30" min="0" max="60" step="1">
  </div>
</div>
<div class="field-row">
  <div class="field">
    <label for="fr-expenses">Annual business expenses ($)</label>
    <input type="number" autocomplete="off" id="fr-expenses" value="6000" min="0" step="500">
  </div>
  <div class="field">
    <label for="fr-weeks">Billable weeks per year</label>
    <input type="number" autocomplete="off" id="fr-weeks" value="46" min="1" max="52" step="1">
  </div>
</div>
<div class="field">
  <label for="fr-billable-pct">Billable hours as % of working time: <span id="fr-billable-val">70</span>%</label>
  <input type="range" id="fr-billable-pct" min="40" max="95" value="70" step="5">
</div>
<div class="stats-grid">
  <div class="stat result-hero" data-tooltip="Take-home target ÷ (1 − tax rate) + business expenses. The pre-tax invoiced revenue you need to generate to net your target."><div class="num" id="fr-gross">$0</div><div class="label">Required gross income</div></div>
  <div class="stat" data-tooltip="Billable weeks × 40 hours × (billable % ÷ 100). Not every working hour is invoiceable — admin, marketing, and breaks consume the rest."><div class="num" id="fr-hours">0 h</div><div class="label">Billable hours/year</div></div>
  <div class="stat" data-tooltip="Required gross income ÷ billable hours. The floor rate you must charge. Add a 20–30% buffer for scope creep and market rate positioning."><div class="num" id="fr-hourly">$0/hr</div><div class="label">Minimum hourly rate</div></div>
  <div class="stat" data-tooltip="Hourly rate × 8 hours. Standard day rate used in project proposals and agency subcontracting. Common day-rate presentation in the UK market."><div class="num" id="fr-daily">$0/day</div><div class="label">Day rate (8h)</div></div>
</div>
<div class="btn-row" style="margin-top:0.75rem">
  <button id="fr-copy" class="secondary">Copy results</button>
  <button id="fr-share" class="secondary">Share results</button>
</div>
