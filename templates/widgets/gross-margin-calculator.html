<div class="field-row">
  <div class="field">
    <label for="gm-revenue">Revenue ($)</label>
    <input type="number" autocomplete="off" id="gm-revenue" value="100000" min="0" step="1000">
    <span class="field__error-msg"></span>
  </div>
  <div class="field">
    <label for="gm-cogs">Cost of Goods Sold / COGS ($)</label>
    <input type="number" autocomplete="off" id="gm-cogs" value="30000" min="0" step="1000">
    <span class="field__error-msg"></span>
  </div>
  <div class="field">
    <label for="gm-target-margin">Target margin % <span style="font-size:0.8em;color:var(--text-muted)">(to find required revenue)</span></label>
    <input type="number" autocomplete="off" id="gm-target-margin" value="70" min="1" max="99" step="1">
    <span class="field__error-msg"></span>
  </div>
</div>
<div class="stats-grid">
  <div class="stat" data-tooltip="(Revenue − COGS) ÷ Revenue. SaaS targets 70–85%; retail is typically 20–50%."><span class="stat-label">Gross Margin</span><span class="stat-value" id="gm-margin">—</span></div>
  <div class="stat" data-tooltip="Revenue minus COGS. The absolute dollar amount left after covering direct production costs."><span class="stat-label">Gross Profit</span><span class="stat-value" id="gm-profit">—</span></div>
  <div class="stat" data-tooltip="(Revenue − COGS) ÷ COGS. Shows how much profit you make per dollar of production cost. Useful for pricing strategy."><span class="stat-label">Markup %</span><span class="stat-value" id="gm-markup">—</span></div>
  <div class="stat" data-tooltip="The revenue you need to achieve your target gross margin with the same COGS. Useful for pricing or expansion planning."><span class="stat-label">Revenue for Target</span><span class="stat-value" id="gm-target-rev">—</span></div>
</div>
<div id="gm-insight" class="calc-insight" style="display:none"></div>
<div class="btn-row" style="margin-top:0.75rem">
  <button id="gm-copy" class="secondary">Copy results</button>
  <button id="gm-share" class="secondary">Share results</button>
</div>
