<div class="field-row">
  <div class="field">
    <label for="ccc-inventory">Average inventory ($)</label>
    <input type="number" autocomplete="off" id="ccc-inventory" value="500000" min="0" step="10000">
  </div>
  <div class="field">
    <label for="ccc-cogs">Annual COGS ($)</label>
    <input type="number" autocomplete="off" id="ccc-cogs" value="3000000" min="1" step="100000">
  </div>
  <div class="field">
    <label for="ccc-ar">Average accounts receivable ($)</label>
    <input type="number" autocomplete="off" id="ccc-ar" value="400000" min="0" step="10000">
  </div>
  <div class="field">
    <label for="ccc-revenue">Annual revenue ($)</label>
    <input type="number" autocomplete="off" id="ccc-revenue" value="5000000" min="1" step="100000">
  </div>
  <div class="field">
    <label for="ccc-ap">Average accounts payable ($)</label>
    <input type="number" autocomplete="off" id="ccc-ap" value="200000" min="0" step="10000">
  </div>
</div>
<div class="stats-grid">
  <div class="stat result-hero" data-tooltip="DIO + DSO − DPO. Days between paying for inventory and collecting cash from customers. Negative = you collect before you pay suppliers (like Amazon)."><span class="stat-label">Cash Conversion Cycle (CCC)</span><span class="stat-value" id="ccc-result">--</span></div>
  <div class="stat" data-tooltip="(Avg Inventory ÷ COGS) × 365. How many days of inventory you hold on average. Lower is better — excess inventory ties up working capital."><span class="stat-label">Days Inventory Outstanding (DIO)</span><span class="stat-value" id="ccc-dio">--</span></div>
  <div class="stat" data-tooltip="(Avg Accounts Receivable ÷ Revenue) × 365. Average days to collect payment after a sale. Benchmark: 30–45 days for B2B; SaaS with upfront billing: ~0."><span class="stat-label">Days Sales Outstanding (DSO)</span><span class="stat-value" id="ccc-dso">--</span></div>
  <div class="stat" data-tooltip="(Avg Accounts Payable ÷ COGS) × 365. Average days before you pay suppliers. Higher DPO improves CCC — but don't exceed supplier terms."><span class="stat-label">Days Payable Outstanding (DPO)</span><span class="stat-value" id="ccc-dpo">--</span></div>
</div>
<div id="ccc-insight" class="calc-insight" style="display:none"></div>
<div class="btn-row" style="margin-top:0.75rem">
  <button id="ccc-copy" class="secondary">Copy results</button>
  <button id="ccc-share" class="secondary">Share results</button>
</div>
