<div class="calc-grid">
  <label for="bl-principal">Loan amount ($)</label>
  <input type="number" id="bl-principal" min="0" step="10000" value="250000" autocomplete="off">

  <label for="bl-rate">Annual interest rate (% APR)</label>
  <input type="number" id="bl-rate" min="0" max="100" step="0.1" value="7.5" autocomplete="off">

  <label for="bl-term">Loan term (months)</label>
  <input type="number" id="bl-term" min="1" max="360" step="1" value="60" autocomplete="off">

  <label for="bl-revenue">Monthly revenue ($ — for affordability check)</label>
  <input type="number" id="bl-revenue" min="0" step="10000" value="0" autocomplete="off">
</div>

<div class="stat-grid">
  <div class="stat-card" data-tooltip="P × [r(1+r)^n] ÷ [(1+r)^n − 1]. Standard amortizing loan formula. Each payment covers accrued interest first; the remainder reduces principal.">
    <span class="stat-label">Monthly Payment</span>
    <span class="stat-value" id="bl-result">--</span>
  </div>
  <div class="stat-card" data-tooltip="Monthly payment × number of months. Total cash out the door including principal repayment and all interest over the loan term.">
    <span class="stat-label">Total Paid</span>
    <span class="stat-value" id="bl-total">--</span>
  </div>
  <div class="stat-card" data-tooltip="Total paid − principal. The cost of borrowing. Higher rates and longer terms amplify this significantly. Refinancing early reduces it.">
    <span class="stat-label">Total Interest</span>
    <span class="stat-value" id="bl-interest">--</span>
  </div>
  <div class="stat-card" data-tooltip="Remaining principal at the halfway point of the loan term. In early years most payment goes to interest; the midpoint balance is typically well above 50% of the original loan.">
    <span class="stat-label">Midpoint Balance</span>
    <span class="stat-value" id="bl-midbal">--</span>
  </div>
</div>

<div id="bl-insight" class="insight-box" aria-live="polite"></div>

<div class="calc-actions">
  <button id="bl-share" class="btn-secondary">Share</button>
  <button id="bl-copy" class="btn-secondary">Copy results</button>
</div>
