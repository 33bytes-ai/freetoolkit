<div class="calc-grid">
  <label for="roi-revenue">Revenue / total returns ($)</label>
  <input type="number" id="roi-revenue" min="0" step="1000" value="150000" autocomplete="off">

  <label for="roi-costs">Operating costs ($)</label>
  <input type="number" id="roi-costs" min="0" step="1000" value="50000" autocomplete="off">

  <label for="roi-investment">Initial investment ($)</label>
  <input type="number" id="roi-investment" min="0" step="1000" value="100000" autocomplete="off">

  <label for="roi-years">Time horizon (years)</label>
  <input type="number" id="roi-years" min="0.1" step="0.5" value="1" autocomplete="off">
</div>

<div class="stat-grid">
  <div class="stat-card" data-tooltip="(Revenue − Costs − Investment) ÷ Investment × 100. The total return over the entire time horizon, not annualized.">
    <span class="stat-label">ROI</span>
    <span class="stat-value" id="roi-result">--</span>
  </div>
  <div class="stat-card" data-tooltip="Revenue minus operating costs minus initial investment. The absolute dollar profit over the time horizon.">
    <span class="stat-label">Net Profit</span>
    <span class="stat-value" id="roi-net-profit">--</span>
  </div>
  <div class="stat-card" data-tooltip="The equivalent annual return if this ROI were earned evenly each year. Useful for comparing investments with different time horizons.">
    <span class="stat-label">Annualized ROI</span>
    <span class="stat-value" id="roi-ann-roi">--</span>
  </div>
  <div class="stat-card" data-tooltip="The revenue level at which total revenue equals total costs plus the initial investment. Above this, the investment is profitable.">
    <span class="stat-label">Break-even</span>
    <span class="stat-value" id="roi-breakeven">--</span>
  </div>
</div>

<div id="roi-insight" class="insight-box" aria-live="polite"></div>

<div class="calc-actions">
  <button id="roi-share" class="btn-secondary">Share</button>
  <button id="roi-copy" class="btn-secondary">Copy results</button>
</div>
