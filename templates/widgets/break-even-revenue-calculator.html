<div class="field-row">
  <div class="field">
    <label for="be-fixed">Monthly fixed costs ($)</label>
    <input type="number" autocomplete="off" id="be-fixed" value="25000" min="0" step="1000">
  </div>
  <div class="field">
    <label for="be-margin">Contribution margin % <span style="font-size:0.8em;color:var(--text-muted)">(gross margin for services)</span></label>
    <input type="number" autocomplete="off" id="be-margin" value="70" min="1" max="99" step="1">
  </div>
  <div class="field">
    <label for="be-revenue">Current monthly revenue ($) <span style="font-size:0.8em;color:var(--text-muted)">(for safety margin)</span></label>
    <input type="number" autocomplete="off" id="be-revenue" value="45000" min="0" step="1000">
  </div>
</div>
<div class="stats-grid">
  <div class="stat" data-tooltip="Fixed Costs ÷ Contribution Margin %. Minimum monthly revenue to cover all fixed costs. Below this, the business loses money on a contribution basis."><span class="stat-label">Break-Even Revenue</span><span class="stat-value" id="be-result">—</span></div>
  <div class="stat" data-tooltip="(Current Revenue − Break-Even Revenue) ÷ Current Revenue. How far revenue can drop before you lose money. 30%+ is healthy; below 10% is fragile."><span class="stat-label">Safety Margin</span><span class="stat-value" id="be-safety">—</span></div>
  <div class="stat" data-tooltip="(Current Revenue − Break-Even Revenue) × Contribution Margin. Estimated monthly profit (or loss) relative to break-even. Positive = profitable."><span class="stat-label">Profit / Loss vs Break-Even</span><span class="stat-value" id="be-profit">—</span></div>
  <div class="stat" data-tooltip="Break-Even Revenue − Current Revenue. Dollar amount of additional revenue needed to reach break-even. Zero or negative = already profitable."><span class="stat-label">Gap to Break-Even</span><span class="stat-value" id="be-gap">—</span></div>
</div>
<div id="be-insight" class="calc-insight" style="display:none"></div>
<div class="btn-row" style="margin-top:0.75rem">
  <button id="be-copy" class="secondary">Copy results</button>
  <button id="be-share" class="secondary">Share results</button>
</div>
