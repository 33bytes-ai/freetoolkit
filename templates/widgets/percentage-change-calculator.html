<div class="field-row">
  <div class="field">
    <label for="pct-old">Original / old value</label>
    <input type="number" autocomplete="off" id="pct-old" value="80" step="any">
  </div>
  <div class="field">
    <label for="pct-new">New value</label>
    <input type="number" autocomplete="off" id="pct-new" value="100" step="any">
  </div>
</div>
<div class="field" style="max-width:200px">
  <label for="pct-years">Years between values <span style="font-size:0.8em;color:var(--text-muted)">(for CAGR)</span></label>
  <input type="number" autocomplete="off" id="pct-years" value="1" min="1" max="100" step="1">
</div>
<div class="stats-grid">
  <div class="stat" data-tooltip="(New − Old) ÷ |Old| × 100. Percentage change from the original value to the new value. Positive = increase; negative = decrease."><span class="stat-label">Percentage Change</span><span class="stat-value" id="pct-change">—</span></div>
  <div class="stat" data-tooltip="New − Old. The raw absolute difference between the two values, in the same unit."><span class="stat-label">Absolute Change</span><span class="stat-value" id="pct-absolute">—</span></div>
  <div class="stat" data-tooltip="New ÷ Old. How many times the new value is relative to the original. A factor of 1.25 = 25% increase. Factor < 1 = decrease."><span class="stat-label">Multiplier</span><span class="stat-value" id="pct-factor">—</span></div>
  <div class="stat" data-tooltip="Compound Annual Growth Rate: (New/Old)^(1/years) − 1. The average annual growth rate if compounded consistently over the period."><span class="stat-label">CAGR</span><span class="stat-value" id="pct-cagr">—</span></div>
</div>
<div id="pct-insight" class="calc-insight" style="display:none"></div>
<div class="btn-row" style="margin-top:0.75rem">
  <button id="pct-copy" class="secondary">Copy results</button>
  <button id="pct-share" class="secondary">Share results</button>
</div>
