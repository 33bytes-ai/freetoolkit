<div class="calc-grid">
  <label for="sv-opportunities">Active opportunities in pipeline</label>
  <input type="number" id="sv-opportunities" min="1" step="1" value="50" autocomplete="off">

  <label for="sv-win-rate">Win rate (%)</label>
  <input type="number" id="sv-win-rate" min="0" max="100" step="1" value="25" autocomplete="off">

  <label for="sv-acv">Average contract value / ACV ($)</label>
  <input type="number" id="sv-acv" min="0" step="100" value="8000" autocomplete="off">

  <label for="sv-cycle">Average sales cycle (days)</label>
  <input type="number" id="sv-cycle" min="1" step="1" value="90" autocomplete="off">
</div>

<div class="stat-grid">
  <div class="stat-card result-hero" data-tooltip="(Opportunities × Win Rate × ACV) ÷ Sales Cycle Days. Revenue generated per day from your pipeline. Increasing any of the 4 inputs improves velocity.">
    <span class="stat-label">Sales Velocity</span>
    <span class="stat-value" id="sv-result">--</span>
  </div>
  <div class="stat-card" data-tooltip="Daily Sales Velocity × 365. The implied annual revenue from your current pipeline if it continues at this rate.">
    <span class="stat-label">Annualized Revenue</span>
    <span class="stat-value" id="sv-annual">--</span>
  </div>
  <div class="stat-card" data-tooltip="Opportunities × ACV. Total value of all active deals in your pipeline before accounting for win rate.">
    <span class="stat-label">Pipeline Value</span>
    <span class="stat-value" id="sv-pipeline">--</span>
  </div>
  <div class="stat-card" data-tooltip="Opportunities × Win Rate. Expected number of deals won from your current pipeline at your current close rate.">
    <span class="stat-label">Expected Won Deals</span>
    <span class="stat-value" id="sv-won">--</span>
  </div>
</div>

<div id="sv-insight" class="insight-box" aria-live="polite"></div>

<div class="calc-actions">
  <button id="sv-share" class="btn-secondary">Share</button>
  <button id="sv-copy" class="btn-secondary">Copy results</button>
</div>
