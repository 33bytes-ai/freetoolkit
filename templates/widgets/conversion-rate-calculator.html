<div class="field-row">
  <div class="field">
    <label for="cr-visitors">Monthly visitors</label>
    <input type="number" autocomplete="off" id="cr-visitors" value="10000" min="1" step="100">
  </div>
  <div class="field">
    <label for="cr-conversions">Conversions this month</label>
    <input type="number" autocomplete="off" id="cr-conversions" value="150" min="0" step="1">
  </div>
  <div class="field">
    <label for="cr-arpu">Revenue per conversion ($) <span style="font-size:0.8em;color:var(--text-muted)">(optional)</span></label>
    <input type="number" autocomplete="off" id="cr-arpu" value="99" min="0" step="1">
  </div>
  <div class="field">
    <label for="cr-new-cr">Target CR % <span style="font-size:0.8em;color:var(--text-muted)">(for uplift calc)</span></label>
    <input type="number" autocomplete="off" id="cr-new-cr" value="2" min="0" max="100" step="0.1">
  </div>
</div>
<div class="stats-grid">
  <div class="stat result-hero" data-tooltip="Conversions ÷ Visitors × 100. SaaS free trial benchmarks: 2–5% good, 8%+ excellent. Paid landing pages: 1–3%."><span class="stat-label">Current CR</span><span class="stat-value" id="cr-rate">—</span></div>
  <div class="stat" data-tooltip="Conversions × revenue per conversion. Monthly revenue generated by your current conversion rate."><span class="stat-label">Monthly Revenue</span><span class="stat-value" id="cr-revenue">—</span></div>
  <div class="stat" data-tooltip="Visitors × target CR ÷ 100 × revenue per conversion. Monthly revenue if you hit your conversion rate target."><span class="stat-label">Revenue at Target CR</span><span class="stat-value" id="cr-new-revenue">—</span></div>
  <div class="stat" data-tooltip="Revenue at target CR minus current revenue. The monthly revenue gain from improving conversion by the target amount."><span class="stat-label">Revenue Impact</span><span class="stat-value" id="cr-impact">—</span></div>
</div>
<div id="cr-insight" class="calc-insight" style="display:none"></div>
<div class="btn-row" style="margin-top:0.75rem">
  <button id="cr-copy" class="secondary">Copy results</button>
  <button id="cr-share" class="secondary">Share results</button>
</div>
