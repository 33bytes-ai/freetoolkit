<div class="field-row">
  <div class="field">
    <label for="clr-arpu">Monthly ARPU ($)</label>
    <input type="number" autocomplete="off" id="clr-arpu" value="99" min="0" step="1">
  </div>
  <div class="field">
    <label for="clr-gm">Gross Margin (%)</label>
    <input type="number" autocomplete="off" id="clr-gm" value="70" min="0" max="100" step="1">
  </div>
</div>
<div class="field-row">
  <div class="field">
    <label for="clr-churn">Monthly Churn Rate (%)</label>
    <input type="number" autocomplete="off" id="clr-churn" value="2" min="0.01" max="100" step="0.1">
  </div>
  <div class="field">
    <label for="clr-cac">Customer Acquisition Cost ($) <span style="font-size:0.8em;color:var(--text-muted)">(optional)</span></label>
    <input type="number" autocomplete="off" id="clr-cac" value="500" min="0" step="10">
  </div>
</div>
<div class="stats-grid">
  <div class="stat" data-tooltip="ARPU ÷ Monthly Churn Rate. Gross LTV before costs. This is total expected revenue per customer over their lifetime, not accounting for acquisition or service costs."><span class="stat-label">LTV (Gross)</span><span class="stat-value" id="clr-ltv">—</span></div>
  <div class="stat" data-tooltip="(ARPU × Gross Margin) ÷ Monthly Churn Rate. Margin-adjusted LTV — the most accurate measure of customer profitability. Used for LTV:CAC comparison."><span class="stat-label">LTV (With Margin)</span><span class="stat-value" id="clr-ltv-gm">—</span></div>
  <div class="stat" data-tooltip="1 ÷ Monthly Churn Rate. Expected average customer lifespan in months before churning. At 2% monthly churn, average customer stays ~50 months."><span class="stat-label">Avg Lifespan</span><span class="stat-value" id="clr-life">—</span></div>
  <div class="stat" data-tooltip="LTV (with margin) ÷ CAC. The gold standard unit economics ratio. SaaS benchmark: ≥ 3×. Below 1× means you lose money on every customer acquired."><span class="stat-label">LTV:CAC Ratio</span><span class="stat-value" id="clr-ratio">—</span></div>
  <div class="stat" data-tooltip="CAC ÷ (ARPU × Gross Margin). Months until the customer's margin contribution covers acquisition cost. Best-in-class: under 12 months. Rule of thumb: < 18 months for healthy SaaS."><span class="stat-label">Payback Period</span><span class="stat-value" id="clr-payback">—</span></div>
</div>
<div id="clr-insight" class="calc-insight" style="display:none"></div>
<div class="btn-row" style="margin-top:0.75rem">
  <button id="clr-copy" class="secondary">Copy results</button>
  <button id="clr-share" class="secondary">Share results</button>
</div>
