<div class="field-row">
  <div class="field">
    <label for="pe-rate">Your hourly rate ($)</label>
    <input type="number" autocomplete="off" id="pe-rate" value="125" min="0" step="5">
  </div>
  <div class="field">
    <label for="pe-hours">Estimated hours</label>
    <input type="number" autocomplete="off" id="pe-hours" value="40" min="0" step="1">
  </div>
  <div class="field">
    <label for="pe-contingency">Contingency buffer (%)</label>
    <input type="number" autocomplete="off" id="pe-contingency" value="20" min="0" max="100" step="5">
  </div>
</div>
<div class="stats-grid">
  <div class="stat" data-tooltip="Hourly rate × estimated hours. The minimum quote before risk buffer. Never quote clients without adding a buffer on top."><div class="num" id="pe-out-base">$0</div><div class="label">Base estimate</div></div>
  <div class="stat" data-tooltip="Base estimate × contingency %. Budget set aside for scope creep, revisions, and unknown unknowns. 20% is the professional standard; increase for vague briefs."><div class="num" id="pe-out-contingency">$0</div><div class="label">Contingency buffer</div></div>
  <div class="stat" data-tooltip="Base estimate + contingency buffer. The figure to put in your proposal. If the client pushes back, reduce scope — not your rate."><div class="num" id="pe-out-total">$0</div><div class="label">Total quote</div></div>
</div>
<p id="pe-out-days" class="tool-short" style="margin-top:0.75rem"></p>
<div id="pe-insight" class="calc-insight" style="display:none"></div>
<div class="btn-row" style="margin-top:0.75rem">
  <button id="pe-copy" class="secondary">Copy results</button>
  <button id="pe-share" class="secondary">Share results</button>
</div>
