<div class="field-row">
  <div class="field">
    <label for="stripe-amount">Charge amount ($)</label>
    <input type="number" autocomplete="off" id="stripe-amount" value="100" min="0" step="0.01">
  </div>
  <div class="field">
    <label for="stripe-card-type">Card type</label>
    <select id="stripe-card-type">
      <option value="domestic">Domestic (2.9% + $0.30)</option>
      <option value="international">International (4.4% + $0.30)</option>
      <option value="custom">Custom rate</option>
    </select>
  </div>
</div>
<div class="field-row" id="stripe-custom-row" style="display:none">
  <div class="field">
    <label for="stripe-custom-pct">Rate (%)</label>
    <input type="number" autocomplete="off" id="stripe-custom-pct" value="2.9" min="0" max="100" step="0.01">
  </div>
  <div class="field">
    <label for="stripe-custom-fixed">Fixed fee ($)</label>
    <input type="number" autocomplete="off" id="stripe-custom-fixed" value="0.30" min="0" step="0.01">
  </div>
</div>
<div class="checkbox-row">
  <label><input type="checkbox" id="stripe-passthrough"> Charge more so you receive exactly that amount</label>
</div>
<div class="output-grid">
  <div class="output-box" data-copy-target="stripe-out-charge" data-tooltip="The amount to charge your customer. If pass-through is enabled, this is grossed up so you net your intended amount after fees.">
    <span class="label">Charge customer</span>
    <span class="value" id="stripe-out-charge"></span>
  </div>
  <div class="output-box" data-copy-target="stripe-out-fee" data-tooltip="Stripe's cut: percentage of transaction + fixed fee per charge. Domestic cards: 2.9% + $0.30.">
    <span class="label">Stripe fee</span>
    <span class="value" id="stripe-out-fee"></span>
  </div>
  <div class="output-box" data-copy-target="stripe-out-net" data-tooltip="What lands in your bank account after Stripe takes its fee.">
    <span class="label">You receive</span>
    <span class="value" id="stripe-out-net"></span>
  </div>
</div>
<div id="stripe-insight" class="calc-insight" style="display:none"></div>

<details style="margin-top:1.5rem">
  <summary style="cursor:pointer; font-weight:600; color:var(--accent)">Monthly volume estimator</summary>
  <div style="margin-top:1rem">
    <div class="field" style="max-width:220px; margin-bottom:1rem">
      <label for="stripe-monthly-txn">Transactions per month</label>
      <input type="number" autocomplete="off" id="stripe-monthly-txn" value="200" min="1" step="10">
    </div>
    <div class="stats-grid" id="stripe-volume-stats" style="display:none">
      <div class="stat"><span class="stat-label">Monthly fees</span><span class="stat-value" id="sv-monthly-fee"></span></div>
      <div class="stat"><span class="stat-label">Annual fees</span><span class="stat-value" id="sv-annual-fee"></span></div>
      <div class="stat"><span class="stat-label">Volume pricing threshold</span><span class="stat-value" id="sv-threshold"></span></div>
    </div>
    <div id="stripe-volume-insight" class="calc-insight" style="display:none; margin-top:0.75rem"></div>
  </div>
</details>

<div class="btn-row" style="margin-top:0.75rem">
  <button id="stripe-share" class="secondary">Share results</button>
  <span class="copy-feedback" id="stripe-feedback"></span>
</div>
