<div class="field-row">
  <div class="field">
    <label for="em-ebitda">EBITDA ($)</label>
    <input type="number" autocomplete="off" id="em-ebitda" value="2000000" min="0" step="100000">
  </div>
  <div class="field">
    <label for="em-multiple">EV/EBITDA multiple (×)</label>
    <input type="number" autocomplete="off" id="em-multiple" value="10" min="0" step="0.5">
  </div>
</div>
<div class="field-row">
  <div class="field">
    <label for="em-revenue">Annual revenue ($) <span style="font-size:0.8em;color:var(--text-muted)">(for margin + EV/Revenue)</span></label>
    <input type="number" autocomplete="off" id="em-revenue" value="10000000" min="0" step="100000">
  </div>
  <div class="field">
    <label for="em-rev-multiple">EV/Revenue multiple (×) <span style="font-size:0.8em;color:var(--text-muted)">(optional)</span></label>
    <input type="number" autocomplete="off" id="em-rev-multiple" value="3" min="0" step="0.5">
  </div>
</div>
<div class="field-row">
  <div class="field">
    <label for="em-debt">Total debt ($) <span style="font-size:0.8em;color:var(--text-muted)">(for equity value)</span></label>
    <input type="number" autocomplete="off" id="em-debt" value="1000000" min="0" step="100000">
  </div>
  <div class="field">
    <label for="em-cash">Cash &amp; equivalents ($)</label>
    <input type="number" autocomplete="off" id="em-cash" value="500000" min="0" step="100000">
  </div>
</div>
<div class="stats-grid">
  <div class="stat" data-tooltip="EBITDA × EV/EBITDA multiple. Enterprise value implied by your EBITDA at the given market multiple. Includes debt — use equity value for what shareholders receive."><span class="stat-label">EV (EBITDA basis)</span><span class="stat-value" id="em-ev-ebitda">—</span></div>
  <div class="stat" data-tooltip="Revenue × EV/Revenue multiple. Alternative EV estimate using revenue multiples. Common for early-stage or high-growth companies with low EBITDA."><span class="stat-label">EV (Revenue basis)</span><span class="stat-value" id="em-ev-revenue">—</span></div>
  <div class="stat" data-tooltip="EV − Total Debt + Cash. What equity holders receive in a sale or liquidation. The buyer pays EV, then assumes debt; sellers receive the equity value."><span class="stat-label">Equity Value</span><span class="stat-value" id="em-equity">—</span></div>
  <div class="stat" data-tooltip="EBITDA ÷ Revenue × 100. EBITDA margin. SaaS targets: 20–30%. Private equity sponsors often target 15%+ for acquisition candidates."><span class="stat-label">EBITDA Margin</span><span class="stat-value" id="em-margin">—</span></div>
</div>
<div id="em-insight" class="calc-insight" style="display:none"></div>
<div class="btn-row" style="margin-top:0.75rem">
  <button id="em-copy" class="secondary">Copy results</button>
  <button id="em-share" class="secondary">Share results</button>
</div>
