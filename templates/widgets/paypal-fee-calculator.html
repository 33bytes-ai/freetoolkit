<div class="field-row">
  <div class="field">
    <label for="pp-amount">Charge amount ($)</label>
    <input type="number" autocomplete="off" id="pp-amount" value="100" min="0" step="0.01">
  </div>
  <div class="field">
    <label for="pp-type">Transaction type</label>
    <select id="pp-type">
      <option value="standard">Domestic online (3.49% + $0.49)</option>
      <option value="international">International (4.99% + $0.49)</option>
      <option value="micropayment">Micropayment (5% + $0.05)</option>
      <option value="custom">Custom rate</option>
    </select>
  </div>
</div>
<div class="field-row" id="pp-custom-row" style="display:none">
  <div class="field">
    <label for="pp-custom-pct">Rate (%)</label>
    <input type="number" autocomplete="off" id="pp-custom-pct" value="3.49" min="0" max="100" step="0.01">
  </div>
  <div class="field">
    <label for="pp-custom-fixed">Fixed fee ($)</label>
    <input type="number" autocomplete="off" id="pp-custom-fixed" value="0.49" min="0" step="0.01">
  </div>
</div>
<div class="checkbox-row">
  <label><input type="checkbox" id="pp-passthrough"> Charge more so you receive exactly that amount</label>
</div>
<div class="output-grid">
  <div class="output-box" data-copy-target="pp-out-charge" data-tooltip="The amount to charge your customer. If pass-through is enabled, this is grossed up so you receive your intended net amount.">
    <span class="label">Charge customer</span>
    <span class="value" id="pp-out-charge"></span>
  </div>
  <div class="output-box" data-copy-target="pp-out-fee" data-tooltip="PayPal's fee. Standard domestic: 3.49% + $0.49. International: 4.99% + $0.49.">
    <span class="label">PayPal fee</span>
    <span class="value" id="pp-out-fee"></span>
  </div>
  <div class="output-box result-hero" data-copy-target="pp-out-net" data-tooltip="The net amount deposited to your PayPal account after fees are deducted.">
    <span class="label">You receive</span>
    <span class="value" id="pp-out-net"></span>
  </div>
</div>
<div id="pp-insight" class="calc-insight" style="display:none"></div>
<div class="btn-row" style="margin-top:0.75rem">
  <button id="pp-share" class="secondary">Share results</button>
  <span class="copy-feedback" id="pp-feedback"></span>
</div>
