# FAQPage structured data per tool slug.
# Each entry becomes a FAQPage JSON-LD block on that tool's page.
# Google uses this for rich results (FAQ dropdowns in SERPs).

stripe-fee-calculator:
  - question: "How much does Stripe charge per transaction?"
    answer: "Stripe charges 2.9% + $0.30 per successful domestic US card transaction. International cards incur an additional 1.5% cross-border fee, bringing the total to 4.4% + $0.30."
  - question: "How much does Stripe take on a $100 charge?"
    answer: "On a $100 domestic charge, Stripe takes $3.20 (2.9% × $100 = $2.90 plus the $0.30 fixed fee). You receive $96.80."
  - question: "Does Stripe charge a monthly fee?"
    answer: "No. Stripe has no monthly fee, setup fee, or minimum volume requirement. You only pay the per-transaction fee when you process a payment."
  - question: "Are Stripe fees negotiable?"
    answer: "Yes, for high-volume businesses. Stripe typically offers custom pricing for businesses processing more than $80,000 per month. Custom rates usually range from 2.2–2.5% + $0.10–$0.20."
  - question: "What happens to the Stripe fee on a refund?"
    answer: "Stripe refunds the percentage component of the fee (2.9%) but not the $0.30 fixed fee. If you refund a $100 charge, Stripe returns $2.90 but keeps the $0.30."

paypal-fee-calculator:
  - question: "How much does PayPal charge per transaction?"
    answer: "PayPal charges 2.99% + $0.49 for standard card transactions (PayPal Standard) and 3.49% + $0.49 for PayPal Checkout. These rates apply to domestic US transactions."
  - question: "How much does PayPal take on a $100 payment?"
    answer: "PayPal takes $3.49 on a $100 domestic payment via PayPal Standard (2.99% × $100 + $0.49). You receive $96.52. PayPal Checkout is more expensive at $3.98."
  - question: "Is PayPal cheaper than Stripe?"
    answer: "Generally no. PayPal Standard (2.99% + $0.49) is slightly more expensive than Stripe (2.9% + $0.30) on most transaction sizes. On a $100 payment, PayPal costs $3.49 vs Stripe's $3.20."
  - question: "Can I use PayPal Friends & Family to avoid fees?"
    answer: "No — using PayPal Friends & Family for business transactions violates PayPal's Terms of Service and can result in your account being permanently limited. It is only for personal payments with no goods or services exchanged."
  - question: "Does PayPal offer lower rates for high volume?"
    answer: "Yes. PayPal's Merchant Rate program reduces fees based on monthly sales: $3,001–$10,000/month = 2.89% + $0.49, $10,001–$100,000/month = 2.79% + $0.49. Above $100k/month, contact PayPal for custom pricing."

mrr-calculator:
  - question: "What is MRR?"
    answer: "MRR (Monthly Recurring Revenue) is the normalized monthly revenue from all active subscriptions. It converts annual, quarterly, and monthly plans into a single comparable monthly figure."
  - question: "What is the difference between MRR and ARR?"
    answer: "ARR (Annual Recurring Revenue) is simply MRR × 12. MRR is used for month-to-month operational tracking; ARR is the standard metric for investor reporting and company valuation in SaaS."
  - question: "What is a good MRR growth rate for SaaS?"
    answer: "Early-stage SaaS (under $1M ARR) typically targets 15–25% month-over-month growth. At $1M–$10M ARR, 10–20% MoM is strong. Above $10M ARR, 5–10% MoM is considered healthy."
  - question: "How do I calculate MRR from annual subscriptions?"
    answer: "Divide the annual contract value by 12. A customer paying $1,200/year contributes $100 MRR. This normalization lets you compare subscribers on different billing periods."

shopify-fee-calculator:
  - question: "How much does Shopify charge per transaction?"
    answer: "With Shopify Payments, Shopify charges 2.0% + 25¢ on Basic, 1.7% + 25¢ on the Shopify plan, and 1.5% + 25¢ on Advanced. Using a third-party payment gateway adds an extra 2.0%, 1.0%, or 0.5% transaction fee respectively."
  - question: "How can I avoid Shopify's transaction fee?"
    answer: "Use Shopify Payments (Shopify's built-in payment processor). When you use Shopify Payments, the additional per-transaction fee (0.5–2%) is waived. You only pay the card processing rate."
  - question: "Is Shopify Basic enough for most stores?"
    answer: "Yes, for most new and growing stores. Shopify Basic is sufficient until you're processing more than roughly $22,000/month in card sales — at that volume, the reduced card rate on the Shopify plan ($105/mo) starts saving more than the extra $66/month in plan fees."
  - question: "Does Shopify charge fees on manual orders?"
    answer: "Yes. Transaction fees apply to all orders processed through Shopify Checkout, including manual orders created in the admin, unless you use Shopify Payments."

runway-calculator:
  - question: "What is startup runway?"
    answer: "Runway is the number of months a startup can operate before running out of cash, calculated as: current cash balance ÷ net monthly burn rate (monthly expenses minus monthly revenue)."
  - question: "How much runway should a startup have before fundraising?"
    answer: "Most investors recommend having 6–12 months of runway when you start a fundraising process, and targeting to close a round with 3–6 months remaining. A Series A process typically takes 3–6 months end-to-end."
  - question: "What is a good burn rate for a startup?"
    answer: "There is no universal 'good' burn rate — it depends on your ARR and growth rate. A common benchmark: your burn multiple (net burn ÷ net new ARR) should be under 1.5× at Series A stage and under 1× at Series B."
  - question: "How do I extend my runway without raising?"
    answer: "The primary levers are reducing headcount costs (largest expense for most startups), cutting infrastructure and SaaS spend, accelerating revenue through annual plan discounts, and reducing CAC by shifting to lower-cost acquisition channels."

ltv-cac-calculator:
  - question: "What is a good LTV:CAC ratio?"
    answer: "The widely cited benchmark is 3:1 or higher — meaning a customer generates at least 3× their acquisition cost in lifetime value. Ratios below 1:1 mean you're losing money on every customer acquired."
  - question: "What is CAC payback period?"
    answer: "CAC payback period is the number of months to recoup the cost of acquiring a customer, calculated as: CAC ÷ (monthly revenue per customer × gross margin). Under 12 months is healthy; under 6 months is excellent."
  - question: "How do you calculate customer lifetime value (LTV)?"
    answer: "LTV = (Average Monthly Revenue per Customer × Gross Margin %) ÷ Monthly Churn Rate. For example: $99/month × 75% margin ÷ 3% churn = $2,475 LTV."
  - question: "Is a very high LTV:CAC ratio always good?"
    answer: "Not necessarily. A very high ratio (above 5:1) can indicate underinvestment in customer acquisition. If your LTV:CAC is 10:1, you might be able to grow faster by spending more on marketing."

freelance-rate-calculator:
  - question: "How do I calculate my freelance hourly rate?"
    answer: "Start with your annual income target, add expenses and taxes, then divide by billable hours. Formula: (Annual target + Expenses) ÷ (1 - Tax rate) ÷ (Weeks × Hours per week × Billable %). A $80k target at 30% tax with 1,200 billable hours = ~$95/hour."
  - question: "What percentage of hours should a freelancer expect to bill?"
    answer: "Most freelancers bill 50–70% of working hours. The remaining 30–50% goes to business development, admin, learning, and non-billable project work. Use 60–65% as a conservative starting estimate."
  - question: "Should my day rate be 8× my hourly rate?"
    answer: "Yes, by convention a standard day rate is 8× your hourly rate. However, many freelancers quote half-day rates at 5× (not 4×) to reflect the fixed overhead of any client engagement."
  - question: "How do taxes affect my freelance rate?"
    answer: "Self-employed freelancers pay income tax plus self-employment tax (15.3% in the US for Social Security and Medicare). At a 30% combined effective rate, you need to charge ~43% more than an equivalent salaried gross to net the same take-home pay."

vat-calculator:
  - question: "How do I calculate VAT from a price including VAT?"
    answer: "To find the VAT amount in a VAT-inclusive price: VAT = Price ÷ (1 + VAT rate) × VAT rate. For a £120 price at 20% VAT: £120 ÷ 1.20 × 0.20 = £20 VAT. The ex-VAT price is £100."
  - question: "When do I need to register for VAT in the UK?"
    answer: "You must register for VAT in the UK when your taxable turnover exceeds £90,000 in any rolling 12-month period (2024–25 threshold). You can also register voluntarily below this threshold."
  - question: "Does Stripe collect VAT automatically?"
    answer: "Stripe Tax (an add-on product) can automatically calculate and collect VAT, GST, and sales tax on transactions. Without Stripe Tax, you are responsible for calculating and collecting the correct VAT amount yourself."

break-even-calculator:
  - question: "What is break-even analysis?"
    answer: "Break-even analysis determines the sales volume at which total revenue equals total costs — the point where the business neither profits nor loses. It is calculated as: Fixed Costs ÷ (Price per unit − Variable cost per unit)."
  - question: "What is contribution margin?"
    answer: "Contribution margin = Revenue − Variable costs. It is the amount each unit sold contributes toward covering fixed costs and, after break-even, toward profit. Expressed as a percentage: Contribution Margin % = (Price − Variable Cost) ÷ Price × 100."
  - question: "How do I use break-even analysis for a SaaS pricing decision?"
    answer: "For SaaS, treat fixed costs as monthly infrastructure + salaries, variable costs as hosting per customer + support cost per customer, and price as the monthly subscription fee. The break-even customer count tells you the minimum number of paying customers you need to cover costs."

churn-impact-calculator:
  - question: "What is a good monthly churn rate for SaaS?"
    answer: "Best-in-class SaaS companies target under 0.5% monthly churn (about 6% annual). 1–2% monthly is acceptable for early-stage products. Above 3% monthly is a serious retention problem that will prevent compounding MRR growth."
  - question: "How much does reducing churn by 1% increase revenue long-term?"
    answer: "The impact compounds significantly over time. For a $50k MRR business with 5% monthly churn, dropping to 4% increases 12-month projected MRR by roughly 12–15%. At 3% churn, the same business would have nearly double the MRR after two years compared to 5%."
  - question: "What is the difference between customer churn and revenue churn?"
    answer: "Customer churn is the percentage of customers who cancel. Revenue churn is the percentage of MRR lost. They differ when customers on different plans churn differently. Net revenue retention (NRR) also counts upgrades: NRR above 100% means expansion revenue more than offsets cancellations."
  - question: "How do I calculate monthly churn rate?"
    answer: "Monthly churn rate = Customers lost in the month ÷ Customers at start of month. For MRR churn: MRR lost ÷ MRR at start of month. Track both: a low customer churn but high revenue churn means your largest customers are leaving."
  - question: "What is net revenue retention (NRR) and what is a good NRR?"
    answer: "NRR measures how much revenue you keep from existing customers including upgrades, downgrades, and cancellations. NRR = (Starting MRR + Expansions − Contractions − Churns) ÷ Starting MRR. Above 100% means your existing base grows without new sales. 120%+ NRR is world-class."

salary-to-hourly-calculator:
  - question: "How do I convert an annual salary to an hourly rate?"
    answer: "Divide your annual salary by total working hours per year. Standard calculation: Annual salary ÷ 2,080 hours (52 weeks × 40 hours/week). A $100,000 salary = $48.08/hour gross. Adjust for part-time hours or fewer weeks worked."
  - question: "How many billable hours are in a work year?"
    answer: "A standard US work year has 2,080 hours (52 weeks × 40 hours). After accounting for 10 public holidays and 15 vacation days, effective working hours drop to about 1,880. Subtract 30% for non-project overhead and you get approximately 1,300–1,400 truly productive hours."
  - question: "What is the true hourly cost of a salaried employee?"
    answer: "A salaried employee costs the employer 1.25–1.4× their gross salary when you include employer-side payroll taxes (7.65% FICA in the US), health benefits, paid leave, 401k matching, and office overhead. A $80k salary often costs $100k–$112k total."
  - question: "Should I compare my salary to a contractor rate?"
    answer: "Yes, but carefully. A contractor charging $100/hour earns $208,000 at 2,080 hours — but pays self-employment tax (~15%), has no benefits, and must find their own work. To compare: subtract ~30% from the contractor rate (for taxes + benefits + downtime) to get the equivalent full-time salary value."
  - question: "What does gross vs net hourly rate mean?"
    answer: "Gross hourly rate is before any deductions (your full salary ÷ hours). Net hourly rate is what you take home after income tax, Social Security, and Medicare. At a 25% effective tax rate, a $50/hour gross becomes approximately $37.50/hour net."

profit-margin-calculator:
  - question: "What is a good gross margin for a SaaS company?"
    answer: "SaaS companies typically target 70–80% gross margin. Horizontal SaaS (tools, productivity) often achieves 75–85%. Vertical SaaS with professional services tends toward 60–70%. Gross margins below 50% are a concern for investors at growth stages."
  - question: "What is the difference between gross, operating, and net profit margin?"
    answer: "Gross margin subtracts cost of goods sold (COGS) from revenue. Operating margin further subtracts operating expenses (R&D, S&M, G&A). Net margin is the bottom line after taxes and interest. For SaaS, gross margin is most important — it determines how much you have left to invest in growth."
  - question: "What operating profit margin should a SaaS aim for?"
    answer: "Early-stage SaaS typically operates at negative operating margins as they invest in growth. At scale ($10M+ ARR), 15–25% operating margin is healthy. Public SaaS companies trade at premium valuations when they achieve 20%+ operating margins while maintaining 20%+ growth."
  - question: "How does the Rule of 40 use profit margin?"
    answer: "The Rule of 40 states that a healthy SaaS company's revenue growth rate plus profit margin should be at least 40. If you're growing at 50%, you can operate at -10% margin. If growth has slowed to 20%, you need a 20% profit margin to maintain the same score."
  - question: "What is EBITDA margin and why do investors use it?"
    answer: "EBITDA margin = EBITDA ÷ Revenue. EBITDA (Earnings Before Interest, Taxes, Depreciation, and Amortization) removes accounting choices from the profitability picture. Investors use it to compare profitability across companies with different capital structures and depreciation schedules."

arr-mrr-converter:
  - question: "What is the difference between ARR and MRR?"
    answer: "ARR (Annual Recurring Revenue) is simply MRR × 12. MRR is used for monthly operational tracking and board reporting. ARR is the standard for investor communications, company valuations, and comparisons to public SaaS benchmarks. Both measure the same underlying subscription revenue."
  - question: "How do you calculate ARR from a mix of annual and monthly subscribers?"
    answer: "Normalize all contracts to monthly: divide annual contracts by 12, leave monthly contracts as-is. Sum all normalized monthly values to get MRR, then multiply by 12 for ARR. A customer paying $1,200/year contributes $100 MRR / $1,200 ARR."
  - question: "What is a good ARR growth rate for SaaS?"
    answer: "T2D3 (triple, triple, double, double, double) is a benchmark VC pattern: triple ARR in years 1–2, double it in years 3–5. In practice: under $1M ARR, 100%+ year-over-year is strong; $1M–$10M ARR, 80–100% is excellent; $10M–$50M ARR, 50–80% is healthy."
  - question: "Does ARR include one-time fees or professional services revenue?"
    answer: "No. ARR and MRR only include recurring subscription revenue. One-time setup fees, professional services, and usage-based overages are excluded (or tracked separately as non-recurring revenue). Mixing them inflates the recurring metric and distorts forecasts."
  - question: "What is daily recurring revenue and when is it useful?"
    answer: "Daily Recurring Revenue = ARR ÷ 365. It's useful for cohort analysis, calculating per-customer daily revenue, and communicating growth momentum (e.g., 'adding $5k DRR every week'). Some founders track weekly recurring revenue (WRR = ARR ÷ 52) for similar purposes."

nps-calculator:
  - question: "What is a good NPS score?"
    answer: "NPS benchmarks vary by industry. For SaaS/software, above 40 is good, above 60 is excellent, and above 70 is world-class. Consumer electronics average around 60. Healthcare averages around 50. Any score above 0 means more promoters than detractors."
  - question: "How is NPS calculated?"
    answer: "Survey customers on a 0–10 scale: 'How likely are you to recommend us?' Promoters score 9–10, Passives 7–8, Detractors 0–6. NPS = % Promoters − % Detractors. Passives are ignored. Range is -100 (all detractors) to +100 (all promoters)."
  - question: "How often should I run NPS surveys?"
    answer: "Most SaaS companies run transactional NPS surveys (triggered by key events like onboarding completion or feature use) and/or relationship NPS surveys (sent to all customers quarterly or semi-annually). Avoid surveying the same customer more than once every 90 days."
  - question: "What is a response rate for NPS surveys?"
    answer: "Typical email NPS survey response rates are 5–30%. In-app surveys achieve 10–40%. A response rate above 20% is generally considered good enough to be statistically meaningful. Low response rates can introduce bias if non-responders differ from responders."
  - question: "What should I do with NPS detractors?"
    answer: "Follow up with all detractors within 24–48 hours. A personal reply asking what went wrong and how you could improve converts a meaningful percentage to neutral or positive outcomes. Detractor follow-up also provides the highest-signal qualitative data for product and support improvements."

rule-of-40-calculator:
  - question: "What is the Rule of 40 in SaaS?"
    answer: "The Rule of 40 states that a healthy SaaS company's revenue growth rate plus its profit margin (EBITDA or free cash flow margin) should sum to at least 40. It balances growth against profitability, allowing high-growth companies to run at a loss and mature companies to compensate with strong margins."
  - question: "How do you calculate the Rule of 40 score?"
    answer: "Rule of 40 = YoY Revenue Growth Rate (%) + Operating/EBITDA Profit Margin (%). Example: 50% growth + -15% operating margin = 35 (fails). 60% growth + 5% margin = 65 (passes strongly). Use trailing 12 months for both figures."
  - question: "What Rule of 40 score do investors expect?"
    answer: "For Series B and later, investors expect at least 40 on the Rule of 40 to justify premium growth-stage multiples. Top-quartile SaaS companies typically score 50–70. Public SaaS companies with scores above 60 tend to trade at significantly higher revenue multiples."
  - question: "Does the Rule of 40 apply to early-stage startups?"
    answer: "The Rule of 40 is most relevant from Series A onward. Pre-product-market-fit startups should focus on growth efficiency (LTV:CAC, payback period) rather than the Rule of 40. Very early companies often have misleadingly high growth rates (150%+ from a small base) that don't reflect rule of 40 in a meaningful way."
  - question: "What margin metric should I use — EBITDA or free cash flow?"
    answer: "Both are used. EBITDA margin is simpler to calculate and compare across companies. Free cash flow margin (FCF) is more conservative and better reflects actual cash generation. For SaaS with significant stock-based compensation, some analysts prefer FCF-based Rule of 40 to avoid overstatement."

price-impact-calculator:
  - question: "How does a price increase affect revenue when some customers churn?"
    answer: "New Revenue = New Price × (Customers × Retention Rate). You need to find the break-even retention: (Current Revenue) ÷ (New Price × Total Customers). If break-even retention is 80%, you can lose up to 20% of customers and still maintain revenue — then grow it as retained customers pay more."
  - question: "What is price elasticity of demand?"
    answer: "Price elasticity measures how much demand changes with a price change. Elasticity = % Change in Quantity ÷ % Change in Price. A value below 1 (inelastic) means customers absorb price increases with minimal churn — common in B2B SaaS with high switching costs. Above 1 (elastic) means pricing changes significantly affect customer count."
  - question: "How much churn should I expect when raising SaaS prices?"
    answer: "For existing customers, price increases of 10–15% typically cause 3–8% additional churn. Increases of 25–50% may cause 10–20% churn, heavily dependent on notice period and grandfathering policy. Notifying 90+ days in advance, locking in current pricing for a fixed period, and framing increases around added value reduces churn substantially."
  - question: "When is the right time to raise SaaS prices?"
    answer: "Strong indicators: customers say pricing is 'too low,' your expansion revenue is low (customers aren't upgrading), your LTV:CAC is above 5:1, or you're adding features that competitors charge significantly more for. The best time is after establishing a strong customer success track record, typically 12–24 months post-launch."
  - question: "Should I grandfather existing customers when raising prices?"
    answer: "It depends on your business stage. Grandfathering reduces short-term churn and maintains goodwill but leaves revenue on the table and creates a complex multi-tier pricing structure over time. Most B2B SaaS companies give existing customers 6–12 months at current pricing before migrating them to new rates."

freelance-project-estimate:
  - question: "How do I estimate a freelance project accurately?"
    answer: "Break the project into phases and tasks, estimate hours for each, then multiply by your hourly rate. Add a contingency buffer of 15–30% for scope creep, unknowns, and revision cycles. Fixed-price projects should be scoped with a detailed Statement of Work to prevent unlimited revisions."
  - question: "What contingency buffer should I add to freelance estimates?"
    answer: "15–20% for well-scoped projects with familiar technology. 25–35% for new domains, vague requirements, or clients who are new to the process. For discovery/research phases with inherently uncertain scope, consider time-and-materials billing instead of fixed price."
  - question: "Should I charge hourly or by project as a freelancer?"
    answer: "Project-based pricing is better for defined deliverables because you can earn a premium for speed and efficiency. Hourly is better when scope is unclear or likely to change. Most experienced freelancers use project pricing for most work and hourly for ongoing retainers or change requests outside original scope."
  - question: "How do I handle scope creep in a fixed-price project?"
    answer: "Define scope clearly in the contract with a clause stating that changes outside the agreed scope are billed at your hourly rate. When a client requests out-of-scope work, issue a Change Order estimating additional hours and cost before proceeding. Scope creep is the #1 cause of unprofitable freelance projects."
  - question: "What is a minimum project fee for a freelancer?"
    answer: "Most experienced freelancers set a minimum engagement fee to avoid small projects that consume disproportionate admin time. A common rule: don't take projects shorter than 3 days or under $1,000–$2,500 depending on your rate. Small projects have the same onboarding, scoping, and invoicing overhead as large ones."

cac-by-channel-calculator:
  - question: "How do you calculate CAC by marketing channel?"
    answer: "Channel CAC = Total spend on that channel ÷ Number of customers acquired through it. Include both direct spend (ad budget, tool subscriptions) and staff time (hours × loaded hourly rate). Blended CAC averages across all channels; channel-level CAC reveals which sources are most efficient."
  - question: "What is a good CAC for B2B SaaS?"
    answer: "CAC benchmarks depend heavily on price point and sales motion. A SaaS product with a $100/month ACV might target CAC under $300. At $500/month ACV, CAC up to $3,000 can be justified if LTV is strong. The key ratio is LTV:CAC above 3:1 and payback period under 18 months."
  - question: "What costs should be included in CAC calculation?"
    answer: "Include all costs attributable to acquiring customers: marketing spend (ads, content, events), sales team salaries + commissions (fully loaded), tools and software used in sales/marketing, and a prorated share of marketing leadership time. Excluding sales salaries understates true CAC by 2–5× for most B2B companies."
  - question: "How do I attribute customers acquired through multiple touchpoints?"
    answer: "Common attribution models: Last-touch (simplest — credit the channel that closed the deal), first-touch (credit the channel that started awareness), and linear (split credit equally across all touchpoints). Most B2B companies use last-touch or CRM-defined attribution. Multi-touch attribution tools provide more accuracy but require robust tracking."
  - question: "When is a marketing channel worth scaling?"
    answer: "A channel is worth scaling when: (1) channel CAC is below your LTV ÷ 3, (2) the channel has demonstrated consistent conversion rates over 90+ days, and (3) you have evidence of CAC stability at 2–3× current spend. Channels that work at $5k/month often break down at $50k/month due to audience saturation."

pricing-tier-comparison:
  - question: "How many pricing tiers should a SaaS product have?"
    answer: "Three tiers is the standard (Good/Better/Best or Starter/Pro/Enterprise). It gives customers a choice anchoring effect and a clear upgrade path. Two tiers work for very focused products; four or more usually adds confusion. The middle tier should be your primary conversion target."
  - question: "What is the difference between freemium and free trial?"
    answer: "Freemium offers a permanently free tier with limited features. Free trial gives full or near-full product access for a limited time (typically 14–30 days). Freemium works when the free tier demonstrates genuine value and has clear upgrade triggers. Free trials work when value is experienced quickly and the conversion window is long enough to do so."
  - question: "How do I set prices for SaaS tiers?"
    answer: "Start with value-based pricing: what outcome does each tier enable, and what is that outcome worth to the target customer? Common approaches: 10× value rule (price at 10% of the value delivered), competitive anchoring (price relative to alternatives), and cost-plus with target gross margin (floor, not ceiling)."
  - question: "What is anchoring in SaaS pricing?"
    answer: "Anchoring is placing a higher-priced tier first so customers perceive the middle tier as a good deal. Showing an 'Enterprise' tier at $500/month makes the $99/month 'Pro' tier feel affordable. Always include a high-end anchor even if most customers won't buy it — it shifts the reference point for all other tiers."
  - question: "Should a SaaS show pricing publicly?"
    answer: "Yes for PLG (product-led growth) and self-serve SaaS. Showing pricing reduces friction, attracts self-qualified leads, and often improves conversion. Exception: enterprise/high-ACV products ($1,000+/month) where pricing complexity requires a sales conversation. Hiding prices from SMB products typically increases bounce rate."

sales-quota-calculator:
  - question: "How do you set a realistic sales quota?"
    answer: "Start with your revenue target, divide by ACV to get deals needed. Then divide by win rate to get qualified opps needed, and by MQL-to-SQL conversion to get leads needed. Build this backward from the number — then reality-check whether your pipeline can generate that volume given historical conversion rates."
  - question: "What is a realistic SaaS sales close rate?"
    answer: "Outbound B2B SaaS close rates from qualified opportunity to close: 15–25% is typical. Inbound leads (already interested) close at 20–35%. Account-based sales to enterprise close at 30–50% but take 3–12 months. Overall, 20% close rate is a common benchmark for planning purposes."
  - question: "How long is a typical SaaS sales cycle?"
    answer: "SMB/self-serve: 1–14 days. Mid-market ($1k–10k ACV): 30–90 days. Enterprise ($50k+ ACV): 3–12 months. Sales cycle length is the primary driver of required pipeline coverage ratio. At a 90-day cycle, you need 3–4× your quarterly target in qualified pipeline."
  - question: "What is pipeline coverage ratio and how much should I have?"
    answer: "Pipeline coverage = value of qualified opportunities ÷ quota. A 3–4× pipeline coverage is standard for a 90-day sales cycle. If you need $1M in closed revenue next quarter, you should have $3–4M in qualified pipeline. Coverage below 2.5× typically results in missed quota."
  - question: "How do you calculate leads needed to hit a revenue target?"
    answer: "Leads needed = (Revenue target ÷ ACV) ÷ Close rate ÷ MQL-to-opportunity rate. Example: $1M target, $12k ACV, 20% close rate, 40% MQL conversion = (83 deals) ÷ 0.20 = 417 opps ÷ 0.40 = 1,042 MQLs. This pipeline math determines your marketing budget."

email-roi-calculator:
  - question: "What is a good email open rate?"
    answer: "Average open rates vary by industry: SaaS/tech newsletters typically see 20–30% open rates. Transactional emails (receipts, confirmations) average 40–60%. Cold outreach averages 15–25%. Since iOS 15's Mail Privacy Protection (2021), open rates from Apple Mail are inflated — click rate is now a more reliable engagement metric."
  - question: "How do you calculate email marketing ROI?"
    answer: "Email ROI = (Revenue generated − Cost of email program) ÷ Cost × 100. Revenue = List size × Open rate × Click rate × Conversion rate × Average order value. Industry average email marketing ROI is often cited as 36:1 to 42:1 ($36–42 return per $1 spent), making it the highest ROI digital channel."
  - question: "What click-through rate should I expect from email?"
    answer: "Average click-through rates (CTR) for email marketing: 2–5% for newsletters, 5–10% for promotional emails to warm lists, 1–3% for cold outreach. A click rate above 5% for a newsletter to 10,000+ subscribers is considered excellent. Monitor click-to-open rate (clicks ÷ opens) for content quality signal."
  - question: "What email frequency maximizes revenue without unsubscribes?"
    answer: "For SaaS/B2B audiences: 1–4 emails per month is the typical sweet spot. Weekly emails work when content is consistently high-value. Daily emails cause high unsubscribe rates in B2B but can work in B2C (e.g., flash deals). Test by splitting your list and measuring both unsubscribe rate and revenue per email."
  - question: "How do I improve email conversion rate?"
    answer: "Focus on: (1) List quality — sending to engaged, opted-in subscribers dramatically outperforms large unengaged lists. (2) Segmentation — relevant emails convert 3–5× better than batch-and-blast. (3) Single clear CTA — one ask per email. (4) Mobile optimization — 60%+ of email opens are on mobile. (5) Subject line testing — a/b test subject lines to improve open rate before optimizing the body."

invoice-total-calculator:
  - question: "How do I add tax to an invoice?"
    answer: "Tax is calculated on the subtotal (after any discounts): Tax amount = Subtotal × Tax rate. Total = Subtotal + Tax. For example: $1,000 subtotal with 10% tax = $100 tax = $1,100 total. In most jurisdictions, VAT/GST/sales tax is applied after discounts."
  - question: "Should I show prices with or without tax on an invoice?"
    answer: "B2B invoices typically show the net (ex-tax) price, then add tax as a separate line item. B2C invoices often show the tax-inclusive price. Check your jurisdiction's invoicing requirements — many countries require VAT-registered businesses to show both the ex-VAT price and VAT amount separately."
  - question: "When is a discount applied before or after tax on an invoice?"
    answer: "Discounts are applied to the subtotal before tax. This means the tax is calculated on the discounted amount. If you quote $1,000 with a 10% discount, the discounted price is $900, and sales tax is applied to $900, not $1,000."
  - question: "What should a professional invoice include?"
    answer: "Required fields: your business name and address, client name and address, unique invoice number, invoice date, payment due date, itemized list of products/services with quantities and rates, subtotal, taxes, and total. For VAT-registered businesses in the EU/UK, also include your VAT registration number."
  - question: "What is a net-30 payment term?"
    answer: "Net-30 means payment is due 30 days from the invoice date. Other common terms: Net-15 (15 days), Net-60 (60 days), 2/10 Net-30 (2% early-payment discount if paid within 10 days, otherwise net-30 applies). For freelancers and agencies, Net-15 or Net-30 is standard; shorter terms improve cash flow."

payment-fee-comparison:
  - question: "Which payment processor charges the lowest fees?"
    answer: "Shopify Payments (Advanced plan) has the lowest rate at 1.5% + $0.25, but requires a Shopify store and a $399/mo subscription. For businesses not on Shopify, Stripe (2.9% + $0.30) beats PayPal Standard (2.99% + $0.49) on transactions above $15."
  - question: "How much cheaper is Shopify Payments vs Stripe?"
    answer: "On a $100 transaction: Shopify Basic = $2.25 fee, Stripe = $3.20 fee — Shopify is $0.95 cheaper. But Shopify Basic requires a $39/mo plan. You'd need $4,100+/mo in Stripe volume to break even on the plan cost when comparing to the Stripe savings."
  - question: "Does PayPal charge more than Stripe?"
    answer: "Yes. PayPal Standard charges 2.99% + $0.49 vs Stripe's 2.9% + $0.30. On a $100 transaction, PayPal Standard takes $3.48 vs Stripe's $3.20 — PayPal is $0.28 more expensive. PayPal Checkout (3.49% + $0.49) is significantly more expensive than both."
  - question: "Can I use Stripe on Shopify without paying extra fees?"
    answer: "Yes, but Shopify charges a third-party transaction fee (0.5%–2% depending on your plan) if you use any payment processor other than Shopify Payments. At $10,000/mo, that adds $50–$200 in Shopify surcharges. Shopify Payments (powered by Stripe's infrastructure) eliminates this fee."

subscription-churn-revenue:
  - question: "What is a good monthly churn rate for SaaS?"
    answer: "Under 1% monthly churn (< 11% annual) is excellent, typical for enterprise SaaS with annual contracts. 1–3% monthly is good for SMB SaaS. Above 5% monthly is critical — you'd lose more than half your MRR base annually, making it nearly impossible to grow through acquisition alone."
  - question: "How do I calculate annual revenue lost to churn?"
    answer: "Multiply your MRR by your monthly churn rate to get the monthly revenue lost. Multiply that by 12 for the annual figure. Example: $50,000 MRR × 4% churn = $2,000 lost per month, $24,000 per year. Note this assumes a static MRR base — in practice, the compounding effect is larger."
  - question: "How much new MRR do I need to break even with churn?"
    answer: "To stay flat, you need new MRR equal to churned MRR each month. If you churn $1,500/mo, you need $1,500 in new MRR just to stay at the same level. To grow 5% on top of that, add another 5% of your MRR — so at $30,000 MRR with 5% churn, you need $1,500 (offset) + $1,500 (growth) = $3,000 new MRR/mo."
  - question: "What is average customer lifetime and how is it calculated?"
    answer: "Average customer lifetime in months equals 1 divided by the monthly churn rate. At 2% monthly churn, average lifetime is 1/0.02 = 50 months (~4.2 years). At 10% churn, it drops to 10 months. Multiply by ARPU to get your average LTV per customer."

arr-growth-rate-calculator:
  - question: "How do I calculate ARR growth rate?"
    answer: "ARR growth rate = ((Current ARR − Previous ARR) / Previous ARR) × 100. If your ARR was $500k a year ago and is $1M today, your YoY growth rate is 100%. This is the most common benchmark used by investors and SaaS analysts."
  - question: "What is a good ARR growth rate for SaaS?"
    answer: "At less than $1M ARR, 100%+ YoY is expected. At $1–5M ARR, 80–150% is strong. At $10–20M ARR, 60–100% is solid. Growth naturally slows as ARR scales — a $100M ARR company growing 30% is adding $30M in new ARR, which is still exceptional in absolute terms."
  - question: "What does T2D3 mean in SaaS?"
    answer: "T2D3 stands for 'triple twice, double three times.' Starting from around $1M ARR, the path is: triple in year 1, triple again in year 2, then double in years 3, 4, and 5. This takes a company from $1M to $72M ARR over five years and represents the benchmark growth trajectory VCs expect from Series A/B investments."
  - question: "How many years will it take to reach my ARR target?"
    answer: "Years to target = log(target ARR / current ARR) / log(1 + annual growth rate). At 100% YoY growth from $1M ARR, reaching $10M takes 3.3 years. At 50% growth from $1M, it takes 5.3 years. The calculator computes this instantly — just enter your current ARR, year-ago ARR, and target."

saas-pricing-calculator:
  - question: "How do I calculate the minimum price for my SaaS product?"
    answer: "Minimum price = cost per customer / (1 − target gross margin). If your monthly infrastructure and support costs are $8 per customer and you want 75% gross margin: $8 / (1 - 0.75) = $32/month minimum. Any price below this destroys gross profit per customer."
  - question: "What gross margin should a SaaS company target?"
    answer: "70–80% gross margin is the SaaS benchmark. Below 60% is concerning for investor presentations and unit economics. Pure software companies with no services or support headcount can reach 85–90%. Managed service or professional services components bring this number down significantly."
  - question: "Should I offer monthly and annual pricing?"
    answer: "Yes. Offering annual prepayment at 15–20% off reduces monthly churn (customers who pay annually churn 3–5× less), improves cash flow, and signals commitment. The break-even on the discount is typically 3–4 months of reduced churn. Most SaaS companies see 30–50% of new customers choose annual billing when offered."
  - question: "How should I structure my SaaS pricing tiers?"
    answer: "Three tiers is the industry standard: Starter (captures SMB / price-sensitive), Pro (your anchor and primary revenue driver), and Business/Enterprise (captures high-value customers). Price the Pro tier at or near the market benchmark for your segment, the Starter at 40–60% of Pro, and Business at 2–3× Pro."

unit-economics-calculator:
  - question: "What is a good CAC payback period for SaaS?"
    answer: "Under 12 months is excellent for self-serve SaaS. Under 18 months is the standard VC benchmark for growth-stage companies. Enterprise SaaS with longer sales cycles can tolerate 18–24 months, but anything above 24 months means growth is capital-intensive and requires continuous fundraising to sustain."
  - question: "What is the LTV:CAC ratio benchmark for SaaS?"
    answer: "3:1 is the widely-cited SaaS benchmark — you generate $3 in lifetime gross profit for every $1 spent acquiring a customer. Most VCs want to see 3× or above before investing at scale. Below 1× means you're destroying value with every customer acquired."
  - question: "What is the SaaS Magic Number?"
    answer: "The Magic Number measures go-to-market efficiency: net new ARR this quarter divided by S&M spend last quarter. Above 0.75 is healthy; above 1.0 means every dollar spent on sales and marketing generates more than $1 in new ARR. Below 0.5 means your go-to-market is inefficient and you should fix the funnel before scaling spend."
  - question: "How do I calculate customer lifetime value (LTV)?"
    answer: "LTV = MRR per customer × gross margin % × average customer lifetime in months. For example: $99/month × 75% margin × 36 months = $2,673 LTV. This represents the total gross profit generated over the customer relationship — not revenue."

customer-health-score:
  - question: "What is a customer health score?"
    answer: "A customer health score is a composite metric (typically 0–100) that combines multiple signals — product usage, login frequency, NPS/satisfaction, support ticket status, and expansion signals — into a single number that predicts churn risk and expansion potential. Scores below 40 indicate high churn risk; scores above 80 indicate expansion candidates."
  - question: "What dimensions should I include in a customer health score?"
    answer: "The most predictive dimensions are: product usage (30% weight), engagement/login frequency (25%), NPS/satisfaction (20%), support health (15%), and growth/expansion signals (10%). Usage and engagement are the highest-weighted because they directly measure whether the customer is getting value from your product."
  - question: "How often should I update customer health scores?"
    answer: "Update daily or weekly for automated signals (logins, feature usage). Update monthly or quarterly for survey-based signals (NPS, CSAT). Review all accounts below 50 weekly in your CS team stand-up. Escalate any account that drops 20+ points in a single week."
  - question: "At what health score should I intervene?"
    answer: "A score below 60 warrants a scheduled check-in call. Below 40 requires immediate CSM escalation. Below 30 indicates high churn probability and should trigger an executive escalation or an emergency product training session."

revenue-growth-calculator:
  - question: "What is a good monthly revenue growth rate for SaaS?"
    answer: "5–10% MoM is solid growth for an early-stage SaaS (60–214% annualised). 15–20%+ MoM is exceptional and venture-backable. T2D3 pace in the early years requires roughly 26% MoM growth. Below 3% MoM is concerning unless you're already at significant scale."
  - question: "How do I calculate CAGR (Compound Annual Growth Rate)?"
    answer: "CAGR = (ending value / beginning value)^(1/years) − 1. Example: growing from $500k to $4M ARR over 3 years = ($4M/$500k)^(1/3) − 1 = 100% CAGR. This represents the smoothed annualised growth rate, ignoring volatility between periods."
  - question: "What is the Rule of 72 for startup growth?"
    answer: "Divide 72 by your annual growth rate to estimate doubling time. Growing at 72% YoY doubles revenue every ~1 year. Growing at 36% YoY doubles every ~2 years. It's an approximation, but accurate enough for planning headcount and infrastructure."
  - question: "What is T2D3 growth in SaaS?"
    answer: "T2D3 stands for Triple, Triple, Double, Double, Double — the growth trajectory from $1M to ~$96M ARR over 5 years. It was popularized by Bessemer Venture Partners as the benchmark for venture-scale SaaS. A company at $2M ARR following T2D3 would reach $6M, $18M, $36M, $72M, $144M ARR in successive years."

nrr-calculator:
  - question: "What is Net Revenue Retention (NRR)?"
    answer: "NRR measures what percentage of your starting MRR you retained over a period, including expansion (upgrades, upsells) and subtracting contraction (downgrades) and churn. Formula: (Starting MRR + Expansion − Contraction − Churn) ÷ Starting MRR × 100. Above 100% means existing customers are growing your revenue without any new sales."
  - question: "What is a good NRR for SaaS?"
    answer: "110–120% NRR is the benchmark for healthy growth-stage SaaS. Above 120% is excellent. Above 130% is world-class (Snowflake, Twilio, and similar PLG companies). Below 100% means you're losing net revenue from existing customers and must replace it with new logos every month."
  - question: "What is the difference between NRR and GRR?"
    answer: "GRR (Gross Revenue Retention) measures only the revenue you kept — it can never exceed 100% because it excludes expansion. NRR includes expansion MRR and can exceed 100%. Use GRR to measure churn effectiveness alone; use NRR to measure the combined health of your expansion and retention motion."
  - question: "How do I improve NRR?"
    answer: "Two levers: reduce churn (improve onboarding, increase product stickiness, add CS coverage for at-risk accounts) and increase expansion (build natural upsell triggers, seat-based pricing, feature gating, annual plan incentives). For most companies, reducing churn has faster impact since expansion requires product and sales investment."

burn-multiple-calculator:
  - question: "What is Burn Multiple in SaaS?"
    answer: "Burn Multiple = net cash burn / net new ARR added in the same period. It measures how much you spend to generate each dollar of new ARR. A 1.0x Burn Multiple means you burn exactly $1 for every $1 of ARR you add. Below 1.0x is efficient; above 2.0x is concerning."
  - question: "What is a good Burn Multiple for a SaaS startup?"
    answer: "Under 1.0x is excellent. 1.0-1.5x is good and investable at Series A. 1.5-2.0x is acceptable if you're pre-product-market fit. Above 2.0x is concerning and typically requires a plan to improve efficiency before scaling spend further."
  - question: "What is the difference between Burn Multiple and Magic Number?"
    answer: "Magic Number measures S&M efficiency (net new ARR / last quarter S&M spend). Burn Multiple measures total operational efficiency (net burn / net new ARR). Burn Multiple is harder to game — it captures all spending including R&D, G&A, and COGS, not just sales and marketing."
  - question: "How do I reduce my Burn Multiple?"
    answer: "Two levers: reduce burn (cut low-ROI spending, improve gross margin, reduce headcount in non-GTM functions) or increase net new ARR (fix conversion funnel, improve retention to reduce churn, add expansion motion). Reducing burn is usually faster."

email-list-growth-calculator:
  - question: "How do I calculate email list growth rate?"
    answer: "Monthly growth rate = (new subscribers - churned subscribers) / starting list size × 100. For example: 300 new, 100 churned (2% churn on 5,000 list), net growth = 200, growth rate = 200/5000 = 4%/month. Annualised, that's about 60% list growth per year."
  - question: "What is a good email list churn rate?"
    answer: "Industry average is 2-3% monthly unsubscribe rate. Below 1.5% is excellent. Above 4% suggests deliverability problems, irrelevant content, or a mismatch between acquisition source and email content. Always monitor both unsubscribes and hard bounces."
  - question: "How many new subscribers do I need each month to grow my list?"
    answer: "You need new subscribers > (list size × monthly churn rate) just to stay flat. To grow a 10,000-subscriber list at 2% monthly churn, you need more than 200 new subscribers per month to see any net growth."
  - question: "How fast should an email list grow?"
    answer: "2-4% monthly growth is average. Above 5%/month is strong. Below 1% means your acquisition funnel needs work. A new list growing from 0 can grow faster; a large mature list will naturally have lower percentage growth even with the same absolute numbers."

ad-roas-calculator:
  - question: "What is ROAS and how is it calculated?"
    answer: "ROAS (Return on Ad Spend) = Revenue from ads ÷ Ad spend. A 4× ROAS means you generated $4 in revenue for every $1 spent on advertising. It's a revenue multiple, not a profit multiple — whether it's profitable depends on your gross margin."
  - question: "What is breakeven ROAS?"
    answer: "Breakeven ROAS = 1 ÷ Gross Margin %. If your gross margin is 50%, you need at least 2× ROAS to break even. If it's 30%, you need 3.33×. Any ROAS below your breakeven means you're losing money on ads even if revenue looks good."
  - question: "What is a good ROAS for Google Ads?"
    answer: "There is no universal 'good ROAS' — it depends entirely on your gross margin. Calculate your breakeven ROAS first (1 ÷ gross margin %). For most e-commerce with 40–50% margins, a 4–5× ROAS is profitable. For lower-margin products, you need higher ROAS to profit."
  - question: "What is the difference between ROAS and ROI?"
    answer: "ROAS is a revenue multiple (revenue / ad spend). ROI is a profit multiple ((gross profit - ad spend) / ad spend × 100). A 4× ROAS at 50% gross margin = $2 gross profit on $1 spend = 100% ROI. ROAS is easier to track per channel; ROI gives the full profitability picture."

customer-ltv-calculator:
  - question: "What is the LTV formula for SaaS?"
    answer: "LTV = ARPU × Gross Margin % × Average Customer Lifetime (months). Average lifetime = 1 / Monthly Churn Rate. Example: $99 ARPU × 75% margin × 50 months (at 2% churn) = $3,712.50 LTV. This is gross LTV — it doesn't subtract CAC."
  - question: "What is a good LTV:CAC ratio?"
    answer: "The benchmark is 3:1 or higher. At 3× LTV:CAC, you generate $3 in lifetime gross profit for every $1 spent on customer acquisition. Below 1× means you're destroying value. Above 5× usually means you're underinvesting in growth — you could acquire more customers profitably."
  - question: "How do I calculate CAC payback period?"
    answer: "CAC Payback = CAC ÷ (ARPU × Gross Margin %). This is how many months of gross profit it takes to recover your acquisition cost. Under 12 months is excellent. 12–18 months is acceptable for sales-led SaaS. Above 24 months requires significant capital to fund growth."
  - question: "Why does churn have such a big impact on LTV?"
    answer: "Cutting monthly churn in half doubles customer lifetime — and therefore doubles LTV. At 4% monthly churn, average lifetime is 25 months. At 2% monthly churn, it's 50 months. Same ARPU, same margin, twice the LTV. This is why churn reduction is the highest-leverage unit economics improvement."

conversion-rate-calculator:
  - question: "What is conversion rate and how is it calculated?"
    answer: "Conversion rate = (Conversions ÷ Visitors) × 100. For example, 150 signups from 10,000 visitors = 1.5% conversion rate. Conversions can be trials, purchases, leads, or any desired action — always measure CR for one specific funnel step at a time."
  - question: "What is a good website conversion rate?"
    answer: "It depends on the funnel stage. Pricing page to trial: 1–5% average, 8–15% top quartile. Trial to paid: 15–25% average for B2B SaaS. Cold paid acquisition: 0.5–2%. Don't compare against averages — compare against your own historical baseline."
  - question: "How much revenue does improving conversion rate generate?"
    answer: "Revenue = Visitors × Conversion Rate × Revenue per Conversion. Improving CR from 1.5% to 2.5% on 10,000 visitors at $99 ARPU increases monthly revenue by $9,900 — without increasing traffic. CRO is often 5–10× more cost-efficient than acquisition for the same revenue impact."
  - question: "How do I run a statistically valid A/B test?"
    answer: "Calculate your required sample size before starting: roughly 1,000 conversions per variant to detect a 10% lift at 95% confidence. Run for at least 2 full weeks to control for day-of-week effects. Stop only when your significance threshold is met — not when results look good."

gross-margin-calculator:
  - question: "What is the gross margin formula?"
    answer: "Gross Margin % = (Revenue − COGS) ÷ Revenue × 100. Example: $100,000 revenue − $30,000 COGS = $70,000 gross profit ÷ $100,000 = 70% gross margin. COGS includes direct costs only (materials, hosting, direct labor) — not operating expenses."
  - question: "What is the difference between gross margin and markup?"
    answer: "Gross margin measures profit as a percentage of revenue. Markup measures the same profit as a percentage of cost. A 50% gross margin = 100% markup. A 33% gross margin = 50% markup. Formula: Markup % = (Price − Cost) ÷ Cost × 100."
  - question: "What is a good gross margin for a SaaS business?"
    answer: "70–80% is the standard benchmark. Below 60% suggests you have significant managed services, implementation costs, or high support COGS. Above 85% is achievable for pure-software, low-support products. Public SaaS companies at IPO typically show 70–80% gross margin."
  - question: "What counts as COGS for a SaaS company?"
    answer: "SaaS COGS includes: cloud infrastructure costs, third-party API costs that scale with usage, customer support salaries, customer success management (a portion), and data storage/CDN costs. COGS does NOT include: R&D, sales, marketing, G&A, or executive salaries."

operating-cash-flow-calculator:
  - question: "What is Operating Cash Flow (OCF)?"
    answer: "Operating Cash Flow is the cash generated by a business's core operations. Unlike net income, OCF adds back non-cash charges (depreciation, amortization) and adjusts for working capital timing differences. Formula: OCF = Net Income + Depreciation & Amortization + Working Capital Change."
  - question: "What is the difference between OCF and free cash flow?"
    answer: "Free Cash Flow (FCF) = OCF − Capital Expenditures. OCF measures cash from operations before investment spending. FCF measures cash remaining after maintaining and growing the asset base. FCF is what's available for debt repayment, dividends, acquisitions, or building cash reserves."
  - question: "What is a good cash conversion ratio?"
    answer: "Cash Conversion Ratio = OCF ÷ Net Income. Near 1.0× is healthy — cash and income are aligned. Below 0.8× suggests working capital problems (customers not paying on time). Above 1.2× means D&A is significant (non-cash charges are large relative to actual investment)."
  - question: "Why is OCF more reliable than net income?"
    answer: "OCF is harder to manipulate than net income. Revenue recognition timing, depreciation schedules, and accrual accounting choices all affect net income without changing actual cash flows. A business with high net income but low OCF may have problems collecting from customers or is aggressive with revenue recognition."

pricing-elasticity-calculator:
  - question: "What is price elasticity of demand?"
    answer: "Price elasticity of demand = % change in quantity demanded / % change in price. A value of −1.5 means a 10% price increase reduces demand by 15%. Values between 0 and −1 are 'inelastic' (demand falls less than price rose, revenue increases). Values below −1 are 'elastic' (demand falls more than price rose, revenue decreases)."
  - question: "What is a typical price elasticity for SaaS?"
    answer: "B2B SaaS typically has elasticity between −0.5 and −1.2 — moderately inelastic. This means a 20% price increase reduces demand by 10–24%, but usually increases total revenue. The more essential your product (payroll, accounting, CRM), the lower (more inelastic) the elasticity."
  - question: "Does a price increase always reduce revenue?"
    answer: "No. If |elasticity| < 1 (inelastic demand), a price increase raises revenue because demand falls by a smaller percentage than price rose. Only if |elasticity| > 1 does a price increase reduce revenue. For most B2B SaaS products with strong switching costs, a moderate price increase is revenue-positive."
  - question: "How do I calculate my own price elasticity?"
    answer: "A/B test your pricing: show 50% of new visitors price A and 50% price B. Measure conversion rates. Elasticity ≈ (CR_B − CR_A) / CR_A ÷ (Price_B − Price_A) / Price_A. If A/B testing isn't feasible, use the Van Westendorp Price Sensitivity Meter (PSM) survey to estimate the acceptable price range."

payroll-cost-calculator:
  - question: "What does it cost an employer to hire someone at $100,000 salary?"
    answer: "In the US, an employer paying $100,000 salary typically incurs: $7,650 FICA taxes (7.65%), ~$42 FUTA, ~$2,700 SUTA (at 2.7%), plus benefits (health insurance $10–15k, 401k match $3–5k). Total: approximately $124,000–$135,000/year, or 24–35% above salary."
  - question: "What is FICA and how much do employers pay?"
    answer: "FICA (Federal Insurance Contributions Act) is the combined Social Security and Medicare tax. Employers pay 6.2% Social Security (on the first $168,600 of wages) plus 1.45% Medicare on all wages = 7.65% total. Employees pay the same amount, for a combined 15.3% FICA on each payroll dollar."
  - question: "What is the true cost of an employee vs a contractor?"
    answer: "For a 1099 contractor, you pay no payroll taxes, no benefits, and no unemployment taxes — but contractors typically charge 25–50% more per hour to compensate. The break-even: an employee at $120k salary costs ~$150–165k total. A contractor doing the same work full-time at $75/hour costs ~$156k/year. At $80/hour, $166k. The right choice depends on duration and need for commitment."
  - question: "What is SUTA and how do I find my rate?"
    answer: "SUTA (State Unemployment Tax Act) is a state-level unemployment tax paid by employers. Rates vary by state (0.2%–8.5%) and by employer experience (new employers get a default rate; rates adjust based on claims history). Contact your state's labor department or unemployment insurance agency for your specific rate."

discount-calculator:
  - question: "How do I calculate a percentage discount?"
    answer: "Discount Amount = Original Price × Discount % / 100. Sale Price = Original Price × (1 − Discount % / 100). For example, 25% off $80 = $80 × 0.25 = $20 discount, $80 − $20 = $60 sale price."
  - question: "How do I find the original price from a sale price and discount?"
    answer: "Original Price = Sale Price ÷ (1 − Discount %). If an item is on sale for $60 at 25% off: $60 ÷ 0.75 = $80 original price. Or to find the discount %: (Original − Sale) ÷ Original × 100 = ($80 − $60) ÷ $80 = 25%."
  - question: "Why does a 20% discount reduce profit by more than 20%?"
    answer: "Because profit is a smaller number than revenue. At a 40% gross margin, a 20% price cut reduces revenue by 20% but reduces gross profit by 50%. At a 25% gross margin, a 20% price cut eliminates all gross profit. The lower your margin, the more dangerous discounting is."
  - question: "How much discount is too much?"
    answer: "Any discount that brings margin below zero is too much (you're paying customers to buy). Discounts above 30–40% can anchor customers to the lower price — they'll expect it on every purchase. For SaaS annual plans, 15–20% is the standard that maximizes cash flow without devaluing the product."

break-even-revenue-calculator:
  - question: "What is break-even revenue?"
    answer: "Break-even revenue is the minimum monthly or annual revenue needed to cover all fixed costs without making a profit or loss. It's calculated as Fixed Costs ÷ Contribution Margin %. Above this number every dollar earned generates profit proportional to your contribution margin."
  - question: "How is break-even different from profitability?"
    answer: "Break-even is the floor — the revenue where you stop losing money. Profitability is anything above that floor. A business at exactly break-even has zero operating profit. Margin of safety measures how far above break-even your current revenue sits."
  - question: "What contribution margin should I use for SaaS?"
    answer: "Most pure SaaS businesses use gross margin as their contribution margin, typically 70–90%. For SaaS with meaningful variable costs (hosting per user, per-transaction fees, human support per ticket), calculate contribution margin as (Revenue − Variable Costs) ÷ Revenue × 100."
  - question: "What is a good margin of safety?"
    answer: "Below 10% is fragile — a single bad month could push you into a loss. 10–25% is moderate — manageable but with limited buffer for investment. Above 25% is healthy — the business can absorb revenue fluctuations and fund growth without immediately hitting break-even."

cac-calculator:
  - question: "What is Customer Acquisition Cost (CAC)?"
    answer: "CAC is the total sales and marketing spend divided by the number of new customers acquired in the same period. It includes ad spend, sales salaries, commissions, marketing team costs, and all tools used for acquisition."
  - question: "What is a good CAC payback period for SaaS?"
    answer: "Under 6 months is excellent. 6–12 months is healthy for most SaaS businesses. 12–24 months is tolerable if churn is very low and LTV is high. Over 24 months typically signals a CAC problem — either acquisition is too expensive or pricing is too low."
  - question: "What's the difference between blended CAC and paid CAC?"
    answer: "Paid CAC only counts direct ad spend divided by customers from paid channels. Blended CAC includes all sales and marketing costs (team salaries, tools, content) divided by all new customers. Blended CAC is the true unit economics number; paid CAC is useful for optimizing channel efficiency."
  - question: "How is CAC related to LTV?"
    answer: "LTV:CAC ratio compares lifetime customer value to acquisition cost. A ratio of 3:1 or higher is generally considered healthy — you earn $3 in lifetime value for every $1 spent acquiring the customer. Below 1:1 means you're paying more than a customer is worth."

revenue-per-employee-calculator:
  - question: "What is a good revenue per employee for SaaS?"
    answer: "At growth stage (Series A–B), $200k–$400k revenue per employee is healthy. Top-quartile companies achieve $400k–$600k+. Below $150k typically indicates the business is adding headcount faster than revenue."
  - question: "Should I use ARR or total revenue for this metric?"
    answer: "For SaaS, use ARR (Annual Recurring Revenue) — it excludes one-time implementation fees or professional services revenue that doesn't recur. For non-SaaS businesses, use total annual revenue."
  - question: "Should contractors count as employees in this calculation?"
    answer: "Include contractors who function like full-time employees (consistent hours, core work). Exclude project-based contractors or offshore work that's genuinely variable. The goal is to measure total productive capacity, not just payroll headcount."
  - question: "How often should I track revenue per employee?"
    answer: "Track it quarterly alongside ARR growth and net revenue retention. The trend matters as much as the absolute number — improving RPE over time signals operational leverage; declining RPE signals headcount growth outpacing revenue."

nrr-calculator:
  - question: "What is Net Revenue Retention (NRR)?"
    answer: "NRR measures the percentage of revenue retained from existing customers over a period, including expansion (upsells) and minus contraction (downgrades) and churn (cancellations). NRR above 100% means expansion offsets churn — often called 'negative churn.'"
  - question: "What is the difference between NRR and GRR?"
    answer: "NRR includes expansion MRR from upsells and seat additions. Gross Revenue Retention (GRR) excludes expansion and is always ≤ 100%. GRR measures pure retention quality. NRR measures retention plus growth from the existing base."
  - question: "What is a good NRR for SaaS?"
    answer: "100–110% is healthy for most SaaS businesses. 110–120% is top quartile. 120%+ is exceptional and typically seen in usage-based or seat-based enterprise SaaS with strong customer success. Below 100% means churn exceeds expansion — focus on retention before scaling acquisition."
  - question: "Should I calculate NRR monthly or annually?"
    answer: "Monthly NRR is more operational — it tells you the current trend. Annualized NRR (monthly NRR ^ 12) is used for investor reporting. Most SaaS investors want to see trailing 12-month NRR to smooth out seasonal variation."

arr-calculator:
  - question: "How do you calculate ARR from MRR?"
    answer: "For monthly billing, ARR = MRR × 12. For annual contracts, ARR is the contract value divided by the contract length in years. If you have a mix, sum the annualized value of all active recurring contracts."
  - question: "What is the difference between ARR and revenue?"
    answer: "ARR is a forward-looking metric — it represents the annualized value of current active subscriptions. Revenue is backward-looking — it represents what was actually recognized in a given period. A $12,000 annual contract signed on December 31 contributes $12,000 to ARR but only ~$1,000 to December revenue."
  - question: "What YoY ARR growth rate do investors want to see?"
    answer: "At $1M–$5M ARR, investors typically want to see 80–150% YoY growth to qualify for Series A. The T2D3 framework (triple, triple, double, double, double) describes the expected growth trajectory for venture-backed SaaS from $2M to $100M+ ARR."
  - question: "Should I include one-time fees in ARR?"
    answer: "No. ARR only includes recurring revenue — subscription fees, seat fees, and recurring add-ons. One-time setup fees, implementation services, and non-recurring revenue should be excluded from ARR to maintain a clean, predictable metric."

ebitda-calculator:
  - question: "What is EBITDA and why is it used?"
    answer: "EBITDA stands for Earnings Before Interest, Taxes, Depreciation, and Amortization. It's used to compare operational profitability across companies with different capital structures, tax rates, and asset bases. By removing non-operating items, it shows how much the core business generates."
  - question: "What is a good EBITDA margin?"
    answer: "It depends heavily on industry. Software and SaaS businesses typically target 15–40% EBITDA margin at maturity. Professional services run 10–20%. Manufacturing and retail run lower (3–15%). Early-stage businesses often have negative EBITDA while investing in growth — that's normal and expected."
  - question: "What is the difference between EBITDA and EBIT?"
    answer: "EBIT (Earnings Before Interest and Taxes) subtracts depreciation and amortization from EBITDA. EBITDA treats D&A as non-cash and excludes it. EBIT is closer to operating income and is used when capital-intensive businesses need to account for asset wear."
  - question: "How is EBITDA used for business valuation?"
    answer: "Enterprise value is often expressed as a multiple of EBITDA (e.g., 8× EBITDA). High-growth SaaS companies trade at 8–20× EBITDA. Professional services at 4–8×. The multiple reflects growth expectations, margin quality, and industry comparables."

cash-conversion-cycle-calculator:
  - question: "What is the Cash Conversion Cycle (CCC)?"
    answer: "The Cash Conversion Cycle measures how many days of cash are tied up in operations — from paying for inputs to collecting revenue. CCC = DIO + DSO - DPO. Lower or negative CCC means better working capital efficiency."
  - question: "What is a good Cash Conversion Cycle?"
    answer: "Negative CCC is best — it means you collect cash before paying suppliers (like Amazon or subscription SaaS businesses). 0–30 days is excellent for most businesses. 30–60 days is moderate. Above 60 days signals significant working capital tied up in operations."
  - question: "How do SaaS businesses have negative CCC?"
    answer: "SaaS businesses that collect monthly subscription fees upfront have no accounts receivable (DSO ≈ 0) and minimal inventory (DIO = 0). If they pay suppliers on 30–60 day terms (DPO > 0), their CCC is 0 - DPO, which is negative."
  - question: "How can I reduce Days Sales Outstanding (DSO)?"
    answer: "Offer early payment discounts (e.g., 2/10 net 30), switch to automatic card billing instead of invoicing, send reminder emails automatically at 15/30/45 days, and implement automatic late payment fees. For enterprise customers, require upfront annual payment at a discount."

burn-multiple-calculator:
  - question: "What is burn multiple in SaaS?"
    answer: "Burn multiple = net cash burn / net new ARR. It measures how efficiently you convert spending into recurring revenue. Below 1× means you generate more ARR than you burn cash. Above 3× signals capital inefficiency — you're spending $3+ for every $1 of new recurring revenue."
  - question: "What is a good burn multiple for SaaS?"
    answer: "Under 1× is world-class. 1–1.5× is excellent. 1.5–2× is good for rapid growth. 2–3× is acceptable at early stage with strong NRR. Above 3× is concerning and investors will typically flag it in Series B diligence."
  - question: "What is the difference between net burn and gross burn?"
    answer: "Gross burn is total cash spent per month. Net burn is gross burn minus revenue collected. Burn multiple uses net burn because it reflects actual cash consumed by the business after revenue collection."
  - question: "How is burn multiple related to CAC payback?"
    answer: "Both measure capital efficiency, but burn multiple is a portfolio-level metric (total burn / total new ARR) while CAC payback is a per-customer metric (CAC / monthly gross profit per customer). A bad burn multiple often reflects high CAC, but can also reflect high churn (reducing net new ARR) or high burn on non-S&M expenses."

saas-quick-ratio-calculator:
  - question: "What is a good SaaS Quick Ratio?"
    answer: "A Quick Ratio above 4x is considered exceptional — you're generating 4x as much new MRR as you're losing. 2–4x is healthy and fundable. 1–2x means you're growing but churn is offsetting most of it. Below 1x means the business is shrinking."
  - question: "What is the difference between Quick Ratio and NRR?"
    answer: "NRR (Net Revenue Retention) measures what percentage of last year's ARR you retained plus expansion, excluding new logos. Quick Ratio includes new MRR from new customers in the numerator, so it measures the combined impact of acquisition, expansion, contraction, and churn. Quick Ratio is a better growth quality signal; NRR is a better retention signal."
  - question: "Should I use MRR or ARR in the Quick Ratio formula?"
    answer: "The Quick Ratio is typically calculated on monthly MRR movements for real-time insight. You can annualize all inputs to use ARR — the ratio will be identical since both numerator and denominator scale by 12. Monthly MRR gives a faster feedback loop."
  - question: "How do I improve my SaaS Quick Ratio?"
    answer: "There are two levers: increase growth MRR (new + expansion) or decrease lost MRR (contraction + churn). Expansion MRR is typically the highest-leverage improvement because it comes from customers who already trust you — no CAC, no lengthy sales cycle. Even a modest expansion rate can dramatically improve your Quick Ratio."

magic-number-calculator:
  - question: "What is a good SaaS Magic Number?"
    answer: "A Magic Number above 1.5 is exceptional — you generate $1.50 of ARR for every $1 of S&M spend. 0.75–1.5 is good and fundable. 0.5–0.75 is marginal — fix CAC efficiency before scaling spend. Below 0.5 means each dollar of S&M generates under $0.50 of ARR — a serious GTM efficiency problem."
  - question: "Why does the Magic Number use prior-quarter S&M spend?"
    answer: "The Magic Number uses last quarter's spend because sales and marketing investment takes time to convert into closed bookings. Using prior-quarter spend captures the actual lagged return: the pipeline you funded last quarter closes as ARR this quarter."
  - question: "What's the difference between Magic Number and CAC payback?"
    answer: "Magic Number is a portfolio-level efficiency ratio (net new ARR / total S&M spend). CAC payback is a per-customer metric (CAC / monthly gross profit per customer). Magic Number gives a quick topline signal; CAC payback tells you how long until each customer pays back their acquisition cost."
  - question: "Should I include both sales and marketing in the spend?"
    answer: "Yes — the Magic Number uses total go-to-market spend: sales salaries, commissions, sales tools, marketing salaries, ad spend, content production, and events. Some investors include only variable S&M costs; others include fully-loaded S&M headcount. Be consistent quarter over quarter to track trends reliably."

working-capital-calculator:
  - question: "What is working capital?"
    answer: "Working capital is current assets minus current liabilities. It measures the short-term liquidity buffer — the operational cash available after covering all obligations due within 12 months. Positive working capital means you can pay short-term bills; negative working capital is a potential liquidity risk (though SaaS businesses with upfront annual billing often run intentionally negative)."
  - question: "What is a good current ratio?"
    answer: "A current ratio of 2.0x or higher is considered strong. 1.5–2.0x is healthy. 1.0–1.5x is acceptable but leaves little margin for error. Below 1.0x means current liabilities exceed current assets — a liquidity warning that warrants attention."
  - question: "What is the difference between current ratio and quick ratio?"
    answer: "The current ratio includes all current assets, including inventory. The quick ratio (also called the acid test ratio) excludes inventory because inventory takes time to sell and convert to cash. The quick ratio is the more conservative of the two: if your current ratio is fine but quick ratio is below 1.0, your liquidity depends on being able to sell inventory quickly."
  - question: "Can a profitable business have negative working capital?"
    answer: "Yes — and it's often a sign of a great business model. SaaS companies that collect annual payments upfront have large deferred revenue balances (a current liability). E-commerce businesses with high inventory turnover and long supplier payment terms can fund growth from supplier credit. The key test is whether the business generates cash flow — if so, negative working capital is a feature, not a bug."

roi-calculator:
  - question: "What is a good ROI for a business investment?"
    answer: "It depends on the type of investment. For marketing, a 4:1 return (300% ROI) is often cited as the minimum viable. For capital investments, anything above your cost of capital (typically 8–15% annualized) creates value. The S&P 500 returns ~10% annually, so business investments should generally target 15–30%+ annualized to justify the added risk."
  - question: "What is the difference between ROI and annualized ROI?"
    answer: "ROI measures total return over the entire period. Annualized ROI converts that to a per-year figure, accounting for compounding. A 100% ROI over 5 years is only ~14.9% annualized — not 20% — because the returns compound. Always compare annualized ROI when comparing investments with different time horizons."
  - question: "What is the difference between ROI and ROAS?"
    answer: "ROI (Return on Investment) is a broad metric: net profit divided by total investment. ROAS (Return on Ad Spend) is marketing-specific: revenue divided by ad spend, without subtracting costs. ROAS of 4:1 means $4 revenue per $1 spent on ads — but your actual ROI is lower once you subtract margins and operating costs."
  - question: "How do I calculate ROI for a marketing campaign?"
    answer: "Marketing ROI = (Revenue attributed to campaign − Cost of campaign) / Cost of campaign × 100. For attribution, you can use first-touch, last-touch, or multi-touch models. Be sure to subtract not just ad spend but also agency fees, creative costs, and staff time. A campaign with 400% ROI ($5 revenue per $1 cost) is generally considered strong."

payback-period-calculator:
  - question: "What is the payback period formula?"
    answer: "Payback Period = Initial Investment / Annual Net Cash Flow. For example, a $200,000 investment generating $80,000 per year in net cash flow has a payback period of 2.5 years. This simple formula ignores the time value of money — use the discounted payback period for capital allocation decisions."
  - question: "What is a good payback period?"
    answer: "It depends on the investment type. For marketing campaigns, under 12 months is excellent. For capital equipment, 2–4 years is standard. For real estate, 5–10 years may be acceptable if rents are stable. The key comparison is against your cost of capital — if payback takes longer than cash flows are reliable, the investment carries significant risk."
  - question: "What is the difference between simple and discounted payback period?"
    answer: "Simple payback period = Investment / Annual Cash Flow. Discounted payback period accounts for the time value of money by discounting each year's cash flow at your cost of capital rate. Discounted payback is always longer than simple payback. For investments over 2 years with any significant capital cost, use the discounted method."
  - question: "What are the limitations of payback period?"
    answer: "Payback period ignores all cash flows after the break-even point. Two investments with identical payback periods might have very different total returns depending on what happens afterward. Always use payback period alongside total ROI and net present value (NPV) for a complete capital allocation decision."

arpu-calculator:
  - question: "What is ARPU in SaaS?"
    answer: "ARPU (Average Revenue Per User) is total MRR divided by the number of active paying users. It measures the average monthly revenue contribution per customer. ARPU is used to forecast scale requirements (how many customers needed for a given MRR target) and to benchmark pricing against industry peers."
  - question: "What is a good ARPU for a SaaS business?"
    answer: "It depends on your go-to-market model. Consumer/freemium: $5–$20/month (requires 50k–200k paid users for $1M MRR). SMB: $50–$500/month (requires 2k–20k users). Mid-market: $500–$2,000/month. Enterprise: $2,000+/month (100–500 customers can generate $1M MRR). Higher ARPU = fewer customers needed, but longer sales cycles."
  - question: "What is the difference between ARPU and ACV?"
    answer: "ARPU (Average Revenue Per User) is monthly revenue per customer, calculated from MRR. ACV (Annual Contract Value) is annual revenue per customer, typically used in enterprise sales with annual contracts. ACV = ARPU × 12. ARPU is used for operational SaaS analytics; ACV for enterprise sales metrics."
  - question: "How do I increase ARPU without losing customers?"
    answer: "The highest-leverage ARPU lever is price optimization — most SaaS products are underpriced. Test a 10–20% price increase on new customers while grandfathering existing ones. Also consider usage-based pricing tiers (usage above a threshold generates expansion MRR) and annual billing options that effectively increase MRR per customer through commitment discounts."

revenue-run-rate-calculator:
  - question: "What is revenue run rate?"
    answer: "Revenue run rate is an annualized estimate based on a shorter period's actual revenue. Formula: Annual Run Rate = (Period Revenue / Period Months) × 12. For example, $250k in Q1 = $1M annual run rate. It's an estimate, not a guarantee — seasonality, growth, or one-time items can make run rate misleading."
  - question: "What's the difference between run rate and ARR?"
    answer: "For SaaS businesses, ARR (Annual Recurring Revenue) = current MRR × 12, based on contracted recurring subscriptions. Run rate is a more general calculation that annualizes any period's total revenue, including non-recurring items. Use ARR for SaaS reporting; use run rate for non-subscription businesses or total revenue projections."
  - question: "When is run rate misleading?"
    answer: "Run rate is misleading when the measurement period is not representative of the full year: seasonal spikes, one-time contracts, or periods of unusually fast growth all produce run rates that won't materialize as actual annual revenue. Always note the assumptions behind a run rate figure when presenting to investors."
  - question: "How do I calculate run rate from Q1 results?"
    answer: "Multiply Q1 revenue by 4. If Q1 revenue was $500,000, the annual run rate is $2,000,000. This simple approach is accurate for stable businesses; use compound growth projection for growing businesses where later quarters will be larger than Q1."

sales-velocity-calculator:
  - question: "What is sales velocity?"
    answer: "Sales velocity measures revenue generated per day from your pipeline. Formula: (Opportunities × Win Rate × ACV) / Sales Cycle Days. It's the single metric that captures all four key sales levers: pipeline volume, win rate, deal size, and cycle speed."
  - question: "What's a good sales velocity?"
    answer: "It depends on your segment. SMB SaaS typically sees $200–500/day ($73k–180k/year). Mid-market deals ($5k–$50k ACV) range from $500–2,000/day. Enterprise sales with >$50k ACV can reach $2,000–10,000+/day. Compare velocity over time — improvement trend matters more than the absolute number."
  - question: "How do I increase sales velocity?"
    answer: "There are four levers: (1) Add more qualified opportunities to your pipeline; (2) Improve win rate through better qualification, demos, and follow-up; (3) Increase ACV through pricing changes or upselling at close; (4) Shorten the sales cycle by reducing friction and improving response times. All four compound — a 10% improvement in each lever produces a 46% velocity increase, not 40%."
  - question: "What is ACV in the sales velocity formula?"
    answer: "ACV (Annual Contract Value) is the average annual value of a closed deal. For monthly SaaS subscriptions: ACV = average MRR × 12. For annual contracts: ACV = the average invoice size. Use your most recent 90–180 days of closed-won deals to calculate a representative average."

free-cash-flow-calculator:
  - question: "What is free cash flow?"
    answer: "Free cash flow (FCF) = Operating Cash Flow − Capital Expenditures. It measures the cash a company generates after investing in assets needed to sustain operations. It's the truest measure of cash generation because it accounts for required capital reinvestment, unlike EBITDA or net income."
  - question: "What's a good FCF margin?"
    answer: "Top-tier SaaS companies like Shopify and Veeva operate at 20–30% FCF margins. A 10–20% margin is healthy for profitable SaaS. Early-stage or high-growth companies often have negative FCF margins as they invest in growth — this is expected if the unit economics are sound."
  - question: "How is FCF different from EBITDA?"
    answer: "EBITDA adds back non-cash charges (depreciation, amortization) and excludes interest and taxes. FCF starts from operating cash flow and subtracts actual capital expenditures. For SaaS companies with low capex, EBITDA ≈ FCF. For capital-intensive businesses, FCF is much lower than EBITDA."
  - question: "What does FCF yield mean?"
    answer: "FCF yield = FCF / Market Cap × 100. It's the cash generation rate per dollar of market cap — analogous to earnings yield but based on cash rather than accounting earnings. A 5% FCF yield (20× FCF) is a common threshold for value investors. High-growth companies trade at lower yields (1–3%) because investors price in future FCF growth."

equity-dilution-calculator:
  - question: "What is equity dilution?"
    answer: "Equity dilution occurs when a company issues new shares, reducing each existing shareholder's ownership percentage. Your share count stays the same, but the total share count increases — so your percentage of the company decreases. For example, owning 60% of a 10M share company becomes 50% after 2M new shares are issued in a funding round."
  - question: "What's the difference between pre-money and post-money valuation?"
    answer: "Pre-money is the company's valuation before an investment. Post-money = pre-money + investment. If a company raises $1M at a $5M pre-money valuation, the post-money is $6M and investors own 1/6 = 16.7%. If the $5M were post-money, investors would own 1/5 = 20%. Always clarify which is meant in term sheet negotiations."
  - question: "How much dilution is typical in a funding round?"
    answer: "Pre-seed rounds dilute founders 10–15%. Seed rounds 15–25%. Series A rounds 20–30%. Series B and beyond typically 15–25% per round. Cumulative dilution after three rounds can leave founders with 35–55% ownership. This varies significantly based on valuation and round size."
  - question: "What is the option pool shuffle?"
    answer: "Investors often require creating or expanding an employee stock option pool before closing a round. Because this happens pre-close, it dilutes founders before investors take their stake — effectively increasing the founder's dilution. Model it by adding the new option pool shares to your 'current shares outstanding' before running dilution calculations."

business-loan-calculator:
  - question: "How is the monthly loan payment calculated?"
    answer: "Monthly Payment = P × [r(1+r)^n] / [(1+r)^n − 1], where P is the principal, r is the monthly rate (APR/12/100), and n is the term in months. For a $250k loan at 7.5% APR over 60 months, the payment is $5,009/month. Most business loans use this standard amortization formula."
  - question: "What interest rate should I use for a business loan?"
    answer: "SBA 7(a) loans are typically WSJ Prime Rate + 2.25–4.75% (currently around 10–14%). Traditional term loans from banks range from 6–15% depending on your credit profile. Online lenders and MCAs charge 15–50%+. Use the APR (annual percentage rate) stated on your term sheet — it includes fees."
  - question: "What is debt service coverage ratio (DSCR)?"
    answer: "DSCR = Annual Net Operating Income / Annual Debt Payments. Most lenders require DSCR ≥ 1.25, meaning you earn $1.25 for every $1 of debt payments. To calculate: take your annual net income before loan payments and divide by total annual payments (monthly payment × 12). A DSCR below 1.0 means the business can't cover payments from operations."
  - question: "Should I choose a shorter or longer loan term?"
    answer: "Shorter terms have higher monthly payments but lower total interest cost. Longer terms have lower payments but you pay much more interest over time. A $250k loan at 7.5% APR: 36-month term costs $29k in interest; 120-month term costs $107k. Choose based on your cash flow — the lowest term your cash flow can comfortably service reduces total cost."

inventory-turnover-calculator:
  - question: "What is inventory turnover ratio?"
    answer: "Inventory turnover = COGS / Average Inventory. It measures how many times you sell and replace your entire inventory in a period. Higher is generally better (more efficient), but too high can signal stockouts. Days Sales of Inventory (DSI = 365 / turnover) shows how many days of inventory you carry on average."
  - question: "What is a good inventory turnover ratio?"
    answer: "Benchmarks vary significantly by industry. Grocery stores turn inventory 20–30× per year. Fashion apparel 6–12×. Electronics 6–10×. Industrial products 2–5×. Compare your ratio to industry peers, not a universal benchmark. More important: is your turnover improving or declining over time?"
  - question: "What is the difference between inventory turnover and sell-through rate?"
    answer: "Inventory turnover (COGS / avg inventory) is a dollar-value metric that measures overall inventory efficiency. Sell-through rate (units sold / units received × 100%) measures what percentage of what you bought you actually sold in a period. Sell-through is more useful for retail category management; turnover is more useful for financial analysis."
  - question: "How do I improve inventory turnover?"
    answer: "Key levers: better demand forecasting to reduce over-ordering; tighter reorder points based on actual lead times; ABC analysis to identify and liquidate slow-moving C-items; shorter supplier lead times to reduce safety stock requirements. A 20% improvement in turnover typically frees up 15–20% of the capital tied up in inventory."

npv-calculator:
  - question: "What is net present value (NPV)?"
    answer: "NPV = −Initial Investment + Σ [Cash Flow / (1 + rate)^year]. It measures the value created (or destroyed) by an investment, adjusted for the time value of money. A positive NPV means the investment earns more than your required rate of return; negative NPV means it earns less. Accept projects with positive NPV."
  - question: "What discount rate should I use for NPV?"
    answer: "Use your cost of capital or required rate of return. For established businesses: use WACC (8–12% is typical). For high-risk projects or startups: 20–30%. For personal investment decisions: use your opportunity cost (what you'd earn in an alternative investment). Sensitivity-test your NPV at multiple discount rates — small changes can flip the decision."
  - question: "What is profitability index (PI)?"
    answer: "PI = (NPV + Initial Investment) / Initial Investment. PI > 1 means positive NPV. It's useful for ranking competing projects when capital is limited: a higher PI means more value per dollar invested. PI of 1.2 means you create $1.20 of present value for every $1 invested (above the required return)."
  - question: "What's the difference between NPV and IRR?"
    answer: "IRR is the discount rate at which NPV = 0 — the break-even return rate. NPV is a dollar value at a specific discount rate. Both are used for investment decisions. NPV is generally preferred because it's in dollar terms, handles varying discount rates correctly, and doesn't give multiple values for non-standard cash flows. Use NPV as your primary metric, IRR as secondary context."

revenue-per-lead-calculator:
  - question: "What is revenue per lead (RPL)?"
    answer: "Revenue per lead = total revenue / total leads. It measures the average revenue generated per lead acquired during a period. RPL accounts for lead quality — a channel generating cheap but unqualified leads will have low RPL even if CPL is low. Use RPL to compare channel profitability, not just acquisition cost."
  - question: "What's the difference between revenue per lead and cost per lead?"
    answer: "Cost per lead (CPL) measures acquisition efficiency: how much you spend to get each lead. Revenue per lead measures effectiveness: how much revenue each lead generates. A channel can have low CPL but terrible RPL (cheap, unqualified leads) or high CPL but excellent RPL (expensive but high-converting leads). Compare both to get the full picture."
  - question: "How do I calculate lead ROI?"
    answer: "Lead ROI = (RPL − CPL) / CPL × 100. If revenue per lead is $400 and cost per lead is $50, Lead ROI = ($400 − $50) / $50 × 100 = 700%. For a channel to be profitable, RPL must exceed CPL. For strong profitability, aim for RPL/CPL ratio of 3× or higher."
  - question: "What's a good revenue per lead benchmark?"
    answer: "RPL varies enormously by segment. SMB SaaS might see $50–200 RPL. Mid-market $500–2,000. Enterprise $5,000+. The absolute number matters less than the ratio between RPL and CPL. A 3× or higher RPL/CPL ratio generally indicates a healthy acquisition channel worth scaling."

customer-concentration-calculator:
  - question: "What is customer concentration risk?"
    answer: "Customer concentration risk is the business risk of depending too heavily on a small number of customers for revenue. If your largest customer represents 30%+ of ARR, their churn could threaten business continuity. Investors flag any single customer above 10% of ARR as a risk; above 20% is often a deal-breaker in Series A+ funding rounds and M&A due diligence."
  - question: "What is the HHI (Herfindahl-Hirschman Index)?"
    answer: "HHI measures market concentration by summing the squared market shares of all participants × 10,000. Originally used by antitrust regulators, it's also useful for measuring revenue concentration. Below 1,500 = well-diversified. 1,500–2,500 = moderate concentration. Above 2,500 = high concentration requiring active management."
  - question: "What percentage of revenue from a single customer is too much?"
    answer: "Investors typically flag any single customer above 10% of ARR as a concentration risk that warrants attention. Above 20% is a significant concern that can reduce your valuation multiple. Above 30% is often a red flag in due diligence. Enterprise SaaS companies often have higher concentrations at early stages — the key is to have a clear strategy and timeline for diversification."
  - question: "How do I reduce customer concentration risk?"
    answer: "Key tactics: (1) Actively diversify your pipeline toward ICP segments different from your largest customers; (2) Set ACV targets that limit any single deal to <15% of projected ARR at time of close; (3) Focus land-and-expand motions on mid-tier accounts rather than concentrating expansion on already-large accounts; (4) Track concentration quarterly as a company-level KPI."

tam-sam-som-calculator:
  - question: "What is TAM, SAM, and SOM?"
    answer: "TAM (Total Addressable Market) = total revenue if you had 100% market share. SAM (Serviceable Addressable Market) = portion of TAM you can realistically serve with your current product and GTM. SOM (Serviceable Obtainable Market) = realistic share of SAM you can capture in 3–5 years. TAM sets the ceiling; SOM is your near-term revenue target."
  - question: "How do investors evaluate TAM?"
    answer: "VCs typically want to see TAM of $1B+ for Series A investments (they need headroom for a 10× outcome). Seed investors may accept $500M+ TAM. Below $500M, the market may still support a profitable bootstrapped or PE-backed business, but venture capital math gets difficult. Investors also scrutinize the methodology — bottom-up beats top-down."
  - question: "What's the difference between top-down and bottom-up market sizing?"
    answer: "Top-down: start with an industry report's total market estimate and calculate your percentage. Fast but imprecise. Bottom-up: count actual potential customers and multiply by ACV. For example: 500,000 companies matching your ICP × $10,000 ACV = $5B TAM. Bottom-up is more credible because it shows customer-level understanding. Use both and triangulate."
  - question: "How should I calculate SOM for a pitch deck?"
    answer: "SOM = the customers you can realistically close in 3–5 years, given your GTM capacity. Work from your sales model: if you plan to hire 10 AEs by year 3, each closing 20 deals/year at $20k ACV, your SOM is $4M ARR. That's your SOM, not a percentage of TAM. Show the math — investors will check it."

contribution-margin-calculator:
  - question: "What is contribution margin?"
    answer: "Contribution margin is the revenue remaining after subtracting all variable costs. It is the amount each unit sold 'contributes' toward covering fixed costs and then generating profit. Formula: Contribution Margin = Selling Price − Variable Cost per Unit."
  - question: "What is a good contribution margin ratio?"
    answer: "It depends on your business model. SaaS businesses typically have 70–85% CM ratios. E-commerce and physical products range from 30–55%. Consulting and services typically run 60–80%. The key benchmark is whether your CM ratio, multiplied by your realistic sales volume, covers your fixed costs with profit left over."
  - question: "How do I use contribution margin for pricing decisions?"
    answer: "Calculate the break-even units at your current price. Then model a 10–15% price increase: the CM ratio rises while fixed costs stay the same, dramatically reducing break-even volume. If raising price by 10% reduces break-even by 20%, the math strongly favors the price increase — unless the market won't bear it."
  - question: "What's the difference between break-even analysis and contribution margin analysis?"
    answer: "Break-even analysis uses contribution margin to find the sales volume where profit = 0. Contribution margin analysis goes further: it shows how margin changes with different price/cost combinations, how many units you need to hit a profit target, and which products in a mixed portfolio contribute most to covering overhead."

freelance-tax-estimator:
  - question: "How much should I set aside for taxes as a freelancer?"
    answer: "A safe rule of thumb is 25–30% of gross freelance income. This covers self-employment tax (15.3%) plus federal income tax in the 12–22% bracket for most freelancers. If you earn $100k+ in net profit, set aside 30–35%. These funds should sit in a separate savings account and be paid quarterly to avoid underpayment penalties."
  - question: "What is the self-employment tax rate?"
    answer: "Self-employment tax is 15.3%: 12.4% Social Security (on the first $168,600 of net profit in 2024) + 2.9% Medicare (no cap). You can deduct half of this amount from your taxable income, reducing your effective SE tax burden. As a W-2 employee, your employer pays the other half — as a freelancer, you pay both sides."
  - question: "How do I avoid underpayment penalties?"
    answer: "Pay at least 90% of your current-year tax liability by the four quarterly deadlines, OR pay 100% of last year's tax liability (110% if your AGI exceeded $150,000). The safe harbor method (paying 100-110% of prior-year tax) is the easiest approach when income is variable — you can true it up at filing without penalty."
  - question: "Should I form an S-Corp to save on taxes?"
    answer: "An S-Corp makes financial sense when net profit exceeds approximately $80,000. You pay yourself a reasonable salary (subject to SE tax) and take additional profit as a distribution (not subject to SE tax), saving 15.3% on the distribution portion. At $100k net profit with $60k salary, this saves roughly $6,120/year. Costs include payroll service fees (~$600/year), S-Corp tax return (~$500), and increased accounting complexity. Get advice from a CPA."

employee-cost-calculator:
  - question: "What is the true cost of an employee beyond salary?"
    answer: "For US knowledge workers, total employer cost is typically 1.25–1.45x the base salary. The main components beyond salary: employer payroll taxes (FICA 7.65%, FUTA 0.6%, SUTA ~2.7%), health insurance ($8,000–$18,000/year), 401(k) match (3–6% of salary), and any bonuses or equity grants. A $100,000 salary typically costs $125,000–$145,000 all-in."
  - question: "How much are employer payroll taxes?"
    answer: "Employers pay FICA (6.2% Social Security on wages up to $168,600 + 1.45% Medicare with no cap = 7.65% total), FUTA (0.6% effective rate on first $7,000 of wages = ~$42 per employee annually), and SUTA (state unemployment, averaging 2.7% on the first $7,000–$56,500 depending on state). Together, employer payroll taxes add approximately 8% to the cost of a $100k salary."
  - question: "How do I budget headcount for a startup?"
    answer: "Use a 1.3x salary multiplier for fully-loaded employee cost (taxes + health insurance + 401k match). Add 15% for bonus-eligible roles. So a $120k engineering hire costs approximately $156k–$168k in total labor expense annually. For financial modeling, many early-stage startups use 1.25–1.30x as the multiplier until they have exact benefits costs."
  - question: "When does a contractor become cheaper than an employee?"
    answer: "A contractor is often more expensive per hour than the all-in cost of an employee, but the contractor doesn't require year-round commitment. The break-even point is typically when a role is needed for fewer than 6–8 months per year, or requires specialized skills that would cost more in recruiting fees and onboarding than the rate premium. At rates above 1.5x the equivalent employee hourly cost, employees are almost always cheaper for permanent roles."

price-to-sales-calculator:
  - question: "What is a good P/S ratio for a SaaS startup?"
    answer: "In 2024, Series A SaaS companies typically command 8–15x ARR if growing 80%+. Series B companies growing 40–60% typically see 8–12x ARR. The multiple compresses with growth — a 20% grower gets 3–5x. Public SaaS companies in 2024 trade at approximately 4–6x forward revenue as a median, down significantly from 15–25x in 2021."
  - question: "What is growth-adjusted P/S?"
    answer: "Growth-adjusted P/S (also called 'P/S divided by growth rate') normalizes the P/S multiple by revenue growth. Formula: P/S ÷ annual growth rate. A P/S of 10x at 50% growth yields 0.20x growth-adjusted P/S. The rule of thumb: above 0.3x is expensive, 0.1–0.2x is fair, below 0.1x may be undervalued. This metric helps compare companies growing at different rates."
  - question: "What is the difference between P/S and EV/Revenue?"
    answer: "P/S uses market capitalization (share price × shares outstanding) as the numerator. EV/Revenue uses enterprise value (market cap + debt − cash). For debt-free, cash-burning startups, they are essentially the same. For cash-rich companies or those with debt, EV/Revenue is more accurate because it normalizes for capital structure differences."
  - question: "How do SaaS P/S multiples get calculated in private markets?"
    answer: "In private markets, P/S (or more precisely ARR multiple) = post-money valuation ÷ ARR. Investors compare this to public comps and apply a 20–30% illiquidity discount. A public comp trading at 8x revenue might imply a private round at 6–7x ARR for a similar-stage company. Secondary market data from Carta, NASDAQ Private Market, and Forge provide real-time private comparables."

churn-cohort-calculator:
  - question: "What is cohort churn analysis?"
    answer: "Cohort churn analysis tracks a specific group of customers (cohort) over time to see what percentage remains active at each month interval. Unlike aggregate churn rate, cohort analysis reveals whether early-adopter cohorts retain better than newer customers, identifies when in the lifecycle most churn occurs, and lets you directly measure the impact of product changes on retention."
  - question: "How do I calculate LTV from monthly churn rate?"
    answer: "For constant monthly churn: LTV = Monthly Revenue per Customer ÷ Monthly Churn Rate. At $99/month and 2% monthly churn, LTV = $99 ÷ 0.02 = $4,950. This formula assumes a constant churn rate (geometric distribution). In reality, cohorts often have higher churn in early months and lower churn later — use actual cohort data for more accurate LTV modeling."
  - question: "What is cohort half-life?"
    answer: "Cohort half-life is how many months it takes for 50% of the original cohort to churn. Formula: Half-life = log(0.5) ÷ log(1 − monthly churn rate). At 2% monthly churn: ~34 months. At 5%: ~14 months. At 10%: ~7 months. It's a useful single-number summary of cohort health — the longer the half-life, the more valuable each acquired customer."
  - question: "How often should I run cohort analysis?"
    answer: "Run cohort retention reports monthly and review the 3-month, 6-month, and 12-month retention for all recent cohorts. Set up a 'retention dashboard' with cohort start month on one axis and months since start on the other (standard retention matrix). Update it monthly. A worsening trend in newer cohorts is the earliest warning of a product or go-to-market problem."

segment-margin-calculator:
  - question: "What is the difference between gross margin and gross profit?"
    answer: "Gross profit is an absolute dollar figure: Revenue minus COGS. Gross margin is a percentage: Gross Profit ÷ Revenue × 100. Use gross profit to compare absolute contribution from segments of different sizes. Use gross margin percentage to compare profitability efficiency between segments regardless of size. Both are essential for a complete segment analysis."
  - question: "How do I calculate blended gross margin for multiple product lines?"
    answer: "Blended gross margin = Total Gross Profit ÷ Total Revenue × 100. First sum gross profit dollars across all segments (not the margin percentages), then divide by total revenue. This gives a revenue-weighted average. Averaging the margin percentages directly is incorrect because it ignores the fact that larger segments have more weight in the overall company profitability."
  - question: "Why is my blended gross margin lower than my best segment's margin?"
    answer: "Because blended margin is a revenue-weighted average. If a high-margin segment (80%) represents 20% of revenue, and a low-margin segment (30%) represents 80% of revenue, the blended margin is 40%, much closer to the low-margin segment. To improve blended margins, you either need to improve margins within each segment or shift revenue mix toward higher-margin segments."
  - question: "What COGS should I include in a segment margin calculation?"
    answer: "Include only direct costs: materials, direct labor, cloud hosting costs (for SaaS), manufacturing overhead, and fulfillment costs. Exclude shared overhead like office rent, executive salaries, and G&A. Segment gross margin is intentionally an upstream metric that excludes corporate allocations. If you need a fully-loaded segment analysis, you are doing segment operating margin, not gross margin."

dso-calculator:
  - question: "What is Days Sales Outstanding and why does it matter?"
    answer: "DSO measures how many days on average it takes to collect payment after a sale. It directly impacts working capital: a high DSO means cash is locked in unpaid invoices rather than available to run the business. Reducing DSO by 15 days for a $5M ARR company can free up over $200,000 in cash without any revenue change."
  - question: "How do I calculate DSO using the indirect method?"
    answer: "The direct method uses period-end AR. The indirect method uses average AR: (Starting AR + Ending AR) ÷ 2. Use the average AR method when collections vary significantly across the period for a more accurate result. For most quarterly reporting, the period-end method is sufficient."
  - question: "What is a good AR turnover ratio?"
    answer: "AR Turnover = Annual Revenue ÷ Average Accounts Receivable. A ratio of 12× means you collect your entire receivables balance 12 times per year (approximately monthly). Higher is better: 8× (≈45-day DSO) is adequate, 12× (≈30-day DSO) is good, 18×+ (≈20-day DSO) is excellent. Ratios below 6× (≈60-day DSO) warrant a collections review."
  - question: "How do early payment discounts affect DSO?"
    answer: "Early payment discounts (e.g., 2/10 Net 30 — 2% off if paid in 10 days) can dramatically cut DSO. A 2% early payment discount is equivalent to an annualized return of 36% for the customer — it's very attractive for cash-rich customers. Even if only 20-30% of customers take the discount, DSO can drop by 10-15 days, often worth more than the discount cost."

roe-calculator:
  - question: "What is the difference between ROE and ROI?"
    answer: "ROI (Return on Investment) measures returns relative to the total cost of an investment, regardless of financing. ROE (Return on Equity) specifically measures returns relative to equity capital, making it leverage-sensitive. For a company with no debt, ROE and ROI are essentially the same. For a leveraged company, ROE will be higher than ROI because equity is a smaller base than total invested capital."
  - question: "How do I calculate shareholders' equity?"
    answer: "Shareholders' equity = Total Assets − Total Liabilities. From the balance sheet: Common stock + Additional paid-in capital + Retained earnings − Treasury stock = Shareholders' equity. For a startup or private company without a formal balance sheet, use: total capital contributed by founders and investors + accumulated net income (or minus accumulated losses) = approximate equity."
  - question: "Why do tech companies have higher ROE than manufacturers?"
    answer: "Software and tech companies have high asset turnover (they generate large revenue with few physical assets) and often high profit margins. Manufacturers require heavy capital investment in equipment, inventory, and facilities, reducing asset turnover and ROE. The asset-light nature of software businesses fundamentally enables higher ROE at scale — the marginal cost of serving one more customer is near zero."
  - question: "What ROE do venture investors expect from startups?"
    answer: "Early-stage VC investors don't typically use ROE — startups are usually pre-profit and book equity is a poor proxy for value. Series A investors focus on revenue growth rate, gross margin, and path to unit economics. ROE becomes relevant as companies approach profitability and begin considering IPO readiness, where public market comps are valued partly on ROE relative to industry peers."
