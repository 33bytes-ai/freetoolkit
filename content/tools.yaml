    Employer payroll taxes add roughly 8–12% to the cost of every employee on top of their
    base salary. For a $75,000 employee, that means $6,000–$9,000 in additional mandatory
    taxes per year.

    ## US employer payroll taxes (2024)

    | Tax | Rate | Wage base |
    |----|------|-----------|
    | Social Security (employer) | 6.2% | First $160,200 |
    | Medicare (employer) | 1.45% | Uncapped |
    | FUTA (Federal Unemployment) | 0.6%* | First $7,000 |

