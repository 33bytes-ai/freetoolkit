  body: |
    Employee turnover is one of the most underestimated costs in business. Studies by
    SHRM and Gallup consistently put the true replacement cost at **6–9 months of annual
    salary** for typical roles, rising to **200%** for senior or highly specialised positions.

    ## Turnover cost components

    | Component | Typical cost |
    |-----------|-------------|
    | Separation (HR admin, exit interview, severance) | 3–5% of annual salary |
    | Vacancy (lost productivity while role is open) | 50–150% of daily wage × days |
    | Recruiting (job boards, agency fees, interview time) | 5–30% of annual salary |
    | Onboarding and training | 10–20% of annual salary |
    | Ramp-up time to full productivity | 25–50% of annual salary × ramp months |

    ## SHRM benchmarks

    - **Entry-level / hourly**: ~50% of annual salary
    - **Technical / professional**: 100–150% of annual salary
    - **Senior / executive**: 200–400% of annual salary

    ## Reducing turnover cost

    High-impact levers: structured onboarding (cuts ramp time by 50%), manager effectiveness
    training (the #1 driver of voluntary attrition), competitive compensation benchmarking,
    and stay interviews rather than exit interviews.

- slug: irr-calculator
  title: "IRR Calculator — Internal Rate of Return"
  nav_title: "IRR Calculator"
  short: "Calculate the Internal Rate of Return (IRR) for any series of cash flows — evaluates the profitability of investments, projects, and business decisions."
  date_added: "2026-06-18"
  new: true
  category: Finance
  js: irr-calculator.js
  keywords: ["irr calculator", "internal rate of return calculator", "investment irr", "project irr calculation", "net present value irr"]
  howto_steps:
    - name: "Enter your initial investment"
      text: "Enter the upfront cost as a negative number (cash outflow). This is period 0 in the cash flow series."
    - name: "Enter cash inflows for each period"
      text: "Add each year's expected cash inflow. You can add up to 10 periods. Negative values represent additional costs in that period."
    - name: "Review the IRR result"
      text: "IRR is the discount rate at which NPV equals zero. Compare it to your WACC or hurdle rate — an IRR above your hurdle rate means the investment creates value."
    - name: "Interpret vs. WACC"
      text: "Enter your cost of capital (WACC) to see whether the project is value-accretive. IRR > WACC = accept the project."
  body: |
    The Internal Rate of Return (IRR) is the annualised rate of return that makes the
    Net Present Value (NPV) of all cash flows equal to zero. It is one of the most
    widely used metrics in capital budgeting and investment analysis.

    ## IRR formula

    IRR is the value of r that satisfies:

    **0 = CF₀ + CF₁/(1+r) + CF₂/(1+r)² + ... + CFₙ/(1+r)ⁿ**

    There is no closed-form solution — IRR is found iteratively (Newton-Raphson method).

    ## IRR decision rule

    - **IRR > WACC (hurdle rate)**: Accept the project — it creates value
    - **IRR < WACC**: Reject the project — it destroys value
    - **IRR = WACC**: Break-even — indifferent

    ## IRR limitations

    - **Multiple IRRs**: cash flows that change sign more than once can yield multiple IRRs
    - **Scale blindness**: IRR ignores project size — a 50% IRR on $1,000 is worth less than 20% on $1M
    - **Reinvestment assumption**: assumes interim cash flows are reinvested at the IRR rate, which may be unrealistic

    For these reasons, IRR is often used alongside NPV rather than in isolation.

