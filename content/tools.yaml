  howto_steps:
    - name: "Enter the original value"
      text: "Type the starting value — this is the baseline the percentage change is measured from."
    - name: "Enter the new value"
      text: "Type the new or current value. Positive result = increase; negative = decrease."
    - name: "Add years for CAGR"
      text: "If comparing values separated by multiple years, enter the number of years to calculate the Compound Annual Growth Rate."
    - name: "Read the multiplier"
      text: "The multiplier shows how many times the new value is relative to the original. A 2.5× multiplier = 150% increase."
  body: |
    ## What Is Percentage Change?

    Percentage change measures how much a value has increased or decreased relative to its original:

    $$\text{Percentage Change} = \frac{\text{New Value} - \text{Old Value}}{|\text{Old Value}|} \times 100$$

    Positive = increase. Negative = decrease.

    ### Common Applications in Business

    - **Revenue growth**: "Revenue grew from $800k to $1M — what's the growth rate?" → 25%
    - **Cost reduction**: "Costs dropped from $50k to $40k — what's the savings %?" → 20%
    - **Price changes**: "We raised prices from $49 to $69 — by how much?" → 40.8%

    ### CAGR vs Simple Percentage Change

    For multi-year comparisons, Compound Annual Growth Rate (CAGR) is more meaningful:

    $$\text{CAGR} = \left(\frac{\text{End Value}}{\text{Start Value}}\right)^{\frac{1}{n}} - 1$$

    A revenue that grew from $1M to $2M over 5 years is a 100% total change, but only 14.87% CAGR.

    ### Intent Pages

    - [Percentage Change Formula and Examples](/tools/percentage-change-calculator/percentage-change-formula/)
    - [What Is CAGR (Compound Annual Growth Rate)?](/tools/percentage-change-calculator/what-is-cagr/)

- slug: cogs-calculator
  title: COGS Calculator
  nav_title: COGS
  short: Calculate Cost of Goods Sold (COGS) from inventory and purchases, then compute gross profit and gross margin.
  date_added: "2026-06-18"
  new: true
  category: Finance
  js: cogs-calculator.js
  keywords:
    - COGS calculator
    - cost of goods sold calculator
    - COGS formula
    - gross profit calculator
    - cost of goods sold formula
  howto_steps:
    - name: "Enter beginning inventory"
      text: "Type the dollar value of inventory on hand at the start of the period (from your opening balance sheet)."
    - name: "Enter purchases or production costs"
      text: "Add all purchases of inventory or direct production costs during the period."
    - name: "Enter ending inventory"
      text: "Type the value of unsold inventory remaining at period end. This reduces COGS — unsold goods are not yet expensed."
    - name: "Add revenue for margin analysis"
      text: "Enter period revenue to see gross profit and gross margin alongside your COGS."
  body: |
    ## What Is COGS?

    Cost of Goods Sold (COGS) is the direct cost of producing the goods a business sold during a period.

    $$\text{COGS} = \text{Beginning Inventory} + \text{Purchases} - \text{Ending Inventory}$$

    ### What's Included in COGS?

    **Included:**
    - Raw materials and components
    - Direct labor (for manufacturing)
    - Manufacturing overhead (factory costs directly tied to production)
    - Freight-in (shipping to receive inventory)

    **Not included (operating expenses):**
    - Sales and marketing costs
    - Administrative salaries
    - R&D expenses
    - Interest and taxes

    ### COGS and Gross Margin

    $$\text{Gross Margin} = \frac{\text{Revenue} - \text{COGS}}{\text{Revenue}} \times 100$$

    Gross margin is the primary indicator of pricing power and business model efficiency. Compare across time periods and competitors within the same industry.

    ### COGS for Service Businesses

    Service businesses don't have physical inventory but still have COGS — it's called Cost of Revenue (CoR) or Cost of Service. Includes direct labor hours billed to clients, contractor costs, and hosting/infrastructure for SaaS.

    ### Intent Pages

    - [What Is COGS (Cost of Goods Sold)?](/tools/cogs-calculator/what-is-cost-of-goods-sold/)
    - [COGS vs Operating Expenses: What's the Difference?](/tools/cogs-calculator/cogs-vs-operating-expenses/)

- slug: net-profit-calculator
  title: Net Profit Calculator
  nav_title: Net Profit
  short: Calculate gross profit, operating income, and net profit with full margin breakdown from revenue through taxes.
  date_added: "2026-06-18"
  new: true
  category: Finance
  js: net-profit-calculator.js
  keywords:
    - net profit calculator
    - net income calculator
    - net profit margin calculator
    - operating income calculator
    - gross profit calculator
    - income statement calculator
  howto_steps:
    - name: "Enter revenue"
      text: "Type total revenue (top-line sales) for the period you are analyzing."
    - name: "Enter COGS"
      text: "Add Cost of Goods Sold — direct costs of producing what you sold. The calculator shows gross profit after this step."
    - name: "Enter operating expenses"
      text: "Add all operating expenses: salaries, rent, marketing, SG&A. Operating income appears after subtracting these."
    - name: "Add interest and taxes"
      text: "Enter interest expense on debt and income taxes to reach final net profit and net margin."
  body: |
    ## What Is Net Profit?

    Net profit (also called net income or the "bottom line") is what remains after subtracting all costs from revenue:

    $$\text{Net Profit} = \text{Revenue} - \text{COGS} - \text{OpEx} - \text{Interest} - \text{Taxes}$$

    ### The Income Statement Waterfall

    | Line | Formula |
    |------|---------|
    | **Revenue** | Top-line sales |
    | **Gross Profit** | Revenue − COGS |
    | **Operating Income (EBIT)** | Gross Profit − Operating Expenses |
    | **EBT** | Operating Income − Interest |
    | **Net Profit** | EBT − Taxes |

    ### Net Profit Margin Benchmarks

    | Industry | Typical Net Margin |
    |----------|--------------------|
    | SaaS | 15–30% |
    | Consulting | 15–25% |
    | Retail | 2–5% |
    | Restaurants | 3–9% |
    | Manufacturing | 5–10% |
    | Healthcare | 4–8% |

    ### Gross vs Operating vs Net Margin

    - **Gross margin** shows production efficiency — is the core product profitable?
    - **Operating margin** shows business model efficiency — can you run the company profitably?
    - **Net margin** shows final owner returns after financing and taxes.

    All three margins compressing together signals a systemic problem. A declining net margin with stable gross margin often points to rising SG&A or interest costs.

    ### Intent Pages

    - [How to Calculate Net Profit Margin](/tools/net-profit-calculator/how-to-calculate-net-profit-margin/)
    - [Gross Profit vs Net Profit: Key Differences](/tools/net-profit-calculator/gross-profit-vs-net-profit/)

- slug: financial-ratios-calculator
  title: Financial Ratios Calculator
  nav_title: Financial Ratios
  short: Calculate six key financial ratios in one dashboard — profitability, liquidity, leverage, and efficiency from a single balance sheet and income statement.
  date_added: "2026-06-18"
  new: true
  category: Finance
  js: financial-ratios-calculator.js
  keywords:
    - financial ratios calculator
    - key financial ratios
    - profitability ratios calculator
    - liquidity ratios calculator
    - financial health calculator
    - balance sheet ratios
  howto_steps:
    - name: "Enter revenue and COGS"
      text: "Type total revenue and cost of goods sold from the income statement. The tool calculates gross margin immediately."
    - name: "Enter net income and total assets"
      text: "Add net income (bottom-line profit) and total assets. This unlocks ROA (Return on Assets)."
    - name: "Enter equity and debt"
      text: "Type shareholders' equity and total debt from the balance sheet. ROE and the Debt-to-Equity ratio appear."
    - name: "Enter current assets and liabilities"
      text: "Add short-term assets and liabilities to calculate the current ratio — your liquidity snapshot."
  body: |
    ## Financial Ratios Dashboard

    This calculator computes six key ratios across four categories in a single view, letting you assess a company's full financial health from one set of inputs.

    ### Profitability Ratios

    **Gross Margin** = (Revenue − COGS) ÷ Revenue
    Measures production efficiency and pricing power. Compare against industry peers.

    **Net Margin** = Net Income ÷ Revenue
    The bottom-line percentage shareholders keep from each dollar of revenue.

    ### Return Ratios

    **ROE (Return on Equity)** = Net Income ÷ Shareholders' Equity
    Measures how well management generates returns for equity holders. S&P 500 average: ~15%.

    **ROA (Return on Assets)** = Net Income ÷ Total Assets
    Asset-utilization efficiency. Asset-light businesses (SaaS, consulting) score much higher than asset-heavy ones (manufacturing, utilities).

    ### Leverage Ratios

    **Debt-to-Equity** = Total Debt ÷ Equity
    Financial risk indicator. D/E > 2 generally indicates significant leverage; varies greatly by industry.

    ### Liquidity Ratios

    **Current Ratio** = Current Assets ÷ Current Liabilities
    Short-term solvency. A ratio below 1.0 means current liabilities exceed current assets — a liquidity warning sign.

    ### Using Ratios Together

    No single ratio tells the whole story. High ROE with very high D/E may mean leverage is inflating returns. Strong margins with a weak current ratio may indicate cash flow problems. Use all six together for a balanced assessment.

    ### Intent Pages

    - [Key Financial Ratios Every Business Owner Should Know](/tools/financial-ratios-calculator/key-financial-ratios-guide/)
    - [How to Read a Balance Sheet Using Ratios](/tools/financial-ratios-calculator/how-to-read-balance-sheet-ratios/)

- slug: times-interest-earned-calculator
  title: Times Interest Earned Calculator
  nav_title: TIE Ratio
  short: Calculate the Times Interest Earned (TIE) ratio to measure how comfortably your EBIT covers annual interest payments.
  date_added: "2026-06-18"
  new: true
  category: Finance
  js: times-interest-earned-calculator.js
  keywords:
    - times interest earned calculator
    - TIE ratio calculator
    - interest coverage ratio calculator
    - EBIT to interest ratio
    - debt coverage calculator
  howto_steps:
    - name: "Enter EBIT"
      text: "Type Earnings Before Interest and Taxes. This is operating income before any financing costs."
    - name: "Enter annual interest expense"
      text: "Add total annual interest payments on all debt obligations."
    - name: "Read your TIE ratio"
      text: "The calculator shows how many times over your EBIT can cover interest payments and how much buffer you have."
  body: |
    ## What Is the Times Interest Earned Ratio?

    Times Interest Earned (TIE) — also called the interest coverage ratio — measures how many times a company's EBIT can pay its interest obligations:

    $$\text{TIE} = \frac{\text{EBIT}}{\text{Interest Expense}}$$

    ### TIE Benchmarks

    | TIE | Assessment |
    |----|------------|
    | ≥ 5× | Strong coverage — comfortably serviceable |
    | 3–5× | Adequate — lender-acceptable for most loans |
    | 1.5–3× | Tight — approaching covenant limits |
    | 1–1.5× | Minimal — one bad quarter puts you at risk |
    | < 1× | Cannot cover interest from operations |

    ### Why Lenders Care

    TIE is a standard loan covenant metric. Most senior lenders require TIE ≥ 1.25–1.5×. A TIE of 3× means EBIT would have to drop 67% before interest payments become unserviceable.

    ### TIE vs DSCR

    TIE only covers interest, not principal repayment. For full debt service coverage including principal, use the [DSCR Calculator](/tools/dscr-calculator/). DSCR is stricter and more commonly used for real estate and project finance.

    ### Intent Pages

    - [What Is the Times Interest Earned Ratio?](/tools/times-interest-earned-calculator/what-is-times-interest-earned-ratio/)
    - [TIE Ratio vs DSCR: What's the Difference?](/tools/times-interest-earned-calculator/tie-ratio-vs-dscr/)

- slug: pe-ratio-calculator
  title: P/E Ratio Calculator
  nav_title: P/E Ratio
  short: Calculate trailing and forward P/E ratios, earnings yield, and PEG ratio to assess stock valuation relative to earnings.
  date_added: "2026-06-18"
  new: true
  category: Valuation
  js: pe-ratio-calculator.js
  keywords:
    - PE ratio calculator
    - price to earnings ratio calculator
    - forward PE calculator
    - PEG ratio calculator
    - earnings yield calculator
    - stock valuation calculator
  howto_steps:
    - name: "Enter stock price"
      text: "Type the current market price per share."
    - name: "Enter trailing EPS"
      text: "Add earnings per share for the trailing 12 months (TTM). Find this on any financial data site."
    - name: "Add forward EPS for forward P/E"
      text: "Enter analyst consensus EPS estimate for the next 12 months to get the forward P/E ratio."
    - name: "Add growth rate for PEG"
      text: "Enter expected annual EPS growth rate to calculate the PEG ratio — P/E adjusted for growth."
  body: |
    ## P/E Ratio Formula

    $$\text{P/E} = \frac{\text{Stock Price}}{\text{EPS}}$$

    ### Trailing vs Forward P/E

    - **Trailing P/E**: Uses last 12 months of actual earnings. More reliable but backward-looking.
    - **Forward P/E**: Uses next 12 months analyst estimates. More relevant for growing companies — shows what the market is pricing in for the future.

    If Forward P/E < Trailing P/E, the market expects earnings to grow. If Forward P/E > Trailing P/E, earnings are expected to shrink.

    ### Earnings Yield

    $$\text{Earnings Yield} = \frac{1}{\text{P/E}} \times 100$$

    Earnings yield is the inverse of P/E — it converts valuation into a return metric comparable to bond yields. A P/E of 20× = 5% earnings yield. Compare to 10-year Treasury yield to gauge relative attractiveness.

    ### PEG Ratio (P/E to Growth)

    $$\text{PEG} = \frac{\text{P/E}}{\text{Expected EPS Growth Rate (\%)}}$$

    Peter Lynch popularized PEG as a growth-adjusted valuation metric. PEG = 1 means the P/E equals the growth rate — "fairly valued." PEG < 1 suggests potential undervaluation; PEG > 2 suggests the stock is pricing in very high growth expectations.

    ### S&P 500 Historical P/E Context

    - Long-run average: ~15–17×
    - Post-2010 average (low-rate era): ~20–25×
    - During recessions: often drops to 10–12×
    - Bubble peaks: 30–40×+

    ### Intent Pages

    - [What Is the P/E Ratio and How to Use It?](/tools/pe-ratio-calculator/what-is-pe-ratio/)
    - [PEG Ratio vs P/E Ratio: Which Is Better for Valuation?](/tools/pe-ratio-calculator/peg-ratio-vs-pe-ratio/)

