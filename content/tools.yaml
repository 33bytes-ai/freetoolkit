- slug: payment-fee-comparison
  title: "Payment Processor Fee Comparison"
  nav_title: "Fee Comparison"
  short: "Compare Stripe, PayPal, and Shopify Payments fees side by side — enter any sale amount and see the exact net payout for each processor instantly."
  date_added: "2026-05-01"
  category: Payments
  js: payment-fee-comparison.js
  keywords: ["stripe vs paypal fees", "payment processor comparison fees", "stripe paypal shopify fee calculator", "cheapest payment processor calculator"]
  howto_steps:
    - name: "Enter your sale amount"
      text: "Type the dollar amount of a typical transaction in the 'Sale amount' field. The table updates instantly."
    - name: "Optionally add a custom rate"
      text: "If you have a negotiated rate (e.g., 2.5% + $0.10), enter it in the custom rate field using the format shown."
    - name: "Read the comparison table"
      text: "The processor with the highest net payout is highlighted. The insight below shows the exact dollar saving over the most expensive option."
    - name: "Share or copy the results"
      text: "Use the 'Share results' button to copy a URL with your inputs pre-filled, or 'Copy results' to paste the table into a spreadsheet."
  body: |
    Choosing the cheapest payment processor for your business is simple once you see the
    numbers side by side. Enter your typical sale amount below and the comparison table
    updates instantly with exact fees and net payouts for **Stripe**, **PayPal Standard**,
    **PayPal Checkout**, and **Shopify Payments** on each of its three plans.

    ## How the fee comparison works

    Each processor's fee structure is hardcoded at its published US rates:

    | Processor | Rate | Fixed fee |
    |-----------|------|-----------|
    | Stripe | 2.9% | + $0.30 |
    | PayPal Standard | 2.99% | + $0.49 |
    | PayPal Checkout | 3.49% | + $0.49 |
    | Shopify Basic | 2.0% | + $0.25 |
    | Shopify (Shopify plan) | 1.7% | + $0.25 |
    | Shopify Advanced | 1.5% | + $0.25 |

    ## When Shopify Payments is cheaper

    Shopify Payments beats Stripe on domestic US Visa/Mastercard transactions above
    roughly $12. At $100, Shopify Basic saves $0.95 per transaction over Stripe. At
    $500/mo volume on the Basic plan ($39/mo), the math is roughly neutral — but at
    $50,000/mo the rate savings dwarf the plan fee.

    ## When to stick with Stripe

    Stripe wins for: subscription billing, SaaS APIs, international payments (135+
    currencies), ACH Direct Debit, B2B invoicing, and businesses that are not on Shopify.
    Stripe's developer ecosystem is unmatched. Use this tool to quantify the fee difference,
    then weigh it against switching costs and feature needs.

- slug: stripe-fee-calculator
  title: "Stripe Fee Calculator"
  nav_title: "Stripe Fees"
  short: "Calculate exactly how much Stripe takes and what you actually receive, for any charge amount and card type."
  date_added: "2026-05-02"
  category: Payments
  js: stripe-fee-calculator.js
  keywords: ["stripe fee calculator", "stripe transaction fee", "how much does stripe charge", "stripe net payout calculator"]
  howto_steps:
    - name: "Enter the charge amount"
      text: "Type the amount you want to charge your customer in the 'Charge amount' field."
    - name: "Select the card type"
      text: "Choose 'Domestic' for US-issued cards (2.9% + $0.30) or 'International' for non-US cards (4.4% + $0.30). Use 'Custom rate' if you have negotiated Stripe pricing."
    - name: "Toggle pass-through mode if needed"
      text: "Check 'Charge more so you receive exactly that amount' if you want Stripe to gross-up the charge so you net your target amount after fees."
    - name: "Read your results"
      text: "The calculator instantly shows the amount charged to the customer, the Stripe fee deducted, and the net payout you receive in your bank account."
  body: |
    Stripe is the payment processor of choice for most SaaS products, marketplaces, and
    indie businesses — but the fee structure trips up founders constantly. The standard
    rate is **2.9% + $0.30** per successful card transaction, but that's just the
    starting point.

    International cards (issued outside the US) incur an additional **1.5% cross-border
    fee**, bringing the total to **4.4% + $0.30**. If you're using Stripe Connect to
    process payments on behalf of connected accounts, fees and revenue sharing get more
    complex. This calculator handles all the common scenarios.

    ## How the Stripe fee calculation works
    1. Enter the amount you want to charge the customer.
    2. Select whether the card is domestic or international.
    3. Choose whether you're absorbing the fee or passing it on to the customer
       ("charge what you need to receive" mode).
    4. The calculator shows the exact fee amount, the net payout to your bank account,
       and — in pass-through mode — what to charge so you receive your target amount.

    ## Why "charge more to receive exactly what you need" matters
    If you need to receive exactly $100 from a domestic US card, you can't just charge
    $100 — you'd receive $96.80 after Stripe's 2.9% + $0.30. To receive exactly $100,
    you need to charge **$103.09** (assuming the customer pays the processing fee).
    This calculator computes the gross-up automatically.

    ## Frequently asked questions

    **Does Stripe's rate change based on volume?**
    Yes. Stripe negotiates custom pricing for businesses processing more than ~$80k/month.
    For most indie founders and early-stage companies, the standard 2.9% + $0.30 applies.
    The calculator uses the standard rate; adjust the percentage field for your negotiated rate.

    **What about Stripe's additional fees (disputes, refunds, international)?**
    Refunds return the percentage fee but not the $0.30 fixed fee. Disputes incur a $15
    fee regardless of outcome ($15 is returned if you win). These edge cases aren't
    included in the per-transaction calculator, but they're worth budgeting for.

    **Can I use this for Stripe Connect?**
    Yes. Stripe Connect passes the same base fee to the platform or the connected account
    depending on your configuration. Enter the total charge and the applicable combined
    rate in the custom rate field.

- slug: mrr-calculator
  title: "MRR & ARR Calculator"
  nav_title: "MRR Calculator"
  short: "Calculate monthly recurring revenue, annual recurring revenue and MRR growth rate from your subscriber plan mix."
  date_added: "2026-05-03"
  category: SaaS Metrics
  js: mrr-calculator.js
  keywords: ["mrr calculator", "monthly recurring revenue calculator", "arr calculator", "saas mrr growth rate"]
  body: |
    Monthly Recurring Revenue (MRR) is the most important metric for any subscription
    business. It normalizes revenue across billing periods — annual subscribers, monthly
    subscribers, and quarterly subscribers all contribute their monthly equivalent — giving
    you a single number that represents predictable, steady-state revenue.

    This calculator lets you add up to **five subscription plans**, each with its own
    monthly price and subscriber count, and computes the combined MRR, Annual Recurring
    Revenue (ARR = MRR × 12), and a 12-month growth projection at a custom growth rate.

    ## Key MRR concepts

    **New MRR** — revenue from brand-new customers this month.
    **Expansion MRR** — additional revenue from existing customers who upgraded.
    **Churned MRR** — revenue lost from cancellations.
    **Net New MRR** = New MRR + Expansion MRR − Churned MRR.

    A healthy SaaS typically targets Net New MRR that grows the base by 10–20% month-over-month at
    early stage and 3–5% at scale.

    ## How to use this calculator
    1. Enter each plan's monthly price and number of active subscribers.
    2. For annual plans, enter the monthly equivalent (annual price ÷ 12).
    3. Optionally enter a monthly growth rate to project future MRR.

    ## Frequently asked questions

    **Should I count annual subscribers in MRR?**
    Yes — MRR includes the monthly equivalent of all recurring revenue regardless of
    billing period. A customer paying $1,200/year contributes $100/month to MRR.

    **What's the difference between MRR and revenue?**
    Revenue (cash received) differs from MRR (recognized monthly equivalent). If you
    collect a $1,200 annual payment upfront, you recognize $100/month to MRR, but
    received $1,200 in cash in month 1. Investors and VCs evaluate both, but MRR is
    the primary growth health metric.

    **What's a good MRR growth rate?**
    Y Combinator famously targets 5–7% week-over-week (about 20–30% month-over-month)
    during the early growth phase. At later stages, 10–15% monthly is strong, and
    5–8% is typical for a healthy, scaling SaaS.

- slug: ltv-cac-calculator
  title: "LTV / CAC Calculator"
  nav_title: "LTV & CAC"
  short: "Calculate Customer Lifetime Value, Customer Acquisition Cost and the LTV:CAC ratio to evaluate your unit economics."
  date_added: "2026-05-04"
  category: SaaS Metrics
  js: ltv-cac-calculator.js
  keywords: ["ltv cac calculator", "customer lifetime value calculator", "cac payback period", "ltv cac ratio saas"]
  howto_steps:
    - name: "Enter your Average Revenue Per User (ARPU)"
      text: "Input your monthly revenue per paying customer. For subscription businesses, this is your average plan price."
    - name: "Enter your gross margin percentage"
      text: "Type your gross margin as a percentage (e.g., 75 for 75%). SaaS typically ranges from 60–85%."
    - name: "Enter your monthly churn rate"
      text: "Input the percentage of customers who cancel each month. This determines how long customers stay and drives LTV."
    - name: "Enter your customer acquisition cost"
      text: "Divide total sales and marketing spend by the number of new customers acquired in the same period."
    - name: "Read your LTV:CAC ratio"
      text: "A ratio of 3:1 or above is healthy. Below 1 means you spend more to acquire a customer than they're worth."
  body: |
    LTV:CAC is the central metric of SaaS unit economics. It measures whether you earn
    more from a customer over their lifetime than it costs to acquire them, and by how
    much. A ratio below 1 means you're losing money on every customer. A ratio of 3:1
    or higher is generally considered healthy and sustainable.

    ## Definitions

    **Customer Lifetime Value (LTV)**
    The total gross profit you expect to earn from a customer over their entire
    relationship with your product.

    LTV = (Average Revenue Per User × Gross Margin %) ÷ Monthly Churn Rate

    **Customer Acquisition Cost (CAC)**
    The fully loaded cost to acquire one new customer — including ad spend, sales salaries,
    and any tools or events used for marketing.

    CAC = Total Sales & Marketing Spend ÷ New Customers Acquired (same period)

    **Payback Period**
    How many months of gross profit are needed to recover CAC:
    Payback = CAC ÷ (ARPU × Gross Margin %)

    ## How to use the LTV/CAC calculator
    1. Enter your Average Revenue Per User (monthly), gross margin %, and monthly churn rate.
    2. Enter your total sales and marketing spend and new customers acquired for the same period.
    3. The calculator shows LTV, CAC, the ratio, and the payback period.

    ## Frequently asked questions

    **What LTV:CAC ratio should I target?**
    3:1 is the commonly cited minimum for a sustainable SaaS — you earn three times what
    you spend to acquire a customer. Below 3:1 typically indicates a growth or margin problem.
    Above 5:1 often indicates you're underinvesting in growth.

    **What's a good CAC payback period?**
    Under 12 months is healthy for most SaaS businesses. Under 6 months is excellent —
    it means the business quickly recoups its customer acquisition investment and can
    reinvest faster.

    **Why does gross margin matter in the LTV calculation?**
    LTV represents *profit*, not revenue. A 70% gross margin on $100 ARPU means you
    actually retain $70 per month after cost of goods sold — that's what gets compared
    against CAC, not the full $100.

- slug: runway-calculator
  title: "Startup Runway Calculator"
  nav_title: "Runway Calculator"
  short: "Calculate how many months of runway you have left, your burn rate, and when you need to raise or break even."
  date_added: "2026-05-05"
  category: SaaS Metrics
  js: runway-calculator.js
  keywords: ["startup runway calculator", "burn rate calculator", "how long will my money last startup", "monthly burn rate"]
  howto_steps:
    - name: "Enter your cash balance"
      text: "Input your current bank balance or total cash available (savings + funding already in the bank)."
    - name: "Enter monthly expenses"
      text: "Add up all fixed and variable costs: salaries, rent, SaaS tools, marketing spend, and any other monthly outflows."
    - name: "Enter monthly revenue (if any)"
      text: "Input your current monthly revenue. This is subtracted from expenses to get your net burn rate. Zero if pre-revenue."
    - name: "Read your runway"
      text: "The calculator shows how many months of runway you have and your net monthly burn rate. Under 6 months is critical."
  body: |
    Runway is the single most urgent metric for any pre-profitability startup or bootstrapped
    business: how many months can you continue operating at your current burn rate before you
    run out of cash?

    This calculator computes **gross burn** (total monthly expenses), **net burn**
    (expenses minus revenue), and **runway** (cash balance ÷ net burn). It also shows the
    date on which your runway ends and how much monthly revenue growth would extend it.

    ## Burn rate definitions

    **Gross burn** — total monthly operating expenses, regardless of revenue.
    **Net burn** — monthly expenses minus monthly revenue. This is what's depleting your bank account.
    **Runway** — months until cash reaches zero: Cash ÷ Net Burn.

    ## How to use the runway calculator
    1. Enter your current cash balance (bank accounts + any credit facilities you can draw).
    2. Enter your total monthly expenses (payroll, infrastructure, subscriptions, etc.).
    3. Enter your current monthly revenue.
    4. Optionally enter a monthly revenue growth rate to model your path to profitability.

    ## Frequently asked questions

    **When should I start worrying about runway?**
    When runway drops below 12 months, you need to be actively fundraising or cutting
    costs — fundraising typically takes 3–6 months from first meeting to cash in the bank.
    Below 6 months, the situation is urgent. Below 3 months, options narrow quickly.

    **Should I include accounts receivable in my cash balance?**
    Only if they are reliably collectable within 30 days. A conservative runway calculation
    uses only confirmed cash in the bank, not promises of future payment.

    **What's a healthy runway for a seed-stage startup?**
    18–24 months is the generally recommended post-seed runway, which gives enough time
    to hit the milestones needed for the next round without too-frequent fundraising
    distraction.

- slug: churn-impact-calculator
  title: "Churn Impact Calculator"
  nav_title: "Churn Impact"
  short: "See exactly how monthly churn erodes your MRR over 12 months and what reducing churn by 1% is worth."
  date_added: "2026-05-06"
  category: SaaS Metrics
  js: churn-impact-calculator.js
  keywords: ["churn rate calculator", "subscription churn impact", "saas churn mrr calculator", "monthly churn mrr projection"]
  howto_steps:
    - name: "Enter your current MRR"
      text: "Input your current monthly recurring revenue. This is the starting point for the churn projection."
    - name: "Enter your monthly churn rate"
      text: "Input the percentage of your subscriber base that cancels each month (e.g., 3 for 3%)."
    - name: "Enter new MRR per month"
      text: "Input how much new MRR you add from new customers each month. Set to 0 to see pure churn impact."
    - name: "Set the projection period"
      text: "Choose how many months to project forward (1–36 months). Longer projections reveal the compounding effect."
    - name: "Read your MRR forecast"
      text: "The chart shows MRR trajectory. The key insight: reducing churn by even 1% has a larger long-term impact than equivalent acquisition growth."
  body: |
    Churn is the silent killer of SaaS businesses. Even a "modest" 5% monthly churn means
    you lose more than half your customer base in a year. This calculator makes the
    compounding math visible: given your current MRR and churn rate, it projects your
    MRR at 3, 6, and 12 months — and shows how much a 1-percentage-point improvement in
    churn is worth in preserved MRR.

    ## Why churn compounds so aggressively

    At 10% monthly churn, after 12 months only 28% of your original subscribers remain
    `(1 - 0.10)^12 ≈ 0.28`. At 2% monthly churn, 79% remain. That 8-point difference in
    monthly churn translates to a 51-point difference in annual retention — a massive gap
    in the economic value of the business.

    ## Gross churn vs. net churn

    **Gross revenue churn** counts cancellations and downgrades only.
    **Net revenue churn** subtracts expansion revenue (upgrades) from gross churn.
    A business with 5% gross churn and 8% expansion has −3% net churn, meaning the
    existing customer base is growing on its own. This is negative churn — the goal.

    ## How to use the churn impact calculator
    1. Enter your current MRR and monthly gross churn rate.
    2. Optionally enter a new MRR growth rate (new customer acquisition).
    3. See MRR projected for months 3, 6, and 12.
    4. See the dollar value of reducing churn by 1%.

    ## Frequently asked questions

    **What's an acceptable monthly churn rate?**
    For SMB/prosumer SaaS: under 3% monthly (≈31% annually) is typical.
    For mid-market: under 1% monthly (≈11% annually).
    For enterprise: under 0.5% monthly. If you're above these benchmarks, churn
    reduction should be the top priority.

    **Can negative churn actually happen?**
    Yes. If expansion revenue from existing customers exceeds cancellation revenue,
    your net churn is negative — the cohort grows even without new customers. This
    is the holy grail of SaaS and dramatically increases LTV and valuation multiples.

- slug: freelance-rate-calculator
  title: "Freelance Rate Calculator"
  nav_title: "Freelance Rate"
  short: "Calculate the minimum hourly rate you need to charge to hit your income target, accounting for taxes, expenses and non-billable time."
  date_added: "2026-05-07"
  category: Freelance
  js: freelance-rate-calculator.js
  keywords: ["freelance hourly rate calculator", "freelancer rate estimator", "what to charge as a freelancer", "minimum freelance rate"]
  howto_steps:
    - name: "Enter your annual income target"
      text: "Input the net income you want to take home after taxes and expenses."
    - name: "Enter your tax rate"
      text: "Input your effective tax rate as a percentage. Self-employed? Add 7.65% for self-employment tax in the US."
    - name: "Enter annual business expenses"
      text: "Add up software subscriptions, equipment, insurance, and other annual business costs."
    - name: "Set your billable weeks and hours"
      text: "Enter how many weeks you'll actually bill (subtracting vacation, sick days) and your target billable percentage of working hours."
    - name: "Read your minimum rate"
      text: "The calculated hourly rate is the floor — what you must charge to hit your income target. Add 20–40% margin for negotiation."
  body: |
    Setting a freelance rate without a systematic calculation is one of the most common
    ways freelancers undercharge. The number you need is not your old salary divided by
    2,080 — it's that number *plus* taxes, *plus* business expenses, *plus* an adjustment
    for the fact that you probably can't bill every hour you work.

    This calculator starts with your **annual income target** and works backwards to the
    minimum hourly rate you must charge to hit it, accounting for all three factors:

    **1. Non-billable time.** Responding to emails, writing proposals, doing accounting,
    and professional development all take time you can't bill clients for. Most freelancers
    bill 60–70% of their working hours.

    **2. Taxes.** Self-employed individuals pay income tax *plus* self-employment tax
    (Social Security + Medicare in the US ≈ 15.3%) on top of it, because employers
    normally pay half the payroll tax on behalf of employees. As a freelancer, you pay
    both halves.

    **3. Business expenses.** Software subscriptions, equipment, office space or co-working,
    health insurance, professional development, and accounting fees all reduce the revenue
    that's left for you after expenses.

    ## Frequently asked questions

    **Why does my "real rate" feel so much higher than what employees earn?**
    Because it is. A full-time employee earning $100k costs their employer ~$130–145k in
    total compensation (benefits, payroll taxes, equipment, office). As a freelancer you're
    covering all of that yourself, plus bearing the risk of non-billable time and income
    gaps between clients.

    **Should I ever charge below my minimum rate?**
    For a strategic client that provides portfolio pieces, referrals, or opens doors to
    higher-rate work, temporarily discounting is a valid business decision — but do it
    consciously, not because you forgot to account for taxes.

    **How do I raise my rate with existing clients?**
    Give 60–90 days notice, anchor to value ("my rate is increasing to $X because I'm now
    delivering Y"), and hold the line. Most clients who stay at the new rate end up being
    more respectful of your time.

- slug: salary-to-hourly-calculator
  title: "Salary to Hourly Rate Calculator"
  nav_title: "Salary to Hourly"
  short: "Convert annual salary to hourly, daily and weekly rates — including after-tax take-home for common US tax brackets."
  date_added: "2026-05-08"
  category: Freelance
  js: salary-to-hourly-calculator.js
  keywords: ["salary to hourly calculator", "annual salary to hourly rate", "convert salary to hourly", "salary per hour calculator"]
  howto_steps:
    - name: "Enter your annual salary"
      text: "Input your gross annual salary (before taxes)."
    - name: "Enter weekly hours and weeks worked"
      text: "Set your weekly hours (typically 40) and weeks worked per year (typically 52, or 50 if you take 2 weeks vacation)."
    - name: "Enter a tax rate for after-tax hourly"
      text: "Input your effective tax rate percentage to see your take-home hourly rate. Use 25–30% for most US earners."
    - name: "Read your hourly, daily, and weekly rates"
      text: "See your gross hourly, after-tax hourly, daily, and weekly rates — useful for freelance rate comparison and negotiation."
  body: |
    Whether you're a freelancer benchmarking your rate against employee salaries, an
    employer pricing a contract position, or just curious what your annual salary breaks
    down to per hour, this calculator handles the conversion instantly with no sign-up.

    The calculation is straightforward for gross rates:
    **Hourly** = Annual Salary ÷ (Weeks per Year × Hours per Week)

    The default assumes 52 weeks/year and 40 hours/week. The calculator also allows you
    to adjust both variables — useful for:
    - Part-time workers (e.g., 20 hours/week)
    - Workers with more or less than 52 paid weeks (e.g., accounting for unpaid leave)
    - Employees with paid time off included in their salary

    ## Pre-tax vs. after-tax hourly rate

    The calculator offers an estimated after-tax hourly rate for common US federal
    income tax brackets (10%, 12%, 22%, 24%, 32%, 35%, 37%). Note: this is a simplified
    estimate that does not account for state income taxes, deductions, or filing status.
    Use it for ballpark comparisons only, not tax planning.

    ## Frequently asked questions

    **How do I convert an hourly rate back to annual salary?**
    Annual = Hourly × Hours per Week × Weeks per Year. For a standard 40h/52w setup:
    Hourly × 2,080 = Annual.

    **My contract says $X/day — how does that convert?**
    Divide by your daily hours to get the hourly rate, then multiply by your weekly hours
    and weeks/year to get annual. For an 8-hour day: Daily rate × (260 working days) = Annual.

    **Why do freelancers charge 2–3× the equivalent employee hourly rate?**
    Because the employer portion of payroll taxes, benefits, equipment, management
    overhead, and income gap risk are all borne by the freelancer rather than the company.
    See the Freelance Rate Calculator for the full breakdown.

- slug: profit-margin-calculator
  title: "Profit Margin Calculator"
  nav_title: "Profit Margin"
  short: "Calculate gross profit, gross margin %, net profit and net margin % from revenue and cost inputs."
  date_added: "2026-05-09"
  category: Business Math
  js: profit-margin-calculator.js
  keywords: ["profit margin calculator", "gross margin calculator", "net profit margin formula", "gross margin percentage"]
  howto_steps:
    - name: "Enter your total revenue"
      text: "Input gross revenue for the period (quarterly or annual is most common)."
    - name: "Enter cost of goods sold (COGS)"
      text: "Input the direct costs to produce or deliver your product or service. For SaaS, this includes hosting, support, and customer success costs."
    - name: "Enter operating expenses"
      text: "Add sales, marketing, R&D, and G&A expenses (but not COGS). Leave at 0 if you only need gross margin."
    - name: "Enter taxes"
      text: "Input income tax for net profit calculation. Leave at 0 for pre-tax analysis."
    - name: "Read your margin breakdown"
      text: "The calculator shows gross profit and margin %, operating profit and margin %, and net profit and margin % simultaneously."
  body: |
    Profit margin is one of the most fundamental metrics in any business, but the
    terminology trips people up: gross margin, net margin, and operating margin all
    measure profitability at different points in the income statement.

    **Gross Profit** = Revenue − Cost of Goods Sold (COGS)
    **Gross Margin %** = (Gross Profit ÷ Revenue) × 100

    **Operating Profit** = Gross Profit − Operating Expenses (salaries, rent, marketing)
    **Operating Margin %** = (Operating Profit ÷ Revenue) × 100

    **Net Profit** = Operating Profit − Interest − Taxes
    **Net Margin %** = (Net Profit ÷ Revenue) × 100

    For SaaS businesses, gross margin is especially important because it directly feeds
    into LTV calculations (LTV = ARPU × Gross Margin % ÷ Churn Rate). SaaS businesses
    typically target 70–80%+ gross margins; software with high hosting or third-party API
    costs can see 50–65%.

    ## How to use the profit margin calculator
    1. Enter revenue, COGS, and operating expenses.
    2. Optionally add taxes and interest to compute net profit.
    3. Each margin level is shown as a dollar amount and a percentage.

    ## Frequently asked questions

    **What's a good gross margin for a SaaS business?**
    70–80% is standard for cloud SaaS. Below 50% often signals high infrastructure costs
    or a services-heavy revenue component that makes scaling harder. Above 80% is
    achievable for pure software products with efficient hosting.

    **Why is gross margin more useful than revenue for valuing a SaaS company?**
    Because revenue growth is meaningless if COGS grows at the same rate. A SaaS
    company generating $1M ARR at 80% gross margin is worth significantly more than one
    at $1M ARR with 30% gross margin, since the former has $800k to cover operating
    expenses and profit, while the latter has only $300k.

    **Is it possible to have positive gross margin and negative net margin?**
    Yes, and it's common in growth-stage startups: the product earns more than its direct
    costs, but sales, marketing, and R&D spending exceeds gross profit. This is deliberate
    "invest now, profit later" — sustainable only if unit economics (LTV:CAC) are healthy.

- slug: break-even-calculator
  title: "Break-Even Calculator"
  nav_title: "Break-Even"
  short: "Find how many units or customers you need to cover fixed costs, and calculate your break-even revenue."
  date_added: "2026-05-10"
  category: Business Math
  js: break-even-calculator.js
  keywords: ["break even calculator", "break even point formula", "break even analysis", "how many sales to break even"]
  howto_steps:
    - name: "Enter total fixed costs"
      text: "Input all costs that don't change with volume: rent, salaries, software subscriptions, insurance."
    - name: "Enter price per unit"
      text: "Input the selling price per unit, customer, or contract. For services, this is the average transaction value."
    - name: "Enter variable cost per unit"
      text: "Input the cost that scales with each sale: materials, payment processing fees, commissions, delivery costs."
    - name: "Read your break-even point"
      text: "The calculator shows the exact number of units/customers to sell to cover all costs, and the minimum revenue required."
  body: |
    Break-even analysis tells you the minimum level of sales required to cover all costs —
    the point at which you are neither making a profit nor incurring a loss. Every unit
    sold beyond break-even contributes to profit.

    **Break-Even Units** = Fixed Costs ÷ (Price per Unit − Variable Cost per Unit)

    The denominator — *Price minus Variable Cost* — is called the **contribution margin**:
    the amount each sale contributes toward covering fixed costs and, once break-even is
    reached, generating profit.

    **Break-Even Revenue** = Break-Even Units × Price per Unit

    Or equivalently: Fixed Costs ÷ Gross Margin %

    ## Applications for different business types

    **SaaS:** Fixed costs = payroll + infrastructure. Variable cost per customer ≈ hosting,
    payment processing fees. Break-even = subscriptions needed to cover monthly costs.

    **Freelance / consulting:** Fixed costs = overhead + desired salary. Price = day rate
    or project fee. Break-even = number of billable days per month.

    **E-commerce / physical products:** Fixed costs = rent, warehouse, staff. Variable
    cost = COGS per unit. Break-even = units sold per period.

    ## Frequently asked questions

    **What counts as a fixed cost vs. a variable cost?**
    Fixed costs don't change with output volume (rent, salaried staff, software
    subscriptions). Variable costs scale directly with each unit sold (materials, payment
    fees, shipping, royalties).

    **How is break-even different from profitability?**
    Break-even is the floor — zero profit, zero loss. Profitability begins above that.
    Break-even analysis is most useful early on to set a minimum sales target and evaluate
    whether a pricing model is viable before investing heavily.

- slug: vat-calculator
  title: "VAT & Sales Tax Calculator"
  nav_title: "VAT Calculator"
  short: "Add or remove VAT / sales tax at any rate. Switch between countries or enter a custom rate."
  date_added: "2026-05-12"
  category: Business Math
  js: vat-calculator.js
  keywords: ["vat calculator", "sales tax calculator", "add vat to price", "remove vat from price", "vat exclusive inclusive"]
  howto_steps:
    - name: "Enter the price amount"
      text: "Input the price you want to calculate VAT on."
    - name: "Enter the VAT / tax rate"
      text: "Select a preset rate (UK 20%, EU standard, Australian 10%) or enter a custom percentage."
    - name: "Choose add or remove mode"
      text: "Select 'Add VAT' to calculate VAT-inclusive price, or 'Remove VAT' to find the ex-VAT price from a gross amount."
    - name: "Read the result"
      text: "See the VAT amount and final price instantly. Useful for invoicing, pricing, and tax returns."
  body: |
    When you invoice a client in a VAT-registered country (UK, EU, Australia, etc.), you
    need to know whether your quoted price is VAT-exclusive (net) or VAT-inclusive (gross)
    and calculate the other. Getting this backwards means either undercharging the client
    or accidentally absorbing the tax yourself.

    This calculator handles both directions:

    **Add tax:** Net price × (1 + rate) = Gross price
    **Remove tax:** Gross price ÷ (1 + rate) = Net price

    Standard rates are pre-populated for common regions (UK: 20%, EU default: 20%/23%,
    Australia GST: 10%, Canada GST: 5%, US: custom). You can also enter any custom rate.

    ## Key concepts

    **Net price (ex-VAT / ex-tax):** The price before tax. This is what you receive as
    revenue. VAT paid by the customer goes to the government, not to you.

    **Gross price (inc-VAT):** The total the customer pays, including tax.

    **VAT / GST registration threshold:** In the UK, you must register for VAT when
    your 12-month taxable turnover exceeds £90,000 (as of 2024). Below that threshold,
    you don't charge VAT and don't need to remit it. US sales tax has no federal threshold
    and varies by state.

    ## Frequently asked questions

    **Do I charge VAT on digital products to overseas customers?**
    EU rules require you to charge VAT at the buyer's country rate when selling B2C
    digital products to EU customers (the "EU Digital Services" rules). Platforms like
    Stripe Tax, Paddle, and Lemon Squeezy handle this automatically as "merchant of
    record." B2B EU sales typically use reverse-charge (customer self-accounts for VAT).

    **What's the difference between VAT and sales tax?**
    VAT is collected at each stage of production and business customers can reclaim it.
    US sales tax is collected only at the final retail sale and cannot be reclaimed
    by businesses. The end-consumer bears both; the mechanics for businesses differ.

- slug: paypal-fee-calculator
  title: "PayPal Fee Calculator"
  nav_title: "PayPal Fees"
  short: "Calculate exactly how much PayPal takes per transaction and what you actually receive, for any payment type."
  date_added: "2026-05-13"
  category: Payments
  js: paypal-fee-calculator.js
  keywords: ["paypal fee calculator", "paypal transaction fee", "how much does paypal charge", "paypal net payout"]
  body: |
    PayPal charges **3.49% + $0.49** per domestic online transaction — slightly higher than
    Stripe's 2.9% + $0.30. For international payments, fees rise to **4.99% + $0.49**.
    Micropayments (transactions under $10) have a special rate: **5% + $0.05**, which is
    cheaper on tiny amounts but expensive as a percentage.

    ## PayPal vs Stripe fee comparison

    | Scenario | PayPal | Stripe |
    |---|---|---|
    | $10 domestic | $0.84 (8.4%) | $0.59 (5.9%) |
    | $100 domestic | $3.98 (4.0%) | $3.20 (3.2%) |
    | $1,000 domestic | $35.39 (3.5%) | $32.30 (3.2%) |
    | $100 international | $5.48 (5.5%) | $4.70 (4.7%) |

    For most transaction sizes, Stripe is cheaper. PayPal's advantage is consumer familiarity
    — checkout conversion can be higher when PayPal is offered as an option.

    ## Fee pass-through mode
    If you need to receive a specific net amount, the calculator solves the gross-up:
    to receive exactly $100 via a domestic PayPal charge, you would need to charge **$104.66**.

    ## PayPal Friends & Family
    Personal payments (Friends & Family) are free for domestic bank-funded or PayPal-balance
    transactions — but using this method for business payments violates PayPal's Terms of Service.
    Doing so risks account termination without the seller protection that standard transactions provide.

    ## Frequently asked questions

    **Does PayPal charge for refunds?**
    PayPal returns the fixed $0.49 fee but keeps the percentage portion (3.49%) when you refund.
    This differs from Stripe, which returns the fixed fee but also keeps the percentage.

    **Can I avoid PayPal fees?**
    For domestic bank account transfers to personal contacts, yes. For business transactions,
    the only way to reduce fees is through PayPal's Merchant Rate program — which requires
    applying and demonstrating high transaction volume. Generally, Stripe offers lower fees
    for most business use cases.

- slug: arr-mrr-converter
  title: "ARR / MRR Converter"
  nav_title: "ARR ↔ MRR"
  short: "Instantly convert between Monthly Recurring Revenue and Annual Recurring Revenue, plus daily and weekly breakdowns."
  date_added: "2026-05-14"
  category: SaaS Metrics
  js: arr-mrr-converter.js
  keywords: ["arr mrr converter", "arr to mrr calculator", "mrr to arr", "annual recurring revenue calculator"]
  howto_steps:
    - name: "Enter your MRR or ARR"
      text: "Input either your Monthly Recurring Revenue or your Annual Recurring Revenue — the calculator converts in both directions instantly."
    - name: "Select the conversion direction"
      text: "Choose whether you're converting from MRR to ARR, or from ARR to MRR."
    - name: "Read the conversions"
      text: "See MRR, ARR, daily recurring revenue, and weekly recurring revenue all at once — useful for investor reporting and financial modeling."
  body: |
    ARR (Annual Recurring Revenue) and MRR (Monthly Recurring Revenue) represent the same
    underlying metric at different time scales. The relationship is simple:

    **ARR = MRR × 12**
    **MRR = ARR ÷ 12**

    But founders mix up these numbers constantly — especially when dealing with annual-plan
    customers, investor conversations, or financial models that use both figures.

    ## When to use ARR vs MRR

    **Use MRR when:**
    - Tracking month-to-month growth velocity
    - Computing churn impact (churn is a monthly rate)
    - Calculating burn rate vs revenue
    - Running short-term models (< 1 year)

    **Use ARR when:**
    - Talking to investors (most SaaS valuations use ARR multiples)
    - Comparing to industry benchmarks ($1M ARR, $10M ARR milestones)
    - Reporting to your board
    - Calculating revenue multiples (ARR / ARR multiple = company value)

    ## Annual plan revenue recognition
    A customer who pays $1,200 upfront for a year contributes **$100/month to MRR** and
    **$1,200 to ARR** — but the cash arrives all at once. This distinction matters for
    runway calculations: ARR and cash flow are not the same thing.

    ## Frequently asked questions

    **Is ARR the same as annual revenue?**
    No. ARR includes only *recurring* subscription revenue. One-time setup fees, professional
    services, and non-recurring revenue are excluded from ARR. This is what makes ARR a
    useful measure of predictable, recurring business health.

    **What ARR multiple should I use for valuation?**
    SaaS valuations typically range from 5–15× ARR depending on growth rate, net retention,
    and market conditions. At $1M ARR growing 100%+ YoY, 10–15× is common. At $5M ARR
    growing 50% YoY, expect 6–10×.

- slug: nps-calculator
  title: "NPS Calculator"
  nav_title: "NPS Score"
  short: "Calculate your Net Promoter Score from promoter, passive, and detractor counts — with benchmark context."
  date_added: "2026-05-15"
  category: SaaS Metrics
  js: nps-calculator.js
  keywords: ["nps calculator", "net promoter score calculator", "nps formula", "how to calculate nps"]
  howto_steps:
    - name: "Count your promoters (score 9–10)"
      text: "Count respondents who answered 9 or 10 on the 'How likely are you to recommend?' question."
    - name: "Count your passives (score 7–8)"
      text: "Count respondents who answered 7 or 8. They don't hurt your NPS but don't help it."
    - name: "Count your detractors (score 0–6)"
      text: "Count respondents who answered 0–6. These customers are at risk of churning and may damage your brand."
    - name: "Read your NPS and context"
      text: "NPS = % Promoters − % Detractors. The calculator shows your score, the industry benchmark context, and the breakdown by segment."
  body: |
    Net Promoter Score (NPS) is one of the most widely used customer satisfaction metrics
    in SaaS. It asks a single question: *"How likely are you to recommend us to a friend
    or colleague?"* Respondents score from 0–10:

    - **Promoters** (9–10): enthusiastic customers who actively refer others
    - **Passives** (7–8): satisfied but unenthusiastic — not a drag, not a booster
    - **Detractors** (0–6): unhappy customers who may warn others away

    **NPS = % Promoters − % Detractors**

    The score ranges from −100 (all detractors) to +100 (all promoters).

    ## NPS benchmarks by industry

    | Industry | Average NPS |
    |---|---|
    | Consumer SaaS | 30–50 |
    | B2B SaaS | 30–45 |
    | E-commerce | 45–55 |
    | Consulting / agencies | 30–40 |

    Apple, Tesla, and Netflix consistently score 70–80+. For most SaaS companies, a score
    above 40 is considered excellent; above 20 is good.

    ## How to act on NPS

    NPS is only useful if you close the feedback loop:
    1. **Detractors** — contact personally within 48 hours; identify root cause; offer resolution
    2. **Passives** — the biggest opportunity; one insight about what would push them to "9" often applies to many customers
    3. **Promoters** — ask for referrals, testimonials, and case study participation

    ## Frequently asked questions

    **How often should I survey customers?**
    Most SaaS businesses survey every 90 days (quarterly), or trigger a survey 30 days
    after a customer's first meaningful usage. Avoid surveying too frequently — it trains
    customers to ignore the survey.

    **Is NPS a lagging or leading indicator?**
    Both. It's a lagging indicator of product quality and support. It's a leading indicator
    of churn — detractors churn at 2–3× the rate of promoters over the following 12 months.

- slug: rule-of-40-calculator
  title: "Rule of 40 Calculator"
  nav_title: "Rule of 40"
  short: "Calculate your SaaS Rule of 40 score — the sum of revenue growth rate and profit margin that investors use to benchmark health."
  date_added: "2026-05-17"
  category: SaaS Metrics
  js: rule-of-40-calculator.js
  keywords: ["rule of 40 calculator", "saas rule of 40", "rule of 40 saas benchmark", "growth plus margin saas"]
  howto_steps:
    - name: "Enter your annual revenue growth rate"
      text: "Input your YoY ARR or revenue growth as a percentage (e.g., 45 for 45% growth)."
    - name: "Enter your profit margin"
      text: "Input your EBITDA, free cash flow, or net income margin as a percentage. Use a negative number if loss-making."
    - name: "Read your Rule of 40 score"
      text: "Growth rate + margin = your score. 40+ is healthy. 60+ is excellent. Below 40 suggests you're either not growing fast enough or burning too much."
  body: |
    The **Rule of 40** is the most widely cited benchmark for SaaS company health at scale.
    It states that a sustainable SaaS business should have its **growth rate + profit margin ≥ 40%**.

    **Rule of 40 Score = Revenue Growth Rate (%) + Net Profit Margin (%)**

    A company growing at 60% year-over-year with a −15% margin scores **+45** — healthy.
    A company growing at 10% with 5% margin scores **+15** — concerning. A company growing
    at 20% with 25% margin scores **+45** — excellent.

    ## Why the Rule of 40 matters for investors

    Investors use the Rule of 40 to compare companies at different growth stages. A high-growth
    company burning cash is acceptable *if* growth is fast enough to offset the burn.
    A slower-growth company is only valuable *if* it generates meaningful profit.
    The Rule of 40 captures the trade-off between both.

    Public SaaS companies trading at premium multiples almost universally pass the Rule of 40.
    During the 2021 SaaS bull market, top-quartile companies scored 60+.

    ## Rule of 40 benchmarks

    | Score | Interpretation |
    |---|---|
    | < 20 | Struggling — needs significant improvement |
    | 20–39 | Below benchmark — acceptable early stage |
    | 40–59 | Passes — healthy SaaS business |
    | 60+ | Exceptional — top-quartile growth + efficiency |

    ## When does the Rule of 40 apply?
    Most investors apply the Rule of 40 to companies above $5–10M ARR. Below that threshold,
    growth rate takes precedence — a pre-revenue startup burning cash at 200% growth isn't
    expected to be profitable. At $50M+ ARR, the Rule of 40 becomes a hard benchmark for
    premium valuation multiples.

    ## Frequently asked questions

    **Which profit margin metric should I use?**
    Free cash flow margin is the most common choice, as it accounts for capex and working
    capital. Some investors use EBITDA margin. Net income margin is least common because it
    includes non-cash charges (stock compensation, depreciation) that distort the picture.

    **Can I game the Rule of 40 by cutting investment?**
    Yes, but short-term. Cutting R&D or sales to improve margins will show a higher score
    today but slower future growth — which investors recognize and discount.

- slug: price-impact-calculator
  title: "Price Increase Impact Calculator"
  nav_title: "Price Impact"
  short: "See how a price increase affects your MRR and calculate the minimum retention rate needed to break even on a pricing change."
  date_added: "2026-05-18"
  category: Business Math
  js: price-impact-calculator.js
  keywords: ["price increase calculator", "pricing impact calculator", "how much can i raise prices", "price elasticity saas"]
  howto_steps:
    - name: "Enter your current price per customer"
      text: "Input your current monthly price (or average ARPU if plans vary)."
    - name: "Enter your current customer count"
      text: "Input how many paying customers you currently have."
    - name: "Enter your proposed new price"
      text: "Input the higher price you're considering."
    - name: "Read the break-even retention"
      text: "See the minimum customer retention % needed for the price increase to not decrease your MRR, plus the projected MRR delta at various churn scenarios."
  body: |
    Raising prices is one of the highest-leverage moves in any subscription business — but
    founders underdo it or avoid it entirely because they fear churn. This calculator makes
    the math explicit: given your current pricing and customer count, exactly how many customers
    can you afford to lose at the new price and still come out ahead?

    ## The break-even retention formula

    **Break-even retention = Current MRR ÷ (New Price × Current Customers)**

    If you have 100 customers at $49/month ($4,900 MRR) and raise to $69/month, you need
    to retain **4,900 ÷ 6,900 = 71%** of customers. In other words, you can lose 29% of
    customers and still earn more revenue.

    ## What research says about B2B price increases

    Price elasticity in B2B SaaS is much lower than in consumer markets. Studies consistently find:
    - **5–15% price increases**: 0–5% customer loss in B2B
    - **20–30% price increases**: 5–15% customer loss in B2B, depending on value perception
    - **50%+ price increases**: significant churn unless clearly value-justified

    ## How to execute a price increase

    1. **Grandfather existing customers** for 6–12 months — reduces churn dramatically
    2. **Announce 60–90 days in advance** with a value-focused message
    3. **Apply immediately to new customers** — test the new price with no risk
    4. **Track conversion rates** after the change — lower conversion may signal positioning issues

    ## Frequently asked questions

    **Should I raise prices on all plans at once?**
    Test the highest tier first. Enterprise/power users are least price-sensitive and provide
    the most useful signal. Once you see the churn data, apply to lower tiers with greater confidence.

    **What if customers cancel after the price increase?**
    Customers who cancel over a modest price increase were usually already considering leaving.
    A price increase often cleans up a customer base — churned customers at the new price
    are replaced by higher-quality customers acquired at the new price point.

- slug: shopify-fee-calculator
  title: "Shopify Fee Calculator"
  nav_title: "Shopify Fees"
  short: "Calculate Shopify processing fees and transaction fees for any plan — with and without Shopify Payments."
  date_added: "2026-05-19"
  category: Payments
  js: shopify-fee-calculator.js
  keywords: ["shopify fee calculator", "shopify transaction fee", "shopify processing fee", "shopify payments vs stripe"]
  howto_steps:
    - name: "Enter the sale amount"
      text: "Input the price of the product you're selling."
    - name: "Select your Shopify plan"
      text: "Choose Basic ($39/mo), Shopify ($105/mo), or Advanced ($399/mo). Each has different processing and transaction fee rates."
    - name: "Toggle Shopify Payments on or off"
      text: "If you use Shopify Payments (built-in processor), there's no third-party transaction fee. Using Stripe or another processor adds 0.5–2% on top."
    - name: "Read your net payout"
      text: "See total fees and net payout. Compare across plans to find which Shopify tier is cheapest at your current volume."
  body: |
    Shopify charges two types of fees on every sale: a **payment processing fee** (similar to
    Stripe's rate) and a separate **transaction fee** if you use a third-party payment gateway
    instead of Shopify Payments. Understanding both is essential for accurate margin calculation.

    ## Shopify fee structure by plan

    | Plan | Monthly fee | Processing rate | Transaction fee (3rd party) |
    |---|---|---|---|
    | Basic | $39 | 2.9% + $0.30 | 2.0% |
    | Shopify | $105 | 2.6% + $0.30 | 1.0% |
    | Advanced | $399 | 2.4% + $0.30 | 0.5% |

    The transaction fee applies *only* when you use a payment processor other than Shopify
    Payments (Stripe, PayPal, etc.). Using Shopify Payments eliminates this fee entirely.

    ## Shopify Payments vs third-party gateways

    For most merchants, Shopify Payments is the cheapest option because it eliminates the
    transaction fee. A $100 sale on the Basic plan via Stripe costs **$2.90 + $0.30 + $2.00 = $5.20**,
    compared to just **$3.20** with Shopify Payments — a 62% difference.

    Reasons to use a third-party gateway anyway:
    - Your country isn't supported by Shopify Payments (Shopify Payments is available in 17+ countries)
    - You need specific fraud tools, subscriptions, or features only available in your existing gateway
    - High-risk product categories that Shopify Payments doesn't support

    ## Frequently asked questions

    **Does the monthly plan fee factor into per-sale cost?**
    The calculator shows per-transaction fees only. For a full cost-per-sale picture including
    the plan fee, divide your monthly plan fee by your number of monthly transactions and add it
    to the per-transaction total. At 100 sales/month on the Basic plan, the plan overhead is $0.39/sale.

    **Should I upgrade my plan to get lower fees?**
    The upgrade math: if moving from Basic to Shopify ($66/month more) saves 0.3% + eliminates
    1% transaction fee (if on 3rd-party): on $66/$0.013 = $5,077/month in sales you break even.
    Above that volume, upgrading pays off.

- slug: freelance-project-estimate
  title: "Freelance Project Estimator"
  nav_title: "Project Estimate"
  short: "Calculate a client-ready project quote from your hourly rate, time estimate, and contingency buffer."
  date_added: "2026-05-20"
  category: Freelance
  js: freelance-project-estimate.js
  keywords: ["freelance project estimate calculator", "how to quote a project freelance", "freelance project cost calculator", "project quote calculator"]
  howto_steps:
    - name: "Enter your hourly rate"
      text: "Input your hourly rate in dollars. Use the Freelance Rate Calculator if you don't know your minimum rate."
    - name: "Enter estimated hours"
      text: "Input your best estimate for total hours. Be honest — most projects run 20–30% over initial estimates."
    - name: "Set your contingency buffer"
      text: "Add a percentage buffer for scope creep and unexpected complexity. 20–30% is standard for fixed-price projects."
    - name: "Read your project quote"
      text: "See the base cost, contingency amount, total quote, and a suggested fixed-price contract amount. Copy for client proposals."
  body: |
    Accurately quoting freelance projects is part math, part risk management. Underquote and
    you work unpaid hours. Overquote without justification and you lose the work. This calculator
    starts with what you know — your rate, your estimated hours, and a contingency buffer —
    and produces a quote you can hand directly to a client.

    ## The two-part formula

    **Base estimate** = Hourly rate × Estimated hours
    **Total quote** = Base estimate × (1 + Contingency %)

    The contingency is not padding or dishonesty — it's a risk buffer that accounts for
    the inevitable: unclear requirements, scope creep, revision rounds, and the time required
    for project management overhead that you didn't explicitly estimate.

    ## What contingency percentage to use

    | Project type | Recommended contingency |
    |---|---|
    | Clear spec, familiar work | 10–15% |
    | Standard project, some unknowns | 20–25% |
    | New domain, unclear requirements | 30–40% |
    | R&D / discovery phases | 50%+ |

    Studies of software projects show 50–80% overrun rates on original estimates. A 20%
    contingency buffer is not aggressive — it's conservative. Clients who push back on
    contingency are telling you they expect scope changes and won't pay for them.

    ## Fixed price vs time-and-materials

    This calculator produces a **fixed-price quote**. Alternatives:
    - **Time-and-materials (T&M)**: you bill actual hours at your rate. Lower risk for you,
      higher perceived risk for the client. Works best for ongoing or open-ended work.
    - **Value-based pricing**: price to the client's perceived value rather than your hours.
      More complex to position, but removes the ceiling on your earnings.

    ## Frequently asked questions

    **Should I show the breakdown or just the total?**
    For most clients, show only the total. Breaking down hourly rate × hours invites negotiation
    on each component and makes clients compare your hourly rate to market. The total is all
    they need to make a buying decision.

    **How do I handle out-of-scope requests?**
    Add a scope clause to your contract: any work outside the defined deliverables is quoted
    separately. Reference this clause calmly when scope creep arrives — "Happy to do that;
    I'll send a quick quote for the extra work" — rather than absorbing it silently.

- slug: cac-by-channel-calculator
  title: "CAC by Channel Calculator"
  nav_title: "CAC by Channel"
  short: "Break down Customer Acquisition Cost by marketing channel to find which channels are most efficient and where to shift budget."
  date_added: "2026-05-22"
  category: SaaS Metrics
  js: cac-by-channel-calculator.js
  keywords: ["cac by channel", "customer acquisition cost by channel", "marketing channel efficiency", "cac channel breakdown"]
  howto_steps:
    - name: "Add your marketing channels"
      text: "Enter a name for each channel (e.g., Google Ads, SEO, Outbound) and the monthly spend for each."
    - name: "Enter new customers from each channel"
      text: "Input how many new paying customers each channel generated in the same period."
    - name: "Compare CAC across channels"
      text: "The table ranks channels by CAC (spend / customers). The most efficient channel is highlighted."
    - name: "Use the insight to reallocate budget"
      text: "Channels with the lowest CAC and highest volume are where to increase spend. High CAC with low volume should be cut or optimized."
  body: |
    Blended CAC hides the truth. Your average cost to acquire a customer might look
    acceptable, but when you break it down by channel, you often find one or two channels
    delivering customers at 3–5× lower cost — and one or two channels where you're
    effectively paying to acquire customers you'd have gotten anyway.

    This calculator lets you enter up to four acquisition channels with their monthly
    spend and new customer count, and ranks them by CAC from most to least efficient.

    ## Why channel-level CAC matters

    The classic mistake: a company is spending $20k/month on paid search ($500 CAC)
    and $3k/month on content/SEO ($150 CAC). The team reports a "blended CAC of $380"
    and considers it acceptable. But every dollar shifted from paid search to content
    would reduce average CAC — potentially doubling growth efficiency without increasing budget.

    ## How to measure CAC by channel accurately

    The formula is simple: **Channel CAC = Monthly Spend ÷ New Customers Acquired**

    The hard part is attribution. Common approaches:
    - **First-touch attribution**: credit the channel that first reached the customer
    - **Last-touch attribution**: credit the channel where the customer converted
    - **Multi-touch attribution**: distribute credit across channels in the journey

    For most early-stage companies, last-touch with a manual override for obvious
    assisted conversions is sufficient. Use UTM parameters consistently to track source.

    ## Fully loaded vs. program-only CAC

    The calculator uses program spend only (ad budget, tool costs, contractor fees for that channel).
    For a fully loaded CAC, add the pro-rata salary of the people working on each channel.
    This distinction matters when comparing in-house content vs. paid acquisition — in-house
    has near-zero program cost but significant salary cost.

    ## Frequently asked questions

    **What's a good CAC by channel?**
    CAC benchmarks vary enormously by ACV. Divide your CAC by your expected LTV — if the
    ratio is above 3:1, the channel is viable. If below 1:1, it's destroying value.

    **How do I handle referral/word-of-mouth?**
    Enter referral program costs (if any) and customers acquired via referral. Customers
    that come with zero program cost (organic referrals) make referral CAC near zero — but
    it's a channel you can't easily scale, so treat it as a bonus rather than a primary channel.

- slug: pricing-tier-comparison
  title: "Pricing Tier Comparison Calculator"
  nav_title: "Tier Comparison"
  short: "Compare 2–3 SaaS pricing tiers and find which tier maximizes revenue at different conversion rates — before you commit to a pricing page."
  date_added: "2026-05-24"
  category: Business Math
  js: pricing-tier-comparison.js
  keywords: ["saas pricing tier comparison", "pricing page optimization", "which saas tier makes more revenue", "pricing tier calculator"]
  body: |
    SaaS pricing pages almost universally offer multiple tiers. But founders often set
    tier prices based on gut feel and competitive research without modeling the actual
    revenue implications of different conversion rates.

    This calculator answers: **for every 1,000 visitors to your pricing page, which tier
    configuration generates the most MRR?**

    ## The conversion-price trade-off

    Higher-priced tiers convert at lower rates. The question is *how much* lower. If your
    $99/month plan converts at 1.5% and your $29/month plan converts at 4%, the $99 plan
    generates $148.50 MRR per 1,000 visitors vs. $116 for the $29 plan — making the higher
    tier 28% more valuable despite the lower conversion rate.

    The key insight: you can afford to lose a lot of conversions on a higher-priced tier
    before it becomes less valuable than a cheaper tier with more conversions.

    ## Anchor pricing strategy

    Many SaaS companies deliberately price an "Enterprise" tier very high (often 3–5× the
    mid tier) with very low expected conversion, for two reasons:
    1. The few Enterprise customers who convert generate disproportionate revenue
    2. It makes the mid tier look like a bargain (anchoring effect)

    ## Frequently asked questions

    **What conversion rates are realistic?**
    B2B SaaS free-trial-to-paid conversion: 15–25%. B2B SaaS visitor-to-paid: 1–5%.
    For this calculator, use your pricing page visitor-to-paid conversion rates.

    **How do I know if my pricing is right?**
    If more than 50% of customers choose your cheapest tier, your pricing is probably
    not differentiated enough — either raise the entry price or add more value to
    higher tiers. If nobody buys the top tier, the price is too high or the value
    proposition isn't clear.

- slug: sales-quota-calculator
  title: "Sales Quota Calculator"
  nav_title: "Sales Quota"
  short: "Calculate how many deals, leads, and pipeline you need to hit your annual revenue target based on ACV and close rate."
  date_added: "2026-05-25"
  category: Business Math
  js: sales-quota-calculator.js
  keywords: ["sales quota calculator", "how many deals to hit quota", "sales pipeline calculator", "sales target calculator"]
  body: |
    Building a sales plan starts with reverse-engineering from your revenue target. Given
    an annual revenue goal, average contract value (ACV), and close rate, this calculator
    shows exactly how many deals, leads, and pipeline you need to generate — by month
    and by year.

    ## The reverse funnel math

    **Deals needed** = Annual Revenue Target ÷ ACV

    **Leads needed** = Deals Needed ÷ Close Rate

    **Pipeline needed** = Leads Needed × ACV (total pipeline value you need to enter)

    If your annual target is $1M, ACV is $12k, and close rate is 20%:
    - 83 deals needed
    - 417 qualified leads needed
    - ~7 deals per month, 35 leads per month

    ## What this tells you about hiring

    A single SDR typically generates 40–80 qualified leads per month depending on segment
    and outbound quality. If your math requires 200+ leads/month, you need 3–5 SDRs or
    a mature inbound engine. Use these numbers to model headcount requirements before
    committing to a revenue plan.

    ## Improving the inputs

    The highest-leverage change to your quota math:
    - **Close rate**: a 5% improvement (from 20% to 25%) reduces leads needed by 20%
    - **ACV**: doubling ACV halves the number of deals required
    - **Sales cycle**: shorter cycles mean more pipeline turns per year and better capital efficiency

    ## Frequently asked questions

    **What close rate should I use?**
    Track close rate from qualified lead (discovery call booked) to closed-won.
    B2B SaaS averages: 15–25% for SMB, 20–30% for mid-market, 30–40% for enterprise (longer funnel, more qualified leads). If you don't know your close rate yet, start with 20%.

    **How does sales cycle affect pipeline?**
    A 30-day sales cycle means pipeline turns ~12× per year; a 90-day cycle turns 4×.
    Shorter cycles give you more data, faster iteration, and lower cash requirements for
    the same revenue target.

- slug: email-roi-calculator
  title: "Email Marketing ROI Calculator"
  nav_title: "Email ROI"
  short: "Calculate the revenue, ROI, and cost per conversion for any email campaign — from list size through opens, clicks, and conversions."
  date_added: "2026-05-27"
  category: Business Math
  js: email-roi-calculator.js
  keywords: ["email marketing roi calculator", "email campaign roi", "email marketing revenue calculator", "email campaign roi formula"]
  howto_steps:
    - name: "Enter your list size and open rate"
      text: "Input total subscribers and your expected open rate percentage (industry average is 20–25% for B2B)."
    - name: "Enter click-through and conversion rates"
      text: "Input CTR (typically 2–5%) and conversion rate (landing page CR, typically 1–10%)."
    - name: "Enter average order value and campaign cost"
      text: "Input your average revenue per conversion and total campaign cost (copywriting, design, tool cost)."
    - name: "Read your ROI"
      text: "See total revenue, profit, ROI percentage, and cost per conversion — useful for budget justification and channel comparison."
  body: |
    Email marketing consistently delivers the highest ROI of any digital marketing channel.
    The DMA reports an average return of **$36–42 per $1 spent** — but that average hides
    enormous variance. The difference between a top-performing email program and a mediocre
    one is almost entirely in open rate, click rate, and list quality.

    ## The email revenue funnel

    **Opens** = List Size × Open Rate
    **Clicks** = Opens × Click-Through Rate
    **Conversions** = Clicks × Conversion Rate
    **Revenue** = Conversions × Average Order Value

    ## Industry benchmark rates

    | Metric | B2B SaaS | E-commerce | Newsletter |
    |--------|----------|-----------|-----------|
    | Open rate | 20–30% | 15–25% | 30–50% |
    | Click rate (of opens) | 5–12% | 8–15% | 4–8% |
    | Conversion rate (of clicks) | 3–8% | 2–5% | 1–3% |

    ## Why list quality matters more than list size

    A 1,000-subscriber list with 35% open rate outperforms a 10,000-subscriber list with
    8% open rate in both revenue and deliverability. Segment your list by engagement —
    suppress inactive subscribers (no opens in 90 days) to improve deliverability metrics
    and open rates across the board.

    ## Types of email campaigns to model

    - **Product launch / promotional**: one-time campaign to full list or segment
    - **Onboarding sequence**: automated sequence triggered by signup — typically highest ROI
    - **Re-engagement campaigns**: win back lapsed subscribers; usually 5–15% conversion to active
    - **Newsletter**: content-led; lower direct conversion but compounds audience trust

    ## Frequently asked questions

    **How do I improve open rates?**
    Subject line testing (A/B test at 20% of list before sending to full list), send-time
    optimization (typically Tuesday–Thursday 10am–2pm in recipient timezone), and list
    hygiene (remove unengaged subscribers) are the three highest-impact levers.

    **What conversion rate should I expect?**
    Conversion rate depends heavily on the offer. A strong promotional email to a warm list
    for a $49 product can convert 5–10% of clicks. An outreach email for a $10k contract
    might convert 1–2% of clicks but generate substantial revenue per conversion.

- slug: invoice-total-calculator
  title: "Invoice Total Calculator"
  nav_title: "Invoice Calculator"
  short: "Build and total an invoice with multiple line items, discount, and tax — then copy the full breakdown with one click."
  date_added: "2026-05-29"
  category: Freelance
  js: invoice-total-calculator.js
  keywords: ["invoice calculator", "invoice total calculator", "freelance invoice calculator", "calculate invoice total with tax"]
  howto_steps:
    - name: "Add line items"
      text: "Enter a description and amount for each line item (services, deliverables, expenses)."
    - name: "Apply a discount if applicable"
      text: "Enter a discount percentage or fixed amount to deduct from the subtotal."
    - name: "Set your tax rate"
      text: "Enter the applicable tax rate (VAT, sales tax, or 0% if tax-exempt). The calculator applies tax after the discount."
    - name: "Copy the invoice breakdown"
      text: "Use the copy button to paste the full itemized breakdown — subtotal, discount, tax, and total — into your invoice document or email."
  body: |
    Invoicing software is great for recurring clients — but when you need a quick total
    for a proposal, a project cost breakdown for a client email, or a sanity check before
    sending an invoice, a simple calculator is faster than opening your invoicing tool.

    This calculator handles up to four line items, optional discount, and optional tax/VAT,
    and produces a copy-pasteable text summary of the full breakdown.

    ## When to use this calculator

    - **Proposal stage**: quickly model the total before committing to a price in writing
    - **Client check-ins**: show a running total of work completed mid-project
    - **Multi-currency sanity check**: verify the math before pasting into your invoicing tool
    - **Tax verification**: confirm the VAT or sales tax amount before submitting

    ## Line-item pricing strategies for freelancers

    **Value-based line items**: instead of "40 hours of development", use "Website redesign
    and development" as the description. This shifts the client's focus from time to deliverable.

    **Milestone-based invoicing**: split projects into two or three invoices (e.g., 50% upfront,
    25% at halfway, 25% on delivery). This protects you from non-payment and helps clients
    manage cash flow.

    **Expenses**: add line items for out-of-pocket costs (stock photos, fonts, tools, travel)
    with a brief description. Bill these at cost unless your contract specifies a markup.

    ## Tax and VAT considerations

    For B2B services within the EU, reverse charge VAT typically applies — you don't charge
    VAT to business clients in other EU member states, but you must state "VAT reverse charge
    applies" on the invoice. For B2C services across the EU, you may need to collect VAT at
    the customer's local rate. Consult your accountant for your specific situation.

    For US freelancers, sales tax generally does not apply to services in most states
    (exceptions: some digital services). Verify your state's rules before charging tax.

    ## Frequently asked questions

    **How do I add more than 4 line items?**
    For longer invoices, use a proper invoicing tool (Bonsai, FreshBooks, or HoneyBook
    are built for freelancers). This calculator is optimized for quick estimates and simple
    invoices.

    **Should I show the hourly rate or just the line item total?**
    For most clients, show only the total per deliverable. Showing "40 hours × $125" invites
    rate negotiation; "Development — $5,000" positions you as delivering a result.

- slug: subscription-churn-revenue
  title: "Subscription Churn Revenue Loss Calculator"
  nav_title: "Churn Revenue Loss"
  short: "Forecast monthly and annual revenue lost to churn — and the MRR needed to break even."
  new: true
  date_added: "2026-06-10"
  category: SaaS Metrics
  js: subscription-churn-revenue.js
  keywords: ["subscription churn revenue loss", "churn revenue calculator", "mrr churn calculator", "saas churn impact"]
  body: |
    Churn is the single biggest drag on SaaS growth. Every percentage point of monthly churn
    compounds — a business churning 5% per month loses over 46% of its MRR base annually.
    This calculator shows you exactly how much revenue disappears each month and year, how
    much new MRR you must acquire just to stay flat, and what target requires hitting a
    given growth rate.

    ## What does monthly churn rate mean?

    Monthly churn rate is the percentage of paying subscribers who cancel in a given month.
    A 3% monthly churn rate means 3 out of every 100 subscribers cancel — leaving 97
    active at month-end. Over 12 months, that compounds to an annual retention rate of
    (0.97)^12 = 69.4%, so you lose over 30% of subscribers annually from 3% monthly churn.

    ## How to use this calculator

    Enter your **current MRR**, your **monthly churn rate** (%), and the **target monthly
    growth rate** you want to achieve. The calculator outputs:

    - **Monthly revenue lost** — churned MRR each month
    - **Annual revenue lost** — the 12-month drag on revenue
    - **New MRR to break even** — how much new MRR/mo to stay flat
    - **New MRR to hit growth target** — acquisition + churn offset combined
    - **Average customer lifetime** — months at this churn rate

    ## Churn benchmarks for SaaS

    | Monthly churn | Annual equivalent | Verdict |
    |---------------|-------------------|---------|
    | < 1% | < 11% | Excellent — enterprise SaaS range |
    | 1–3% | 11–30% | Good — typical SMB SaaS |
    | 3–5% | 30–46% | Needs improvement |
    | 5–10% | 46–72% | Critical — acquisition can't outrun this |
    | > 10% | > 72% | Business model issue, not a growth problem |

    ## The "leaky bucket" growth problem

    The hardest insight from this calculator: at 5% monthly churn, you need to grow
    new MRR by 5% just to stay flat. A 10% monthly growth target requires acquiring
    15% of MRR in new subscriptions each month. This is why reducing churn has
    **3× the financial impact** of the equivalent increase in acquisition spend.

    For reducing churn, focus first on activation (users who never used key features
    cancel first), then on pricing alignment (users on the wrong plan for their usage),
    then on proactive cancellation flows.

- slug: arr-growth-rate-calculator
  title: "ARR Growth Rate Calculator"
  nav_title: "ARR Growth Rate"
  short: "Calculate your Annual Recurring Revenue growth rate, T2D3 trajectory, and years to reach your ARR target."
  new: true
  date_added: "2026-06-11"
  category: SaaS Metrics
  js: arr-growth-rate-calculator.js
  keywords: ["arr growth rate calculator", "annual recurring revenue growth", "saas arr growth rate", "t2d3 growth calculator"]
  howto_steps:
    - name: "Enter your current ARR"
      text: "Input your Annual Recurring Revenue today (MRR × 12). Use a round number in dollars."
    - name: "Enter your ARR 12 months ago"
      text: "Input what your ARR was exactly one year ago. This is used to calculate your YoY growth rate."
    - name: "Optionally set an ARR target"
      text: "Enter a target ARR (e.g., $10M) to see how many years you'll need to reach it at your current growth rate."
    - name: "Read your growth metrics"
      text: "The calculator shows your YoY growth rate, net new ARR, 3- and 5-year ARR projections, and years to your target."
  body: |
    Annual Recurring Revenue (ARR) growth rate is the single most important metric for
    SaaS fundraising and benchmarking. Investors, analysts, and buyers all start with this
    number — how fast are you growing your predictable annual revenue?

    ## How to calculate ARR growth rate

    ARR growth rate = ((Current ARR − Previous ARR) / Previous ARR) × 100

    If your ARR was $600k a year ago and is $1.2M today, your YoY growth rate is 100%.
    You doubled in 12 months — which is the first threshold of the T2D3 framework.

    ## What is T2D3?

    T2D3 is a benchmark path for high-growth SaaS companies, popularized by Neeraj Agrawal
    at Battery Ventures. Starting from ~$1–2M ARR, the path is:
    - **Year 1–2**: Triple ARR (300% of starting ARR)
    - **Year 3–5**: Double ARR each year

    A company that hits T2D3 from $1M ARR reaches: $3M → $9M → $18M → $36M → $72M over
    five years. This trajectory is what top-tier VCs look for when evaluating Series B and
    later-stage SaaS investments.

    ## Rule of 72 for ARR doubling time

    A quick mental shortcut: divide 72 by your annual growth rate to estimate how many
    years to double. At 50% growth, you double every 1.4 years. At 25%, every 2.9 years.
    At 10%, every 7.2 years.

    ## Benchmarks by ARR stage

    | ARR stage | Expected growth | Excellent |
    |-----------|----------------|-----------|
    | < $1M | 100%+ | 200%+ |
    | $1M–$5M | 80–150% | 200%+ |
    | $5M–$20M | 60–100% | 150%+ |
    | $20M–$50M | 40–80% | 100%+ |
    | $50M+ | 25–50% | 70%+ |

    Growth naturally slows as ARR increases — the denominator gets larger. That's why
    investors look at growth efficiency (ARR growth / net burn) rather than growth rate
    alone at later stages.

    ## How to use this calculator

    Enter your current ARR and your ARR from 12 months ago. The calculator shows your
    YoY growth rate, 3- and 5-year projections if you maintain this rate, and the number
    of years to reach any target ARR you set.

    **What does this calculator do?**
    Calculate your Annual Recurring Revenue growth rate, T2D3 trajectory, and years to reach your ARR target.

- slug: saas-pricing-calculator
  title: "SaaS Pricing Calculator"
  nav_title: "SaaS Pricing"
  short: "Calculate optimal SaaS pricing tiers based on your costs, target margin, and willingness-to-pay — with monthly and annual plan analysis."
  new: true
  date_added: "2026-06-12"
  category: SaaS Metrics
  js: saas-pricing-calculator.js
  keywords: ["saas pricing calculator", "saas pricing strategy", "how to price saas product", "saas pricing tiers"]
  howto_steps:
    - name: "Enter your cost per customer per month"
      text: "Input your monthly COGS per customer: hosting, support, and other direct service costs. For SaaS, this is often $2–$20."
    - name: "Set your target gross margin"
      text: "Enter the gross margin percentage you're targeting. SaaS benchmark is 70–85%."
    - name: "Enter your active or target customer count"
      text: "Input current customers (or target customers) to see MRR projections for each pricing tier."
    - name: "Enter a competitor's mid-tier price"
      text: "Input a reference competitor price. The calculator anchors your tiers relative to the competitive landscape."
    - name: "Read your 3-tier pricing recommendation"
      text: "See Starter, Pro, and Business prices calculated from your cost floor and competitive anchoring, plus MRR estimates and annual plan pricing."
  body: |
    Pricing a SaaS product is one of the most leveraged decisions a founder makes.
    Raise prices 10% and you increase revenue 10% at zero marginal cost — no new customers,
    no new features. Yet most SaaS founders underprice by 20–40% because they anchor on
    cost rather than value.

    This calculator uses two inputs to find your pricing floor: your cost per customer per
    month (infrastructure + direct support) and your target gross margin. It then suggests
    a three-tier structure anchored to a competitor reference price.

    ## How SaaS pricing tiers work

    Most successful SaaS products use three tiers:

    - **Starter** (60% of competitor mid-tier price) — captures SMB and early adopters
    - **Pro** (competitor mid-tier price) — the anchor tier that most customers choose
    - **Business/Enterprise** (2× competitor mid-tier) — captures value-sensitive large customers

    The Pro tier does the heaviest revenue lifting. Price it too low and you leave money on
    the table; price it above the market without differentiation and you increase churn.

    ## The gross margin floor

    Your **minimum viable price** is cost_per_customer / (1 − target_margin). At $8 COGS
    and 75% target margin: $8 / 0.25 = **$32/month minimum**. Below this, every customer
    you add destroys gross profit margin.

    Most SaaS targets 70–80% gross margin. Below 60%, unit economics are difficult to sustain.
    Above 85% is possible for pure software (no support headcount, no managed services).

    ## Annual pricing strategy

    Offering annual prepayment at a 15–17% discount:
    - Improves cash flow (you receive 12× MRR upfront)
    - Reduces effective monthly churn (customers can only churn at renewal)
    - Signals commitment (customers who pay annually churn at 3–5× lower rates)

    The break-even on the annual discount is typically 3–4 months of avoided churn.

    ## How to use this calculator

    Enter your cost per customer per month, target gross margin, current or target customer
    count, and a competitor reference price. The calculator outputs a full three-tier price
    structure, MRR projections, annual plan prices, and your gross margin at the recommended rates.

    **What does this calculator do?**
    Calculate optimal SaaS pricing tiers based on your costs, target margin, and willingness-to-pay — with monthly and annual plan analysis.

- slug: customer-health-score
  title: "Customer Health Score Calculator"
  nav_title: "Health Score"
  short: "Score your SaaS customers by usage, engagement, and NPS to predict churn risk and identify expansion opportunities."
  new: true
  date_added: "2026-06-15"
  category: SaaS Metrics
  js: customer-health-score.js
  keywords: ["customer health score calculator", "saas customer health score", "customer success health score", "churn prediction score"]
  howto_steps:
    - name: "Score product usage (0–100)"
      text: "Rate how actively the customer uses your core features. 100 = daily active, uses all key features. 0 = no logins in 30+ days."
    - name: "Score engagement (0–100)"
      text: "Rate frequency of logins, email opens, and in-app actions. 100 = multiple team members log in daily. 0 = single user, infrequent."
    - name: "Score NPS / satisfaction (0–100)"
      text: "Convert your NPS or CSAT score. NPS 50+ → 90. NPS 20–50 → 65. NPS 0–20 → 45. Negative NPS → 15–25."
    - name: "Score support health (0–100)"
      text: "100 = no open tickets, fast resolutions. Reduce for open critical tickets, recent complaints, long resolution times."
    - name: "Score growth / expansion signal (0–100)"
      text: "100 = actively expanding seats, high usage approaching limits. 0 = no usage growth, recent downsell."
  body: |
    A customer health score is a single composite metric that predicts churn risk and
    expansion potential. Instead of monitoring 15 separate signals — login frequency, feature
    adoption, support tickets, NPS, seat growth — you reduce them to a single number that
    drives CS team action.

    ## Why customer health scores reduce churn

    Customer success teams that operate without a health score react to churn — they only
    know a customer is at risk when they submit a cancellation request. Teams with health
    scores can identify at-risk customers 60–90 days before cancellation, when intervention
    is still possible.

    In practice, customers with health scores below 40 churn at 3–5× the rate of customers
    with scores above 70. A weekly review of all accounts below 50 — and escalation of
    accounts below 35 — is a straightforward playbook that reduces churn 20–40%.

    ## How the score is calculated

    This calculator uses five dimensions weighted by their typical predictive power:

    | Dimension | Weight | What to measure |
    |-----------|--------|----------------|
    | Product usage | 30% | DAU, feature adoption, breadth of use |
    | Engagement | 25% | Login frequency, team adoption, email engagement |
    | NPS / satisfaction | 20% | Last NPS survey score or CSAT |
    | Support health | 15% | Open tickets, time-to-resolution, severity |
    | Growth / expansion | 10% | Seat growth, usage vs limit, upsell signals |

    ## Health score thresholds

    | Score | Status | Action |
    |-------|--------|--------|
    | 80–100 | Healthy | Expansion candidate — offer upgrade or case study |
    | 60–79 | Neutral | Monitor monthly — address any engagement gaps |
    | 40–59 | At Risk | Assign CSM — schedule check-in call this week |
    | 0–39 | Critical | Escalate — high churn probability in 30 days |

    ## How to use this calculator

    Score each dimension from 0 to 100 based on your customer's actual behaviour data.
    The calculator computes the weighted composite score and recommends the appropriate
    intervention level.

    Enter your values above and results update instantly.

    ## Frequently asked questions

    **What does this calculator do?**
    Score your SaaS customers by usage, engagement, and NPS to predict churn risk and identify expansion opportunities.

- slug: unit-economics-calculator
  title: "Unit Economics Calculator"
  nav_title: "Unit Economics"
  short: "Calculate CAC payback period, LTV:CAC ratio, gross margin, and magic number to evaluate your SaaS business health."
  date_added: "2026-06-16"
  new: true
  category: SaaS Metrics
  js: unit-economics-calculator.js
  keywords: ["unit economics calculator", "cac payback period calculator", "ltv cac ratio saas", "saas magic number calculator", "saas gross margin calculator"]
  howto_steps:
    - name: "Enter Customer Acquisition Cost (CAC)"
      text: "Total sales and marketing spend divided by new customers acquired in the same period. Include salaries, ad spend, tools, and agency fees."
    - name: "Enter Monthly Recurring Revenue per customer (MRR per customer)"
      text: "Average MRR generated by a new customer. Use ARPU (Average Revenue Per User) if you have it."
    - name: "Enter Gross Margin %"
      text: "Revenue minus cost of goods sold (COGS) divided by revenue. For pure SaaS this is typically 70–85%. Include hosting, support, and customer success costs."
    - name: "Enter Customer Lifetime (months)"
      text: "Average months a customer stays before churning. Equal to 1 / monthly churn rate. If monthly churn is 2%, lifetime = 50 months."
    - name: "Review your unit economics"
      text: "The calculator shows CAC payback period, LTV, LTV:CAC ratio, and magic number. Healthy SaaS shows LTV:CAC ≥ 3× and payback ≤ 18 months."
  body: |
    Unit economics are the per-customer building blocks of SaaS profitability. Two companies
    with identical ARR can have wildly different long-term trajectories depending on their
    CAC payback period, LTV, and gross margin. Understanding unit economics tells you whether
    faster growth makes you richer or just accelerates the burn.

    ## The key metrics explained

    **CAC payback period** — how many months of gross profit it takes to recover the cost of
    acquiring one customer. Below 12 months is excellent for self-serve; below 18 months is
    acceptable for enterprise. Above 24 months means you need to raise capital to grow.

    **LTV (Customer Lifetime Value)** — total gross profit from a customer over their entire
    relationship with you. Calculated as MRR × gross margin % × average lifetime in months.

    **LTV:CAC ratio** — the return on every dollar spent acquiring a customer. The VC benchmark
    is 3:1 or higher. Below 1:1 means you're destroying value with every new customer.

    **Magic Number** — measures the efficiency of your go-to-market spend. Calculated as net
    new ARR divided by prior quarter S&M spend. Above 0.75 is good; above 1.0 is great.

    ## Unit economics benchmarks

    | Metric | Poor | Good | Excellent |
    |--------|------|------|-----------|
    | CAC Payback | > 24 months | 12–18 months | < 12 months |
    | LTV:CAC | < 1× | 2–3× | > 3× |
    | Gross Margin | < 60% | 65–75% | > 80% |
    | Magic Number | < 0.5 | 0.5–1.0 | > 1.0 |

    ## Why unit economics matter more than ARR growth

    ARR growth is vanity if unit economics are broken. A business growing 100% YoY with a
    CAC payback of 36 months will run out of cash before the cohorts become profitable.
    Investors and acquirers both underwrite businesses based on unit economics — your
    growth rate only matters if the underlying economics are sound.

    ## Frequently asked questions

    **What does this calculator do?**
    Calculate CAC payback period, LTV:CAC ratio, gross margin, and magic number to evaluate your SaaS business health.

- slug: revenue-growth-calculator
  title: "SaaS Revenue Growth Calculator (MoM/QoQ/YoY)"
  nav_title: "Revenue Growth"
  short: "Calculate MoM, QoQ, and YoY revenue growth rates, CAGR, and time-to-double to benchmark your startup's trajectory."
  new: true
  date_added: "2026-06-17"
  category: SaaS Metrics
  js: revenue-growth-calculator.js
  keywords: ["revenue growth rate calculator", "saas revenue growth calculator", "cagr calculator", "month over month growth calculator", "yoy growth rate"]
  howto_steps:
    - name: "Enter current period revenue"
      text: "Enter your most recent month's MRR or ARR. Use consistent units — don't mix MRR with ARR."
    - name: "Enter prior period revenue"
      text: "Enter the revenue from the comparison period. For MoM growth use last month; for YoY use same month last year; for CAGR use revenue from N years ago."
    - name: "Enter number of periods for CAGR"
      text: "For CAGR (Compound Annual Growth Rate), enter the number of years between the two revenue figures. Leave at 1 for simple period-over-period growth."
    - name: "Review growth benchmarks"
      text: "T2D3 (triple, triple, double, double, double) is the venture benchmark for early SaaS. The Rule of 72 tells you doubling time: 72 / growth rate % = years to double."
    - name: "Use doubling time for planning"
      text: "If you're growing at 8% MoM, you'll double revenue every ~9 months. This helps you project headcount, infrastructure, and fundraising needs."
  body: |
    Revenue growth rate is the most fundamental metric for any startup. It tells you not
    just how big you are today, but whether the business is accelerating, decelerating, or
    dying. Investors underwrite growth trajectory, not current revenue.

    ## Month-over-Month vs Year-over-Year

    **MoM (Month-over-Month) growth** is the fastest feedback loop — it shows whether
    last month's initiatives worked. But MoM is noisy. A single large deal, a seasonal
    spike, or a one-time discount can distort it. Use a 3-month rolling average for
    smoother signal.

    **YoY (Year-over-Year) growth** removes seasonality and shows the underlying business
    trend. It's the primary metric investors use when evaluating growth-stage SaaS. Most
    SaaS companies aspire to 100%+ YoY growth in early years.

    ## CAGR — smoothing lumpy growth

    Compound Annual Growth Rate (CAGR) shows the smoothed annualised growth over a
    multi-year period. If you grew from $100k to $800k ARR over 3 years, CAGR =
    (800k/100k)^(1/3) − 1 = 100% per year. It ignores volatility between periods.

    ## T2D3 — the venture growth benchmark

    T2D3 means: triple in year 2, triple in year 3, then double in years 4, 5, and 6.
    A company at $1M ARR following T2D3 reaches ~$96M ARR by year 6. This benchmark
    was popularized by Bessemer Venture Partners and is the standard against which
    growth-stage SaaS is measured.

    ## Rule of 72

    Divide 72 by your annual growth rate percentage to get approximate doubling time.
    Growing at 72% YoY? You'll roughly double in 1 year. Growing at 36% YoY? Double in
    2 years. This works for any compounding metric — MRR, ARR, users, revenue.

    ## Frequently asked questions

    **What does this calculator do?**
    Calculate MoM, QoQ, and YoY revenue growth rates, CAGR, and time-to-double to benchmark your startup's trajectory.

- slug: email-list-growth-calculator
  title: "Email List Growth Rate Calculator"
  nav_title: "List Growth Rate"
  short: "Calculate your email list growth rate, monthly decay, and how many new subscribers you need to reach your target list size."
  new: true
  date_added: "2026-06-17"
  category: Marketing
  js: email-list-growth-calculator.js
  keywords: ["email list growth rate calculator", "email subscriber growth", "list growth rate formula", "email marketing growth calculator"]
  howto_steps:
    - name: "Enter current list size"
      text: "Your total number of active email subscribers right now. Exclude hard-bounced and unsubscribed contacts."
    - name: "Enter new subscribers per month"
      text: "Average new opt-ins per month (last 3 months works well). Include all sources: website forms, lead magnets, paid ads."
    - name: "Enter monthly churn rate"
      text: "Percentage of subscribers who unsubscribe or go inactive each month. Industry average is 2-3%. Check your ESP for the exact figure."
    - name: "Enter target list size"
      text: "Your goal list size. The calculator shows how many months to reach it at your current growth rate."
    - name: "Analyze your net growth"
      text: "Net monthly growth = new subscribers minus churned subscribers. If this is negative, your list is shrinking even if you're adding subscribers."
  body: |
    Email list growth is one of the most valuable assets a bootstrapped business can build.
    Unlike social media followers or paid ad audiences, your email list is an asset you own.
    But a list that isn't growing is decaying — even with zero new subscribers, unsubscribes
    and inactivity shrink it every month.

    ## The growth formula

    **Net monthly growth = New subscribers - (List size x Monthly churn rate)**

    If you have 10,000 subscribers with 3% monthly churn, you lose 300 subscribers/month
    from your existing base. To grow, you need more than 300 new subscribers per month.

    ## List decay is compounding

    At 3% monthly churn, a list with no new subscribers loses 31% of its size per year.
    At 5% monthly churn, it loses 46%. This is why email marketers obsess over re-engagement
    campaigns and sunset policies — inactive subscribers inflate your list size while
    damaging deliverability.

    ## Industry benchmarks

    | Metric | Good | Average | Poor |
    |--------|------|---------|------|
    | Monthly churn | < 1.5% | 2-3% | > 4% |
    | Open rate | > 30% | 20-25% | < 15% |
    | List growth rate | > 5%/mo | 2-4%/mo | < 1%/mo |

    ## Frequently asked questions

    **What does this calculator do?**
    Calculate email list growth rate, net monthly growth, and time to reach your target list size.

- slug: ad-roas-calculator
  title: "Ad ROAS Calculator"
  nav_title: "ROAS Calculator"
  short: "Calculate Return on Ad Spend (ROAS), breakeven ROAS from your gross margin, and target ROAS for any profit goal — for Google Ads, Meta, or any paid channel."
  new: true
  date_added: "2026-06-17"
  category: Marketing
  js: ad-roas-calculator.js
  keywords: ["roas calculator", "return on ad spend calculator", "breakeven roas", "target roas calculator", "google ads roas calculator"]
  howto_steps:
    - name: "Enter ad spend"
      text: "Total amount spent on ads in the period (Google, Meta, TikTok, etc.)."
    - name: "Enter revenue from ads"
      text: "Total revenue attributed to those ads. Use revenue, not profit — ROAS is a revenue multiple."
    - name: "Enter gross margin %"
      text: "Your gross margin as a percentage (revenue minus COGS, divided by revenue). For e-commerce, typically 30–60%. For SaaS, typically 70–85%."
    - name: "Set a target profit margin"
      text: "Optional: enter the profit margin you want to achieve from ads. The calculator shows the ROAS you need to hit that target."
    - name: "Read your ROAS and breakeven"
      text: "See current ROAS, breakeven ROAS (the minimum to avoid losing money), target ROAS for your profit goal, and net profit from the campaign."
  body: |
    Return on Ad Spend (ROAS) is the most direct measure of ad campaign profitability.
    It answers: for every dollar spent on ads, how much revenue did you generate?

    **ROAS = Revenue from ads ÷ Ad spend**

    A ROAS of 4× means you generated $4 in revenue for every $1 spent. But whether that
    4× is profitable depends entirely on your gross margin.

    ## Why ROAS alone doesn't tell you if ads are profitable

    A 4× ROAS on a 30% margin product means you spent $1 to generate $4 revenue, but
    only $1.20 in gross profit — a net loss of $0.20 per dollar spent. The same 4× ROAS
    on an 80% margin SaaS product means $3.20 gross profit per $1 spent.

    **Breakeven ROAS = 1 ÷ Gross Margin %**

    | Gross Margin | Breakeven ROAS |
    |---|---|
    | 20% | 5.0× |
    | 30% | 3.33× |
    | 40% | 2.5× |
    | 50% | 2.0× |
    | 70% | 1.43× |
    | 80% | 1.25× |

    ## Target ROAS for a specific profit margin

    If you want to achieve a 20% profit margin (profit / revenue), use this formula:

    **Target ROAS = 1 ÷ (Gross Margin % − Target Profit Margin %)**

    Example: 50% gross margin, 20% target profit margin → 1 ÷ 0.30 = **3.33× target ROAS**

    ## ROAS vs ROI — what's the difference?

    ROAS is a revenue multiple. ROI is a profit multiple.

    **ROI = (Revenue − COGS − Ad Spend) ÷ Ad Spend × 100**

    A 4× ROAS with 50% margin = $2 gross profit on $1 spent = 100% ROI.
    A 2× ROAS with 50% margin = $1 gross profit on $1 spent = 0% ROI (breakeven).

    ROAS is easier to calculate in real time (no COGS data needed per channel). Use it for
    channel comparison and bid strategy. Use ROI for final profitability assessment.

    ## Benchmarks by ad channel

    | Channel | Typical ROAS range | Notes |
    |---|---|---|
    | Google Search (branded) | 5–20× | High intent, low competition cost |
    | Google Shopping | 3–8× | Varies by product margin |
    | Meta / Facebook | 2–5× | Depends heavily on creative and audience |
    | TikTok Ads | 1.5–4× | Growing channel, lower CPMs for now |
    | Programmatic display | 1–3× | Lower intent; good for retargeting |

    ## Frequently asked questions

    **What is a good ROAS?**
    It depends entirely on your gross margin. A 4× ROAS is great for a 60% margin SaaS product
    but terrible for a 15% margin dropshipping business. Calculate your breakeven ROAS first —
    anything above that is profitable.

    **How do I improve ROAS?**
    Three levers: (1) better creative and copy to improve CTR and conversion rate, (2) tighter
    audience targeting to reach high-intent buyers, (3) bid on higher-intent keywords and exclude
    low-converting placements. Raising prices also improves ROAS without changing ad efficiency.

    **What ROAS should I target for Google Ads?**
    Google recommends setting target ROAS at 3–5× your breakeven as a starting point, then letting
    Smart Bidding optimize. For new campaigns with no conversion data, start with manual CPC and
    gather 30–50 conversions before switching to target ROAS bidding.

- slug: customer-ltv-calculator
  title: "Customer LTV Calculator"
  nav_title: "LTV Calculator (Quick)"
  short: "Calculate Customer Lifetime Value (LTV), LTV:CAC ratio, and CAC payback period from your ARPU, gross margin, and monthly churn rate."
  new: true
  date_added: "2026-06-17"
  category: SaaS Metrics
  js: customer-ltv-calculator.js
  keywords: ["customer lifetime value calculator", "ltv calculator saas", "ltv cac ratio calculator", "cac payback period calculator", "saas ltv formula"]
  howto_steps:
    - name: "Enter monthly ARPU"
      text: "Your Average Revenue Per User per month. Use your current MRR divided by active paying customers."
    - name: "Enter gross margin %"
      text: "Revenue minus COGS divided by revenue. For SaaS this is typically 70–85%. Include hosting, support, and direct service costs."
    - name: "Enter monthly churn rate"
      text: "The percentage of customers who cancel each month. Average monthly churn for SMB SaaS is 2–3%. At 2% churn, average lifetime = 50 months."
    - name: "Optionally enter your CAC"
      text: "Customer Acquisition Cost: total sales and marketing spend divided by new customers in the same period. Enter this to see LTV:CAC ratio and payback period."
    - name: "Interpret your LTV:CAC"
      text: "LTV:CAC above 3× is the VC benchmark for healthy unit economics. Below 1× means each customer acquired destroys value. Payback period under 12 months is excellent."
  body: |
    Customer Lifetime Value (LTV) is the total gross profit you expect to earn from
    a typical customer over their entire relationship with your business. It's the
    denominator in the most important question in SaaS: is it worth the cost of
    acquiring this customer?

    ## The LTV formula

    **LTV = ARPU × Gross Margin % × Average Customer Lifetime (months)**

    Where:
    - **ARPU** = Monthly revenue per customer
    - **Gross Margin %** = (Revenue − COGS) / Revenue
    - **Average Lifetime** = 1 / Monthly Churn Rate

    At $99 ARPU, 75% gross margin, and 2% monthly churn:
    - Average lifetime = 1 / 0.02 = **50 months**
    - LTV = $99 × 0.75 × 50 = **$3,712.50**

    ## LTV:CAC — the key unit economics ratio

    **LTV:CAC = LTV ÷ Customer Acquisition Cost**

    The benchmark: **3× or higher**. At 3× LTV:CAC, you generate $3 in lifetime gross
    profit for every $1 spent acquiring a customer. Below 1× means you're destroying
    value with every new customer — a growth problem masquerading as a revenue problem.

    | LTV:CAC | Assessment |
    |---|---|
    | < 1× | Value destruction — fix before scaling |
    | 1–2× | Marginal — unsustainable at scale |
    | 2–3× | Acceptable — below benchmark |
    | 3–5× | Healthy — venture-backable unit economics |
    | > 5× | Excellent — room to invest more in growth |

    ## CAC payback period

    **CAC Payback = CAC ÷ (ARPU × Gross Margin %)**

    This tells you how many months of gross profit it takes to recover customer acquisition
    cost. Investors benchmark:
    - **< 12 months**: excellent — especially for self-serve SaaS
    - **12–18 months**: acceptable for sales-led SMB SaaS
    - **18–24 months**: challenging — requires more capital to fund growth
    - **> 24 months**: difficult to sustain without large funding rounds

    ## Why churn is the biggest lever

    Halving your churn rate doubles customer lifetime — and therefore doubles LTV —
    without changing price, margin, or CAC. This is why churn reduction has a larger
    financial impact than equivalent increases in acquisition spend.

    At 4% monthly churn, average lifetime = 25 months. At 2% monthly churn, lifetime = 50 months.
    Same ARPU, same margin, twice the LTV.

    ## Frequently asked questions

    **What does this calculator do?**
    Calculate Customer Lifetime Value (LTV), LTV:CAC ratio, and CAC payback period.

- slug: conversion-rate-calculator
  title: "Conversion Rate Calculator"
  nav_title: "Conversion Rate"
  short: "Calculate your website conversion rate and model the exact revenue impact of improving it — for any funnel stage, from visitor to paid customer."
  new: true
  date_added: "2026-06-17"
  category: Marketing
  js: conversion-rate-calculator.js
  keywords: ["conversion rate calculator", "website conversion rate", "cro calculator", "conversion rate optimization", "visitor to customer conversion rate"]
  howto_steps:
    - name: "Enter monthly visitors"
      text: "The number of people who visit your pricing page, landing page, or trial signup page in a month."
    - name: "Enter conversions"
      text: "The number of desired actions completed (purchases, signups, trials started) in the same period."
    - name: "Enter revenue per conversion"
      text: "Average revenue generated per conversion (MRR for SaaS trials, AOV for e-commerce). Used to calculate revenue impact."
    - name: "Enter a target conversion rate"
      text: "The CR you want to achieve. The calculator shows the exact monthly revenue increase if you hit that target."
    - name: "Read the revenue impact"
      text: "See current CR, current monthly revenue, projected revenue at your target CR, and the dollar uplift. Use this to prioritize CRO vs other growth levers."
  body: |
    Conversion rate is the percentage of visitors who complete a desired action —
    signup, purchase, trial start, or lead form submission. It's one of the most
    leveraged metrics in any growth funnel because improving it increases revenue
    without requiring more traffic.

    **Conversion Rate = (Conversions ÷ Visitors) × 100**

    ## The revenue impact formula

    **Monthly Revenue = Visitors × Conversion Rate × Revenue per Conversion**

    At 10,000 visitors, 1.5% CR, and $99 ARPU: $10,000 × 0.015 × $99 = **$14,850/month**

    Improving CR from 1.5% to 2.5% — a 67% relative increase — at the same traffic:
    $10,000 × 0.025 × $99 = **$24,750/month** — a **$9,900/month uplift**.

    ## Why CRO is often more efficient than acquisition

    Doubling traffic costs roughly 2× your marketing budget. Doubling conversion rate
    costs the price of experiments (user research, A/B tests, landing page redesigns) —
    often 10× cheaper per dollar of revenue gained.

    The math only breaks down when your traffic volume is too low to run statistically
    significant A/B tests. Below ~1,000 visitors/month per variant, CRO is guesswork.
    Above 5,000/month, it becomes highly reliable.

    ## Conversion rate benchmarks

    | Funnel stage | Average | Top quartile |
    |---|---|---|
    | Homepage → pricing page | 10–20% | 30%+ |
    | Pricing page → trial | 1–5% | 8–15% |
    | Trial → paid (B2B SaaS) | 15–25% | 35%+ |
    | Paid acquisition (cold) | 0.5–2% | 3–5% |
    | Email CTA → purchase | 2–8% | 10–20% |

    ## The five highest-impact CRO changes

    1. **Headline clarity** — your value prop in 10 words, not 30. Users read H1s first.
    2. **Social proof above the fold** — logo bars, specific testimonials, G2/Capterra ratings
    3. **CTA friction reduction** — one click to trial, no credit card, progressive disclosure
    4. **Pricing page anchoring** — three tiers with the middle one highlighted as "recommended"
    5. **Exit intent and retargeting** — capture visitors who bounce before converting

    ## Frequently asked questions

    **What is a good conversion rate?**
    It depends entirely on the funnel stage and traffic source. Cold paid traffic converting
    at 0.5–1% is normal. Branded search converting at 5–15% is expected. Focus on improving
    relative to your own baseline rather than industry averages.

    **How do I run an A/B test on my conversion rate?**
    Use a sample size calculator before starting: you need roughly 1,000 conversions per
    variant to detect a 10% improvement reliably. Run tests for at least 2 full weeks to
    control for day-of-week effects.

- slug: gross-margin-calculator
  title: "Gross Margin Calculator"
  nav_title: "Gross Margin"
  short: "Calculate gross margin %, gross profit, and markup from revenue and COGS — plus the revenue needed to hit any target margin."
  new: true
  date_added: "2026-06-17"
  category: Business Math
  js: gross-margin-calculator.js
  keywords: ["gross margin calculator", "gross profit calculator", "markup vs margin calculator", "how to calculate gross margin", "gross margin formula"]
  howto_steps:
    - name: "Enter total revenue"
      text: "Total revenue for the period (monthly, quarterly, or annual — be consistent)."
    - name: "Enter COGS"
      text: "Cost of Goods Sold: direct costs to produce or deliver your product or service. For SaaS, include hosting, support, and infrastructure. For physical products, include materials and manufacturing."
    - name: "Enter target gross margin"
      text: "Optional: the margin you want to achieve. The calculator shows the revenue needed at your current COGS to hit that target."
    - name: "Read gross margin and markup"
      text: "Gross margin % = gross profit / revenue. Markup % = gross profit / COGS. They're related but different — a 50% margin is a 100% markup."
  body: |
    Gross margin is the percentage of revenue that remains after deducting the direct
    costs of delivering your product or service. It's the most fundamental profitability
    metric — before operating expenses, sales, marketing, or overhead.

    **Gross Margin % = (Revenue − COGS) ÷ Revenue × 100**

    **Gross Profit = Revenue − COGS**

    ## Margin vs markup — the common confusion

    Gross margin and markup are both derived from revenue and COGS, but they're calculated
    differently and tell you different things:

    | Metric | Formula | What it measures |
    |---|---|---|
    | Gross margin | (Revenue − COGS) ÷ Revenue | % of revenue retained after direct costs |
    | Markup | (Revenue − COGS) ÷ COGS | % added to cost to set price |

    A 50% gross margin means you keep 50 cents of every dollar earned.
    A 50% markup means you added 50% to cost to set your price — which is only a 33% margin.

    At a 50% margin: sell for $100, COGS = $50, markup = $50/$50 = 100%
    At a 50% markup: sell for $150, COGS = $100, margin = $50/$150 = 33%

    ## Gross margin benchmarks by industry

    | Industry | Typical gross margin |
    |---|---|
    | SaaS / software | 70–85% |
    | Professional services | 50–70% |
    | E-commerce (branded) | 40–60% |
    | E-commerce (reseller) | 20–40% |
    | Physical product (DTC) | 40–65% |
    | Restaurants / food | 60–70% (on food cost only) |
    | Wholesale / distribution | 10–30% |

    ## Why gross margin is the most important metric at early stage

    Gross margin determines whether your business model works. Operating expenses —
    headcount, rent, marketing — are variable costs you control. Gross margin is structural.
    A business with 20% gross margin can't reach 20% net margin even at infinite scale.

    ## What is COGS for a SaaS business?

    For SaaS, COGS includes:
    - Cloud infrastructure (AWS/GCP/Azure costs that scale with customers)
    - Third-party API costs (Twilio, Stripe, etc.)
    - Customer support headcount (fully loaded)
    - Customer success management (partially)
    - Data storage and CDN costs

    COGS does NOT include: R&D, engineering salaries, sales, marketing, G&A, or any
    overhead. Those are operating expenses below the gross margin line.

    ## Frequently asked questions

    **What is a good gross margin for SaaS?**
    70–80% is the benchmark for most SaaS businesses. Below 60%, you may have a managed
    service or implementation cost issue. Above 85% is possible for pure-software PLG
    companies with low support costs. Public SaaS companies at IPO typically show 70–80%.

    **What does this calculator do?**
    Calculate gross margin %, gross profit, markup %, and the revenue needed at current COGS to hit any target margin.

- slug: operating-cash-flow-calculator
  title: "Operating Cash Flow Calculator"
  nav_title: "Cash Flow (OCF)"
  short: "Calculate Operating Cash Flow (OCF) from net income, depreciation, and working capital — plus free cash flow and cash conversion ratio."
  new: true
  date_added: "2026-06-17"
  category: Business Math
  js: operating-cash-flow-calculator.js
  keywords: ["operating cash flow calculator", "ocf calculator", "free cash flow calculator", "cash conversion ratio", "net income to cash flow"]
  howto_steps:
    - name: "Enter net income"
      text: "The bottom line from your income statement for the period. This can be negative if the business is losing money."
    - name: "Enter depreciation and amortization"
      text: "Non-cash charges from your income statement. Add these back — depreciation reduces net income but doesn't consume cash. For SaaS, this is often software amortization."
    - name: "Enter working capital change"
      text: "Change in accounts receivable, inventory, and accounts payable. Enter as negative if working capital increased (cash was tied up) or positive if working capital decreased (cash was freed)."
    - name: "Enter CapEx"
      text: "Capital expenditures: cash spent on equipment, property, or capitalized software development. Used to calculate Free Cash Flow (OCF − CapEx)."
    - name: "Read your OCF and FCF"
      text: "Operating Cash Flow shows actual cash generated by operations. Free Cash Flow = OCF − CapEx — what's available for debt repayment, dividends, or investment."
  body: |
    Operating Cash Flow (OCF) measures the actual cash your business generates from
    its core operations. Unlike net income, OCF is hard to manipulate with accounting
    choices — cash either arrived in your bank account or it didn't.

    ## The indirect method formula

    **OCF = Net Income + Depreciation & Amortization + Working Capital Changes**

    This is the most common method (indirect method) because it starts from the readily
    available net income figure and adjusts for non-cash items and timing differences.

    ## Why OCF differs from net income

    **Depreciation** reduces reported profit but doesn't use cash. A $10k server depreciated
    over 5 years reduces net income by $2k/year but was paid for in year 1. Adding back D&A
    converts income-statement profit into cash-based profit.

    **Working capital changes** reflect the timing difference between revenue recognition
    and cash collection:
    - Accounts receivable **increased** → you invoiced customers but haven't collected yet → OCF is lower than net income
    - Accounts payable **increased** → you received goods but haven't paid yet → OCF is higher than net income

    ## Free Cash Flow (FCF)

    **FCF = OCF − Capital Expenditures**

    Free cash flow is what's left after maintaining and growing the asset base. It's the
    metric private equity firms and sophisticated investors use to value businesses because
    it represents actual distributable cash.

    | OCF | Capex | FCF | Interpretation |
    |---|---|---|---|
    | +$100k | $5k | +$95k | Healthy — business is a cash generator |
    | +$100k | $50k | +$50k | Acceptable — investing heavily in assets |
    | +$100k | $120k | −$20k | Growth investment phase |
    | −$50k | $10k | −$60k | Cash drain — requires external funding |

    ## Cash conversion ratio

    **Cash Conversion Ratio = OCF ÷ Net Income**

    CCR above 1× means the business generates more cash than reported profit (good).
    CCR below 1× means profit is outpacing cash collection — watch accounts receivable.
    CCR above 1.5× often indicates large non-cash depreciation charges relative to capex.

    ## Frequently asked questions

    **What does this calculator do?**
    Calculate Operating Cash Flow from net income, D&A, and working capital changes — plus Free Cash Flow and Cash Conversion Ratio.

- slug: pricing-elasticity-calculator
  title: "Pricing Elasticity Calculator"
  nav_title: "Price Elasticity"
  short: "Calculate how a price change affects demand and revenue based on price elasticity — see whether raising your price will increase or decrease total revenue."
  new: true
  date_added: "2026-06-17"
  category: Business Math
  js: pricing-elasticity-calculator.js
  keywords: ["price elasticity calculator", "pricing elasticity of demand", "how does price change affect revenue", "price elasticity formula", "demand elasticity calculator"]
  howto_steps:
    - name: "Enter your current price"
      text: "Your current price per unit or subscription tier."
    - name: "Enter current monthly demand"
      text: "Current units sold, signups, or customers per month at that price."
    - name: "Enter your new (proposed) price"
      text: "The price you're considering. Can be higher or lower than current."
    - name: "Enter price elasticity of demand"
      text: "Elasticity = % change in demand / % change in price. Typical values: −0.5 to −2. B2B SaaS usually runs −0.5 to −1. High-commodity e-commerce can be −2 to −4. Negative = demand falls when price rises (normal)."
    - name: "Read the revenue impact"
      text: "See the projected new demand at the new price and the total revenue impact. If |elasticity| < 1, a price increase raises revenue. If |elasticity| > 1, a price increase reduces revenue."
  body: |
    Price elasticity of demand measures how sensitive your customers are to price changes.
    It's the ratio of the percentage change in demand to the percentage change in price.

    **Elasticity = % Change in Demand ÷ % Change in Price**

    A price elasticity of −1.5 means a 10% price increase reduces demand by 15%.

    ## Elastic vs inelastic demand

    | Elasticity | Type | Revenue effect of price increase |
    |---|---|---|
    | |E| < 0.5 | Highly inelastic | Revenue increases significantly |
    | 0.5 < |E| < 1 | Inelastic | Revenue increases |
    | |E| = 1 | Unit elastic | Revenue unchanged |
    | 1 < |E| < 2 | Elastic | Revenue decreases |
    | |E| > 2 | Highly elastic | Revenue decreases sharply |

    ## Typical elasticity values by market

    Most B2B SaaS products have elasticity between −0.5 and −1.2 — meaning pricing power
    is moderate to strong. This is why SaaS companies can raise prices by 10–20% and
    retain most customers.

    | Market | Typical elasticity |
    |---|---|
    | Necessity software (payroll, accounting) | −0.3 to −0.6 |
    | B2B SaaS (tools) | −0.6 to −1.2 |
    | Consumer subscription | −1.0 to −2.0 |
    | Physical commodities | −1.5 to −4.0 |
    | Luxury goods | −0.3 to −0.8 |

    ## When to use this calculator

    1. **Before a price increase**: enter your current elasticity estimate to see the
    demand drop and net revenue change. If revenue increases despite some churn,
    the price increase is financially rational.

    2. **Modeling a discount**: a price decrease increases demand but may reduce revenue
    if demand is inelastic. This calculator shows when discounts are self-defeating.

    3. **Comparing pricing tiers**: compare revenue at $49, $79, and $99 under different
    elasticity assumptions to find the revenue-maximizing price.

    ## Estimating your own elasticity

    The best approach: A/B test pricing. Show 50% of new visitors price A and 50% price B.
    Measure conversion rates. Elasticity ≈ (CR_B/CR_A − 1) / (Price_B/Price_A − 1).

    If you can't A/B test: survey customers using Van Westendorp Price Sensitivity Meter
    (ask: "too cheap", "bargain", "expensive", "too expensive") to estimate the price range
    where demand is inelastic.

    ## Frequently asked questions

    **What does this calculator do?**
    Calculate how a price change affects demand and revenue based on price elasticity.

