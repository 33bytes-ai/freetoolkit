- slug: roa-calculator
  title: Return on Assets Calculator
  nav_title: ROA Calculator
  short: Calculate Return on Assets (ROA) and decompose it into net margin and asset turnover using the DuPont framework.
  date_added: "2026-06-18"
  new: true
  category: Finance
  js: roa-calculator.js
  keywords:
    - return on assets calculator
    - ROA calculator
    - DuPont analysis calculator
    - asset turnover calculator
    - net profit margin ROA
  howto_steps:
    - name: "Enter net income"
      text: "Type your annual net income — the bottom line after all expenses, interest, and taxes."
    - name: "Enter total assets"
      text: "Type total assets from your balance sheet — current assets plus non-current assets."
    - name: "Add revenue for DuPont analysis"
      text: "Enter annual revenue to decompose ROA into net profit margin × asset turnover — the DuPont identity."
    - name: "Benchmark against industry"
      text: "Compare your ROA to industry benchmarks. Most profitable businesses target 5–10% ROA; capital-intensive sectors accept 2–5%."
  body: |
    ## What Is Return on Assets (ROA)?

    Return on Assets measures how efficiently a company uses its asset base to generate profit.

    $$\text{ROA} = \frac{\text{Net Income}}{\text{Total Assets}} \times 100$$

    ### ROA Benchmarks by Industry

    | Industry | Typical ROA |
    |----------|-------------|
    | Technology / SaaS | 10–25% |
    | Consumer goods | 5–15% |
    | Manufacturing | 3–8% |
    | Retail | 4–10% |
    | Banking / financial | 1–2% |
    | Real estate | 1–3% |

    ### The DuPont Decomposition

    ROA can be decomposed into two drivers:

    $$\text{ROA} = \text{Net Profit Margin} \times \text{Asset Turnover}$$

    This is useful for diagnosis: a low ROA may come from thin margins, slow asset turns, or both. Improving either driver improves ROA.

    ### Intent Pages

    - [What Is Return on Assets (ROA)?](/tools/roa-calculator/what-is-return-on-assets/)
    - [ROA vs ROE: What Is the Difference?](/tools/roa-calculator/roa-vs-roe-difference/)

- slug: debt-to-equity-calculator
  title: Debt-to-Equity Ratio Calculator
  nav_title: Debt-to-Equity
  short: Calculate debt-to-equity ratio, equity ratio, and financial leverage from your balance sheet figures.
  date_added: "2026-06-18"
  new: true
  category: Finance
  js: debt-to-equity-calculator.js
  keywords:
    - debt to equity ratio calculator
    - D/E ratio calculator
    - financial leverage calculator
    - equity ratio calculator
    - debt ratio calculator
  howto_steps:
    - name: "Enter total debt"
      text: "Add short-term and long-term debt from your balance sheet. Include all interest-bearing obligations."
    - name: "Enter shareholders' equity"
      text: "Enter total equity from the balance sheet — paid-in capital plus retained earnings minus treasury stock."
    - name: "Add total assets (optional)"
      text: "Enter total assets to calculate the equity ratio and debt ratio as percentages of the total asset base."
    - name: "Review leverage status"
      text: "Compare your D/E ratio to industry benchmarks. Capital-light businesses target below 1×; asset-heavy industries may run 1.5–3×."
  body: |
    ## What Is the Debt-to-Equity Ratio?

    The debt-to-equity ratio measures how much debt a business uses relative to equity — a fundamental indicator of financial leverage and risk.

    $$\text{D/E Ratio} = \frac{\text{Total Debt}}{\text{Total Shareholders' Equity}}$$

    ### D/E Benchmarks by Industry

    | Industry | Typical D/E Ratio |
    |----------|------------------|
    | Technology / SaaS | 0.2–0.8× |
    | Consumer goods | 0.5–1.5× |
    | Manufacturing | 0.8–2.0× |
    | Real estate | 1.0–3.0× |
    | Utilities | 1.5–3.0× |
    | Banking | 5–15× (regulated leverage) |

    ### D/E Ratio and ROE

    High leverage amplifies ROE through the financial leverage multiplier:

    $$\text{ROE} = \text{ROA} \times \text{Financial Leverage}$$

    A business with 10% ROA and 3× leverage has 30% ROE. But the same leverage amplifies losses when ROA is negative.

    ### Intent Pages

