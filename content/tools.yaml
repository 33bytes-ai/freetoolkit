    - name: "Model runway"
      text: "Enter your cash balance to calculate how many months of runway remain at current burn rate."
  body: |
    Knowing your total burn rate is not enough — understanding which departments are
    consuming runway allows founders to make targeted cuts or investments.

    ## Gross burn vs. net burn

    **Gross burn** = total monthly cash out (all departments)
    **Net burn** = gross burn − monthly revenue
    **Runway** = cash balance / net burn

    ## Typical department spend ratios (Series A–B SaaS)

    | Department | % of Total Headcount Cost |
    |-----------|--------------------------|
    | Engineering / Product | 40–50% |
    | Sales | 20–30% |
    | Marketing | 10–20% |
    | G&A (Finance, HR, Ops) | 10–15% |

    Pre-product-market-fit companies are typically engineering-heavy (60%+).
    Post-PMF, sales and marketing grow as a share.

    ## Red flags in burn composition

    - **G&A > 20%**: overhead-heavy; trim ops costs before cutting product
    - **Sales/Marketing > 60% combined**: high CAC pressure; check payback period
    - **Engineering < 25% post-PMF**: underinvesting in product at the wrong time

    ## Burn multiples by stage

    | Stage | Healthy burn multiple (net burn / net new ARR) |
    |-------|----------------------------------------------|
    | Pre-revenue | N/A |
    | $0–1M ARR | 2–4× |
    | $1–5M ARR | 1.5–3× |
    | $5–20M ARR | 1–2× |
    | $20M+ ARR | <1× |

- slug: dcf-calculator
  title: "DCF Calculator (Discounted Cash Flow)"
  nav_title: "DCF Calculator"
  short: "Calculate the present value of future cash flows using your discount rate — get intrinsic value, NPV, and terminal value in seconds."
  date_added: "2026-06-18"
  new: true
  category: Valuation
  js: dcf-calculator.js
  keywords: ["dcf calculator", "discounted cash flow calculator", "npv calculator", "terminal value calculator", "intrinsic value calculator"]
  howto_steps:
    - name: "Enter projected cash flows"
      text: "Input free cash flow projections for each year of your forecast period (typically 5–10 years)."
    - name: "Set your discount rate"
      text: "Enter your WACC or required rate of return. This is the rate that reflects the risk of the investment."
    - name: "Set terminal growth rate"
      text: "Enter the expected long-term growth rate after the forecast period (typically 2–4% for stable businesses)."
    - name: "Read the intrinsic value"
      text: "The calculator returns the present value of forecast cash flows plus terminal value — the intrinsic enterprise value."
  body: |
    A DCF (Discounted Cash Flow) model values a business or investment by summing the
    present value of all expected future cash flows. It is the foundational valuation
    methodology in corporate finance.

    ## The DCF formula

    **Enterprise Value = Σ (FCF_t / (1 + r)^t) + Terminal Value / (1 + r)^n**

    Where FCF_t = free cash flow in year t, r = discount rate (WACC), n = forecast years.

    **Terminal Value (Gordon Growth) = FCF_n × (1 + g) / (r − g)**

    Where g = terminal growth rate (must be < r).

    ## Discount rate guidance

    | Company type | Typical discount rate |
    |-------------|----------------------|
    | Public large-cap | 8–10% |
    | Public mid-cap | 10–14% |
    | Private growth stage | 15–25% |
    | Early-stage startup | 25–40% |
    | Seed / pre-revenue | 40–60% |

    ## The importance of terminal value

    In a 10-year DCF, terminal value often accounts for 70–90% of total enterprise value.
    This makes the terminal growth rate assumption the single most sensitive variable.
    Small changes in g (terminal growth) produce large changes in value — always
    sensitise your model.

    ## DCF limitations

    DCF is only as good as your cash flow projections. It is most reliable for:
    - Stable, mature businesses with predictable cash flows
    - Businesses you can project 5–10 years with reasonable confidence

    It is least reliable for: pre-revenue companies, highly cyclical businesses, and
    companies where intangible value dominates.

- slug: operating-leverage-calculator
  title: "Operating Leverage Calculator"
  nav_title: "Operating Leverage"
  short: "Calculate your degree of operating leverage (DOL) — how much a percentage change in revenue amplifies your operating income."
  date_added: "2026-06-18"
  new: true
  category: Finance
  js: operating-leverage-calculator.js
  keywords: ["operating leverage calculator", "degree of operating leverage", "DOL calculator", "operating leverage formula", "fixed vs variable cost leverage"]
  howto_steps:
    - name: "Enter revenue"
      text: "Input total revenue for the period."
    - name: "Enter variable costs"
      text: "Enter all variable costs (COGS, sales commissions, payment processing fees) that scale directly with revenue."
    - name: "Enter fixed costs"
      text: "Enter fixed operating costs (salaries, rent, software subscriptions) that don't change with revenue volume."
    - name: "Read your DOL"
      text: "Degree of Operating Leverage = Contribution Margin / Operating Income. A DOL of 3 means a 10% revenue increase produces a 30% operating income increase."
  body: |
    Operating leverage measures how sensitive your operating income is to revenue changes.
    High operating leverage is a double-edged sword: revenue growth amplifies profits,
    but revenue decline amplifies losses.

    ## Degree of Operating Leverage (DOL) formula

    **DOL = Contribution Margin / Operating Income**
    **DOL = (Revenue − Variable Costs) / (Revenue − Variable Costs − Fixed Costs)**

    A DOL of 4 means: every 1% change in revenue produces a 4% change in operating income.

    ## Why SaaS has high operating leverage

    SaaS companies have high fixed costs (engineering, infrastructure, G&A) and low
    variable costs (hosting, payment processing, support at scale). Once fixed costs
    are covered, additional revenue flows mostly to operating income.

    This is why SaaS margins expand dramatically as companies scale — the model has
    inherent operating leverage once you pass the fixed-cost threshold.

    ## Operating leverage by industry

    | Industry | Typical DOL | Reason |
    |----------|------------|--------|
    | SaaS (scale) | 3–8 | High fixed, low variable |
    | Airlines | 4–8 | High fixed (aircraft, crew) |
    | Manufacturing | 2–4 | Equipment fixed costs |
    | Retail | 1.5–3 | High COGS (variable) |
    | Services | 1.5–2.5 | Labour scales with revenue |

    ## Fixed cost leverage vs. financial leverage

    Operating leverage amplifies operating income changes via fixed costs.
    Financial leverage amplifies net income changes via debt interest.
    Combined (total leverage) = DOL × DFL.

- slug: price-elasticity-calculator
  title: "Price Elasticity of Demand Calculator"
  nav_title: "Demand Elasticity"
  short: "Calculate price elasticity of demand — how sensitive your customers are to price changes, and model the revenue impact of a price increase or decrease."
  date_added: "2026-06-18"
  new: true
  category: Marketing
  js: price-elasticity-calculator.js
  keywords: ["price elasticity calculator", "price elasticity of demand", "price sensitivity calculator", "elastic vs inelastic demand", "price change revenue impact"]
  howto_steps:
    - name: "Enter original price and quantity"
      text: "Input your current price per unit and the quantity sold at that price."
    - name: "Enter new price and quantity"
      text: "Input the new price you want to test and the expected quantity at that price."
    - name: "Read price elasticity"
      text: "Elasticity = % change in quantity ÷ % change in price. Values below -1 = elastic (price-sensitive). Values between -1 and 0 = inelastic."
    - name: "See revenue impact"
      text: "The calculator shows whether the price change increases or decreases total revenue based on your elasticity."
  body: |
    Price elasticity of demand measures how much quantity demanded changes in response
    to a price change. It is the most important metric for pricing decisions.

    ## Price elasticity formula

    **PED = % Change in Quantity Demanded / % Change in Price**
    **PED = (Q2 − Q1) / Q1 × P1 / (P2 − P1)**

    ## Interpreting elasticity values

    | PED value | Interpretation |
    |-----------|---------------|
    | 0 | Perfectly inelastic — quantity doesn't change at all |
    | −0.1 to −0.5 | Inelastic — price increase raises revenue |
    | −0.5 to −1.0 | Mildly elastic — revenue changes slightly |
    | −1.0 | Unit elastic — revenue unchanged by price changes |
    | −1.0 to −2.0 | Elastic — price increase reduces revenue |
    | < −2.0 | Highly elastic — small price change, large demand change |

    ## Revenue rules by elasticity

    - **|PED| < 1 (inelastic)**: raising price increases revenue
    - **|PED| = 1 (unit elastic)**: revenue unchanged
    - **|PED| > 1 (elastic)**: raising price decreases revenue

    ## What drives elasticity in B2B SaaS

    Inelastic factors (low price sensitivity):
    - Deep workflow integration (switching cost)
    - Clear ROI quantification ($10 cost saves $100)
    - Few substitutes

    Elastic factors (high price sensitivity):
    - Commodity functionality (spreadsheet competitors)
    - Budget-conscious buyers (SMB, early-stage)
    - Easy-to-switch alternatives

    Most B2B SaaS with strong retention is inelastic in the 5–15% price increase range.

- slug: rule-of-72-calculator
  title: "Rule of 72 Calculator"
  nav_title: "Rule of 72"
  short: "Use the Rule of 72 to estimate how long it takes to double your money at a given annual return rate — and find the rate needed to double by a target date."
  date_added: "2026-06-18"
  new: true
  category: Finance
  js: rule-of-72-calculator.js
  keywords: ["rule of 72 calculator", "doubling time calculator", "compound interest doubling", "investment return calculator", "how long to double money"]
  howto_steps:
    - name: "Enter your annual rate"
      text: "Enter the annual growth or interest rate (e.g. 8% for S&P 500 historical average)."
    - name: "See doubling time"
      text: "The Rule of 72 divides 72 by the rate to estimate years to double. At 8%, that's 72 ÷ 8 = 9 years."
    - name: "Set a target doubling time"
      text: "Enter how many years you want to double your money to see the required annual return."
    - name: "Compare exact vs approximation"
      text: "The exact doubling time uses logarithms — the Rule of 72 approximation is within 1–2% for rates between 2–20%."
  body: |
    The Rule of 72 is a quick mental math shortcut for estimating how long compound
    interest takes to double an investment.

    ## Formula

    **Doubling time (years) ≈ 72 ÷ Annual Rate (%)**

    **Required rate ≈ 72 ÷ Target years**

    ## Why 72?

    72 is divisible by 1, 2, 3, 4, 6, 8, 9, 12, and 24 — making mental math easy.
    The exact formula uses **ln(2) ÷ ln(1 + r)**, but 72/r is accurate to within 1–2%
    for rates between 2–20%.

    ## Doubling time by rate

    | Annual rate | Doubling time |
    |------------|--------------|
    | 2% | 36 years |
    | 4% | 18 years |
    | 6% | 12 years |
    | 8% | 9 years |
    | 10% | 7.2 years |
    | 12% | 6 years |
    | 24% | 3 years |
    | 72% | 1 year |

    ## The Rule of 72 and inflation

    Inflation uses the rule too. At 3% inflation, purchasing power halves in 24 years.
    This is why earning above inflation is essential for real wealth preservation.

    ## Exponential growth applications

    The Rule of 72 works for any exponential process:
    - SaaS ARR growth rate → years to double revenue
    - Population growth → doubling time
    - Debt at given interest rate → years to double what you owe

- slug: cac-payback-calculator
  title: "CAC Payback Period Calculator"
  nav_title: "CAC Payback"
  short: "Calculate how many months it takes to recover your customer acquisition cost. One of the key unit economics metrics VCs check before investing."
  date_added: "2026-06-18"
  new: true
  category: SaaS Metrics
  js: cac-payback-calculator.js
  keywords: ["cac payback period calculator", "customer acquisition cost payback", "payback period SaaS", "unit economics calculator", "how long to recover CAC"]
  howto_steps:
    - name: "Enter your CAC"
      text: "Input the average cost to acquire one customer (total sales & marketing spend ÷ new customers)."
    - name: "Enter monthly ARPU"
      text: "Input the average monthly revenue per customer."
    - name: "Enter gross margin"
      text: "Input your gross margin percentage. CAC is paid back from gross profit, not revenue."
    - name: "Read payback period"
      text: "Payback = CAC ÷ (ARPU × gross margin). The result tells you how many months until each customer becomes profitable."
  body: |
    CAC Payback Period (also called Time to Recover CAC) measures how many months of
    gross profit from a customer are needed to recover the cost of acquiring them.

    ## Formula

    **Payback (months) = CAC ÷ (Monthly ARPU × Gross Margin %)**

    ## Why use gross margin, not revenue?

    COGS must be covered before a customer is profitable. Using revenue inflates the
    apparent payback speed — use gross margin to get an accurate picture.

    ## Benchmarks by company type

    | Payback | Assessment |
    |---------|-----------|
    | < 6 months | Exceptional — very capital-efficient |
    | 6–12 months | Strong — standard VC benchmark |
    | 12–18 months | Acceptable for enterprise SaaS |
    | 18–24 months | Requires high LTV to justify |
    | > 24 months | High risk — needs high retention |

    ## CAC Payback vs LTV:CAC

    LTV:CAC looks at the total lifetime return. CAC Payback focuses on capital efficiency:
    how quickly does each customer dollar pay you back? A company with 24-month payback
    needs 2 years of capital before each cohort turns profitable.

    ## How to improve CAC Payback

    - Increase ARPU through pricing tiers or usage-based pricing
    - Improve gross margin (reduce COGS)
    - Reduce CAC through SEO, PLG, or referral programs
    - Shorten sales cycles

- slug: sales-funnel-calculator
  title: Sales Funnel Calculator
  nav_title: Sales Funnel
  short: Model your full sales funnel — from leads to closed revenue — and find your weakest conversion stage.
  date_added: "2026-06-18"
  new: true
  category: Marketing
  js: sales-funnel-calculator.js
  keywords:
    - sales funnel calculator
    - lead conversion funnel
    - MQL SQL conversion rate
    - funnel conversion rate calculator
    - sales pipeline calculator
  howto_steps:
    - name: "Enter your monthly lead volume"
      text: "Type the number of raw leads entering your funnel each month (e.g., all inbound form fills)."
    - name: "Set the stage conversion rates"
      text: "Enter the percentage of leads that advance to MQL, MQL to SQL, SQL to Opportunity, and Opportunity to Close. Use your CRM data or industry benchmarks."
    - name: "Enter your average contract value"
      text: "Type your average monthly deal value or ACV. The calculator multiplies closed customers by this figure to show MRR from the funnel."
    - name: "Identify the bottleneck stage"
      text: "Look for the stage with the largest drop relative to benchmarks. Improving the weakest stage by 10% has more impact than doubling leads."
  body: |
    ## What Is a Sales Funnel Calculator?

    A sales funnel calculator models the progression of prospects through each stage of your pipeline — from raw leads to closed customers — so you can project revenue and identify the weakest stage.

    ### Standard B2B Funnel Stages

    | Stage | Typical Conversion Rate |
    |-------|------------------------|
    | Lead → MQL | 20–40% |
    | MQL → SQL | 30–50% |
    | SQL → Opportunity | 40–60% |
    | Opportunity → Close | 20–30% |
    | **Overall Lead → Customer** | **1–5%** |

    ### Overall Funnel Conversion

    $$\text{Overall Conversion} = \frac{\text{New Customers}}{\text{Leads}} \times 100$$

    An overall conversion rate of 1–3% is typical for B2B SaaS. Above 5% is excellent and usually indicates strong brand/inbound signals.

    ### Finding Your Bottleneck

    The stage with the lowest conversion rate relative to benchmark is your constraint. Doubling your lead volume with a broken MQL→SQL stage produces the same number of customers — just twice the waste.

    ### Revenue from the Funnel

    $$\text{Monthly Revenue} = \text{New Customers} \times \text{ACV}$$

    Model multiple scenarios: optimistic (improve one stage by 10%), base, and pessimistic (leads drop 20%) to stress-test your pipeline.

    ### Intent Pages

    - [What Is a Sales Funnel?](/tools/sales-funnel-calculator/what-is-a-sales-funnel/)
    - [MQL vs SQL: What's the Difference?](/tools/sales-funnel-calculator/mql-vs-sql-difference/)

- slug: dscr-calculator
  title: DSCR Calculator
  nav_title: DSCR
  short: Calculate Debt Service Coverage Ratio and find the maximum loan your cash flow can support.
  date_added: "2026-06-18"
  new: true
  category: Finance
  js: dscr-calculator.js
  keywords:
    - DSCR calculator
    - debt service coverage ratio calculator
    - NOI debt coverage
    - business loan qualification calculator
    - commercial real estate DSCR
  howto_steps:
    - name: "Enter your Net Operating Income"
      text: "Type your annual NOI — revenue minus operating expenses, excluding interest, taxes, and depreciation."
    - name: "Enter total annual debt service"
      text: "Enter the sum of all principal and interest payments due in one year across all loans and lines of credit."
    - name: "Set the minimum DSCR requirement"
      text: "Enter the lender's minimum DSCR threshold. SBA and conventional lenders typically require 1.25."
    - name: "Review coverage and implied loan"
      text: "Check your DSCR against the minimum, see the maximum debt service your NOI supports, and the implied maximum loan at your rate and term."
  body: |
    ## What Is DSCR?

    Debt Service Coverage Ratio (DSCR) measures how many times your net operating income covers your annual debt payments. It's the primary metric lenders use to approve business loans and commercial real estate financing.

    $$\text{DSCR} = \frac{\text{Net Operating Income}}{\text{Annual Debt Service}}$$

    ### DSCR Benchmarks

    | DSCR | Interpretation |
    |------|----------------|
    | ≥ 1.50 | Strong — easily qualifies most lenders |
    | 1.25–1.49 | Acceptable — SBA and conventional standard |
    | 1.00–1.24 | Marginal — limited lender options |
    | < 1.00 | Below coverage — cash flow cannot service debt |

    ### What Counts as NOI?

    NOI = Revenue − Operating Expenses (excluding interest, taxes, depreciation, and amortization). For real estate, it's rental income minus vacancies and operating costs.

    ### Maximum Loan from DSCR

    Given a minimum DSCR requirement, the maximum annual debt service your cash flow supports is:

    $$\text{Max Debt Service} = \frac{\text{NOI}}{\text{Minimum DSCR}}$$

    Apply standard loan amortization to convert max debt service into a maximum loan principal at your rate and term.

    ### Intent Pages

    - [What Is Debt Service Coverage Ratio?](/tools/dscr-calculator/what-is-debt-service-coverage-ratio/)
    - [DSCR Requirements by Lender Type](/tools/dscr-calculator/dscr-requirements-by-lender/)

- slug: ebitda-multiple-calculator
  title: EBITDA Multiple Calculator
  nav_title: EBITDA Multiple
  short: Estimate enterprise value and equity value using EV/EBITDA and EV/Revenue multiples.
  date_added: "2026-06-18"
  new: true
  category: Valuation
  js: ebitda-multiple-calculator.js
  keywords:
    - EBITDA multiple calculator
    - EV EBITDA valuation
    - enterprise value calculator
    - business valuation multiple
    - EV revenue multiple
  howto_steps:
    - name: "Enter EBITDA and the target multiple"
      text: "Type your annual EBITDA and the EV/EBITDA multiple that applies to your industry and growth rate."
    - name: "Enter revenue for a cross-check"
      text: "Add annual revenue to calculate EBITDA margin and run an EV/Revenue valuation to bracket the range."
    - name: "Enter debt and cash for equity value"
      text: "Input total debt and cash on hand. The calculator converts enterprise value to equity value — what shareholders actually receive in a sale."
    - name: "Compare the two EV estimates"
      text: "Review the EBITDA-based and revenue-based enterprise values. If they diverge significantly, revisit your multiple assumptions."
  body: |
    ## What Is the EBITDA Multiple?

    The EV/EBITDA multiple (also called the EBITDA multiple) is the most common valuation metric in M&A and private equity. It expresses enterprise value as a multiple of EBITDA (Earnings Before Interest, Taxes, Depreciation, and Amortization).

    $$\text{Enterprise Value} = \text{EBITDA} \times \text{EV/EBITDA Multiple}$$

    ### Industry EBITDA Multiple Benchmarks (2024)

    | Sector | Typical EV/EBITDA |
    |--------|-------------------|
    | SaaS / High-growth tech | 15–30× |
    | B2B software (mature) | 8–15× |
    | Manufacturing | 5–8× |
    | Retail | 4–7× |
    | Services / consulting | 4–7× |
    | Distribution | 5–8× |

    ### Enterprise Value vs. Equity Value

    Enterprise Value includes debt holders. Equity Value is what shareholders actually receive:

    $$\text{Equity Value} = \text{EV} - \text{Total Debt} + \text{Cash}$$

    ### EBITDA vs. Revenue Multiples

    Revenue multiples (EV/Revenue) are used when EBITDA is negative or near zero, common in high-growth SaaS. Compare both to bracket your valuation range.

    ### Intent Pages

    - [What Is EV/EBITDA?](/tools/ebitda-multiple-calculator/what-is-ev-ebitda/)
    - [EBITDA Multiple by Industry](/tools/ebitda-multiple-calculator/ebitda-multiple-by-industry/)

- slug: current-ratio-calculator
  title: Current Ratio Calculator
  nav_title: Current Ratio
  short: Calculate current ratio, quick ratio, and cash ratio to measure your business's short-term liquidity.
  date_added: "2026-06-18"
  new: true
  category: Finance
  js: current-ratio-calculator.js
  keywords:
    - current ratio calculator
    - quick ratio calculator
    - liquidity ratio calculator
    - acid test ratio
    - working capital ratio
  howto_steps:
    - name: "Enter current assets"
      text: "Type total current assets — cash, accounts receivable, inventory, and other assets convertible to cash within 12 months."
    - name: "Enter current liabilities"
      text: "Type total current liabilities — accounts payable, short-term debt, and other obligations due within 12 months."
    - name: "Enter inventory and cash separately"
      text: "For the quick ratio, enter your inventory value. For the cash ratio, enter cash and cash equivalents only."
    - name: "Review all three ratios"
      text: "Compare your current, quick, and cash ratios against industry benchmarks to assess liquidity strength."
  body: |
    ## What Is the Current Ratio?

    The current ratio measures a company's ability to pay short-term obligations using its short-term assets.

    $$\text{Current Ratio} = \frac{\text{Current Assets}}{\text{Current Liabilities}}$$

    ### Three Liquidity Ratios Explained

    | Ratio | Formula | Target |
    |-------|---------|--------|
    | Current Ratio | Current Assets ÷ Current Liabilities | 1.5–2.0× |
    | Quick Ratio | (Current Assets − Inventory) ÷ Current Liabilities | ≥ 1.0× |
    | Cash Ratio | Cash &amp; Equivalents ÷ Current Liabilities | 0.1–0.5× |

    The quick ratio (also called the acid-test ratio) is more conservative — it excludes inventory, which may take weeks or months to sell. The cash ratio is the most stringent, counting only cash on hand.

    ### What Is Net Working Capital?

    Net Working Capital = Current Assets − Current Liabilities. Positive NWC means the company can cover all short-term obligations and still have liquid assets remaining.

    ### Intent Pages

    - [What Is the Current Ratio?](/tools/current-ratio-calculator/what-is-the-current-ratio/)
    - [Current Ratio vs Quick Ratio: Key Differences](/tools/current-ratio-calculator/current-ratio-vs-quick-ratio/)

- slug: markup-calculator
  title: Markup Calculator
  nav_title: Markup
  short: Calculate markup percentage, gross margin, and gross profit from cost and selling price — and understand the difference.
  date_added: "2026-06-18"
  new: true
  category: Business Math
  js: markup-calculator.js
  keywords:
    - markup calculator
    - markup percentage calculator
    - markup vs margin
    - gross margin calculator
    - price markup calculator
  howto_steps:
    - name: "Enter your unit cost"
      text: "Type the cost per unit — your COGS, landed cost, or cost of service delivery."
    - name: "Enter the selling price"
      text: "Type the price you charge customers. The calculator shows both the markup (cost basis) and margin (revenue basis)."
    - name: "Compare markup and margin"
      text: "Note that markup and margin are never equal — a 50% markup is only a 33% margin. Use this to avoid pricing mistakes."
    - name: "Use the price/cost ratio"
      text: "The ratio shows how many times the price exceeds cost. Retailers often target a 2–3× ratio (50–67% margin)."
  body: |
    ## Markup vs. Margin: The Most Common Pricing Confusion

    Markup and gross margin both measure profitability but on different bases:

    $$\text{Markup \%} = \frac{\text{Price} - \text{Cost}}{\text{Cost}} \times 100$$

    $$\text{Gross Margin \%} = \frac{\text{Price} - \text{Cost}}{\text{Price}} \times 100$$

    ### Why Markup Always Exceeds Margin

    For any product where Price > Cost, Markup % > Margin %. This is because markup divides by the smaller number (cost), while margin divides by the larger number (price).

    | Markup | Equivalent Margin |
    |--------|------------------|
    | 25% | 20% |
    | 50% | 33.3% |
    | 100% | 50% |
    | 200% | 66.7% |
    | 400% | 80% |

    ### When to Use Each

    - **Markup**: When starting from cost and deciding on a price (retail, manufacturing)
    - **Margin**: When reporting profitability, comparing businesses, or setting financial targets

    ### Intent Pages

    - [What Is Markup vs Margin?](/tools/markup-calculator/what-is-markup-vs-margin/)
    - [How to Calculate Markup Percentage](/tools/markup-calculator/how-to-calculate-markup-percentage/)

