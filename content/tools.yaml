    ## Revenue Growth Rate Formula

    $$\text{Growth Rate} = \frac{\text{Current Revenue} - \text{Previous Revenue}}{\text{Previous Revenue}} \times 100$$

    ### Growth Rate Benchmarks

    | Growth | Category |
    |--------|---------- |
    | 100%+ | Hypergrowth |
    | 50–100% | High growth (early-stage SaaS) |
    | 20–50% | Strong growth |
    | 10–20% | Moderate growth |
    | 0–10% | Slow growth / maturing |
    | Negative | Declining |

    ### CAGR for Multi-Year Analysis

    $$\text{CAGR} = \left(\frac{\text{End Revenue}}{\text{Start Revenue}}\right)^{\frac{1}{n}} - 1$$

    CAGR normalizes uneven growth across years. A company that grew 30%, then 10%, then 50% had a CAGR of ~27.5% — more informative than any single year.

    ### Rule of 40

    The Rule of 40 is the primary SaaS health benchmark:

    $$\text{Rule of 40} = \text{Growth Rate} + \text{Net Margin}$$

    A score ≥ 40 indicates a balanced, sustainable SaaS business. A company growing at 60% can operate at −20% margin and still score 40. A slow-grower at 10% needs a 30%+ margin to pass.

    ### Intent Pages

    - [How to Calculate Revenue Growth Rate](/tools/revenue-growth-rate-calculator/how-to-calculate-revenue-growth-rate/)
    - [What Is the Rule of 40 for SaaS?](/tools/revenue-growth-rate-calculator/what-is-rule-of-40/)

- slug: enterprise-value-calculator
  title: Enterprise Value Calculator
  nav_title: Enterprise Value
  short: Calculate Enterprise Value (EV) and key acquisition multiples — EV/EBITDA and EV/Revenue — from market cap, debt, and cash.
  date_added: "2026-06-18"
  new: true
  category: Valuation
  js: enterprise-value-calculator.js
  keywords:
    - enterprise value calculator
    - EV EBITDA calculator
    - EV to revenue calculator
    - company valuation calculator
    - acquisition multiple calculator
  howto_steps:
    - name: "Enter market capitalization"
      text: "Type shares outstanding multiplied by stock price, or the total equity market value."
    - name: "Enter total debt and cash"
      text: "Add all debt obligations (long-term + current portion) and subtract cash and equivalents."
    - name: "Add EBITDA for EV/EBITDA multiple"
      text: "Enter Earnings Before Interest, Taxes, Depreciation, and Amortization to see the most common acquisition multiple."
    - name: "Add revenue for EV/Revenue"
      text: "Enter total revenue to calculate the revenue multiple — often used for high-growth, pre-profit companies."
  body: |
    ## Enterprise Value Formula

    $$\text{EV} = \text{Market Cap} + \text{Total Debt} - \text{Cash}$$

    Enterprise Value is the theoretical takeover price — what a buyer would pay to acquire the entire business, including taking on its debt obligations and receiving its cash.

    ### Why EV Instead of Market Cap?

    Market cap only reflects equity value. EV accounts for capital structure:

    - **Company A**: $1B market cap, $500M debt, $100M cash → EV = $1.4B
    - **Company B**: $1B market cap, $0 debt, $100M cash → EV = $900M

    Company A is actually 56% more expensive to acquire, even though they have the same market cap. EV corrects for this.

    ### EV/EBITDA Benchmarks

    | EV/EBITDA | Context |
    |-----------|---------|
    | < 5× | Value / distressed |
    | 6–10× | Traditional industries |
    | 10–15× | Mid-market growth |
    | 15–25× | High-growth businesses |
    | 25×+ | Premium SaaS / hypergrowth |

    ### EV/Revenue Benchmarks

    | EV/Revenue | Context |
    |------------|---------|
    | < 1× | Deep value / declining |
    | 1–3× | Traditional businesses |
    | 3–10× | Growth businesses |
    | 10×+ | High-growth SaaS |

    ### Intent Pages

    - [What Is Enterprise Value?](/tools/enterprise-value-calculator/what-is-enterprise-value/)
    - [EV/EBITDA Multiple: What It Means and Industry Benchmarks](/tools/enterprise-value-calculator/ev-ebitda-multiple-benchmarks/)

- slug: customer-lifetime-revenue-calculator
  title: Customer Lifetime Value Calculator (Detailed)
  nav_title: LTV Calculator (Detailed)
  short: Calculate customer LTV, LTV:CAC ratio, average lifespan, and payback period from ARPU, churn rate, gross margin, and CAC.
  date_added: "2026-06-18"
  new: true
  category: SaaS Metrics
  js: customer-lifetime-revenue-calculator.js
  keywords:
    - customer lifetime value calculator
    - LTV calculator
    - LTV CAC ratio calculator
    - customer LTV formula
    - SaaS lifetime value calculator
    - CLV calculator
  howto_steps:
    - name: "Enter monthly ARPU"
      text: "Type Average Revenue Per User per month — total MRR divided by number of customers."
    - name: "Enter gross margin"
      text: "Add your gross margin percentage (revenue minus direct costs). This converts LTV from revenue to profit terms."
    - name: "Enter monthly churn rate"
      text: "Type the percentage of customers who cancel each month. Lower churn means higher LTV."
    - name: "Add CAC for ratio analysis"
      text: "Enter Customer Acquisition Cost to see the LTV:CAC ratio and payback period."
  body: |
    ## Customer Lifetime Value Formula

    $$\text{LTV} = \frac{\text{ARPU}}{\text{Monthly Churn Rate}}$$

    With gross margin adjustment:

    $$\text{LTV (margin)} = \frac{\text{ARPU} \times \text{Gross Margin}}{\text{Monthly Churn Rate}}$$

    ### LTV:CAC — The Core SaaS Unit Economics Ratio

    $$\text{LTV:CAC} = \frac{\text{LTV (with margin)}}{\text{CAC}}$$

    | Ratio | Assessment |
    |-------|-----------|
    | 5×+ | Excellent — underinvesting in growth |
    | 3–5× | Healthy SaaS benchmark |
    | 1–3× | Marginal — monitor closely |
    | < 1× | Losing money on each customer |

    ### Payback Period

    $$\text{Payback} = \frac{\text{CAC}}{\text{ARPU} \times \text{Gross Margin \%}}$$

    Payback under 12 months is excellent for SaaS. Under 18 months is acceptable. Over 24 months means you're financing growth heavily with capital.

    ### Churn Rate and LTV

    Small changes in churn have a large impact on LTV:

    | Monthly Churn | Avg Lifespan | LTV ($99 ARPU) |
    |--------------|-------------|----------------|
    | 1% | 100 months | $9,900 |
    | 2% | 50 months | $4,950 |
    | 5% | 20 months | $1,980 |
    | 10% | 10 months | $990 |

    ### Intent Pages

    - [How to Calculate Customer Lifetime Value (LTV)](/tools/customer-lifetime-revenue-calculator/how-to-calculate-customer-lifetime-value/)
    - [LTV to CAC Ratio: SaaS Benchmarks and How to Improve It](/tools/customer-lifetime-revenue-calculator/ltv-cac-ratio-benchmarks/)

- slug: invoice-discount-calculator
  title: Invoice Early Payment Discount Calculator
  nav_title: Invoice Discount
  short: Calculate early payment discount savings, net payment amount, and the annualized cost of passing on a 2/10 net 30 discount.
  date_added: "2026-06-18"
  new: true
  category: Finance
  js: invoice-discount-calculator.js
  keywords:
    - invoice discount calculator
    - early payment discount calculator
    - 2/10 net 30 calculator
    - annualized cost of discount
    - accounts payable discount calculator
  howto_steps:
    - name: "Enter invoice amount"
      text: "Type the total invoice value before any discount."
    - name: "Enter the discount percentage"
      text: "Add the offered discount rate, e.g. 2 for a 2% early payment discount."
    - name: "Set payment terms"
      text: "Enter the days for early payment (e.g. 10) and the net terms (e.g. 30). The calculator computes the annualized cost of passing on the discount."
  body: |
    ## Early Payment Discount Formula

    For a "2/10 net 30" term (2% discount if paid within 10 days, otherwise due in 30):

    $$\text{Annualized Cost} = \frac{\text{Discount \%}}{100 - \text{Discount \%}} \times \frac{365}{\text{Net Days} - \text{Discount Days}}$$

    **Example (2/10 net 30):**

    $$\frac{2}{98} \times \frac{365}{20} = 37.2\%$$

    Passing on a 2/10 net 30 discount is equivalent to borrowing at 37.2% APR — almost always worth taking if you have the cash.

    ### When to Take the Discount

    Take the early payment discount when your **annualized cost of passing on the discount** exceeds your **cost of capital** (cost of a line of credit, opportunity cost of cash).

    | Your borrowing rate | Discount annualized cost | Decision |
    |--------------------|--------------------------|---------- |
    | 8% | 37.2% | Take the discount |
    | 8% | 6% | Pass — borrowing is cheaper than losing the discount |

    ### Dynamic Discounting

    Some AP platforms offer dynamic discounting — variable rates based on days paid early. Use this calculator to evaluate any offer by computing the implied annualized cost.

    ### Intent Pages

    - [What Is a 2/10 Net 30 Payment Term?](/tools/invoice-discount-calculator/what-is-2-10-net-30/)
    - [When Should You Take an Early Payment Discount?](/tools/invoice-discount-calculator/when-to-take-early-payment-discount/)

- slug: accounts-receivable-turnover-calculator
  title: Accounts Receivable Turnover Calculator
  nav_title: A/R Turnover
  short: Calculate A/R turnover ratio, Days Sales Outstanding (DSO), and excess receivables vs your collection target.
  date_added: "2026-06-18"
  new: true
  category: Finance
  js: accounts-receivable-turnover-calculator.js
  keywords:
    - accounts receivable turnover calculator
    - AR turnover ratio calculator
    - days sales outstanding calculator
    - DSO calculator
    - receivables turnover formula
  howto_steps:
    - name: "Enter annual net credit sales"
      text: "Type total credit sales for the period (exclude cash sales). Use annual figures for a full-year analysis."
    - name: "Enter beginning and ending A/R balances"
      text: "Add the accounts receivable balance at the start and end of the period. The calculator averages them."
    - name: "Set your target DSO"
      text: "Enter your target collection days. The tool shows how much receivables are above or below target."
  body: |
    ## A/R Turnover and DSO Formulas

    $$\text{A/R Turnover} = \frac{\text{Net Credit Sales}}{\text{Average A/R}}$$

    $$\text{DSO} = \frac{\text{Average A/R}}{\text{Net Credit Sales}} \times 365$$

    ### A/R Turnover Benchmarks

    | Ratio | Assessment |
    |-------|-----------|
    | 12× or higher | Excellent — collecting every ~30 days |
    | 8–12× | Good |
    | 4–8× | Adequate |
    | Below 4× | Slow — review credit and collection policies |

    ### DSO Benchmarks

    Good DSO depends on your payment terms. If you offer net-30 terms, a DSO of 35–40 days is reasonable. DSO significantly above your stated terms indicates collection problems.

    | Net Terms | Target DSO |
    |-----------|-----------|
    | Net 15 | 18–22 days |
    | Net 30 | 32–40 days |
    | Net 45 | 48–55 days |
    | Net 60 | 65–75 days |

    ### Improving A/R Turnover

    - Send invoices immediately upon delivery
    - Offer early payment discounts (see [Invoice Discount Calculator](/tools/invoice-discount-calculator/))
    - Follow up on overdue invoices at 30, 45, 60 days
    - Require deposits or shorter terms for new customers

    ### Intent Pages

    - [What Is Accounts Receivable Turnover?](/tools/accounts-receivable-turnover-calculator/what-is-accounts-receivable-turnover/)
    - [How to Reduce DSO and Speed Up Cash Collection](/tools/accounts-receivable-turnover-calculator/how-to-reduce-dso/)

- slug: price-per-unit-calculator
  title: Price Per Unit Calculator
  nav_title: Price Per Unit
  short: Calculate and compare price per unit for different package sizes or supplier quotes to find the best value option.
  date_added: "2026-06-18"
  new: true
  category: Business Math
  js: price-per-unit-calculator.js
  keywords:
    - price per unit calculator
    - cost per unit calculator
    - unit price calculator
    - price comparison calculator
    - best value calculator
  howto_steps:
    - name: "Enter Option 1 price and quantity"
      text: "Type the total price and number of units in the first package or quote."
    - name: "Enter Option 2 price and quantity (optional)"
      text: "Add a second option to compare. The calculator identifies which is cheaper per unit and by how much."
  body: |
    ## Price Per Unit Formula

    $$\text{Price Per Unit} = \frac{\text{Total Price}}{\text{Quantity}}$$

    ### Why Unit Price Comparisons Matter

    Retail packaging frequently obscures real value by using different sizes and round prices. A 16-oz product at $12.99 and a 30-oz product at $21.99 look similar but have very different unit costs:

    - 16 oz: $12.99 ÷ 16 = **$0.8119/oz**
    - 30 oz: $21.99 ÷ 30 = **$0.7330/oz**

    The 30-oz option is 9.7% cheaper per unit.

    ### Business Applications

    **For buyers:**
    - Compare supplier quotes with different minimum order quantities
    - Evaluate bulk purchase discounts (is the extra volume worth the storage cost?)
    - Compare raw material costs across packaging sizes

    **For sellers:**
    - Price bundles and multi-packs appropriately
    - Calculate the unit economics of different SKUs
    - Ensure bulk pricing still maintains target margins

    ### Bulk Discounts and Carry Costs

    The cheapest unit price isn't always the best decision. A bulk purchase locks up cash and incurs storage costs. If you're comparing a cheaper bulk option vs a pricier small order, factor in:

    1. Storage/handling cost per unit per month
    2. Cost of capital (carrying cost of the extra inventory)
    3. Risk of obsolescence or expiry

    ### Intent Pages

    - [How to Calculate Price Per Unit](/tools/price-per-unit-calculator/how-to-calculate-price-per-unit/)
    - [Unit Price vs Total Price: Making Smart Bulk Purchase Decisions](/tools/price-per-unit-calculator/unit-price-bulk-purchasing-guide/)

- slug: gross-revenue-retention-calculator
  title: Gross Revenue Retention Calculator
  nav_title: GRR Calculator
  short: Calculate Gross Revenue Retention (GRR) from starting MRR, churn, and contraction — excluding expansion to isolate pure retention.
  date_added: "2026-06-18"
  new: true
  category: SaaS Metrics
  js: gross-revenue-retention-calculator.js
  keywords:
    - gross revenue retention calculator
    - GRR calculator
    - gross MRR retention
    - revenue retention rate calculator
    - SaaS retention calculator
  howto_steps:
    - name: "Enter starting MRR"
      text: "Type MRR at the beginning of the period from existing customers only (exclude new MRR added this month)."
    - name: "Enter churned MRR"
      text: "Add MRR lost to complete cancellations — customers who stopped paying entirely."
    - name: "Enter contracted MRR"
      text: "Add MRR lost to plan downgrades only. Do not include upsells here — GRR excludes expansion."
  body: |
    ## Gross Revenue Retention (GRR) Formula

    $$\text{GRR} = \frac{\text{Starting MRR} - \text{Churned MRR} - \text{Contracted MRR}}{\text{Starting MRR}} \times 100$$

    GRR is always ≤ 100%. It measures how much existing revenue you retain without counting expansion.

    ### GRR vs NRR

    | Metric | Includes Expansion | Can Exceed 100% |
    |--------|--------------------|----------------|
    | **GRR** | No | No |
    | **NRR** | Yes | Yes |

    GRR tells you about the health of your base retention. NRR tells you about total revenue momentum. A company with GRR of 85% but NRR of 110% is masking a significant churn problem with upsells.

    ### GRR Benchmarks

    | GRR | Assessment |
    |----|-----------|
    | 95%+ | Best-in-class (Salesforce, Veeva tier) |
    | 90–95% | Strong |
    | 85–90% | Acceptable |
    | 80–85% | Below average — warrants investigation |
    | < 80% | High churn — retention problem |

    ### Why GRR Matters for Fundraising

    Investors scrutinize GRR independently of NRR because it reveals whether growth is organic or driven by aggressive upselling to compensate for churn. A business with 80% GRR and 120% NRR is a different risk profile than one with 95% GRR and 105% NRR.

    ### Intent Pages

    - [GRR vs NRR: What's the Difference?](/tools/gross-revenue-retention-calculator/grr-vs-nrr-difference/)
    - [What Is a Good Gross Revenue Retention Rate?](/tools/gross-revenue-retention-calculator/what-is-good-gross-revenue-retention/)

- slug: employee-turnover-calculator
  title: Employee Turnover Rate Calculator
  nav_title: Employee Turnover
  short: Calculate annual employee turnover rate, retention rate, and total cost of turnover including replacement costs.
  date_added: "2026-06-18"
  new: true
  category: HR & People
  js: employee-turnover-calculator.js
  keywords:
    - employee turnover rate calculator
    - employee turnover calculator
    - staff turnover calculator
    - cost of employee turnover calculator
    - retention rate calculator
  howto_steps:
    - name: "Enter employees separated"
      text: "Type the number of employees who left during the period (voluntary and involuntary separations)."
    - name: "Enter headcount at start and end"
      text: "Add headcount at the beginning and end of the period. The calculator uses the average for accuracy."
    - name: "Add salary and replacement cost for dollar impact"
      text: "Enter average salary and replacement cost percentage to calculate the total cost of turnover. SHRM estimates 33–50% for entry-level roles, up to 200% for senior positions."
  body: |
    ## Employee Turnover Rate Formula

    $$\text{Turnover Rate} = \frac{\text{Employees Separated}}{\text{Average Headcount}} \times 100$$

    $$\text{Average Headcount} = \frac{\text{Start HC} + \text{End HC}}{2}$$

    ### Industry Benchmarks

    | Industry | Average Annual Turnover |
    |----------|------------------------|
    | Tech / Software | 10–15% |
    | Finance / Insurance | 10–15% |
    | Healthcare | 15–25% |
    | Retail | 25–60% |
    | Food & Hospitality | 50–75% |
    | Staffing agencies | 100%+ |

    ### The Real Cost of Turnover

    SHRM (Society for Human Resource Management) estimates replacement costs range from 33% to 200% of annual salary, depending on the role:

    | Role | Replacement Cost |
    |------|-----------------|
    | Entry-level / hourly | 33–50% of salary |
    | Mid-level contributor | 50–100% of salary |
    | Senior / specialized | 100–150% of salary |
    | Executive / C-suite | 150–200%+ of salary |

    Costs include: job postings, recruiter fees, interview time, lost productivity during vacancy, onboarding time, and new-hire ramp-up.

    ### Intent Pages

    - [How to Calculate Employee Turnover Rate](/tools/employee-turnover-calculator/how-to-calculate-employee-turnover-rate/)
    - [True Cost of Employee Turnover](/tools/employee-turnover-calculator/true-cost-of-employee-turnover/)

- slug: budget-variance-calculator
  title: Budget Variance Calculator
  nav_title: Budget Variance
  short: Calculate budget variance in dollars and percentage, and determine whether the variance is favorable or unfavorable for revenue or expense lines.
  date_added: "2026-06-18"
  new: true
  category: Finance
  js: budget-variance-calculator.js
  keywords:
    - budget variance calculator
    - budget vs actual calculator
    - variance analysis calculator
    - favorable unfavorable variance
    - budget variance formula
  howto_steps:
    - name: "Enter actual amount"
      text: "Type the actual result for the period — what was actually spent or earned."
    - name: "Enter budgeted amount"
      text: "Add the planned or budgeted figure for the same period."
    - name: "Select line item type"
      text: "Choose 'Expense' or 'Revenue' — this determines whether a positive variance is favorable or unfavorable."
  body: |
    ## Budget Variance Formula

    $$\text{Variance} = \text{Actual} - \text{Budget}$$

    $$\text{Variance \%} = \frac{\text{Actual} - \text{Budget}}{|\text{Budget}|} \times 100$$

    ### Favorable vs Unfavorable

    The direction that makes a variance "favorable" depends on the line item type:

    | Line Type | Favorable Condition |
    |-----------|---------------------|
    | Revenue | Actual > Budget (earned more than planned) |
    | Expense | Actual < Budget (spent less than planned) |

    ### Materiality Thresholds

    Most organizations set materiality thresholds for variance investigation. Common rules:
    - Investigate variances > 5–10% for budget lines over $10k
    - Always investigate revenue variances > 10%
    - Flag cumulative variances even if individual periods are within tolerance

    ### Types of Budget Variance

    - **Price variance**: The unit price differed from what was budgeted
    - **Volume variance**: Quantity sold or units consumed differed
    - **Efficiency variance**: Labor or material usage per unit differed
    - **Mix variance**: The combination of products/services sold differed from the planned mix

    Understanding the source of a variance determines the appropriate corrective action.

    ### Intent Pages

    - [What Is Budget Variance Analysis?](/tools/budget-variance-calculator/what-is-budget-variance-analysis/)
    - [Favorable vs Unfavorable Variance: Key Differences](/tools/budget-variance-calculator/favorable-vs-unfavorable-variance/)
