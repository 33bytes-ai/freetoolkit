  howto_steps:
    - name: "Enter customers at start of period"
      text: "Type the number of paying customers you had at the beginning of the period (month, quarter, or year)."
    - name: "Enter customers at end of period"
      text: "Type total customers at the end of the period, including new customers acquired during the period."
    - name: "Enter new customers acquired"
