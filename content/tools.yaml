  body: |
    Cost Per Lead (CPL) tells you how much you're paying to acquire a single lead from a
    given marketing channel or campaign. Combined with conversion rate and deal size, it
    determines whether a channel is profitable.

    ## CPL formula

    **CPL = Total Marketing Spend / Number of Leads**

    ## From leads to revenue

    | Metric | Formula |
    |--------|---------|
    | Lead-to-customer rate | Customers / Leads × 100 |
    | Revenue per lead | Avg deal value × conversion rate |
    | Marketing ROI | (Revenue attributable − Spend) / Spend × 100 |
    | Max allowable CPL | ACV × conversion rate × gross margin |

    ## Typical CPL benchmarks by channel

    | Channel | B2B CPL range |
    |---------|--------------|
    | Organic search (SEO) | $10–$80 |
    | Content / email | $20–$100 |
    | LinkedIn Ads | $80–$200 |
    | Google Ads (search) | $30–$150 |
    | Events / webinars | $50–$300 |

    ## Why CPL alone is misleading

    A low CPL from a channel with poor lead quality costs more than a high CPL from a
    channel with high-intent buyers. Always track lead-to-opportunity and close rates
    by channel to get the full picture.

