      text: "Enter monthly recurring revenue (MRR) or other revenue. This reduces net burn."
    - name: "Enter department costs"
      text: "Enter the total monthly cost (salaries + benefits + tools + contractors) for Engineering, Sales, Marketing, and G&A."
    - name: "Review burn breakdown"
