      text: "Total cost of employer-provided benefits: health insurance employer contribution, 401(k) match, dental, vision, life insurance, etc. Typical range: $10,000–$25,000/year for US full-time."
    - name: "Enter your SUTA rate"
      text: "Your state's State Unemployment Tax rate. The default is 2.7% (federal new employer rate). Check your state's labor department for your actual rate — it varies by state and employer history."
    - name: "Read total employer cost"
      text: "See total annual employer cost, monthly cost, payroll taxes, and cost-to-salary ratio. The typical ratio for US full-time employees with standard benefits is 125–140%."
  body: |
    The cost of hiring an employee is significantly higher than the salary you offer.
    Employers pay payroll taxes, fund benefits, and incur overhead costs that add
    20–40% to the base salary. This calculator quantifies the total real cost.

    ## What employers pay in payroll taxes (US)

    **FICA — Federal Insurance Contributions Act**
    - Social Security: 6.2% of wages (on first $168,600 of wages in 2024)
    - Medicare: 1.45% of all wages (plus 0.9% Additional Medicare on wages above $200k)
    - Total FICA: 7.65% of wages

    **FUTA — Federal Unemployment Tax**
    - 6.0% on first $7,000 of wages, reduced to 0.6% after state unemployment credit
    - Effective rate: typically $42/employee/year after credit

    **SUTA — State Unemployment Tax**
    - Varies by state: 0.2%–8%+ on a state wage base (typically first $10,000–$40,000)
    - New employer default rate is often 2.7%

    ## What benefits typically cost employers

    | Benefit | Typical employer cost |
    |---|---|
    | Health insurance (self) | $7,000–$15,000/year |
    | Health insurance (family) | $18,000–$28,000/year |
    | 401(k) match (3–5% of salary) | $3,600–$6,000 on $120k salary |
    | Dental + Vision | $600–$1,500/year |
    | Life insurance | $200–$500/year |
    | Paid time off (15 days) | ~5.8% of salary in cost |

    ## The 1.25–1.40× rule of thumb

    A commonly cited rule: total employer cost = 1.25–1.40× annual salary for US
    full-time employees with standard benefits. At $120k salary:
    - 1.25×: $150,000/year total cost
    - 1.35×: $162,000/year total cost

    Higher for senior employees with comprehensive benefits; lower for contractors
    (no payroll taxes if properly classified as 1099).

    ## Employee vs contractor cost comparison

    Contractors (1099) cost more per hour but have no payroll taxes or benefits.
    For a 40-hour/week engagement, the break-even:
    - $120k employee = ~$58/hour effective cost
    - Contractor at $75–90/hour may cost more but requires no long-term commitment

    Use this calculator alongside the Freelance Rate Calculator to compare options.

    ## Frequently asked questions

    **What does this calculator do?**
    Calculate total employer cost including payroll taxes (FICA, FUTA, SUTA) and benefits.

- slug: discount-calculator
  title: "Discount Calculator"
  nav_title: "Discount Calculator"
  short: "Calculate sale price, discount amount, or reverse-calculate the discount percentage from any original price — plus margin impact after discount."
  new: true
  date_added: "2026-06-17"
  category: Business Math
  js: discount-calculator.js
  keywords: ["discount calculator", "sale price calculator", "percentage discount calculator", "how much is 20 percent off", "discount percentage formula"]
  howto_steps:
    - name: "Enter the original price"
      text: "The full price before discount."
    - name: "Enter discount percentage OR sale price"
      text: "Enter a discount % to calculate the sale price, OR enter a known sale price to calculate the discount percentage. The calculator uses whichever field you fill in."
    - name: "Optionally enter COGS"
      text: "Cost per unit or COGS. The calculator shows gross margin at the discounted price — useful for checking whether a promotion is profitable."
    - name: "Read the results"
      text: "See sale price, discount amount, discount %, and margin. If margin goes negative after discount, you're selling below cost."
  body: |
    A discount calculator has two modes: calculate the sale price from a discount percentage,
    or reverse-calculate the discount from a known sale price. This one handles both.

    ## The discount formula

    **Sale Price = Original Price × (1 − Discount % / 100)**

    **Discount Amount = Original Price × Discount % / 100**

    At $99 original price with 20% discount:
    - Discount amount = $99 × 0.20 = **$19.80**
    - Sale price = $99 − $19.80 = **$79.20**

    ## Reverse discount calculation

    If you know the original price and sale price:

    **Discount % = (Original Price − Sale Price) ÷ Original Price × 100**

    If a $149 item is on sale for $99: ($149 − $99) ÷ $149 = **33.6% off**

    ## Why discounts hurt margins disproportionately

    A 20% discount on a product with 40% gross margin:
    - Original: $99 price, $59.40 COGS, $39.60 gross profit (40% margin)
    - Discounted: $79.20 price, $59.40 COGS, $19.80 gross profit (25% margin)

    20% off the price = 50% reduction in gross profit. This asymmetry is why deep
    discounting is dangerous at low margins.

    ## Common discount structures

    | Type | How it works | Best for |
    |---|---|---|
    | Percentage off | Fixed % discount from list price | Promotions, clearance |
    | Fixed amount off | $X off total | AOV (average order value) boosting |
    | BOGO | Buy one get one | Volume without lowering price signal |
    | Annual plan discount | 15–20% off monthly × 12 | SaaS annual commitment |
    | Early bird | First N customers get lower price | Launch pricing |

    ## Frequently asked questions

    **What does this calculator do?**
    Calculate sale price, discount amount, discount %, and margin impact for any discount scenario.

- slug: break-even-revenue-calculator
  title: "Break-Even Revenue Calculator"
  nav_title: "Break-Even Revenue"
  short: "Calculate the exact revenue needed to cover your fixed costs given your contribution margin — plus safety margin when you enter current revenue."
  new: true
  date_added: "2026-06-17"
  category: Business Math
  js: break-even-revenue-calculator.js
  keywords: ["break even calculator", "break even revenue", "break even point calculator", "contribution margin calculator", "fixed costs calculator", "margin of safety calculator"]
  howto_steps:
    - name: "Enter your monthly fixed costs"
      text: "Include rent, salaries, software subscriptions — all costs that don't change with revenue."
    - name: "Enter your contribution margin %"
      text: "For SaaS: use gross margin. For physical products: (price − variable cost) ÷ price × 100. This is the % of each revenue dollar left after variable costs."
    - name: "Optionally enter current revenue"
      text: "If you enter current monthly revenue, the calculator shows your safety margin — how far above break-even you are — and profit vs loss vs break-even."
    - name: "Interpret the results"
      text: "A safety margin below 10% is fragile. Above 25% gives real room for investment. Improve by reducing fixed costs or increasing contribution margin."
  body: |
    Break-even analysis tells you the minimum revenue your business needs to avoid a loss.
    It's one of the most important financial exercises for any founder or operator.

    ## The break-even formula

    **Break-Even Revenue = Fixed Costs ÷ Contribution Margin %**

    At $25,000/month in fixed costs and 70% contribution margin:
    - Break-even = $25,000 ÷ 0.70 = **$35,714/month**

    Every dollar above $35,714 generates $0.70 in operating profit.

    ## What counts as fixed vs variable costs

    | Fixed costs | Variable costs |
    |---|---|
    | Rent | Transaction fees |
    | Full-time salaries | Contractor payments (per project) |
    | Software subscriptions | Cost of goods sold |
    | Insurance | Customer acquisition cost |
    | Minimum AWS/GCP bills | Support tickets per new user |

    Most SaaS businesses are 85–95% fixed costs. That's why the model scales — each
    additional dollar of revenue converts almost entirely to margin.

    ## Contribution margin vs gross margin

    For pure software businesses, contribution margin ≈ gross margin. Both exclude
    the variable cost per unit of revenue.

    For businesses with meaningful variable costs (physical products, services billed
    hourly), contribution margin = (Price − Variable Cost per Unit) ÷ Price.

    A $500 product with $150 in material cost has 70% contribution margin.
    If fixed costs are $50,000/month, break-even = $50,000 ÷ 0.70 = $71,429/month.

    ## Margin of safety

    Once you know break-even, margin of safety shows how much revenue you can lose
    before hitting a loss:

    **Margin of Safety = (Actual Revenue − Break-Even Revenue) ÷ Actual Revenue × 100**

    At $50,000 revenue against $35,714 break-even:
    - Safety margin = ($50,000 − $35,714) ÷ $50,000 = **28.6%**

    A margin of safety below 10% means a single bad month could push you into loss.
    Investors often look for >25% before calling a business resilient.

    ## How to improve your break-even point

    Three levers:

    **1. Reduce fixed costs** — Renegotiate rent, automate headcount-heavy processes,
    cut unused subscriptions. Direct reduction in break-even.

    **2. Increase contribution margin** — Raise prices, reduce COGS (supplier
    renegotiation, better hosting efficiency). The highest-leverage lever at scale.

    **3. Grow revenue faster than fixed costs** — Classic operating leverage. If fixed
    costs stay flat while revenue grows, safety margin expands automatically.

    ## Break-even analysis by business type

    | Model | Typical contrib. margin | Break-even at $30k fixed costs |
    |---|---|---|
    | Pure SaaS | 75–90% | $33k–$40k MRR |
    | SaaS with professional services | 55–70% | $43k–$55k/month |
    | E-commerce (branded) | 30–50% | $60k–$100k/month |
    | Agency / consulting | 40–60% | $50k–$75k/month |
    | Physical product | 20–40% | $75k–$150k/month |

    ## Frequently asked questions

    **What does this calculator do?**
    Calculate the monthly revenue needed to cover your fixed costs given your contribution
    margin. Enter current revenue to see your safety margin.

- slug: cac-calculator
  title: "CAC Calculator"
  nav_title: "CAC Calculator"
  short: "Calculate blended Customer Acquisition Cost from ad spend, sales payroll, and tools — plus CAC payback period based on ARPU and gross margin."
  new: true
  date_added: "2026-06-17"
  category: SaaS Metrics
  js: cac-calculator.js
  keywords: ["CAC calculator", "customer acquisition cost calculator", "CAC payback period", "blended CAC", "sales marketing efficiency", "cost per customer"]
  howto_steps:
    - name: "Enter monthly acquisition costs"
      text: "Add your monthly ad spend, sales and marketing payroll, and tools/software costs. These are all costs attributable to acquiring new customers."
    - name: "Enter new customers acquired"
      text: "How many new paying customers did you acquire this month? The calculator divides total acquisition cost by this number for blended CAC."
    - name: "Enter ARPU and gross margin for payback"
      text: "Optional: enter monthly ARPU and gross margin % to calculate how many months it takes to recover the CAC from a single customer's gross profit."
    - name: "Interpret the results"
      text: "Payback under 6 months is excellent. Over 18 months typically signals an inefficient acquisition channel or pricing that's too low. Benchmark against your LTV."
  body: |
    Customer Acquisition Cost (CAC) is the total sales and marketing spend required to
    acquire one new paying customer. It's one of the core SaaS unit economics metrics.

    ## The CAC formula

    **CAC = Total Sales & Marketing Spend ÷ New Customers Acquired**

    At $37,000/month in total S&M spend acquiring 50 customers:
    - CAC = $37,000 ÷ 50 = **$740**

    ## What to include in CAC

    Include all costs that exist because of your acquisition efforts:

    | Include | Exclude |
    |---|---|
    | Paid ads (Google, Meta, LinkedIn) | Product development |
    | Sales team salaries + commissions | General & administrative |
    | Marketing team salaries | Customer success (post-sale) |
    | CRM, ad tools, marketing automation | Hosting & infrastructure |
    | Content creation costs | Support costs |

    Many founders undercount CAC by excluding sales salaries or tools, making the metric
    look better than it is. Blended CAC includes everything.

    ## CAC payback period

    The most actionable CAC metric is payback period — how many months until you recover
    the acquisition cost from a single customer's gross profit.

    **CAC Payback = CAC ÷ (Monthly ARPU × Gross Margin %)**

    At $740 CAC, $99 ARPU, 75% gross margin:
    - Monthly gross profit per customer = $99 × 0.75 = $74.25
    - Payback = $740 ÷ $74.25 = **9.97 months**

    ## CAC benchmarks by stage

    | Stage | Acceptable payback | Notes |
    |---|---|---|
    | Seed / early stage | < 18 months | Still figuring out channels |
    | Series A | < 12 months | Channels identified, optimizing |
    | Growth stage | < 6 months | Scaled, efficient acquisition |
    | Enterprise SaaS | < 24 months | Long sales cycles tolerated |

    ## LTV:CAC ratio

    The LTV:CAC ratio compares lifetime value to acquisition cost:
    - **< 1**: You're paying more than a customer is worth. Not sustainable.
    - **1–3**: Marginal. Revenue covers CAC but leaves little profit.
    - **3–5**: Healthy. Strong unit economics.
    - **> 5**: Excellent. May signal you're under-investing in growth.

    ## How to reduce CAC

    **Channel optimization**: Measure CAC per channel (paid search, content, outbound,
    referral). Kill or reduce spend on channels with > 18-month payback. Double down
    on < 6-month channels.

    **Conversion rate**: Higher website-to-trial conversion means more customers from
    the same ad spend. A/B testing landing pages is often the fastest CAC lever.

    **Sales efficiency**: Measure deals closed per sales rep per month. Underperforming
    reps inflate blended CAC significantly.

    **Referral programs**: Customer-referred acquisition typically has 2–3× lower CAC
    than paid channels. Invest in referral mechanics early.

    ## Frequently asked questions

    **What does this calculator do?**
    Calculate blended CAC from ad spend, sales payroll, and tools, plus CAC payback
    period using ARPU and gross margin.

- slug: revenue-per-employee-calculator
  title: "Revenue per Employee Calculator"
  nav_title: "Revenue/Employee"
  short: "Benchmark your ARR per FTE against SaaS industry quartiles — and calculate the revenue or headcount needed to hit a target efficiency ratio."
  new: true
  date_added: "2026-06-17"
  category: SaaS Metrics
  js: revenue-per-employee-calculator.js
  keywords: ["revenue per employee", "ARR per employee", "revenue per headcount", "SaaS efficiency ratio", "employee productivity calculator", "revenue productivity benchmark"]
  howto_steps:
    - name: "Enter your annual revenue or ARR"
      text: "For SaaS, use Annual Recurring Revenue. For other businesses, use annual revenue."
    - name: "Enter total headcount"
      text: "Use full-time equivalents (FTE). Include full-time employees and any contractors who are effectively full-time."
    - name: "Optionally enter total annual payroll"
      text: "If you enter total payroll cost, the calculator shows cost per employee and revenue-to-payroll multiple — the ratio of revenue generated per dollar of labor cost."
    - name: "Compare against benchmarks"
      text: "The calculator shows where you fall relative to the SaaS median ($250k/employee) and top quartile ($400k+). Use this to guide your next hiring decision."
  body: |
    Revenue per employee (RPE) is one of the most watched efficiency metrics for SaaS
    companies. It tells investors and operators how much revenue each additional employee
    generates — and whether the business scales with headcount.

    ## The formula

    **Revenue per Employee = Annual Revenue ÷ Total Headcount**

    At $5M ARR and 20 employees: $5,000,000 ÷ 20 = **$250,000 per employee**

    ## SaaS benchmarks by stage

    | Stage / ARR range | Median RPE | Top quartile |
    |---|---|---|
    | < $1M ARR | $80k–$150k | > $200k |
    | $1M–$5M ARR | $150k–$250k | > $350k |
    | $5M–$20M ARR | $200k–$350k | > $500k |
    | $20M–$100M ARR | $250k–$450k | > $600k |
    | $100M+ ARR | $300k–$600k | > $800k |

    Best-in-class product-led growth companies (Atlassian, Figma pre-acquisition)
    have hit $1M+ per employee by keeping headcount lean relative to revenue.

    ## Why RPE matters more than total headcount

    A 50-person company at $10M ARR ($200k/employee) and a 50-person company at
    $25M ARR ($500k/employee) have very different economics. Headcount without
    revenue context is meaningless.

    RPE also predicts future hiring needs: if you need to double revenue, do you
    need to double headcount, or can you do it with 20% more people through
    automation and tooling?

    ## Revenue/payroll multiple

    Dividing RPE by average fully-loaded employee cost gives the revenue/payroll
    multiple — how many dollars of revenue each dollar of payroll generates.

    At $250k RPE and $120k average cost per employee: multiple = 2.1×

    Healthy SaaS businesses typically show 2–4× multiples. Below 1.5× suggests
    headcount growth is outpacing revenue. Above 5× often means the business is
    understaffed and likely to have service quality issues.

    ## When to use RPE in hiring decisions

    Use RPE as a forward-looking guardrail:

    - Before a hire: calculate what RPE will be *after* the hire at current revenue.
      If it drops below $150k, delay until revenue grows to justify it.
    - After a growth quarter: recalculate RPE. If it's risen significantly without
      new hires, you have capacity to hire without hurting efficiency.
    - For board reporting: track RPE quarterly as a headline efficiency metric
      alongside ARR growth and net revenue retention.

    ## Frequently asked questions

    **What does this calculator do?**
    Calculate revenue per employee from ARR and headcount, compare against SaaS
    benchmarks, and optionally show cost per employee and revenue/payroll multiple.

- slug: nrr-calculator
  title: "Net Revenue Retention (NRR) Calculator"
  nav_title: "NRR Calculator"
  short: "Calculate Net Revenue Retention and Gross Revenue Retention from starting MRR, expansion, contraction, and churn — the core SaaS retention health metric."
  new: true
  date_added: "2026-06-17"
  category: SaaS Metrics
  js: nrr-calculator.js
  keywords: ["NRR calculator", "net revenue retention", "gross revenue retention", "GRR calculator", "SaaS retention metrics", "expansion MRR calculator", "churn MRR calculator"]
  howto_steps:
    - name: "Enter your starting MRR"
      text: "The total MRR from existing customers at the beginning of the period (month or quarter). Do not include new customers acquired during the period."
    - name: "Enter expansion MRR"
      text: "Revenue added from existing customers: upsells, seat additions, tier upgrades, usage overages."
    - name: "Enter contraction MRR"
      text: "Revenue lost from existing customers who downgraded (but didn't fully cancel): plan downgrades, seat reductions."
    - name: "Enter churned MRR"
      text: "Revenue fully lost from customers who cancelled during the period."
    - name: "Read NRR and GRR"
      text: "NRR above 100% means expansion offsets churn. GRR is always ≤ 100% — it measures retention without expansion. Target NRR > 110% for best-in-class SaaS."
  body: |
    Net Revenue Retention (NRR) is the most important single metric for measuring
    SaaS revenue health from the existing customer base.

    ## The NRR formula

    **NRR = (Starting MRR + Expansion MRR − Contraction MRR − Churned MRR) ÷ Starting MRR × 100**

    At $100k starting MRR, $15k expansion, $3k contraction, $5k churn:
    - Ending MRR from existing base = $100k + $15k − $3k − $5k = $107k
    - NRR = $107k ÷ $100k = **107%**

    ## NRR vs Gross Revenue Retention (GRR)

    **GRR** excludes expansion — it only measures how much of the starting MRR
    you retained (ignoring upsells):

    **GRR = (Starting MRR − Contraction − Churn) ÷ Starting MRR × 100**

    GRR is always ≤ 100%. It tells you about the quality of your retention
    without the expansion "cushion."

    At 107% NRR and 92% GRR, expansion is covering churn and more — but
    if expansion slows, net retention could flip negative.

    ## NRR benchmarks

    | NRR | Interpretation |
    |---|---|
    | < 90% | Revenue from existing base shrinking fast |
    | 90–100% | Expansion partially offsets churn |
    | 100–110% | Positive — expansion exceeds churn |
    | 110–120% | Strong — top quartile for SaaS |
    | 120%+ | Exceptional — "negative churn" |

    Best-in-class enterprise SaaS companies (Snowflake, Twilio at peak) have
    reported 130–160% NRR, meaning revenue from existing cohorts nearly doubled
    within 12 months through expansion.

    ## Why NRR above 100% is transformative

    At 120% NRR, even zero new customer acquisition produces 20% annual growth.
    The business can grow its revenue base purely by upselling and expanding
    existing customers — this is the SaaS "negative churn" holy grail.

    At 95% NRR, you must replace 5% of your starting MRR just to stay flat —
    before you grow even a dollar. Acquisition becomes a treadmill.

    ## What drives NRR above 100%

    - **Seat-based or usage-based pricing**: revenue grows as the customer grows
    - **Strong onboarding**: customers who adopt the product fully expand more
    - **Net promoter score**: happy customers upgrade, unhappy ones churn
    - **Customer success outreach**: proactive expansion signals = more upsells
    - **Annual vs monthly**: annual customers expand more and churn less

    ## Frequently asked questions

    **What does this calculator do?**
    Calculate Net Revenue Retention and Gross Revenue Retention from starting MRR,
    expansion, contraction, and churn MRR inputs.

- slug: arr-calculator
  title: "ARR Calculator"
  nav_title: "ARR Calculator"
  short: "Convert MRR to Annual Recurring Revenue, calculate YoY growth against last year's ARR, and project ARR 12 and 24 months out at a given monthly growth rate."
  new: true
  date_added: "2026-06-17"
  category: SaaS Metrics
  js: arr-calculator.js
  keywords: ["ARR calculator", "annual recurring revenue calculator", "MRR to ARR", "ARR growth calculator", "SaaS ARR", "ARR projection calculator"]
  howto_steps:
    - name: "Enter your current MRR"
      text: "Monthly Recurring Revenue — the sum of all recurring subscription revenue this month."
    - name: "Enter ARR from 12 months ago"
      text: "Optional: enter your ARR from a year ago to see Year-over-Year growth percentage — the primary growth metric investors track."
    - name: "Enter monthly growth rate"
      text: "Optional: your expected monthly MRR growth rate. The calculator projects ARR at 12 and 24 months at this rate using compound growth."
    - name: "Read the results"
      text: "ARR = MRR × 12. YoY growth shows how fast you're scaling. 12/24-month projections show where the business is heading at current growth."
  body: |
    Annual Recurring Revenue (ARR) is the annualized value of all recurring subscription
    contracts. For most SaaS businesses, it's simply MRR × 12.

    ## ARR vs MRR

    **ARR = MRR × 12** — for pure monthly subscription businesses.

    For businesses with annual contracts, ARR is calculated directly from contract
    values: a $12,000/year contract contributes $12,000 ARR regardless of billing
    frequency.

    The MRR × 12 method is an approximation that works well for monthly billing.
    For annual or multi-year contracts, calculate ARR from contract terms directly.

    ## What counts as ARR (and what doesn't)

    Include:
    - Monthly or annual subscription fees
    - Recurring add-ons and seat fees
    - Recurring professional services (fixed monthly retainer)

    Exclude:
    - One-time setup fees
    - Non-recurring professional services
    - Usage-based revenue that's genuinely variable (some companies include a
      normalized baseline, but conservative ARR excludes it)

    ## ARR milestones and what they unlock

    | ARR | What it means |
    |---|---|
    | $1M | Standard Series A threshold (some investors require this) |
    | $3M | Most Series A investors require > $3M with 100%+ YoY growth |
    | $10M | Series B territory; efficiency metrics start mattering |
    | $25M+ | Series C/D; institutional growth investors engage |
    | $100M+ | IPO-eligible; public market comparables apply |

    ## YoY growth rate benchmarks

    Investor shorthand: you want to grow ARR at **"T2D3"** — triple, triple, double,
    double, double — meaning 3× growth for 2 years, then 2× for 3 years.

    | ARR range | "Good" YoY | "Great" YoY |
    |---|---|---|
    | < $1M | 100%+ | 200%+ |
    | $1M–$5M | 80–100% | 150%+ |
    | $5M–$20M | 60–80% | 100%+ |
    | $20M–$100M | 40–60% | 80%+ |
    | $100M+ | 25–40% | 60%+ |

    ## ARR projection formula

    **Projected ARR = Current ARR × (1 + Monthly Growth Rate)^Months**

    At $1M ARR growing 8%/month:
    - 12 months: $1M × (1.08)^12 = **$2.52M**
    - 24 months: $1M × (1.08)^24 = **$6.34M**

    ## Frequently asked questions

    **What does this calculator do?**
    Convert MRR to ARR, calculate Year-over-Year growth versus last year's ARR,
    and project ARR at 12 and 24 months given a monthly growth rate.

- slug: ebitda-calculator
  title: "EBITDA Calculator"
  nav_title: "EBITDA Calculator"
  short: "Calculate EBITDA from revenue, COGS, and operating expenses — plus EBITDA margin, EBIT after depreciation, and implied valuation at a given EBITDA multiple."
  new: true
  date_added: "2026-06-17"
  category: Business Math
  js: ebitda-calculator.js
  keywords: ["EBITDA calculator", "EBITDA margin calculator", "EBIT calculator", "enterprise value calculator", "EBITDA multiple valuation", "operating profit calculator"]
  howto_steps:
    - name: "Enter your annual revenue"
      text: "Total revenue for the period — before any deductions."
    - name: "Enter cost components"
      text: "Fill in COGS (cost of goods sold), operating expenses, SG&A (sales, general and administrative), and R&D. EBITDA = Revenue minus all of these."
    - name: "Optionally enter D&A for EBIT"
      text: "Depreciation and amortization are non-cash charges. Subtracting D&A from EBITDA gives EBIT (earnings before interest and taxes)."
    - name: "Optionally enter an EBITDA multiple"
      text: "Enter an industry EBITDA multiple to see the implied enterprise valuation. Multiples vary by industry — software SaaS typically trades at 8–20× EBITDA."
  body: |
    EBITDA (Earnings Before Interest, Taxes, Depreciation, and Amortization) is the most
    widely used metric for comparing operational profitability across companies and capital
    structures.

    ## The EBITDA formula

    **EBITDA = Revenue − COGS − Operating Expenses − SG&A − R&D**

    Or equivalently: **EBITDA = Net Income + Interest + Taxes + Depreciation + Amortization**

    At $5M revenue, $750k COGS, $1.5M OpEx, $500k SG&A, $750k R&D:
    - EBITDA = $5M − $750k − $1.5M − $500k − $750k = **$1.5M**
    - EBITDA margin = $1.5M ÷ $5M = **30%**

    ## EBITDA vs EBIT vs Net Income

    | Metric | Includes | Excludes |
    |---|---|---|
    | EBITDA | All operating costs | Interest, taxes, D&A |
    | EBIT | EBITDA minus D&A | Interest, taxes |
    | Net Income | Everything | Nothing |

    EBITDA is popular because it removes the distortion from:
    - Capital structure (interest payments differ by how much debt a company carries)
    - Tax jurisdiction (tax rates vary by country and structure)
    - Capital intensity (depreciation depends on asset base, not operations)

    This makes it easier to compare a software company (low D&A) with a manufacturing
    company (high D&A) on an apples-to-apples operational basis.

    ## EBITDA margin benchmarks

    | Industry | Typical EBITDA margin |
    |---|---|
    | Software / SaaS | 15–40% |
    | B2B services | 10–20% |
    | E-commerce | 5–15% |
    | Healthcare | 10–25% |
    | Manufacturing | 8–15% |
    | Retail | 3–8% |

    High-margin SaaS businesses at scale can achieve 30–40%+ EBITDA margins.
    Early-stage SaaS typically runs at negative EBITDA while investing in growth.

    ## EBITDA multiples and valuation

    Enterprise value (EV) is commonly expressed as a multiple of EBITDA:

    **Enterprise Value = EBITDA × Industry Multiple**

    Typical multiples:
    - High-growth SaaS: 8–20× EBITDA
    - Profitable software: 6–12× EBITDA
    - Professional services: 4–8× EBITDA
    - Manufacturing: 3–6× EBITDA
    - Retail: 2–5× EBITDA

    A company with $1.5M EBITDA at a 10× multiple has an implied EV of $15M.

    ## Limitations of EBITDA

    EBITDA can be misleading when:
    - CapEx is high (D&A excluded, but real capital spend remains)
    - Working capital is negative (growth companies often have negative working capital)
    - Non-recurring items are buried in operating expenses

    Warren Buffett famously criticized "EBITDA earnings" as a management tool for
    obscuring real economics. Use it for comparison and benchmarking, not as a
    substitute for cash flow analysis.

    ## Frequently asked questions

    **What does this calculator do?**
    Calculate EBITDA, EBITDA margin, EBIT after depreciation/amortization, and
    implied enterprise valuation from revenue and cost components.

- slug: cash-conversion-cycle-calculator
  title: "Cash Conversion Cycle Calculator"
  nav_title: "Cash Conversion Cycle"
  short: "Calculate Days Inventory Outstanding, Days Sales Outstanding, and Days Payable Outstanding — and combine them into the Cash Conversion Cycle to measure working capital efficiency."
  new: true
  date_added: "2026-06-17"
  category: Business Math
  js: cash-conversion-cycle-calculator.js
  keywords: ["cash conversion cycle calculator", "CCC calculator", "days inventory outstanding", "days sales outstanding", "days payable outstanding", "working capital efficiency"]
  howto_steps:
    - name: "Enter average inventory and annual COGS"
      text: "DIO = Average Inventory ÷ COGS × 365. For services/SaaS businesses with no inventory, DIO is 0 — skip this field."
    - name: "Enter accounts receivable and revenue"
      text: "DSO = Average Accounts Receivable ÷ Revenue × 365. Lower DSO = faster collection. High DSO often indicates payment terms or collection issues."
    - name: "Enter accounts payable and COGS"
      text: "DPO = Average Accounts Payable ÷ COGS × 365. Higher DPO = you pay suppliers later = better for cash flow."
    - name: "Interpret the CCC"
      text: "CCC = DIO + DSO - DPO. Lower (or negative) CCC is better — it means you turn operations into cash quickly. Negative CCC means you collect before you pay."
  body: |
    The Cash Conversion Cycle (CCC) measures how many days a company's cash is tied up
    in operations — from paying for inventory or inputs to collecting revenue from customers.

    ## The CCC formula

    **CCC = DIO + DSO − DPO**

    Where:
    - **DIO** (Days Inventory Outstanding) = Average Inventory ÷ COGS × 365
    - **DSO** (Days Sales Outstanding) = Average AR ÷ Revenue × 365
    - **DPO** (Days Payable Outstanding) = Average AP ÷ COGS × 365

    ## Example calculation

    A business with:
    - Average inventory: $500k
    - Annual COGS: $3M
    - Average AR: $400k
    - Annual revenue: $5M
    - Average AP: $200k

    - DIO = $500k ÷ $3M × 365 = 60.8 days
    - DSO = $400k ÷ $5M × 365 = 29.2 days
    - DPO = $200k ÷ $3M × 365 = 24.3 days
    - **CCC = 60.8 + 29.2 − 24.3 = 65.7 days**

    The company has $65.7 days of cash tied up in working capital on average.

    ## Negative CCC: the holy grail

    Some businesses — particularly SaaS (customers pay upfront) and retail giants
    (sell before paying suppliers) — achieve negative CCC. That means they collect
    cash before they need to pay their suppliers.

    Amazon famously operated with a negative CCC for years, essentially using
    supplier credit as free working capital to fund growth.

    ## CCC for SaaS businesses

    Pure SaaS businesses typically have:
    - DIO = 0 (no physical inventory)
    - DSO = depends on payment terms (0 for monthly subscriptions, 30–60 for invoiced enterprise)
    - DPO = depends on supplier payment terms (usually 30–60 days)

    SaaS with monthly card billing and standard payables often has CCC near 0 or negative.

    ## How to improve CCC

    **Reduce DIO**: Faster inventory turns through better demand forecasting, reduced
    safety stock, or just-in-time procurement.

    **Reduce DSO**: Offer early payment discounts, automate collections, shorten
    payment terms for new customers, implement automatic billing.

    **Increase DPO**: Negotiate longer payment terms with suppliers (60–90 days vs
    30 days). Large companies do this systematically.

    ## Frequently asked questions

    **What does this calculator do?**
    Calculate Days Inventory Outstanding, Days Sales Outstanding, Days Payable
    Outstanding, and combine them into the Cash Conversion Cycle.

- slug: burn-multiple-calculator
  title: "Burn Multiple Calculator"
  nav_title: "Burn Multiple"
  short: "Calculate your burn multiple — net cash burn divided by net new ARR — the capital efficiency metric VCs use to evaluate how efficiently you're converting spending into growth."
  new: true
  date_added: "2026-06-17"
  category: SaaS Metrics
  js: burn-multiple-calculator.js
  keywords: ["burn multiple calculator", "SaaS burn multiple", "capital efficiency SaaS", "net burn ARR ratio", "SaaS efficiency metrics", "burn rate calculator"]
  howto_steps:
    - name: "Enter annual net burn"
      text: "Net burn = cash spent minus revenue collected during the year. If you spent $5M and collected $2M in subscriptions, net burn is $3M."
    - name: "Enter net new ARR"
      text: "Net new ARR = new ARR added minus churned ARR during the year. If you added $3M in new ARR but churned $1M, net new ARR is $2M."
    - name: "Optionally enter cash and new customers"
      text: "Cash on hand calculates runway at current burn rate. New customers estimates CAC (burn / new customers acquired)."
    - name: "Interpret the burn multiple"
      text: "Under 1x is world-class. 1-2x is good. 2-3x is acceptable at early stage. Over 3x signals capital inefficiency — each dollar of spending generates less than $0.33 in ARR."
  body: |
    Burn Multiple is one of the most important capital efficiency metrics in SaaS.
    It was popularized by David Sacks and measures how much you're spending to
    generate each dollar of net new ARR.

    ## The formula

    **Burn Multiple = Net Cash Burn ÷ Net New ARR**

    At $3M annual net burn and $2M net new ARR: Burn Multiple = **1.5×**

    This means you spend $1.50 in cash to generate $1 of recurring revenue.

    ## Net burn vs gross burn

    **Gross burn**: Total cash spent per period (all expenses)
    **Net burn**: Gross burn minus revenue collected

    Burn Multiple uses net burn because it accounts for the revenue you're
    already collecting. A company at $5M gross burn but $3M in revenue
    collection has $2M net burn — and the burn multiple reflects actual
    capital efficiency.

    ## Burn Multiple benchmarks

    | Burn Multiple | Interpretation |
    |---|---|
    | < 0 | Generating ARR faster than burning cash — exceptional |
    | 0–1× | World-class capital efficiency |
    | 1–1.5× | Excellent — top quartile |
    | 1.5–2× | Good — acceptable for rapid growth |
    | 2–3× | Borderline — investors will flag at Series B |
    | > 3× | Concerning — significant capital efficiency problem |

    ## Why burn multiple matters more than burn rate alone

    A $500k/month burn rate tells you nothing without context. Is it generating
    $500k/month in new ARR, or $100k/month? The first is fine; the second is burning
    5× for every dollar of ARR — a serious problem.

    Burn Multiple gives the context. Two companies with the same burn rate might
    have very different capital efficiency depending on their growth velocity.

    ## Burn Multiple and the Rule of 40

    Both metrics assess SaaS efficiency, but from different angles:
    - **Rule of 40**: Revenue growth + EBITDA margin ≥ 40 (operating efficiency of the P&L)
    - **Burn Multiple**: Cash burn / net new ARR (capital efficiency of growth spending)

    A company can pass Rule of 40 but have a poor burn multiple if it's growing
    with unsustainable cash spending relative to ARR additions.

    ## How to improve burn multiple

    1. **Reduce CAC** — more ARR from the same S&M spend
    2. **Reduce churn** — net new ARR improves when churned ARR falls
    3. **Increase ACV** — same headcount, higher ARR per deal
    4. **Expand existing customers** — expansion ARR requires near-zero additional burn
    5. **Automate operational work** — reduce gross burn without cutting growth investment

    ## Frequently asked questions

    **What does this calculator do?**
    Calculate burn multiple from net burn and net new ARR, plus runway and
    implied CAC from cash on hand and new customers.

- slug: saas-quick-ratio-calculator
  title: "SaaS Quick Ratio Calculator"
  nav_title: "Quick Ratio"
  short: "Calculate your SaaS Quick Ratio — growth MRR divided by lost MRR — to measure whether your business is growing efficiently or just replacing churn."
  new: true
  date_added: "2026-06-17"
  category: SaaS Metrics
  js: saas-quick-ratio-calculator.js
  keywords: ["saas quick ratio calculator", "saas quick ratio", "mrr quick ratio", "saas growth quality metric", "quick ratio saas benchmark"]
  howto_steps:
    - name: "Enter new MRR"
      text: "MRR added from brand-new customers this month. Do not include expansion revenue from existing customers — keep that separate."
    - name: "Enter expansion MRR"
      text: "Additional MRR from existing customers upgrading plans, adding seats, or expanding usage. This is a key lever for improving your quick ratio."
    - name: "Enter contraction MRR"
      text: "MRR lost from existing customers who downgraded their plan. They're still paying — just less."
    - name: "Enter churned MRR"
      text: "MRR completely lost from customers who cancelled. Combined with contraction, this is your total lost MRR denominator."
    - name: "Interpret your Quick Ratio"
      text: "Quick Ratio = (New MRR + Expansion MRR) / (Contraction MRR + Churned MRR). 4x+ = exceptional. 2-4x = healthy. < 2x = churn is offsetting too much of your growth."
  body: |
    The SaaS Quick Ratio measures the quality of your growth. Coined by Mamoon Hamid at
    Kleiner Perkins, it asks: for every dollar of MRR you lose, how many dollars of new
    MRR are you generating?

    ## The formula

    **Quick Ratio = (New MRR + Expansion MRR) / (Contraction MRR + Churned MRR)**

    A company adding $50k new MRR and $15k expansion MRR, while losing $5k to contraction
    and $10k to churn, has a Quick Ratio of 65/15 = **4.3x** — exceptional.

    ## Why Quick Ratio matters more than gross growth

    Two companies can have identical gross MRR growth rates but very different quick ratios.
    A company at 30% gross MRR growth with 20% churn has a Quick Ratio of ~1.5x — the
    churn is eating most of the growth. Another company at 30% gross growth with 5% churn
    has a Quick Ratio of ~6x — a fundamentally healthier business.

    Investors use Quick Ratio to separate genuine growth from "running on a treadmill."

    ## Benchmarks

    | Quick Ratio | Assessment |
    |---|---|
    | > 4x | Exceptional — world-class SaaS growth quality |
    | 2–4x | Healthy — fundable, investable growth |
    | 1–2x | Marginal — growing faster than losing, but barely |
    | < 1x | Declining — losing more MRR than gaining |

    ## Quick Ratio vs NRR vs Burn Multiple

    - **NRR (Net Revenue Retention)**: % of last year's ARR you still have + expansion. Excludes new logos.
    - **Quick Ratio**: Growth MRR / lost MRR. Includes new logos. Measures acquisition + retention together.
    - **Burn Multiple**: Net burn / net new ARR. Measures capital efficiency of all that growth.

    The Quick Ratio is the best single metric for measuring the *quality* of your MRR growth.
    A high Quick Ratio with a good Burn Multiple and high NRR signals a capital-efficient,
    sticky, growing SaaS business — the trifecta investors want to see.

    ## How to improve your Quick Ratio

    1. **Expand existing accounts** — expansion MRR costs 3–7x less than acquiring new logos
    2. **Reduce logo churn** — one churn prevention saves as much as one new acquisition
    3. **Segment your churn** — identify which cohorts churn most and fix the onboarding for them
    4. **Build expansion loops** — usage-based pricing, seat expansion, and add-on modules all drive expansion MRR
    5. **Increase new MRR** — growth always helps, but retention improvements have compounding effects

    ## Frequently asked questions

    **What does this calculator do?**
    Calculate your SaaS Quick Ratio from monthly MRR movements to measure the quality and
    sustainability of your revenue growth.

- slug: magic-number-calculator
  title: "Magic Number Calculator"
  nav_title: "Magic Number"
  short: "Calculate your SaaS Magic Number — net new ARR divided by prior quarter S&M spend — to measure how efficiently your go-to-market converts sales investment into revenue."
  new: true
  date_added: "2026-06-17"
  category: SaaS Metrics
  js: magic-number-calculator.js
  keywords: ["magic number calculator saas", "saas magic number", "magic number formula", "GTM efficiency calculator", "sales marketing efficiency SaaS"]
  howto_steps:
    - name: "Enter net new ARR"
      text: "Total net new ARR added this quarter: new logos + expansion MRR × 4, minus churn ARR × 4. Use the same period as your S&M spend."
    - name: "Enter prior quarter S&M spend"
      text: "Total sales and marketing spend from the PREVIOUS quarter. The Magic Number is a lagged metric — last quarter's spend drives this quarter's ARR."
    - name: "Optionally add new customers and gross margin"
      text: "New customers lets the calculator compute implied CAC. Gross margin enables GTM payback period calculation."
    - name: "Interpret your Magic Number"
      text: "1.5+ = exceptional, accelerate spend. 0.75–1.5 = good, invest steadily. 0.5–0.75 = marginal, fix before scaling. Under 0.5 = diagnose GTM before investing more."
  body: |
    The Magic Number measures the efficiency of your go-to-market motion. It was popularized
    by Lars Dalgaard and later referenced extensively by David Sacks and investors at scale.

    ## The formula

    **Magic Number = Net New ARR (this quarter) / S&M Spend (prior quarter)**

    The one-quarter lag is intentional: sales and marketing spend takes time to produce
    bookings. Using prior-quarter spend captures the actual return on that investment.

    At $500k net new ARR and $400k prior-quarter S&M spend: Magic Number = **1.25** —
    solid, bordering on excellent.

    ## Magic Number benchmarks

    | Magic Number | Interpretation |
    |---|---|
    | > 1.5 | Exceptional — step on the gas |
    | 0.75–1.5 | Good — invest steadily in S&M |
    | 0.5–0.75 | Marginal — improve efficiency before scaling |
    | < 0.5 | Poor — diagnose CAC and close rate issues |

    ## Magic Number vs Burn Multiple

    Both measure efficiency, from different angles:
    - **Magic Number**: GTM-only efficiency. Net new ARR / S&M spend. Ignores R&D, G&A.
    - **Burn Multiple**: Total efficiency. Net burn / net new ARR. Includes all spending.

    A company can have a great Magic Number (efficient S&M) but a poor Burn Multiple
    (overspending on R&D or G&A relative to growth). Both metrics are needed.

    ## When Magic Number matters most

    Magic Number is most useful from $1M ARR to $20M ARR — the stage where you're
    actively scaling a repeatable GTM motion. At very early stage (pre-PMF), it's
    noise. At growth stage, it's a signal to optimize before Series B.

    Investors at Sequoia, a16z, and Bessemer all use variants of Magic Number as
    a quick filter in SaaS diligence.

    ## Frequently asked questions

    **What does this calculator do?**
    Calculate your SaaS Magic Number from quarterly net new ARR and prior-quarter S&M
    spend, with implied CAC and GTM payback period.

- slug: working-capital-calculator
  title: "Working Capital Calculator"
  nav_title: "Working Capital"
  short: "Calculate working capital, current ratio, and quick ratio from your balance sheet — the core liquidity metrics for measuring a business's short-term financial health."
  new: true
  date_added: "2026-06-17"
  category: Business Math
  js: working-capital-calculator.js
  keywords: ["working capital calculator", "current ratio calculator", "quick ratio calculator", "working capital formula", "liquidity ratio calculator"]
  howto_steps:
    - name: "Enter current assets"
      text: "Total assets convertible to cash within 12 months: cash, accounts receivable, short-term investments, and inventory."
    - name: "Enter current liabilities"
      text: "Obligations due within 12 months: accounts payable, short-term debt, accrued expenses, deferred revenue due this year."
    - name: "Enter inventory (optional)"
      text: "Inventory value for the Quick Ratio calculation. Quick Ratio excludes inventory because it's less liquid — it measures whether you can pay short-term obligations without selling stock."
    - name: "Enter annual revenue (optional)"
      text: "Enables Days Working Capital calculation — how many days of revenue your working capital represents."
    - name: "Interpret current ratio"
      text: "Current Ratio above 2.0x is strong. 1.5–2.0x is healthy. 1.0–1.5x is tight but solvent. Below 1.0x is a liquidity warning — current liabilities exceed current assets."
  body: |
    Working capital is the difference between a business's current assets and current
    liabilities. It measures short-term liquidity — the operational buffer that keeps
    daily business running without a cash crisis.

    ## The formula

    **Working Capital = Current Assets − Current Liabilities**

    If current assets are $500k and current liabilities are $200k, working capital is $300k.
    This $300k represents the operational cash cushion.

    ## Current Ratio

    **Current Ratio = Current Assets / Current Liabilities**

    At $500k / $200k = 2.5x. For every $1 of short-term obligations, there are $2.50 of
    liquid assets available.

    ## Quick Ratio (Acid Test)

    **Quick Ratio = (Current Assets − Inventory) / Current Liabilities**

    The Quick Ratio excludes inventory because converting stock to cash takes time.
    It's a more conservative measure of immediate liquidity.

    ## Benchmarks

    | Current Ratio | Assessment |
    |---|---|
    | > 2.0x | Strong — ample short-term buffer |
    | 1.5–2.0x | Healthy — comfortable liquidity |
    | 1.0–1.5x | Tight — limited margin for error |
    | < 1.0x | Warning — potential liquidity risk |

    ## Negative working capital

    Some businesses — particularly SaaS and subscription companies — can operate with
    negative working capital. If customers pay annually upfront (creating deferred
    revenue = a current liability), working capital will be negative while the business
    is perfectly healthy.

    Amazon famously ran negative working capital for years: customers paid instantly,
    while Amazon paid suppliers on 30–45 day terms. The gap funded operations.

    ## Working capital and the Cash Conversion Cycle

    Working capital is the static balance; the [Cash Conversion Cycle](/tools/cash-conversion-cycle-calculator/)
    is the dynamic flow. A business might have positive working capital but a terrible CCC
    if receivables take 90+ days to collect. Track both metrics together.

    ## Frequently asked questions

    **What does this calculator do?**
    Calculate working capital, current ratio, quick ratio, and days working capital from
    your current assets and liabilities.

- slug: roi-calculator
  title: "ROI Calculator"
  nav_title: "ROI Calculator"
  short: "Calculate return on investment (ROI), annualized ROI, net profit, and break-even period for any business investment, marketing campaign, or capital allocation decision."
  new: true
  date_added: "2026-06-17"
  category: Business Math
  js: roi-calculator.js
  keywords: ["roi calculator", "return on investment calculator", "annualized roi calculator", "investment return calculator", "roi formula business"]
  howto_steps:
    - name: "Enter revenue or total returns"
      text: "Total revenue or financial returns generated by the investment over the period. For a marketing campaign, this is attributed revenue. For a capital investment, it's operating profit generated."
    - name: "Enter operating costs"
      text: "Ongoing costs associated with the investment over the period — staff time, ongoing expenses, maintenance. Excludes the initial capital investment."
    - name: "Enter initial investment"
      text: "The upfront cost: equipment purchase, campaign budget, software license, development cost, or capital deployed."
    - name: "Set time horizon"
      text: "How long over which to measure the ROI. For campaigns, use campaign duration. For capital investments, use the asset's useful life or your measurement window."
    - name: "Interpret annualized ROI"
      text: "Annualized ROI normalizes returns across different time periods, enabling apples-to-apples comparison between a 6-month campaign and a 3-year capital investment."
  body: |
    ROI (Return on Investment) is the most universal measure of investment efficiency.
    It expresses profit as a percentage of the capital deployed to generate it.

    ## The formula

    **ROI = (Net Profit / Investment Cost) × 100**

    Where Net Profit = Revenue − Operating Costs

    At $150k revenue, $50k costs, and $100k investment:
    - Net Profit = $100k
    - ROI = ($100k / $100k) × 100 = **100%**

    ## Annualized ROI

    **Annualized ROI = ((1 + ROI/100) ^ (1/years) − 1) × 100**

    Annualized ROI enables comparison across different time horizons. A 50% ROI over
    2 years is equivalent to ~22.5% annualized — not 25%. Compounding matters.

    ## What counts as a good ROI?

    Context is everything:
    - **Marketing**: 5:1 return ($5 revenue per $1 spent) = 400% ROI — consider good
    - **Real estate**: 8–12% annualized ROI — typical
    - **S&P 500 average**: ~10% annualized — the benchmark for passive capital
    - **SaaS investment**: target > 30% annualized within 3 years

    Any ROI below your cost of capital (typically 8–15%) means the investment destroys value.

    ## ROI vs other metrics

    | Metric | Measures | When to use |
    |---|---|---|
    | ROI | Total return on capital | Comparing investment efficiency |
    | ROAS | Revenue per ad dollar | Marketing-specific |
    | Payback period | Months to recoup investment | Cash flow planning |
    | NPV | Present value of future returns | Long-term capital allocation |

    ## Frequently asked questions

    **What does this calculator do?**
    Calculate ROI, annualized ROI, net profit, and break-even period from revenue,
    costs, and initial investment.

- slug: payback-period-calculator
  title: "Payback Period Calculator"
  nav_title: "Payback Period"
  short: "Calculate payback period in years and months — simple and discounted — to determine how long until an investment breaks even and starts generating net returns."
  new: true
  date_added: "2026-06-17"
  category: Business Math
  js: payback-period-calculator.js
  keywords: ["payback period calculator", "investment payback period", "discounted payback period", "break even investment calculator", "payback period formula"]
  howto_steps:
    - name: "Enter initial investment"
      text: "The upfront capital cost: equipment, software, development, or any one-time expenditure being analyzed."
    - name: "Enter annual net cash flow"
      text: "The annual cash generated by the investment after all operating costs. For equipment, this is labor savings plus additional revenue minus maintenance. Use the average annual figure."
    - name: "Set discount rate (optional)"
      text: "Your cost of capital or hurdle rate — typically 8–15% for most businesses. The discount rate enables discounted payback period, which accounts for the time value of money."
    - name: "Set analysis period"
      text: "The total years over which to evaluate the investment. Used to calculate total ROI at the end of the period."
    - name: "Compare simple vs discounted payback"
      text: "Simple payback ignores the time value of money. Discounted payback gives a more conservative estimate — always longer than simple payback. Use discounted for capital allocation decisions."
  body: |
    The payback period is the time required for an investment to generate cash flows
    sufficient to recover its initial cost. It's one of the most widely used capital
    budgeting metrics because it directly answers: "When do I get my money back?"

    ## Simple payback period formula

    **Payback Period (years) = Initial Investment / Annual Net Cash Flow**

    At $200k investment and $80k annual net cash flow: 200k / 80k = **2.5 years**.

    ## Discounted payback period

    The discounted payback period accounts for the time value of money by
    discounting each year's cash flow:

    **PV of Year N Cash Flow = Annual Cash Flow / (1 + Discount Rate) ^ N**

    The discounted payback period is always longer than the simple payback period.
    At 10% discount rate, a $200k investment with $80k/year simple payback of 2.5 years
    becomes approximately 3.1 years discounted.

    ## Payback period benchmarks

    | Payback Period | Assessment |
    |---|---|
    | < 6 months | Exceptional — rare, typically software/SaaS |
    | 6–12 months | Excellent — fast return on capital |
    | 1–2 years | Good — standard for marketing investments |
    | 2–4 years | Acceptable — typical for capital equipment |
    | > 4 years | Long — requires stable, predictable cash flows |

    ## Limitations of payback period

    Payback period ignores cash flows after the break-even point. A $200k investment
    with a 2-year payback that then generates $100k/year for 8 more years is far
    superior to one that generates exactly $80k/year — but they show identical
    payback periods.

    **Use payback period alongside ROI and NPV for complete capital budgeting analysis.**

    ## Frequently asked questions

    **What does this calculator do?**
    Calculate simple and discounted payback period from initial investment and annual
    net cash flows, plus ROI at the end of your analysis period.

- slug: arpu-calculator
  title: "ARPU Calculator (Average Revenue Per User)"
  nav_title: "ARPU Calculator"
  short: "Calculate Average Revenue Per User (ARPU) from MRR and active users — the core SaaS pricing metric for benchmarking, forecasting, and identifying pricing opportunities."
  new: true
  date_added: "2026-06-17"
  category: SaaS Metrics
  js: arpu-calculator.js
  keywords: ["arpu calculator", "average revenue per user calculator", "arpu saas", "arpu formula", "monthly arpu calculation"]
  howto_steps:
    - name: "Enter total MRR"
      text: "Your total Monthly Recurring Revenue from all active paying customers. This should match the MRR figure from your billing platform — exclude one-time revenue, setup fees, and churned customers."
    - name: "Enter active paying users"
      text: "Count of customers actively paying for your product this month. Exclude free plan users, trial users, and churned accounts. For seat-based products, count unique paying accounts (not seats)."
    - name: "Set a target MRR (optional)"
      text: "Your MRR goal. The calculator shows how many users you'd need at your current ARPU to hit that target."
    - name: "Interpret your ARPU"
      text: "ARPU above $500/month indicates mid-market or enterprise pricing. $50–$500 is SMB territory. Below $50 is prosumer or freemium — requires very high volume to generate meaningful MRR."
  body: |
    ARPU (Average Revenue Per User) is the monthly revenue generated per paying customer.
    It's a fundamental SaaS metric that directly determines how many customers you need
    to reach any given MRR target.

    ## The formula

    **ARPU = Total MRR / Number of Active Paying Users**

    At $50,000 MRR and 500 active users: ARPU = **$100/month**.

    ## ARPU and required scale

    ARPU determines the scale required to reach your MRR target:

    | ARPU | Users needed for $1M MRR |
    |---|---|
    | $10/month | 100,000 users |
    | $100/month | 10,000 users |
    | $500/month | 2,000 users |
    | $1,000/month | 1,000 users |
    | $5,000/month | 200 users |

    High ARPU = enterprise motion (complex sales, long cycles, high ACV).
    Low ARPU = product-led motion (self-serve, viral, high volume required).

    ## ARPU vs ACV

    **ARPU** is monthly revenue per user, typically calculated from MRR.
    **ACV** (Annual Contract Value) is annual revenue per customer, from ARR.
    ACV = ARPU × 12.

    ACV is used in enterprise sales; ARPU in SaaS analytics and unit economics.

    ## How to increase ARPU

    1. **Raise prices** — the highest-leverage ARPU lever. Even a 10% price increase
       with 5% churn adds net 5% to MRR with zero additional customers.
    2. **Upsell to higher tiers** — move customers up the pricing ladder.
    3. **Usage-based components** — add metered billing that scales with usage.
    4. **Expand seats** — for team products, per-seat pricing grows ARPU as teams grow.
    5. **Annual billing** — doesn't change ARPU but improves cash flow on the same revenue.

    ## Frequently asked questions

    **What does this calculator do?**
    Calculate ARPU from total MRR and active users, plus users needed to hit a target
    MRR at your current ARPU.

- slug: revenue-run-rate-calculator
  title: "Revenue Run Rate Calculator"
  nav_title: "Run Rate"
  short: "Calculate annual revenue run rate from any period's revenue — project ARR from Q1 earnings, monthly revenue, or partial-year figures with optional growth rate compounding."
  new: true
  date_added: "2026-06-17"
  category: SaaS Metrics
  js: revenue-run-rate-calculator.js
  keywords: ["revenue run rate calculator", "annual run rate calculator", "arr run rate", "revenue run rate formula", "annualized revenue calculator"]
  howto_steps:
    - name: "Enter revenue for the period"
      text: "Total revenue generated during the measurement period. For Q1, enter January–March total. For a single month, enter that month's revenue."
    - name: "Enter period length in months"
      text: "How many months the revenue period covers: 1 for monthly, 3 for quarterly (Q1, Q2, Q3, Q4), 6 for half-year, 9 for 9-month YTD."
    - name: "Set monthly growth rate (optional)"
      text: "If you're growing month-over-month, enter your average growth rate. The calculator uses compound growth to project forward revenue — more accurate than simple linear projection."
    - name: "Set forward projection period"
      text: "How many months to project. The default is 12 months to show next-year run rate. Set to 24 or 36 for longer-term projections."
  body: |
    Run rate is an annualized estimate of revenue based on a shorter period's actual results.
    It's widely used when you don't have a full year of data — at a company's early stage,
    after a major shift, or when reporting partial-year results.

    ## The formula

    **Annual Run Rate = (Period Revenue / Period Months) × 12**

    At $250k revenue over 3 months: ($250k / 3) × 12 = **$1,000,000 ARR run rate**.

    ## Run rate vs ARR

    In SaaS, ARR (Annual Recurring Revenue) is calculated from your current MRR:
    ARR = MRR × 12. This is precise and based on contracted recurring revenue.

    Run rate is a more general term for any revenue annualized. It can apply to
    total revenue (including one-time), service revenue, or transactional revenue —
    not just subscription revenue.

    For pure SaaS businesses: **use ARR**, not run rate. ARR is more accurate because
    it's based on contracted recurring revenue, not a period average that may be skewed
    by seasonality or one-time items.

    For non-SaaS businesses: **run rate** is the correct term.

    ## When run rate is misleading

    **Seasonality**: A retailer who earns $500k in December but annualizes to $6M ARR
    is not a $6M/year business.

    **Growth periods**: Annualizing January revenue when you're growing 10% MoM will
    significantly understate full-year revenue.

    **One-time items**: Large consulting contracts or one-time sales inflate run rate
    without representing sustainable recurring revenue.

    Use compound growth rate projection for growing businesses — the calculator supports
    this with the optional monthly growth rate input.

    ## Frequently asked questions

    **What does this calculator do?**
    Calculate annual run rate from any period's revenue, with optional compound growth
    projection to estimate forward revenue.

- slug: sales-velocity-calculator
  title: "Sales Velocity Calculator"
  nav_title: "Sales Velocity"
  short: "Calculate sales velocity — the revenue your pipeline generates per day — from opportunities, win rate, ACV, and sales cycle length."
  new: true
  date_added: "2026-06-17"
  category: SaaS Metrics
  js: sales-velocity-calculator.js
  keywords: ["sales velocity calculator", "sales velocity formula", "pipeline velocity", "sales velocity metric", "revenue per day calculator"]
  howto_steps:
    - name: "Enter active opportunities"
      text: "Number of deals currently in your pipeline. Use your CRM count for active, qualified opportunities — exclude leads that haven't been qualified."
    - name: "Enter your win rate"
      text: "Percentage of qualified opportunities you close. Calculate as: (Closed Won deals / Total qualified opportunities) × 100. A typical B2B SaaS win rate is 20–30%."
    - name: "Enter average contract value"
      text: "ACV is the average annual value of a closed deal. For monthly SaaS: ACV = average MRR × 12. For annual contracts: ACV = average deal size."
    - name: "Enter average sales cycle length"
      text: "Days from opportunity creation to closed-won. Calculate from your CRM: average days between opportunity open date and close date for won deals in the last 90–180 days."
  body: |
    Sales velocity measures how fast your pipeline converts to revenue — specifically,
    how many dollars of revenue your sales team generates per day. It's one of the
    most actionable metrics in B2B sales because it decomposes revenue growth into
    four levers you can optimize independently.

    ## The formula

    **Sales Velocity = (Opportunities × Win Rate × ACV) / Sales Cycle Days**

    With 50 opportunities, 25% win rate, $8,000 ACV, and 90-day sales cycle:
    (50 × 0.25 × $8,000) / 90 = **$1,111/day** → **$405k annualized**

    ## The four levers

    Sales velocity has exactly four inputs, each of which is independently improvable:

    1. **# Opportunities** — more qualified pipeline. Adding 20% more opps adds 20%
       to velocity (holding other factors constant).
    2. **Win rate** — better qualification, stronger demos, improved follow-up. Raising
       win rate from 25% to 30% adds 20% to velocity.
    3. **ACV** — pricing, packaging, upsell at close. Raising ACV from $8k to $10k
       adds 25% to velocity.
    4. **Sales cycle** — shortening from 90 to 75 days adds 20% to velocity.

    Improving all four by 10% each compounds to **+46% velocity**, not +40%.

    ## Benchmarks by segment

    | Segment | Typical Sales Velocity |
    |---|---|
    | SMB SaaS (<$5k ACV) | $200–500/day |
    | Mid-Market ($5k–$50k ACV) | $500–2,000/day |
    | Enterprise (>$50k ACV) | $2,000–10,000+/day |

    ## What sales velocity tells you

    **Low velocity with good win rate**: Pipeline coverage is too thin — add more
    opportunities at the top of funnel.

    **Low velocity with good pipeline**: Win rate or ACV is the problem — improve
    qualification or pricing.

    **Decent velocity with long cycle**: Shortening the sales cycle has outsized
    impact because it appears in the denominator.

    ## Frequently asked questions

    **What does this calculator do?**
    Calculate sales velocity (revenue per day) from your pipeline size, win rate,
    average contract value, and sales cycle length.

- slug: free-cash-flow-calculator
  title: "Free Cash Flow Calculator"
  nav_title: "FCF"
  short: "Calculate free cash flow (operating cash flow minus capital expenditures), FCF margin, and FCF yield — the metric investors use to assess true cash generation."
  new: true
  date_added: "2026-06-17"
  category: Business Math
  js: free-cash-flow-calculator.js
  keywords: ["free cash flow calculator", "fcf calculator", "free cash flow formula", "fcf margin calculator", "operating cash flow calculator"]
  howto_steps:
    - name: "Enter operating cash flow"
      text: "Operating cash flow (OCF) is found on the cash flow statement. For private companies: OCF = Net Income + Depreciation & Amortization − Change in Working Capital. For public companies: take the number directly from the cash flow statement."
    - name: "Enter capital expenditures"
      text: "Capital expenditures are purchases of property, plant, and equipment (PP&E). For SaaS companies, capex is typically low (servers, office equipment). Find it in the investing activities section of the cash flow statement."
    - name: "Enter annual revenue (for margin)"
      text: "Your total annual revenue for the same period. Used to calculate FCF margin — a more meaningful comparison metric than absolute FCF."
    - name: "Enter market cap (optional)"
      text: "Market capitalization for public companies. Used to calculate FCF yield: a higher yield means you're getting more cash generation per dollar of market cap. Comparable to earnings yield for valuation."
  body: |
    Free cash flow (FCF) is the cash a business generates after accounting for capital
    expenditures. It's the truest measure of a company's ability to generate cash —
    more reliable than earnings (which can be distorted by accounting choices) and
    more actionable than revenue growth alone.

    ## The formula

    **FCF = Operating Cash Flow − Capital Expenditures**

    A company with $500k OCF and $80k capex generates **$420k FCF**.

    ## Why FCF matters more than EBITDA

    EBITDA adds back non-cash charges to normalize earnings across capital structures.
    FCF goes further: it accounts for capital reinvestment required to sustain the
    business. A company spending heavily on equipment might have strong EBITDA but
    negative FCF — it's not actually retaining cash.

    For SaaS companies, the gap between EBITDA and FCF is usually small (capex is
    minimal). For hardware, manufacturing, or infrastructure businesses, capex can
    consume 30–50% of operating cash flow, making FCF very different from EBITDA.

    ## FCF margin benchmarks

    | Company type | FCF Margin |
    |---|---|
    | Top-tier SaaS (Shopify, Veeva) | 20–30% |
    | Typical profitable SaaS | 10–20% |
    | Early-stage / growth SaaS | 0–10% |
    | High-capex businesses | -10–+5% |

    ## FCF yield for valuation

    FCF yield = FCF / Market Cap × 100

    A 5% FCF yield means you're paying 20× FCF. A 2% yield means 50× FCF.
    Generally: FCF yields above 4–5% are considered cheap; below 1.5% is expensive.
    Adjust for growth expectations — high-growth companies justify lower yields.

    ## FCF vs free cash flow to equity (FCFE)

    FCF is firm-level cash generation before debt service. FCFE subtracts debt
    payments: FCFE = FCF − (Debt Repayment − New Debt). For equity investors
    valuing a leveraged company, FCFE is more relevant.

    ## Frequently asked questions

    **What does this calculator do?**
    Calculate free cash flow from operating cash flow and capex, plus FCF margin
    and optional FCF yield for valuation context.

- slug: equity-dilution-calculator
  title: "Equity Dilution Calculator"
  nav_title: "Equity Dilution"
  short: "Model how a funding round dilutes founder and investor ownership — calculate post-money valuation, new shares issued, and your diluted ownership percentage."
  new: true
  date_added: "2026-06-17"
  category: Business Math
  js: equity-dilution-calculator.js
  keywords: ["equity dilution calculator", "dilution calculator startup", "pre money post money calculator", "founder dilution calculator", "funding round dilution"]
  howto_steps:
    - name: "Enter pre-money valuation"
      text: "The company's agreed valuation before the investment comes in. This is what you negotiate with investors. Pre-money does not include the investment — if investors value the company at $5M and invest $1M, the pre-money is $5M."
    - name: "Enter investment amount"
      text: "Total new capital raised in this round. For a simple round, this is one number. For tranched rounds, use the total committed (or just the first tranche if modeling step-by-step)."
    - name: "Enter current shares outstanding"
      text: "Total shares issued to all existing shareholders before the new round. Include founder shares, employee options (vested + unvested), previous investor shares, and any warrants."
    - name: "Enter your share count"
      text: "Your personal current share count (or any specific shareholder's shares). The calculator will show your ownership percentage before and after the round."
  body: |
    Equity dilution happens every time a company issues new shares. When investors
    receive new shares in exchange for their investment, the total share count increases
    and every existing shareholder owns a smaller percentage — even though their absolute
    share count is unchanged.

    ## The math

    **Pre-money valuation**: $5,000,000
    **Investment**: $1,000,000
    **Post-money valuation**: $6,000,000
    **Investor ownership**: $1M / $6M = **16.7%**

    If you held 60% pre-round (6M of 10M shares), you now hold:
    6M / (10M + 2M new shares) = **50%**

    Your ownership dropped from 60% to 50% — a **10pp dilution**.

    ## Pre-money vs post-money valuation

    These terms cause significant confusion in fundraising negotiations:

    **Pre-money**: Company value before the investment.
    **Post-money**: Pre-money + Investment amount.

    When an investor says "I'll invest $1M at a $5M valuation," clarify: is that $5M
    pre-money or post-money? The difference is significant:
    - $5M pre-money: investor gets 1M / 6M = **16.7%**
    - $5M post-money: investor gets 1M / 5M = **20%**

    Always specify pre-money in term sheets.

    ## Cumulative dilution across rounds

    Dilution compounds. Typical dilution by stage:

    | Round | Dilution | Cumulative founder ownership |
    |---|---|---|
    | Pre-seed ($500k) | 10–15% | 85–90% |
    | Seed ($1–2M) | 15–25% | 65–75% |
    | Series A ($5–10M) | 20–30% | 45–55% |
    | Series B ($20–40M) | 15–25% | 35–45% |

    Dilution at each round is on the post-round cap table, not the original. A founder
    at 85% post-seed who raises a 20% Series A retains 85% × 80% = **68%**.

    ## Option pool shuffle

    Investors often require creating or expanding an option pool before the funding
    round closes — increasing dilution on founders. A "20% post-money option pool"
    on a $6M round means creating shares equal to 20% of the post-round cap table.
    This dilutes founders before investors, increasing effective pre-money dilution.

    Model this by adding option pool shares to "current shares outstanding" before
    running the calculator.

    ## Frequently asked questions

    **What does this calculator do?**
    Model founder and investor dilution from a funding round: post-money valuation,
    new shares issued, and your ownership percentage after the round.

- slug: business-loan-calculator
  title: "Business Loan Calculator"
  nav_title: "Business Loan"
  short: "Calculate monthly payment, total interest, and total cost of a business loan — model SBA loans, term loans, and lines of credit with standard amortization."
  new: true
  date_added: "2026-06-17"
  category: Business Math
  js: business-loan-calculator.js
  keywords: ["business loan calculator", "small business loan calculator", "sba loan calculator", "loan payment calculator", "business loan monthly payment"]
  howto_steps:
    - name: "Enter loan amount"
      text: "The principal amount you're borrowing. For SBA 7(a) loans the max is $5M. For SBA microloans, up to $50k. Enter the amount you plan to request, not including fees or points."
    - name: "Enter annual interest rate (APR)"
      text: "The annual percentage rate on the loan. SBA 7(a) variable rates are typically WSJ Prime + 2.25–4.75%. Fixed-rate term loans for businesses range from 6–15% depending on creditworthiness. Check your term sheet for the stated APR."
    - name: "Enter loan term in months"
      text: "How long you have to repay the loan. SBA 7(a) loans: up to 10 years for working capital (120 months), up to 25 years for real estate. Term loans: 1–7 years. Lines of credit: typically 12 months, renewable."
    - name: "Enter monthly revenue (optional)"
      text: "Your current average monthly revenue, used to calculate debt service coverage. The calculator checks whether your monthly payment is within safe guidelines (under 10% of revenue for most businesses)."
  body: |
    A business loan calculator helps you understand the true cost of borrowing — not
    just the interest rate, but the actual monthly payment, total interest paid, and
    how much of each payment goes to principal vs interest.

    ## The amortization formula

    **Monthly Payment = P × [r(1+r)^n] / [(1+r)^n − 1]**

    Where:
    - P = principal (loan amount)
    - r = monthly interest rate (APR / 12 / 100)
    - n = number of monthly payments (term in months)

    For a $250,000 loan at 7.5% APR over 60 months:
    r = 0.075/12 = 0.00625
    Monthly payment = $250,000 × (0.00625 × 1.00625^60) / (1.00625^60 − 1) = **$5,009/month**
    Total paid = $300,553
    Total interest = $50,553 (20.2% of principal)

    ## SBA loan benchmarks

    | Loan type | Typical rate | Max term | Use case |
    |---|---|---|---|
    | SBA 7(a) | Prime + 2.25–4.75% | 10 years | General working capital, equipment |
    | SBA 7(a) real estate | Prime + 1.5–2.75% | 25 years | Commercial real estate |
    | SBA 504 | ~6–7% fixed | 10–25 years | Real estate + equipment |
    | SBA Microloan | 8–13% | 6 years | Small businesses, <$50k |

    Note: SBA loans require personal guarantee and good credit (650+ FICO typical).

    ## Debt service coverage ratio (DSCR)

    Lenders evaluate your ability to repay using DSCR:
    **DSCR = Annual Net Operating Income / Annual Debt Service**

    Most lenders require DSCR ≥ 1.25 — meaning for every $1 in annual debt payments,
    you earn $1.25 in NOI. A DSCR below 1.0 means the business can't cover debt service
    from operations.

    To calculate DSCR: take your annual net income before debt payments and divide by
    total annual loan payments (this calculator's monthly payment × 12).

    ## Interest cost comparison

    Loan term affects total interest paid dramatically:

    | $250k at 7.5% APR | Monthly payment | Total interest |
    |---|---|---|
    | 36 months | $7,758 | $29,277 |
    | 60 months | $5,009 | $50,553 |
    | 84 months | $3,866 | $74,762 |
    | 120 months | $2,978 | $107,336 |

    Longer terms lower monthly payments but significantly increase total interest. Choosing
    the right term depends on your cash flow needs and the cost of capital.

    ## Frequently asked questions

    **What does this calculator do?**
    Calculate monthly payment, total paid, and total interest for any business loan using
    the standard amortization formula. Enter loan amount, APR, and term in months.

- slug: inventory-turnover-calculator
  title: "Inventory Turnover Calculator"
  nav_title: "Inventory Turnover"
  short: "Calculate inventory turnover ratio (COGS ÷ average inventory), days sales of inventory (DSI), and sell-through rate — the core metrics for inventory health."
  new: true
  date_added: "2026-06-17"
  category: Business Math
  js: inventory-turnover-calculator.js
  keywords: ["inventory turnover calculator", "inventory turnover ratio", "days sales of inventory calculator", "sell-through rate calculator", "stock turnover calculator"]
  howto_steps:
    - name: "Enter annual COGS"
      text: "Cost of Goods Sold for the measurement period (usually annual or quarterly). COGS includes the direct cost of goods — purchase price, manufacturing costs, freight in. Excludes operating expenses like rent and salaries."
    - name: "Enter beginning and ending inventory"
      text: "Inventory value at the start and end of the measurement period (from your balance sheet). The calculator averages them to reduce the effect of seasonality. Use the same valuation method (FIFO, LIFO, or weighted average) consistently."
    - name: "Enter units sold and received (optional)"
      text: "For sell-through rate: units actually sold vs units received during the period. Useful for retail and e-commerce. Sell-through = units sold / units received × 100%. 80%+ is generally healthy for most retail categories."
  body: |
    Inventory turnover measures how efficiently a business converts inventory into sales.
    A high turnover means goods move quickly — less cash tied up in stock and lower
    carrying costs. Too high can signal stockouts; too low signals excess inventory
    and capital inefficiency.

    ## The formula

    **Inventory Turnover = COGS / Average Inventory**
    **Average Inventory = (Beginning Inventory + Ending Inventory) / 2**
    **Days Sales of Inventory (DSI) = 365 / Inventory Turnover**

    With $1.2M COGS and $200k average inventory:
    Turnover = $1.2M / $200k = **6.0×**
    DSI = 365 / 6.0 = **60.8 days** of inventory on hand

    ## Benchmarks by industry

    | Industry | Typical turnover | Typical DSI |
    |---|---|---|
    | Grocery / Supermarket | 20–30× | 12–18 days |
    | Fast fashion / Apparel | 6–12× | 30–60 days |
    | Electronics | 6–10× | 36–60 days |
    | Automotive parts | 4–8× | 45–90 days |
    | Furniture / Home | 3–6× | 60–120 days |
    | Industrial/B2B | 2–5× | 73–180 days |

    ## Why turnover matters

    **Cash flow**: Inventory is tied-up cash. $500k in stock at 3× turnover represents
    4 months of working capital locked up. At 6× turnover, it's 2 months. The difference
    can fund a major marketing campaign or buffer a slow season.

    **Carrying costs**: Warehousing, insurance, shrinkage, and obsolescence typically
    run 20–30% of inventory value annually. Reducing average inventory by $100k saves
    $20–30k/year in carrying costs.

    **Stockouts vs overstock**: Very high turnover (above industry benchmark) may signal
    you're selling out too quickly. Very low turnover means excess stock that may
    become obsolete.

    ## Improving inventory turnover

    1. **Better demand forecasting**: Use historical sales data and seasonality patterns
       to order closer to actual demand.
    2. **Tighter reorder points**: Set reorder triggers based on lead time + safety stock,
       not gut feel.
    3. **ABC analysis**: Rank SKUs by revenue contribution. A-items (top 20% of SKUs,
       80% of revenue) need tight management; C-items can carry lighter stock.
    4. **Faster supplier lead times**: Shorter lead times allow lower safety stock.
    5. **Liquidate dead inventory**: Run promotions on slow movers before they become
       write-offs.

    ## Sell-through rate

    **Sell-through = Units Sold / Units Received × 100%**

    Sell-through measures how much of what you bought you actually sold in a period.
    80%+ is generally healthy. Below 60% suggests over-buying or poor category selection.

    ## Frequently asked questions

    **What does this calculator do?**
    Calculate inventory turnover ratio, days sales of inventory (DSI), and sell-through
    rate from COGS and inventory values.

- slug: npv-calculator
  title: "NPV Calculator (Net Present Value)"
  nav_title: "NPV"
  short: "Calculate net present value from an initial investment and up to 5 years of cash flows — includes profitability index and simple payback period."
  new: true
  date_added: "2026-06-17"
  category: Business Math
  js: npv-calculator.js
  keywords: ["npv calculator", "net present value calculator", "npv formula", "discounted cash flow calculator", "investment npv calculator"]
  howto_steps:
    - name: "Enter initial investment"
      text: "The upfront cost of the investment — the cash outflow on day zero. For a project, this is capital cost plus setup. For a business acquisition, this is the purchase price. Enter as a positive number (the calculator treats it as a negative cash flow automatically)."
    - name: "Enter discount rate"
      text: "The discount rate is your cost of capital or required rate of return. For businesses: use WACC (weighted average cost of capital). For personal investments: use your expected opportunity cost. Common values: 8–12% for moderate-risk projects, 15–25% for high-risk ventures."
    - name: "Enter annual cash flows"
      text: "Future cash flows from the investment for years 1–5. Use net cash flows: revenue minus direct costs. Can be negative in early years (losses) and positive later (profits). You can leave later years blank if the investment horizon is shorter."
  body: |
    Net present value (NPV) tells you whether an investment creates or destroys value
    by comparing the present value of future cash flows to the upfront cost.

    ## The formula

    **NPV = −Initial Investment + Σ [Cash Flow_t / (1 + r)^t]**

    Where r is the discount rate and t is the time period in years.

    For a $100k investment at 10% discount rate with $30k, $35k, $40k, $40k, $40k
    annual cash flows:
    NPV = −100k + 30k/1.1 + 35k/1.21 + 40k/1.331 + 40k/1.464 + 40k/1.611
    NPV = −100k + 27.3k + 28.9k + 30.0k + 27.3k + 24.8k = **$38.3k**

    Positive NPV means the investment creates value above the required return.

    ## NPV decision rules

    | NPV | Decision |
    |---|---|
    | Positive (NPV > 0) | Accept — creates value above required return |
    | Zero (NPV = 0) | Break-even — earns exactly required return |
    | Negative (NPV < 0) | Reject — destroys value at this discount rate |

    ## Profitability Index (PI)

    PI = (NPV + Initial Investment) / Initial Investment

    PI measures value created per dollar invested. PI > 1 = positive NPV. Useful
    for ranking competing projects when capital is constrained: higher PI means more
    value per dollar of capital deployed.

    | PI | Interpretation |
    |---|---|
    | > 1.5 | Excellent return |
    | 1.1–1.5 | Good return |
    | 1.0–1.1 | Marginal return |
    | < 1.0 | Destroys value |

    ## Choosing the right discount rate

    The discount rate is the most critical input — small changes have large effects.

    **Corporate WACC**: Weighted average of debt cost (after-tax) and equity cost.
    Typical range: 8–12% for established businesses.

    **Venture/startup**: Higher rates (20–30%) reflect higher risk. A startup might
    require 25% return to compensate investors for failure risk.

    **Hurdle rate**: Many companies set a minimum acceptable IRR (15–20%) for projects
    to compete for capital allocation.

    When uncertain, run NPV at multiple discount rates (sensitivity analysis).

    ## NPV vs IRR

    IRR (Internal Rate of Return) is the discount rate at which NPV = 0.
    Both measure project value; NPV is generally preferred because:
    - NPV is in dollar terms (easier to interpret)
    - IRR can give multiple values for unconventional cash flows
    - NPV correctly handles varying discount rates over time

    ## Frequently asked questions

    **What does this calculator do?**
    Calculate NPV from an initial investment and up to 5 years of cash flows. Enter
    your discount rate (cost of capital) and projected annual cash flows.

- slug: revenue-per-lead-calculator
  title: "Revenue per Lead Calculator"
  nav_title: "Revenue per Lead"
  short: "Calculate revenue per lead (RPL) by channel — compare marketing channel profitability, cost per lead vs revenue generated, and leads needed to hit revenue targets."
  new: true
  date_added: "2026-06-17"
  category: Marketing
  js: revenue-per-lead-calculator.js
  keywords: ["revenue per lead calculator", "cost per lead calculator", "lead value calculator", "marketing channel roi calculator", "lead generation roi"]
  howto_steps:
    - name: "Enter total revenue"
      text: "Revenue generated from leads in the measurement period. For accurate attribution: use revenue from customers who entered the funnel as leads during the period. Attribution model matters — first-touch, last-touch, or multi-touch will give different numbers."
    - name: "Enter total leads"
      text: "Total number of leads acquired in the same period. Match the period to your revenue measurement. For B2B with long cycles: consider using a cohort approach (revenue from leads acquired 3–12 months ago vs cost to acquire them)."
    - name: "Enter marketing spend"
      text: "Total cost of the marketing activities that generated these leads, for cost per lead calculation. Include ad spend, agency fees, content costs, and tools directly attributed to the channel being measured."
    - name: "Enter target revenue"
      text: "Your revenue goal for this channel. The calculator divides target by RPL to show how many leads you'd need to hit the target, assuming current conversion rates hold."
  body: |
    Revenue per lead (RPL) is the most actionable metric for comparing marketing
    channel profitability. Unlike CTR or CPL alone, RPL accounts for lead quality —
    a channel that generates cheap leads may still have terrible RPL if those leads
    don't convert or buy small.

    ## The formula

    **Revenue per Lead = Total Revenue / Total Leads**

    With $480k revenue and 1,200 leads: RPL = $480k / 1,200 = **$400/lead**

    ## Why RPL beats cost per lead

    Cost per lead (CPL) measures acquisition efficiency. But a $10 CPL is worthless
    if those leads never close. RPL measures acquisition effectiveness — the actual
    revenue generated per lead regardless of cost.

    Compare across channels:

    | Channel | Leads | Revenue | RPL | Spend | CPL | ROI |
    |---|---|---|---|---|---|---|
    | Google Ads | 500 | $200k | $400 | $25k | $50 | 8× |
    | LinkedIn Ads | 100 | $80k | $800 | $20k | $200 | 4× |
    | Organic | 600 | $200k | $333 | $15k | $25 | 13× |

    Google Ads has the same RPL as organic. LinkedIn has higher RPL (better lead quality)
    but also higher CPL. Organic has the best ROI but lowest RPL.

    **Conclusion**: Scale organic first (highest ROI). Then Google Ads (good ROI, scalable).
    LinkedIn is expensive but generates high-value leads — keep small budget for enterprise.

    ## RPL vs CAC

    RPL is a marketing funnel metric. CAC (Customer Acquisition Cost) is a sales funnel
    metric. The relationship:
    - RPL × Lead-to-Customer Rate = Revenue per Customer (ACV)
    - CPL / Lead-to-Customer Rate = CAC

    If RPL = $400 and lead-to-customer rate is 5%, your ACV implied is $8,000.
    If CPL = $50 and lead-to-customer rate is 5%, your CAC is $1,000.

    ## Cohort matching for long sales cycles

    For B2B with 60–90 day sales cycles, using the same period for leads and revenue
    creates a mismatch. Better approach:
    - Measure leads acquired in Q1
    - Measure revenue closed in Q2–Q3 from those leads
    - Calculate RPL on a 6-month lag

    This gives accurate attribution for long-cycle deals.

    ## Frequently asked questions

    **What does this calculator do?**
    Calculate revenue per lead and cost per lead by channel, compare channel ROI,
    and find how many leads you need to hit a revenue target.

- slug: customer-concentration-calculator
  title: "Customer Concentration Risk Calculator"
  nav_title: "Concentration Risk"
  short: "Calculate customer concentration risk — % revenue from top customers, Herfindahl-Hirschman Index (HHI), and single-customer exposure — a key due diligence metric."
  new: true
  date_added: "2026-06-17"
  category: SaaS Metrics
  js: customer-concentration-calculator.js
  keywords: ["customer concentration risk calculator", "revenue concentration calculator", "customer concentration hhi", "customer dependency calculator", "top customer revenue percentage"]
  howto_steps:
    - name: "Enter total ARR or revenue"
      text: "Your total Annual Recurring Revenue (or total annual revenue for non-SaaS). This is the denominator for all concentration calculations."
    - name: "Enter top customer ARR values"
      text: "Enter the ARR (or annual revenue) for your top 1–5 customers, from largest to smallest. You don't need to enter all 5 — enter just the customers you want to model. Leave remaining fields at 0."
  body: |
    Customer concentration risk measures how dependent your business is on a small
    number of customers. High concentration is a major concern for investors, acquirers,
    and lenders — and a genuine business risk if those customers churn.

    ## The key metrics

    **Top-N concentration %**: Revenue from your top N customers / total revenue × 100.
    Investors typically flag anything above 10% for a single customer.

    **HHI (Herfindahl-Hirschman Index)**: Sum of squared market shares (×10,000).
    Used by antitrust regulators; also useful for measuring revenue concentration.
    Below 1,500 = competitive. 1,500–2,500 = moderate concentration. Above 2,500 = high.

    ## Investor red lines

    | Metric | Yellow flag | Red flag |
    |---|---|---|
    | Largest customer % | 10–20% | >20% |
    | Top 3 customers % | 30–50% | >50% |
    | Top 10 customers % | 50–70% | >70% |

    These thresholds are especially scrutinized in due diligence for Series A+
    and M&A transactions.

    ## How to reduce concentration

    1. **Diversify the pipeline**: Add ICP-qualified leads from segments different
       from your largest customers.
    2. **Grow small customers faster**: Focus expansion revenue on mid-tier accounts.
    3. **Limit contract size cap**: Consider capping individual contracts at 15–20%
       of projected ARR to maintain diversification as you grow.
    4. **Reduce discount for large accounts**: Avoid pricing that incentivizes
       unhealthy over-dependence on single customers.

    ## Frequently asked questions

    **What does this calculator do?**
    Calculate customer concentration risk metrics: top-N concentration %, HHI index,
    and largest customer exposure for investor and risk management analysis.

- slug: tam-sam-som-calculator
  title: "TAM SAM SOM Calculator"
  nav_title: "TAM/SAM/SOM"
  short: "Calculate Total Addressable Market (TAM), Serviceable Addressable Market (SAM), and Serviceable Obtainable Market (SOM) for investor presentations and market sizing."
  new: true
  date_added: "2026-06-17"
  category: Business Math
  js: tam-sam-som-calculator.js
  keywords: ["tam sam som calculator", "total addressable market calculator", "market size calculator", "tam calculator", "serviceable addressable market calculator"]
  howto_steps:
    - name: "Enter total target population"
      text: "How many potential customers exist in your defined market? For B2B: count companies matching your ICP (by size, industry, geography). For B2C: count individuals in your target demographic. Use industry reports, census data, or LinkedIn/database counts."
    - name: "Enter average annual spend"
      text: "How much would a typical customer spend annually on your category? For SaaS: your target ACV. For consumer: average annual purchase value. This creates a top-down TAM. Cross-check with a bottom-up calculation: your price × realistic customer count."
    - name: "Enter serviceable market %"
      text: "What percentage of the TAM can you realistically serve? Filter by: geographic reach, languages supported, tech stack compatibility, regulatory constraints, and distribution limitations. For an English-only US SaaS targeting global market, SAM might be 20–30% of TAM."
    - name: "Enter target market share %"
      text: "What share of the SAM can you realistically capture in 5–7 years? For early-stage companies, 2–5% of SAM is credible. Top-3 players in mature markets hold 20–40% SAM share. Be conservative — investors scrutinize optimistic market share projections."
  body: |
    TAM, SAM, and SOM define your market opportunity at three levels of specificity.
    Every investor deck needs these numbers, and how you define them signals whether
    you understand your market.

    ## The three levels

    **TAM (Total Addressable Market)**: The total global revenue opportunity if you
    captured 100% of the market. This is a ceiling — not a realistic target.

    **SAM (Serviceable Addressable Market)**: The portion of TAM you can realistically
    serve given your product's current capabilities, geographic reach, and go-to-market.

    **SOM (Serviceable Obtainable Market)**: The portion of SAM you can realistically
    capture in 3–5 years, given competition and your go-to-market scale.

    ## Top-down vs bottom-up market sizing

    **Top-down**: Industry reports estimate total market size, and you identify your
    percentage. Fast, but imprecise. "The CRM market is $50B, and we target 1%."

    **Bottom-up**: Count actual customers and multiply by ACV. More credible.
    "There are 500,000 mid-market companies in the US, 30% have this problem, we can
    reach 15% of those with our current GTM, at $15k ACV = $337M SAM."

    Investors prefer bottom-up because it shows you understand the actual customer pool.

    ## Investor expectations by stage

    | Stage | Minimum TAM | Notes |
    |---|---|---|
    | Seed | $500M | VCs need headroom for a $50M+ outcome |
    | Series A | $1B+ | Fund math requires large market potential |
    | Series B+ | $5B+ | To justify growth at scale and IPO narrative |

    TAM below $500M is not automatically disqualifying — services businesses and
    vertical SaaS can build highly profitable $50–100M revenue businesses in
    smaller markets. But VC-backed hypergrowth requires massive markets.

    ## Common mistakes in market sizing

    **Overcounting TAM**: "The global enterprise software market is $500B, we're in
    software, therefore our TAM is $500B." Wrong. TAM must be the market for your
    specific product category.

    **Confusing TAM and SAM**: "Our SAM is the entire US market." SAM should
    filter by who you can actually sell to today — your ICP, not the entire country.

    **Unrealistic SOM**: "We'll capture 10% of the market in year 3." Without
    showing the GTM math (headcount, channels, CAC), this is unbelievable.

    ## Frequently asked questions

    **What does this calculator do?**
    Calculate TAM (total customers × spend), SAM (filtered by your reach), and SOM
    (your achievable share) for market sizing in investor decks.

- slug: contribution-margin-calculator
  title: "Contribution Margin Calculator"
  nav_title: "Contribution Margin"
  short: "Calculate unit contribution margin, CM ratio, and the exact number of units needed to break even or hit a profit target."
  date_added: "2026-06-17"
  category: Business Math
  js: contribution-margin-calculator.js
  keywords: ["contribution margin calculator", "contribution margin ratio", "break even units calculator", "unit economics calculator", "target profit calculator"]
  howto_steps:
    - name: "Enter selling price and variable cost"
      text: "Input your price per unit and the variable cost per unit (materials, payment fees, packaging, shipping per sale)."
    - name: "Enter fixed costs"
      text: "Add your total fixed costs for the period — rent, payroll, software subscriptions, anything that doesn't scale with units sold."
    - name: "Set a target profit (optional)"
      text: "Enter a profit target to see exactly how many units you need to sell to reach it, on top of covering fixed costs."
    - name: "Read the CM ratio and break-even"
      text: "The CM ratio shows how much of each sale goes toward covering fixed costs. Break-even units is your minimum viable sales target."
  body: |
    Contribution margin is the selling price minus all variable costs. It is the per-unit
    engine of profit: every unit sold adds its contribution margin to the pool that
    covers fixed costs. Once fixed costs are fully covered, every additional unit sold
    converts 100% of its contribution margin to profit.

    **Unit Contribution Margin (UCM)** = Selling Price − Variable Cost per Unit

    **Contribution Margin Ratio (CM Ratio)** = UCM ÷ Selling Price × 100

    **Break-Even Units** = Fixed Costs ÷ UCM

    **Units to Hit Target Profit** = (Fixed Costs + Target Profit) ÷ UCM

    ## What counts as a variable cost?

    Variable costs are those that increase directly with each unit produced or sold:
    - Materials, components, and raw ingredients
    - Payment processing fees (e.g., 2.9% + $0.30 per transaction)
    - Shipping and fulfillment costs
    - Sales commissions tied to each deal
    - Cloud hosting that scales per API call or user

    Fixed costs do not vary with output: payroll, rent, annual software subscriptions,
    insurance, and depreciation.

    ## CM ratio benchmarks by business type

    | Business Type | Typical CM Ratio | Notes |
    |---|---|---|
    | SaaS | 70–85% | Low variable cost; hosting and payment fees are small |
    | Consulting / services | 60–80% | Time is the variable cost |
    | E-commerce | 30–55% | COGS, fulfillment, and returns reduce margin |
    | Manufacturing | 25–50% | Raw materials dominate variable cost |
    | Restaurants | 20–40% | Food, beverages, and hourly labor are variable |

    ## Pricing decisions with contribution margin

    If your CM ratio is low, you face a structural challenge: each sale contributes
    little toward the fixed cost pool. You either need high volume or a higher price.
    Increasing price by 10% while holding variable costs flat directly raises the CM
    ratio — the most powerful lever for early-stage businesses.

    Running multiple pricing scenarios is the best use of this calculator: model the
    CM ratio at different price points and see the break-even units shrink as price rises.

    ## Frequently asked questions

    **How is contribution margin different from gross margin?**
    Gross margin (used in accounting) subtracts cost of goods sold (COGS), which may
    include some fixed manufacturing overhead. Contribution margin subtracts only
    purely variable costs. For product businesses with simple cost structures they are
    often similar, but for manufacturing they can differ significantly.

    **What is a good contribution margin ratio?**
    It depends on the business model. SaaS companies typically target 70%+ CM ratios.
    E-commerce is viable at 35–50%. Below 20%, the business requires very high volume
    to generate meaningful profit and has little pricing flexibility.

- slug: freelance-tax-estimator
  title: "Freelance Tax Estimator"
  nav_title: "Freelance Tax"
  short: "Estimate your annual self-employment tax, federal income tax, and quarterly estimated payments as a freelancer or independent contractor."
  date_added: "2026-06-17"
  category: Tax & Compliance
  js: freelance-tax-estimator.js
  keywords: ["freelance tax calculator", "self employment tax calculator", "quarterly estimated tax calculator", "independent contractor tax calculator", "1099 tax estimator"]
  howto_steps:
    - name: "Enter your annual net profit"
      text: "Input your expected annual freelance income after deducting business expenses (software, equipment, home office, etc.)."
    - name: "Add any W-2 or other income (optional)"
      text: "If you also have a salaried job or investment income, enter it here to calculate your combined tax burden."
    - name: "Select your filing status"
      text: "Choose Single or Married Filing Jointly to apply the correct tax brackets."
    - name: "Read your quarterly estimate"
      text: "The calculator shows self-employment tax (15.3%), federal income tax by bracket, total annual liability, and the quarterly payment you should send to the IRS."
  body: |
    As a freelancer or independent contractor, you are responsible for paying both
    the employee AND employer share of Social Security and Medicare taxes — together
    called **self-employment (SE) tax** at 15.3% of net profit.

    Unlike W-2 employees, no one withholds taxes from your payments. You must pay
    estimated taxes quarterly (April 15, June 16, September 15, January 15) to avoid
    IRS underpayment penalties.

    ## How Freelance Taxes Are Calculated

    **Step 1: Net profit** = gross income − business expenses

    **Step 2: SE tax** = net profit × 15.3%
    (Social Security 12.4% up to $168,600 + Medicare 2.9%, no cap)

    **Step 3: SE tax deduction** = SE tax × 50%
    (You can deduct half your SE tax from taxable income)

    **Step 4: Taxable income** = net profit − SE deduction + any other income

    **Step 5: Federal income tax** = apply 2024 marginal brackets to taxable income

    **Step 6: Quarterly payment** = (SE tax + federal income tax) ÷ 4

    ## Key Deductions That Reduce Your Bill

    - **Business expenses**: software, equipment, professional development, home office
    - **Health insurance premiums**: fully deductible if you pay for your own policy
    - **Retirement contributions**: SEP-IRA (up to 25% of net profit, max $69k),
      Solo 401(k) (up to $23k employee + 25% employer share), or Roth IRA ($7k)
    - **Half of SE tax**: automatically calculated and deducted

    ## S-Corp Election Consideration

    At ~$80,000+ in net profit, some freelancers save by electing S-Corp status.
    You pay yourself a "reasonable salary" (subject to SE tax) and take the
    remainder as a distribution (not subject to SE tax). The savings can exceed
    $5,000/year but require running payroll and filing an additional tax return.
    Consult a CPA before making this decision.

    ## Frequently asked questions

    **When do I need to pay quarterly estimated taxes?**
    If you expect to owe $1,000 or more in taxes for the year, the IRS requires
    quarterly estimated payments. The due dates are April 15, June 15, September 15,
    and January 15. Missing or underpaying results in a penalty (currently ~8%/year
    annualized on the underpaid amount).

    **What expenses can I deduct as a freelancer?**
    Any ordinary and necessary business expense: home office (dedicated space),
    business software and subscriptions, professional development, equipment,
    internet service (business portion), professional liability insurance, accounting
    and legal fees, and business-related travel.

- slug: employee-cost-calculator
  title: "Employee Cost Calculator"
  nav_title: "Employee Cost"
  short: "Calculate the true total cost of an employee — salary plus payroll taxes, benefits, and bonus — and see the cost multiplier over base pay."
  date_added: "2026-06-17"
  category: HR & People
  js: employee-cost-calculator.js
  keywords: ["employee cost calculator", "true cost of an employee", "employer payroll taxes calculator", "cost multiplier salary", "total compensation cost"]
  howto_steps:
    - name: "Enter the base salary"
      text: "Input the employee's annual base salary before any bonuses or benefits."
    - name: "Enter the annual benefits cost"
      text: "Add the employer's cost for health insurance, dental, vision, 401(k) match, and any other benefits. If unsure, a common estimate is $15,000–$20,000 per year for US knowledge workers."
    - name: "Add variable compensation (optional)"
      text: "Include expected annual bonus, equity vesting value, or other variable comp to see the full all-in employer cost."
    - name: "Read the cost multiplier"
      text: "The multiplier shows how much more you pay above base salary. A 1.30x multiplier means a $100k salary employee costs $130k total."
  body: |
    The most common mistake when budgeting headcount is using base salary as the
    cost. The true employer cost of an employee is **base salary × 1.25 to 1.45**
    for most US knowledge workers, driven by mandatory payroll taxes and benefits.

    ## What Makes Up Total Employee Cost

    **1. Employer payroll taxes (~7.65%)**
    - FICA: 6.2% Social Security (on first $168,600) + 1.45% Medicare (no cap)
    - FUTA: 0.6% effective federal unemployment (on first $7,000 of wages)
    - SUTA: ~2.7% average state unemployment tax rate (on first $7,000–$56,500, varies by state)

    **2. Health insurance**
    - Average employer cost: $8,000–$18,000/year per employee (2024 KFF data)
    - Family coverage: $14,000–$22,000/year
    - Self-only: $7,000–$10,000/year

    **3. Retirement contributions (optional)**
    - 401(k) match: typically 3–6% of salary
    - At $100k salary with 4% match: $4,000/year

    **4. Bonus and equity**
    - Target bonus for knowledge workers: 10–20% of base
    - Equity grants (RSUs): $5,000–$50,000/year depending on level

    ## The 1.25x to 1.4x Rule of Thumb

    A quick mental model: multiply any salary by **1.3x** for a fully-loaded
    employment cost estimate (taxes + health insurance + 401k match, no bonus).
    Add 15–20% for bonus-eligible roles.

    | Salary | Taxes (~8%) | Benefits (~12%) | Total (1.2x) | + 10% Bonus (1.3x) |
    |---|---|---|---|---|
    | $80,000 | $6,120 | $9,600 | $95,720 | $103,720 |
    | $120,000 | $9,180 | $14,400 | $143,580 | $155,580 |
    | $150,000 | $11,475 | $18,000 | $179,475 | $194,475 |

    ## Contractors vs. Employees

    When comparing a W-2 hire to a contractor, remember that the contractor's rate
    includes their own taxes and benefits. A contractor at $75/hour is not 1.3x
    more expensive than an employee — the contractor is paying their own 15.3% SE
    tax and benefits. The true cost comparison requires adding the employee burden
    to the salary before comparing.

    ## Frequently asked questions

    **What payroll taxes does the employer pay?**
    Employers pay FICA (7.65%: 6.2% Social Security + 1.45% Medicare), FUTA
    (effective 0.6% on first $7,000 of wages), and SUTA (state unemployment tax,
    ranging from 0.6% to 8.5% depending on state and rate experience).

    **How much does health insurance cost the employer?**
    According to the 2024 Kaiser Family Foundation survey, employers pay an average
    of $8,435/year for single employee coverage and $17,393/year for family coverage.
    This is the largest variable in the cost multiplier after payroll taxes.

- slug: price-to-sales-calculator
  title: "Price-to-Sales Ratio Calculator"
  nav_title: "P/S Ratio"
  short: "Calculate P/S ratio, implied valuation at any multiple, and growth-adjusted P/S for startup and SaaS company comparisons."
  date_added: "2026-06-17"
  category: Valuation
  js: price-to-sales-calculator.js
  keywords: ["price to sales ratio calculator", "ps ratio calculator", "ev revenue multiple", "saas valuation multiple calculator", "startup valuation calculator"]
  howto_steps:
    - name: "Enter your annual revenue"
      text: "Input your ARR or trailing twelve months (TTM) revenue. For startups, use ARR if subscription-based."
    - name: "Enter market cap or current valuation"
      text: "For public companies: shares outstanding × share price. For private companies: last round post-money valuation."
    - name: "Set a target multiple"
      text: "Enter the P/S multiple you want to value at — comparable company median, a VC target, or your exit target."
    - name: "Enter growth rate for growth-adjusted P/S"
      text: "Add your YoY revenue growth rate to see your growth-adjusted P/S (also called P/S ÷ growth). A lower number is better — it shows how much you pay per unit of growth."
  body: |
    The price-to-sales (P/S) ratio is one of the most widely used valuation metrics
    for high-growth software and SaaS companies where earnings are not yet a reliable
    guide to value.

    **P/S Ratio** = Market Capitalization ÷ Annual Revenue

    Or equivalently: **EV/Revenue** = Enterprise Value ÷ Annual Revenue

    For private companies, the numerator is the post-money valuation from the most
    recent funding round.

    ## P/S Ratio Benchmarks by Stage (2024)

    | Company Stage | Typical P/S Range | Notes |
    |---|---|---|
    | Early-stage SaaS (50%+ growth) | 8–20x ARR | Seed to Series A |
    | Growth-stage SaaS (30–50% growth) | 5–12x ARR | Series B to C |
    | Late-stage SaaS (20–30% growth) | 3–8x ARR | Pre-IPO |
    | Public SaaS (10–20% growth) | 2–6x revenue | Median ~4x in 2024 |
    | Declining / mature software | 0.5–2x revenue | PE buyout range |

    After the 2021–2022 multiple compression, public SaaS P/S multiples fell from
    20–30x to 4–8x as interest rates rose. The current (2024) median public SaaS
    P/S is approximately 4–6x forward revenue.

    ## The Rule of 40 Connection

    High P/S multiples are justified when the Rule of 40 score is strong. A company
    growing 50% with −5% FCF margin (Rule of 40 = 45%) trades at higher multiples
    than one growing 20% with −15% margin (Rule of 40 = 5%).

    **Growth-adjusted P/S** = P/S ÷ Growth Rate

    A P/S of 10x at 50% growth gives growth-adjusted P/S of 0.2x — often considered
    fair value. Above 0.3x can be stretched; below 0.15x can represent value.

    ## EV/Revenue vs. P/S

    For companies with debt or significant cash, Enterprise Value / Revenue is more
    accurate than P/S:

    **EV** = Market Cap + Total Debt − Cash and Equivalents

    Most early-stage startups have minimal debt and cash burning down, so EV ≈ Market Cap.
    For cash-rich companies or those with venture debt, the adjustment matters.

    ## Frequently asked questions

    **What P/S ratio should I target for my startup valuation?**
    At Series A, 8–15x ARR is common for SaaS companies growing 80%+. At Series B,
    10–20x ARR for companies with strong NRR (120%+) and 50%+ growth. These numbers
    compress significantly as growth slows — a 30% grower typically gets 4–8x.

    **How do I use P/S for competitive benchmarking?**
    Find 5–10 public comps with similar growth rates and business models. Take the
    median P/S. Apply it to your ARR for a rough valuation range. Discount 20–30%
    for private-company illiquidity premium. This is the most common method used by
    VC investors for Series B+ valuations.

- slug: churn-cohort-calculator
  title: "Churn Cohort Analysis Calculator"
  nav_title: "Cohort Churn"
  short: "Analyze cohort retention, calculate LTV from churn rate, and project how many customers remain after any number of months."
  date_added: "2026-06-17"
  category: SaaS Metrics
  js: churn-cohort-calculator.js
  keywords: ["churn cohort analysis", "cohort retention calculator", "customer ltv from churn", "monthly churn rate calculator", "cohort analysis saas"]
  howto_steps:
    - name: "Enter your starting cohort size"
      text: "Input how many customers were in the cohort at month 0 (the month they first subscribed or activated)."
    - name: "Enter customers churned in the first period"
      text: "Add how many left in the measurement period. The calculator shows the initial retention rate."
    - name: "Enter monthly revenue and churn rate"
      text: "These are used to project LTV and retention over your chosen horizon. The monthly churn rate can come from your average over the last 3–6 months."
    - name: "Set a projection horizon"
      text: "Choose how many months ahead to project. 12 months is standard; 24–36 months is useful for enterprise cohorts with lower churn."
  body: |
    Cohort analysis is the most rigorous way to understand customer retention.
    Instead of tracking an aggregate churn rate, you follow a specific group of
    customers (those who started in January, for example) and measure how many
    are still active over time.

    ## What Cohort Analysis Reveals

    Aggregate churn hides critical signals. A company growing 20% monthly with
    5% monthly churn looks like a 5% churn business — but cohort analysis reveals
    that older cohorts retain much better (or worse) than newer ones.

    **Cohort signals to watch:**
    - **Month 1–3 churn spike**: Usually an onboarding issue
    - **Month 6–12 churn spike**: Often a value realization problem
    - **Stable churn after month 12**: "Power user" retention floor — the core audience

    ## LTV from Cohort Churn Rate

    For a constant monthly churn rate:

    **LTV** = Monthly Revenue per Customer ÷ Monthly Churn Rate

    At $99/month and 2% monthly churn: LTV = $99 ÷ 0.02 = **$4,950**

    At $99/month and 5% monthly churn: LTV = $99 ÷ 0.05 = **$1,980**

    Cutting churn in half doubles LTV — the single most powerful lever in subscription
    economics.

    ## Cohort Half-Life

    The cohort half-life is the number of months until 50% of the original cohort
    has churned:

    **Half-life** = log(0.5) ÷ log(1 − monthly churn rate)

    At 2% monthly churn: half-life ≈ 34 months
    At 5% monthly churn: half-life ≈ 14 months
    At 10% monthly churn: half-life ≈ 7 months

    ## Benchmarks by Company Type

    | Company Type | Monthly Churn | Annual Churn | LTV at $100/mo |
    |---|---|---|---|
    | Enterprise SaaS | 0.5–1% | 6–11% | $10,000–$20,000 |
    | Mid-market SaaS | 1–2% | 12–22% | $5,000–$10,000 |
    | SMB SaaS | 2–5% | 22–46% | $2,000–$5,000 |
    | Consumer apps | 5–15% | 46–80% | $700–$2,000 |

    ## Frequently asked questions

    **What is a good monthly churn rate for SaaS?**
    Below 1% monthly churn (under 12% annual) is considered good for SMB SaaS.
    Enterprise SaaS should target 0.5–0.75% monthly (6–9% annual). Consumer apps
    with 3–5% monthly churn can be viable if CAC is low and ARPU high enough.

    **How do I do a full cohort analysis?**
    Group customers by the month they first subscribed. For each cohort, track
    what percentage remains active at months 1, 3, 6, 12, 24. Plot these as a
    retention curve. Compare curves across cohorts — improving retention curves
    over time means your product and onboarding are getting better.

- slug: segment-margin-calculator
  title: "Segment Gross Margin Calculator"
  nav_title: "Segment Margin"
  short: "Compare gross margin and gross profit across up to 4 product lines or business segments side by side."
  category: "Business Math"
  date_added: "2026-06-17"
  keywords:
    - segment gross margin
    - gross margin by product line
    - blended gross margin
    - multi-segment profitability
    - gross profit by segment
  js: segment-margin-calculator.js
  howto_steps:
    - name: "Enter segment revenues"
      text: "Type revenue for each product line or segment (leave unused rows at 0)."
    - name: "Enter COGS per segment"
      text: "Enter cost of goods sold for each segment — direct materials, labor, and attributable overhead."
    - name: "Read per-segment metrics"
      text: "The table shows gross margin %, gross profit, and revenue share for each active segment."
    - name: "Compare against blended margin"
      text: "Use the blended gross margin to benchmark your full product mix against industry targets."
  body: |
    ## What Is Segment Gross Margin?

    Segment gross margin measures how much of each dollar of revenue a specific
    product line or business unit retains after paying direct production costs.
    It is the most fundamental profitability metric for multi-product companies
    because it shows which segments subsidize the others.

    **Gross Margin (%) = (Revenue − COGS) ÷ Revenue × 100**

    COGS (Cost of Goods Sold) includes direct materials, direct labor, and
    manufacturing overhead — not sales, marketing, or G&A expenses.

    ## Why Blended Margin Matters

    The blended gross margin is a revenue-weighted average of your segment
    margins. If SaaS is 80% margin and services are 30% margin, a 70/30 revenue
    split yields a blended margin of approximately 65%.

    Changes in revenue mix — not just segment-level margin improvements — can
    dramatically shift your blended gross margin. Understanding this drives
    go-to-market decisions: which segments to prioritize, which to de-emphasize,
    and how growth investments affect future profitability.

    ## Gross Margin Benchmarks by Segment Type

    | Segment Type | Typical Gross Margin |
    |---|---|
    | Pure SaaS / Software | 70–85% |
    | Subscription hardware | 40–60% |
    | Professional services | 25–45% |
    | Hardware product | 30–50% |
    | E-commerce / retail | 20–40% |
    | Manufacturing | 15–35% |

    ## Revenue Share and Portfolio Analysis

    Revenue share shows what percentage of total company revenue each segment
    contributes. High revenue share from low-margin segments drags blended margin
    and compresses the funds available for R&D, sales, and marketing. Many
    companies deliberately track the ratio of high-margin to low-margin revenue
    as a leading indicator of long-term profitability.

    ## Frequently asked questions

    **How does segment margin differ from contribution margin?**
    Gross margin only deducts COGS — the costs directly tied to producing and
    delivering the product. Contribution margin goes further, deducting all
    variable costs including variable sales commissions, variable support costs,
    and credit card fees. For SaaS, the two are often close because most costs
    are fixed. For e-commerce, contribution margin is more useful because
    shipping, returns, and payment processing are truly variable.

    **What does a "good" blended gross margin look like?**
    It depends heavily on business model. Pure-play SaaS companies target 70–80%+.
    Mixed SaaS + services companies (like most enterprise software) land around
    55–70%. Hardware companies aim for 40–55%. If your blended margin is below
    40%, it is very difficult to build a high-growth business because you cannot
    afford the sales and marketing investment needed to scale.

- slug: dso-calculator
  title: "Days Sales Outstanding (DSO) Calculator"
  nav_title: "DSO Calculator"
  short: "Calculate Days Sales Outstanding to measure how quickly you collect accounts receivable and how much cash is tied up in unpaid invoices."
  category: "Finance"
  date_added: "2026-06-17"
  keywords:
    - days sales outstanding
    - DSO calculator
    - accounts receivable days
    - AR turnover ratio
    - collections efficiency
  js: dso-calculator.js
  howto_steps:
    - name: "Enter accounts receivable"
      text: "Type your current accounts receivable balance — the total unpaid invoices outstanding."
    - name: "Enter total credit sales"
      text: "Enter total revenue on credit for the same period (quarter or year) as your AR balance."
    - name: "Set the period length"
      text: "Enter 90 for quarterly data or 365 for annual data. The period must match your sales figure."
    - name: "Read your DSO"
      text: "View your DSO in days, AR turnover ratio, and the target AR balance if you want to achieve 30-day DSO."
  body: |
    ## What Is Days Sales Outstanding (DSO)?

    Days Sales Outstanding (DSO) measures how many days on average it takes your
    business to collect payment after a sale. It is one of the most important
    working capital metrics because it directly quantifies how much cash is locked
    up in receivables at any given time.

    **DSO = (Accounts Receivable ÷ Total Credit Sales) × Number of Days**

    A lower DSO means faster collections and less cash tied up in unpaid invoices.
    A rising DSO is an early warning sign of collection problems or customer
    cash-flow stress.

    ## How to Interpret Your DSO

    | DSO Range | Interpretation |
    |---|---|
    | Under 30 days | Excellent — customers are paying promptly |
    | 30–45 days | Good — aligned with standard Net 30 terms |
    | 45–60 days | Acceptable — monitor for upward trend |
    | 60–90 days | Elevated — review collections process |
    | Over 90 days | High — significant working capital impact |

    ## Accounts Receivable Turnover Ratio

    The AR Turnover Ratio is the inverse relationship to DSO:

    **AR Turnover = Total Credit Sales ÷ Average Accounts Receivable**

    Higher AR turnover means you are collecting faster. It complements DSO:
    a turnover of 12× implies an average DSO of about 30 days.

    ## How to Reduce DSO

    1. **Shorten payment terms**: Switch from Net 60 to Net 30 for new customers
    2. **Offer early payment discounts**: "2/10 Net 30" (2% off if paid in 10 days)
    3. **Automate reminders**: Send invoice reminders at 7, 14, and 30 days past due
    4. **Require deposits**: For large projects, collect 25–50% upfront
    5. **Accept more payment methods**: Reduce friction with ACH, credit card, wire

    ## Working Capital Impact

    Every day of DSO improvement frees up cash equal to your daily sales volume.
    If you generate $450,000/quarter and reduce DSO from 45 to 30 days, you
    free up 15 × ($450,000 ÷ 90) = **$75,000 in cash** without any revenue change.

    ## Frequently asked questions

    **What is a good DSO for a B2B SaaS company?**
    B2B SaaS companies with monthly subscriptions often have near-zero DSO because
    subscriptions charge upfront. For annual upfront contracts (invoiced), DSO
    typically runs 30–45 days after invoice. If you have both subscription and
    professional services revenue, your blended DSO might be 35–55 days.

    **How does DSO affect my credit line?**
    Lenders look at DSO when underwriting asset-based loans (ABL) and invoice
    financing. High DSO or rising DSO can indicate collection problems and reduce
    the advance rate on your receivables. Keeping DSO under 45 days generally
    makes your AR more bankable at standard advance rates (typically 80–85%).

- slug: roe-calculator
  title: "Return on Equity (ROE) Calculator"
  nav_title: "ROE Calculator"
  short: "Calculate Return on Equity to measure how efficiently a company generates profit from shareholders' capital investment."
  category: "Finance"
  date_added: "2026-06-17"
  keywords:
    - return on equity calculator
    - ROE calculator
    - shareholders equity return
    - DuPont analysis
    - equity profitability
  js: roe-calculator.js
  howto_steps:
    - name: "Enter net income"
      text: "Type annual net income (after tax) from the bottom line of your income statement."
    - name: "Enter shareholders equity"
      text: "Enter total shareholders equity from your balance sheet (total assets minus total liabilities)."
    - name: "Read your ROE"
      text: "View your Return on Equity percentage and the performance rating (Excellent / Good / Acceptable / Needs improvement)."
    - name: "Benchmark against your industry"
      text: "Compare your ROE against the industry benchmarks in the body text to assess whether you are creating or destroying equity value."
  body: |
    ## What Is Return on Equity (ROE)?

    Return on Equity (ROE) measures how much profit a company generates for each
    dollar of shareholders' equity. It is the most widely used measure of
    management's efficiency in generating returns on capital.

    **ROE = Net Income ÷ Shareholders' Equity × 100**

    A 20% ROE means the company generates $0.20 in profit for every $1.00 of
    equity capital — equivalent to a 20% annual return for equity investors if
    all profits are retained and reinvested.

    ## What Is a Good ROE?

    | ROE Range | Interpretation |
    |---|---|
    | 20%+ | Excellent — top-quartile performance |
    | 15–20% | Good — above average for most industries |
    | 10–15% | Acceptable — in line with market average |
    | 5–10% | Below average — needs improvement |
    | Under 5% | Poor — may be destroying equity value |

    The long-run average ROE for the S&P 500 is approximately 14%. Technology
    companies often achieve 20–40%; retailers 10–15%; utilities 8–12%.

    ## DuPont Analysis: Decomposing ROE

    The DuPont formula breaks ROE into three drivers:

    **ROE = Net Profit Margin × Asset Turnover × Equity Multiplier**

    - **Net Profit Margin** = Net Income ÷ Revenue (how much profit per dollar of sales)
    - **Asset Turnover** = Revenue ÷ Total Assets (how efficiently assets generate sales)
    - **Equity Multiplier** = Total Assets ÷ Equity (financial leverage)

    High ROE from high margins and asset efficiency is more sustainable than
    high ROE driven purely by leverage. Over-leveraged ROE collapses quickly
    when business conditions deteriorate.

    ## ROE and Sustainable Growth Rate

    The sustainable growth rate is the maximum rate at which a company can grow
    without external equity financing:

    **Sustainable Growth Rate = ROE × (1 − Dividend Payout Ratio)**

    At 20% ROE with 0% payout (all earnings retained): 20% sustainable growth.
    At 20% ROE with 50% payout: 10% sustainable growth.

    ## Frequently asked questions

    **How does ROE differ from ROA?**
    Return on Assets (ROA) = Net Income ÷ Total Assets. ROA measures efficiency
    across all capital (debt + equity). ROE only measures returns on equity capital.
    The difference between ROE and ROA reflects financial leverage: ROE = ROA ×
    Equity Multiplier. A company with the same ROA but more debt will show a
    higher ROE — which can be misleading if leverage is excessive.

    **When is a high ROE misleading?**
    A very high ROE can result from: (1) high financial leverage inflating returns,
    (2) share buybacks reducing equity to near zero, or (3) large accumulated
    losses reducing book equity. Always check whether high ROE is driven by
    margin and asset efficiency (good) or financial engineering (risky).

- slug: wacc-calculator
  title: "WACC Calculator"
  nav_title: "WACC Calculator"
  short: "Calculate Weighted Average Cost of Capital — the blended rate a company must earn on its assets to satisfy all capital providers, equity and debt."
  date_added: "2026-06-18"
  new: true
  category: Finance
  js: wacc-calculator.js
  keywords: ["wacc calculator", "weighted average cost of capital", "wacc formula", "cost of equity cost of debt", "discount rate calculator"]
  howto_steps:
    - name: "Enter equity and debt values"
      text: "Input the market value of equity (e.g. market cap) and total debt. The weights are calculated automatically."
    - name: "Set cost of equity"
      text: "Enter your cost of equity percentage — this is typically estimated using CAPM: risk-free rate + beta × equity risk premium."
    - name: "Set cost of debt and tax rate"
      text: "Enter the pre-tax cost of debt (average interest rate on borrowings) and your corporate tax rate. Interest tax shields reduce the effective cost of debt."
    - name: "Read the WACC result"
      text: "WACC is the minimum return your assets must generate to create value. A project IRR above WACC creates value; below destroys it."
  body: |
    WACC (Weighted Average Cost of Capital) is the minimum return a company must earn
    on its existing assets to satisfy its capital providers — both equity holders and
    debt holders. It serves as the hurdle rate for investment decisions and DCF valuations.

    ## WACC formula

    **WACC = (E/V) × Rₑ + (D/V) × Rᵈ × (1 − Tᶜ)**

    Where:
    - **E** = Market value of equity (market cap)
    - **D** = Market value of debt
    - **V** = E + D (total capital)
    - **Rₑ** = Cost of equity (%)
    - **Rᵈ** = Pre-tax cost of debt (%)
    - **Tᶜ** = Corporate tax rate (%)

    ## Why does the tax rate matter?

    Debt interest is tax-deductible, which creates a "tax shield." The after-tax cost of
    debt is Rᵈ × (1 − Tᶜ). A company with 6% cost of debt and 25% tax rate has an
    effective debt cost of 4.5%.

    ## Typical WACC benchmarks

    | Industry | Typical WACC |
    |----------|-------------|
    | SaaS / Software | 8–14% |
    | Consumer goods | 6–10% |
    | Utilities | 4–8% |
    | Biotech | 12–20% |

    ## WACC in practice

    - **DCF valuations**: WACC is the discount rate applied to future free cash flows
    - **Capital budgeting**: only accept projects with IRR > WACC
    - **Capital structure decisions**: optimise the mix of equity and debt to minimise WACC
    - **Performance measurement**: ROIC > WACC means the company creates economic value

- slug: cost-per-lead-calculator
