- slug: weighted-average-calculator
  title: "Weighted Average Calculator"
  nav_title: "Weighted Average"
  short: "Calculate weighted averages for grades, prices, rates, or any metrics — see each component's contribution to the overall result instantly."
  date_added: "2026-06-18"
  new: true
  category: Business Math
  js: weighted-average-calculator.js
  keywords: ["weighted average calculator", "calculate weighted average", "weighted mean calculator", "weighted grade calculator", "portfolio weighted return"]
  howto_steps:
    - name: "Enter values and weights"
      text: "For each item, enter the value and its corresponding weight. Weights can be percentages, units, or any proportional number."
    - name: "Add rows as needed"
      text: "Use the '+ Add row' button to add up to 8 items to the calculation."
    - name: "Read the weighted average"
      text: "The weighted average is sum(value × weight) / sum(weights). The calculator also shows each item's contribution percentage."
    - name: "Common use cases"
      text: "Portfolio returns, grade calculations, blended rates, market share-weighted metrics, or any scenario where each data point has a different significance."
  body: |
    A weighted average accounts for the relative importance of each value in a dataset.
    Unlike a simple average, it weights each value by its proportion — so a large segment
    contributes more to the result than a small one.

    ## Weighted average formula

    **Weighted Average = Σ(value × weight) / Σ(weights)**

    ## Common business applications

    | Use case | Value | Weight |
    |----------|-------|--------|
    | Portfolio return | Asset return % | Asset value $ |
    | Blended cost of capital | Cost % | Capital amount $ |
    | Weighted NPS | NPS per cohort | Cohort size |
    | COGS by product | Unit cost | Units sold |
    | Market share-weighted price | Price $ | Market share % |

    ## Weighted average vs. simple average

    If you sell 100 units at $10 and 10 units at $50, the simple average price is
    ($10 + $50) / 2 = $30. But the weighted average (by units) is (100×$10 + 10×$50)
    / 110 = **$13.64** — a far more accurate representation of your actual revenue per unit.

- slug: gross-profit-margin-calculator
  title: "Gross Profit Margin Calculator"
  nav_title: "Gross Profit"
  short: "Calculate gross profit, gross margin %, and markup from revenue and COGS — with industry benchmark guidance."
  date_added: "2026-06-18"
  new: true
  category: Finance
  js: gross-profit-margin-calculator.js
  keywords: ["gross profit margin calculator", "gross margin calculator", "gross profit calculator", "profit margin formula", "COGS calculator"]
  howto_steps:
    - name: "Enter revenue"
      text: "Enter total revenue (net sales) for the period you want to analyze."
    - name: "Enter COGS"
      text: "Enter Cost of Goods Sold — the direct costs of producing your goods or services (materials, direct labor, manufacturing overhead)."
    - name: "Read your gross margin"
      text: "Gross Profit = Revenue − COGS. Gross Margin % = Gross Profit / Revenue × 100. A higher margin means more left over to cover operating expenses."
    - name: "Compare to your industry"
      text: "Software SaaS: 70–85%. Manufacturing: 20–40%. Retail: 20–50%. Food & beverage: 30–50%."
  body: |
    Gross profit margin is the first profitability metric investors and operators look at.
    It measures how much revenue remains after accounting for the direct costs of production
    — before sales, marketing, G&A, and other operating expenses.

    ## Gross profit formulas

    **Gross Profit = Revenue − COGS**
    **Gross Margin % = Gross Profit / Revenue × 100**
    **Markup % = Gross Profit / COGS × 100**

    Note: gross margin and markup are different. A 50% markup means you sell at 1.5× cost,
    giving a 33% gross margin — not 50%.

    ## Industry gross margin benchmarks

    | Industry | Typical Gross Margin |
    |----------|---------------------|
    | SaaS / software | 70–85% |
    | Professional services | 60–75% |
    | E-commerce / retail | 20–50% |
    | Food & beverage | 30–50% |
    | Manufacturing | 20–40% |
    | Construction | 15–25% |

    ## Why gross margin matters for SaaS

    Investors use gross margin to assess scalability. A SaaS business with 80% gross margin
    can fund sales and marketing from gross profit; a 50% gross margin business struggles
    to reach Rule of 40 territory without tight cost discipline.

    ## Gross margin vs. net margin

    Gross margin excludes operating expenses (sales, marketing, R&D, G&A). Net margin is
    after all expenses and taxes. A company can have a high gross margin but a negative
    net margin if operating costs are excessive.

- slug: mirr-calculator
  title: "MIRR Calculator (Modified IRR)"
  nav_title: "MIRR Calculator"
  short: "Calculate Modified Internal Rate of Return — a more accurate investment return metric that corrects IRR's reinvestment rate assumption."
  date_added: "2026-06-18"
  new: true
  category: Finance
  js: mirr-calculator.js
  keywords: ["mirr calculator", "modified irr calculator", "modified internal rate of return", "mirr vs irr", "investment return calculator"]
  howto_steps:
    - name: "Enter cash flows"
      text: "Enter the initial investment (negative) and each year's expected cash inflow. Year 0 is typically the initial outlay."
    - name: "Enter finance rate"
      text: "The cost of borrowing or financing the investment (usually WACC or cost of debt). Used to discount negative cash flows."
    - name: "Enter reinvestment rate"
      text: "The expected return on reinvested cash flows (usually a safe rate like Treasury yield or your typical reinvestment opportunity)."
    - name: "Compare MIRR to your hurdle rate"
      text: "If MIRR > hurdle rate, the investment creates value. MIRR is typically more conservative and realistic than standard IRR."
  body: |
    MIRR (Modified Internal Rate of Return) fixes a key flaw in standard IRR: the
    assumption that all cash inflows are reinvested at the IRR itself — which is usually
    unrealistically high.

    ## MIRR formula

    **MIRR = (FV of positive cash flows at reinvestment rate / PV of negative cash flows at finance rate) ^ (1/n) − 1**

    Where n = number of periods.

    ## MIRR vs. IRR

    | Aspect | IRR | MIRR |
    |--------|-----|------|
    | Reinvestment assumption | At the IRR rate (often too high) | At your specified reinvestment rate |
    | Multiple IRR problem | Can have multiple solutions | Always single solution |
    | Typical result | Higher | Lower, more realistic |
    | Use case | Quick screening | More rigorous capital budgeting |

    ## When to use MIRR

    Use MIRR when:
    - Project cash flows alternate positive and negative (multiple IRR problem)
    - The reinvestment rate is significantly different from IRR
    - You need to compare projects with different lifespans
    - Lenders or sophisticated investors require it

    Typical MIRR thresholds: 15%+ for startup/VC investments, 12–18% for PE,
    8–12% for real estate, 6–10% for infrastructure.

- slug: cash-burn-by-department
  title: "Cash Burn by Department Calculator"
  nav_title: "Burn by Department"
  short: "Break down monthly cash burn by department — engineering, sales, marketing, G&A — and see which teams are consuming the most runway."
  date_added: "2026-06-18"
  new: true
