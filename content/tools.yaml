    - name: "Add ARPU for LTV estimate"
      text: "Enter monthly revenue per customer to see implied customer LTV at the current churn rate."
  body: |
    ## What Is Customer Retention Rate?

    Customer Retention Rate (CRR) measures what percentage of existing customers you kept over a period.

    $$\text{CRR} = \frac{\text{End Customers} - \text{New Customers}}{\text{Start Customers}} \times 100$$

    This isolates retention of the original customer base, excluding new acquisitions.

    ### Retention Rate vs Churn Rate

    $$\text{Churn Rate} = 100\% - \text{Retention Rate}$$

    A 90% monthly retention rate = 10% monthly churn rate. They are inverses.

    ### Benchmarks

    | Business Type | Target Monthly Retention |
    |---------------|------------------------|
    | B2B SaaS | 95–99% |
    | B2C SaaS | 90–95% |
    | E-commerce | 70–85% (annual) |
    | Mobile apps | 25–45% (day 30) |

    ### Why Retention Compounds

    A 5% improvement in retention can increase profits by 25–95% (Bain & Company). The math: a business with 98% monthly retention loses 21% of customers per year; at 95% retention, it loses 46%.

    ### Intent Pages

    - [What Is Customer Retention Rate?](/tools/customer-retention-rate-calculator/what-is-customer-retention-rate/)
    - [How to Improve Customer Retention Rate](/tools/customer-retention-rate-calculator/how-to-improve-customer-retention/)

- slug: percentage-change-calculator
  title: Percentage Change Calculator
  nav_title: "% Change"
  short: Calculate percentage change, absolute change, and CAGR between any two values.
  date_added: "2026-06-18"
  new: true
