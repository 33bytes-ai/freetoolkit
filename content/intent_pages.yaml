    - Fixed fee = $0.30
    - **Total fee = $29.30 | You receive = $970.70**

    For an international card: **$44.30 fee | $955.70 net**.

    ## At what volume do you get Stripe's custom pricing?

    Stripe negotiates custom pricing for businesses processing **$80,000+/month** in volume.
    Custom rates typically range from 2.2–2.5% + $0.10–$0.20, depending on transaction mix
    and risk profile. At $80k/month with a custom 2.4% + $0.15 rate, the $1,000 transaction
    fee drops to **$24.15** — saving $5.15 per transaction vs. standard pricing.

    ## $1,000 is the ACH threshold

    Stripe also supports ACH bank transfers at **0.8% (capped at $5)**. For a $1,000 transfer,
    ACH costs **$5.00** — 83% cheaper than card processing. For B2B invoices over $500,
    offering ACH alongside card payment can significantly reduce processing costs. Note: ACH
    takes 2–5 business days to settle vs. instant card authorization.

# ---- LTV:CAC benchmarks by industry ----

- slug: ltv-cac-saas-benchmarks
  parent_tool: ltv-cac-calculator
  title: "LTV:CAC Benchmarks for Different SaaS Business Models"
  description: "LTV:CAC ratio and payback period benchmarks for PLG, SMB, mid-market, and enterprise SaaS — with context for each."
  keywords: ["ltv cac saas benchmark", "saas unit economics benchmark", "ltv cac ratio by model", "plg ltv cac"]
  body: |
    The "3:1 is healthy" rule of thumb for LTV:CAC is a useful starting point, but
    optimal ratios vary significantly by business model, go-to-market motion, and stage.

    ## Benchmarks by GTM motion

    | Model | LTV:CAC target | Payback period | Why |
    |-------|---------------|---------------|-----|
    | **PLG / self-serve** | 5:1–10:1 | < 6 months | Low CAC (users self-educate); churn must be very low |
    | **SMB sales-assisted** | 3:1–5:1 | 12–18 months | Higher CAC from sales touch; higher churn |
    | **Mid-market** | 4:1–6:1 | 9–15 months | Balance of sales cost and lower churn |
    | **Enterprise** | 6:1–10:1 | 18–24 months | Very long sales cycles justified by very low churn |

    ## What top-quartile companies look like

    According to Bessemer Venture Partners benchmarks:
    - Top-quartile PLG companies: LTV:CAC of 8:1+, payback under 6 months
    - Top-quartile enterprise: LTV:CAC of 10:1+, payback under 18 months
    - Median public SaaS at IPO: LTV:CAC of 4:1–6:1

    ## The problem with benchmarking early-stage companies

    LTV:CAC is most meaningful above $1M ARR. Before that, sample sizes are too small and
    CAC can be artificially low (founder-led sales) or high (early experimentation). Focus
    on trend direction: is your LTV increasing and CAC decreasing over time?

- slug: ltv-cac-ecommerce-benchmarks
  parent_tool: ltv-cac-calculator
  title: "LTV:CAC Benchmarks for E-Commerce Businesses"
  description: "Customer lifetime value and CAC benchmarks for e-commerce, DTC brands, and subscription boxes — including repeat purchase rate."
  keywords: ["ltv cac ecommerce", "ecommerce customer lifetime value", "dtc ltv cac", "ecommerce cac benchmark"]
  body: |
    E-commerce LTV:CAC works differently from SaaS. There's no monthly churn rate —
    instead, the key variables are **repeat purchase rate**, **average order value (AOV)**,
    and **number of purchases per year**.

    ## E-commerce LTV formula

    **LTV = AOV × Purchase Frequency × Gross Margin % × Customer Lifetime (years)**

    For a customer who spends $80 per order, 3 times per year, at 40% gross margin, for
    3 years:
    LTV = $80 × 3 × 0.40 × 3 = **$288**

    ## E-commerce CAC benchmarks by channel

    | Channel | Typical CAC range |
    |---------|-----------------|
    | Google Shopping | $15–40 |
    | Meta (Facebook/Instagram) | $20–60 |
    | Influencer marketing | $25–80 |
    | Email/SMS (existing list) | $1–5 |
    | Organic social | $0–10 |

    ## What LTV:CAC should e-commerce target?

    For DTC brands: 3:1+ with payback in under 12 months is healthy. Subscription boxes
    aim for 2:1+ (acceptable due to high retention), while one-time purchase e-commerce
    needs 4:1+ to justify paid acquisition.

    High-AOV, high-margin products can profitably acquire customers at 1:1 if the repeat
    purchase rate is strong. The second purchase is almost free (email/SMS cost is minimal).

- slug: ltv-cac-agency-benchmarks
  parent_tool: ltv-cac-calculator
  title: "LTV:CAC Benchmarks for Digital Agencies and Consultancies"
  description: "Customer lifetime value and acquisition cost benchmarks for marketing agencies, design studios, and consulting firms."
  keywords: ["agency ltv cac", "consulting firm customer lifetime value", "agency client lifetime value", "digital agency ltv"]
  body: |
    Agencies and consultancies don't typically think in SaaS terms, but LTV:CAC is equally
    valid — and often better than most SaaS companies because client retention is high and
    CAC can be very low (referrals, reputation, LinkedIn).

    ## Agency LTV formula

    **Monthly retainer × Average client tenure (months) × Gross margin %**

    A $5,000/month retainer client who stays 24 months at 35% margin:
    LTV = $5,000 × 24 × 0.35 = **$42,000**

    ## Agency acquisition costs

    | Channel | Typical CAC |
    |---------|------------|
    | Referral from existing client | $0–$500 |
    | LinkedIn outreach | $500–$2,000 |
    | Paid ads (lead gen) | $2,000–$8,000 |
    | Conference / events | $3,000–$15,000 |
    | Cold outbound | $1,000–$5,000 |

    ## Improving agency LTV:CAC

    - **Extend client tenure**: quarterly business reviews, proactive reporting, and
      value expansion conversations (upsell from retainer to project work) are the
      highest-leverage levers
    - **Reduce CAC**: a strong referral program (10% of first year value to the referrer)
      can make referrals the primary channel — near-zero CAC and highest-quality clients

# ---- Rule of 40 by ARR tier ----

- slug: rule-of-40-by-arr-tier
  parent_tool: rule-of-40-calculator
  title: "Rule of 40 Benchmarks by ARR Stage — What Investors Expect"
  description: "Rule of 40 scores expected at $1M, $5M, $10M, and $50M ARR — and how to improve your score at each stage."
  keywords: ["rule of 40 benchmark", "rule of 40 saas stage", "rule of 40 arr", "saas rule of 40 by stage"]
  body: |
    The Rule of 40 is not uniformly applied at every ARR stage. Investors have different
    expectations depending on where you are in your growth journey.

    ## Rule of 40 expectations by ARR

    | ARR stage | Growth rate expectation | Margin expectation | Rule of 40 |
    |-----------|----------------------|-------------------|-----------|
    | **$0–1M** | 100–300% YoY | −50% to −100% | N/A (too early) |
    | **$1–5M** | 80–150% YoY | −30% to −60% | 20–80+ (growth trumps) |
    | **$5–10M** | 50–100% YoY | −20% to −40% | 30+ expected |
    | **$10–30M** | 40–60% YoY | −15% to −30% | 40+ expected |
    | **$30–100M** | 25–40% YoY | −10% to 0% | 40–50 |
    | **$100M+ / pre-IPO** | 20–35% YoY | 0–20% | 50–70+ for premium multiple |

    ## Why growth matters more early on

    Below $10M ARR, investors almost universally prioritize growth rate over profitability.
    A company growing at 200% with a −60% margin scores +140 on the Rule of 40 — but the
    score is almost irrelevant. What matters is the growth velocity.

    Above $10M ARR, the margin component starts to matter. VCs and growth equity firms
    start asking: is this business capital-efficient? Can it be profitable at scale?

    ## The Rule of 40 and public market valuations

    In the 2021 SaaS bull market, companies trading above 20× ARR almost universally had
    Rule of 40 scores above 60. Post-correction (2022–2024), the Rule of 40 remains
    important but the threshold for premium multiples has shifted:
    - Score 40–60: 8–14× ARR multiple (healthy)
    - Score 60+: 14–20× ARR multiple (top-quartile)
    - Score < 40: 4–8× ARR (requires clear path to improvement)

# ---- PayPal fees by country ----

- slug: paypal-fees-uk
