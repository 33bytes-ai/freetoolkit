- slug: saas-churn-benchmarks-by-stage
  parent_tool: churn-impact-calculator
  title: "SaaS Churn Rate Benchmarks — What Is Good Monthly Churn?"
  description: "Average monthly and annual churn rates for SaaS companies by stage, segment, and price point — plus what separates top-quartile retention from average."
  keywords: ["saas churn benchmarks", "good monthly churn rate saas", "average saas churn rate", "b2b saas churn rate"]
  body: |
    Churn benchmarks vary significantly by customer segment, price point, and market.
    A 3% monthly churn rate is devastating for enterprise SaaS but potentially acceptable
    for a low-cost self-serve product. Here are the key benchmarks.

    ## Monthly churn benchmarks by segment

    | Segment | Excellent | Good | Acceptable | Concerning |
    |---------|-----------|------|-----------|-----------|
    | SMB (<$500 ACV) | <1.5% | 1.5–3% | 3–5% | >5% |
    | Mid-market ($500–5k ACV) | <0.75% | 0.75–1.5% | 1.5–3% | >3% |
    | Enterprise (>$5k ACV) | <0.25% | 0.25–0.75% | 0.75–1.5% | >1.5% |
    | Consumer / B2C | <3% | 3–7% | 7–12% | >12% |

    ## Annual vs monthly churn conversion

    Annual churn ≠ monthly churn × 12 due to compounding:

    | Monthly Churn | Annual Churn (compounded) |
    |--------------|--------------------------|
    | 0.5% | 5.8% |
    | 1.0% | 11.4% |
    | 2.0% | 21.5% |
    | 3.0% | 30.7% |
    | 5.0% | 46.0% |

    ## Net revenue retention benchmarks

    NRR combines churn, downgrades, and expansions. Top-quartile SaaS:
    - PLG/self-serve: 100–115% NRR
    - Mid-market: 110–125% NRR
    - Enterprise: 115–130%+ NRR

    Use our [Churn Impact Calculator](/tools/churn-impact-calculator/) to model how
    changes in your churn rate affect MRR over 12 and 24 months.

- slug: how-to-reduce-churn-saas
  parent_tool: churn-impact-calculator
  title: "How to Reduce SaaS Churn — 8 Proven Tactics"
  description: "The most effective tactics for reducing monthly churn in B2B SaaS, from onboarding improvements to proactive health scoring and annual billing incentives."
  keywords: ["how to reduce saas churn", "reduce churn rate saas", "churn reduction tactics", "saas customer retention"]
  body: |
    Reducing churn by even 1% monthly has a compounding effect that outperforms
    most marketing investments. Here are the highest-impact tactics, ordered by ROI.

    ## 1. Fix onboarding (highest ROI)

    The majority of SaaS churn is decided in the first 30 days. Customers who don't
    reach their "aha moment" — the specific moment when the product's value becomes
    obvious — will churn regardless of how good the product is. Map your activation
    metric and optimize relentlessly toward it.

    ## 2. Proactive customer health scoring

    Identify customers at risk before they cancel. Key signals: login frequency below
    baseline, feature adoption drop, support ticket volume spike, NPS detractor response.
    Assign health scores and have customer success reach out to red accounts before they
    decide to leave.

    ## 3. Convert monthly to annual billing

    Annual subscribers churn at 5–10× lower rates. Offer a 15–20% discount for annual
    payment and actively push monthly subscribers to convert at the 3-month mark (when
    they've seen value but aren't yet deeply integrated).

    ## 4. Win-back campaigns for churned customers

    15–25% of churned customers can be won back within 90 days. A personal email from
    a founder or CSM, addressing the specific reason they cancelled, with a concrete
    offer (extended trial of new features, temporary discount) converts surprisingly well.

    ## 5. Exit survey discipline

    Tag every churn reason in your CRM. After 30 days of data, you'll see patterns:
    "too expensive," "missing feature X," "switching to competitor Y." Each cluster
    points to a specific fix. This is the highest-signal product feedback you'll get.

    Use our [Churn Impact Calculator](/tools/churn-impact-calculator/) to see exactly
    how much additional MRR you'd retain by reducing churn by 1–2%.

# ---- NPS calculator intent pages ----

- slug: nps-benchmarks-by-industry
  parent_tool: nps-calculator
  title: "NPS Benchmarks by Industry — What Is a Good NPS Score?"
  description: "Net Promoter Score benchmarks across major industries including SaaS, retail, financial services, and healthcare — so you know how your score compares."
  keywords: ["nps benchmarks by industry", "good nps score saas", "average nps score", "nps score comparison industry"]
  body: |
    NPS scores only mean something in context. An NPS of 40 is mediocre for consumer
    electronics but excellent for health insurance. Here are the benchmarks across
    major industries.

    ## NPS benchmarks by industry (2023–2024)

    | Industry | Excellent | Good | Average | Below Average |
    |----------|-----------|------|---------|---------------|
    | SaaS / Software | 60+ | 40–60 | 20–40 | <20 |
    | eCommerce | 60+ | 45–60 | 25–45 | <25 |
    | Financial services | 50+ | 30–50 | 10–30 | <10 |
    | Telecommunications | 30+ | 15–30 | 0–15 | <0 |
    | Health insurance | 20+ | 5–20 | -10–5 | <-10 |
    | Airlines | 50+ | 30–50 | 10–30 | <10 |
    | Consumer electronics | 65+ | 50–65 | 30–50 | <30 |
    | Retail | 65+ | 50–65 | 30–50 | <30 |

    **Notable benchmarks**: Apple ~72, Amazon ~60, Slack ~51, Salesforce ~66,
    HubSpot ~44, Zoom ~54.

    ## Why NPS varies by business model

    B2B SaaS scores tend to be higher than consumer products because business buyers
    are more rational in their evaluations, have lower expectations for delight, and
    give higher scores if the product solves a clear business problem effectively.

    Self-serve SaaS consistently scores higher than high-touch sales models, likely
    because self-serve customers chose the product themselves (self-selection bias).

    Use our [NPS Calculator](/tools/nps-calculator/) to calculate your NPS from
    your survey results and track changes over time.

- slug: how-to-run-nps-survey-saas
  parent_tool: nps-calculator
  title: "How to Run an NPS Survey for SaaS — Timing, Questions, and Follow-Up"
  description: "Best practices for running NPS surveys in a SaaS product: when to survey, which question to ask, how to segment results, and what to do with detractors."
  keywords: ["how to run nps survey saas", "nps survey best practices", "when to send nps survey", "nps follow up questions"]
  body: |
    Running NPS correctly is as important as calculating it. Here's how to get
    actionable data rather than a number that looks good on a dashboard.

    ## Two types of NPS surveys

    **Relationship NPS**: Sent to all customers on a schedule (quarterly or semi-annually).
    Measures overall satisfaction with your company. Best for tracking trends and
    comparing against industry benchmarks.

    **Transactional NPS**: Triggered by a specific event (onboarding completion,
    feature launch, support ticket resolution). Measures satisfaction with a specific
    interaction. Best for identifying specific fix points.

    ## Timing guidelines

    - Don't survey new customers in their first 30 days (they haven't seen full value yet)
    - Wait 7 days after a negative experience before surveying
    - Never survey the same customer more often than every 90 days
    - Transactional: survey within 24 hours of the trigger event

    ## The follow-up question matters more than the score

    The single-question NPS score tells you *what* your score is. The follow-up
    open-text question ("What's the main reason for your score?") tells you *why*.
    Code the responses into categories (e.g., "missing features," "price too high,"
    "excellent support") and track the distribution. This is where the actionable
    signal lives.

    ## Closing the loop

    Reply to every detractor within 48 hours. Acknowledge the specific concern they
    raised. This converts 15–25% of detractors to passive or promoter, and generates
    trust regardless of outcome.

    Use our [NPS Calculator](/tools/nps-calculator/) to calculate your NPS score from
    survey raw numbers.

