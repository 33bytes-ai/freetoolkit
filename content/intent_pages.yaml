# ---- Invoice total calculator intent pages ----

- slug: how-to-calculate-invoice-total
  parent_tool: invoice-total-calculator
  title: "How to Calculate an Invoice Total with Tax and Discounts"
  description: "A step-by-step guide to computing an invoice total correctly — including line items, discounts, tax, and late payment fees."
  keywords: ["how to calculate invoice total", "invoice calculation with tax", "invoice total formula", "invoice with discount calculation"]
  body: |
    Calculating an invoice total correctly avoids disputes, ensures you collect what you're
    owed, and keeps your accounts receivable clean.

    ## Invoice total formula

    **Subtotal** = sum of all line items (quantity × unit price)
    **After discount** = Subtotal × (1 − discount%)
    **Tax** = After-discount × tax rate%
    **Total** = After-discount + Tax

    ## Applying discounts: before or after tax?

    Always apply discounts to the pre-tax amount. Tax should be calculated on the
    discounted price, not the original. Some jurisdictions explicitly require this;
    applying tax before discount is incorrect and will overcharge your client.

    ## When to add late payment fees

    Include payment terms on every invoice (e.g. "Net 30, 1.5%/month late fee").
    Late fee = outstanding balance × monthly rate × months overdue.
    A $5,000 invoice 60 days overdue at 1.5%/month = $5,000 × 1.5% × 2 = $150 fee.

    ## Invoice numbering best practice

    Use sequential invoice numbers (INV-001, INV-002...) or date-prefixed (2024-INV-001).
    Never reuse a number — it creates accounting confusion and can flag tax audits.

    Build your invoice calculation with the [invoice total calculator](/tools/invoice-total-calculator/).

# ---- Sales quota calculator intent pages ----

- slug: how-to-set-sales-quotas
  parent_tool: sales-quota-calculator
  title: "How to Set Sales Quotas That Are Achievable and Motivating"
  description: "A framework for setting annual and quarterly sales quotas — based on territory potential, rep capacity, and historical attainment data."
  keywords: ["how to set sales quota", "sales quota setting methodology", "sales rep quota", "sales target calculator", "quota attainment rate"]
  body: |
    Sales quotas are one of the most consequential decisions in revenue planning. Set them
    too high and you destroy morale and retention. Too low and you leave money on the table.
    Here is a data-driven framework.

    ## The quota-setting inputs

    1. **Total revenue target** (from finance — usually ARR growth goal)
    2. **Number of quota-carrying reps** (QCRs) — exclude ramp, leave, management
    3. **Historical attainment** — what % of reps hit quota last period?
    4. **Territory/segment capacity** — TAM × penetration rate by territory

    ## Common quota models

    **Top-down**: Total target ÷ number of reps + management buffer (20–30%)
    - Simple, but ignores territory variation

    **Bottom-up**: Sum of territory potential × expected win rate
    - More accurate, requires territory data

    **Bottoms-up with attainment model**: Set quota so 60–70% of reps attain it
    - Research shows this maximises revenue per rep while preserving motivation

    ## Quota attainment benchmarks

    A healthy sales org has:
    - 60–70% of reps at or above quota
    - <5% of reps significantly below (50% of quota)
    - Clear top performer tier (120%+) driving outsized results

    Use the [sales quota calculator](/tools/sales-quota-calculator/) to model your
    revenue targets and per-rep allocations.

# ---- Pricing tier comparison intent pages ----

- slug: saas-pricing-tiers-best-practices
  parent_tool: pricing-tier-comparison
  title: "SaaS Pricing Tiers: Best Practices for 2024"
  description: "How to structure starter, growth, and enterprise pricing tiers for a SaaS product — with guidance on limits, feature gates, and upgrade triggers."
  keywords: ["saas pricing tiers", "saas pricing structure", "how to price saas product", "pricing tier best practices", "freemium vs paid tiers"]
  body: |
    Most SaaS products converge on 3 tiers: Starter / Growth / Enterprise. Here is what
    separates products that convert well from those that confuse buyers.

    ## The 3-tier structure

    **Starter** — designed to get users started quickly, often self-serve.
    - Price: $0–$49/month
    - Goal: activation, not revenue
    - Limits: usage caps that hit at the point of getting real value (e.g. 5 projects, 1,000 contacts)

    **Growth** — designed for teams who have validated the product.
    - Price: $49–$249/month
    - Goal: expansion revenue, team adoption
    - Features: collaboration, integrations, priority support

    **Enterprise** — designed for custom contracts and compliance requirements.
    - Price: custom / $1,000+/month
    - Goal: large contracts, security, SLA, dedicated support

    ## Feature gating principles

    1. **Gate on collaboration** — solo users stay on Starter; teams upgrade
    2. **Gate on volume** — usage limits that hit when ROI is already proven
    3. **Never gate on value-core features** — if the core job-to-be-done is gated, free users never get the aha moment
    4. **Transparent upgrade prompts** — show the limit, show the value, show the price

