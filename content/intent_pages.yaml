# ---- Stripe fee for specific amounts ----

- slug: stripe-fee-on-10-dollars
  parent_tool: stripe-fee-calculator
  title: "How Much Does Stripe Take on a $10 Charge?"
  description: "Exact Stripe fee on a $10 transaction — domestic and international breakdown."
  keywords: ["stripe fee on $10", "stripe 10 dollar fee", "stripe fee small amount", "stripe fee 10 dollars"]
  body: |
    On a **$10 charge** with a domestic US card, Stripe takes **$0.59** (5.9% effective rate):
    - 2.9% of $10 = $0.29
    - Fixed fee = $0.30
    - **Total fee = $0.59 | You receive = $9.41**

    For an international card (4.4% + $0.30): **$0.74 fee | $9.26 net**.

    ## Why small charges have a high effective rate
    The $0.30 fixed fee is disproportionately large on small transactions. At $10, it's
    already 3% before the percentage component is added. This is why Stripe offers a
    **micropayment rate (5% + $0.05)** — available to eligible businesses processing
    primarily small transactions under $10. At $10, the micropayment rate produces:
    5% × $10 + $0.05 = **$0.55**, which is slightly cheaper than the standard rate.

    ## To receive exactly $10 net
    If you need to receive exactly $10 from a domestic card, you need to charge **$10.62**
    (the gross-up: ($10 + $0.30) / (1 - 0.029) = $10.617).

    Use the calculator above and enable "charge more to receive exactly that amount."

- slug: stripe-fee-on-100-dollars
  parent_tool: stripe-fee-calculator
  title: "How Much Does Stripe Take on a $100 Charge?"
  description: "Exact Stripe fee on a $100 transaction — domestic (2.9% + $0.30) and international (4.4% + $0.30) breakdown."
  keywords: ["stripe fee on $100", "stripe 100 dollar fee", "how much does stripe charge on 100", "stripe net payout 100"]
  body: |
    On a **$100 charge** with a domestic US card, Stripe takes **$3.20** (3.2% effective):
    - 2.9% of $100 = $2.90
    - Fixed fee = $0.30
    - **Total fee = $3.20 | You receive = $96.80**

    For an international card (4.4% + $0.30): **$4.70 fee | $95.30 net**.

    ## Common $100 charge scenarios

    | Plan type | Monthly charge | Stripe fee | Net per subscriber |
    |-----------|---------------|-----------|-------------------|
    | SaaS monthly | $99 | $3.17 | $95.83 |
    | SaaS monthly | $100 | $3.20 | $96.80 |
    | E-commerce | $100 | $3.20 | $96.80 |

    ## To receive exactly $100 net
    Charge **$103.09** to receive exactly $100 after Stripe's fee:
    ($100 + $0.30) / (1 - 0.029) = $103.09.

    This is useful if you want to price at "$100 to me" rather than "$100 to customer."

