- slug: stripe-fees-for-subscriptions
  parent_tool: stripe-fee-calculator
  title: "Stripe Fees for Recurring Subscriptions"
  description: "How Stripe fees work for monthly and annual subscriptions — and how to calculate your net payout per billing cycle."
  keywords: ["stripe subscription fees", "stripe recurring billing fees", "stripe fees saas", "stripe monthly subscription fee"]
  body: |
    When you run a subscription business on Stripe, you pay the same **2.9% + $0.30** fee
    on every successful recurring charge — just as you would for a one-off payment. But a
    few nuances specific to subscriptions are worth understanding before you set your pricing.

    ## Do you pay a fee every time Stripe bills a subscriber?

    Yes. Each successful subscription renewal triggers a separate transaction fee. If a
    customer pays $99/month on a monthly plan, Stripe takes $3.17 on each renewal
    (2.9% × $99 + $0.30), leaving you $95.83. Over 12 months on a single subscriber,
    you pay $38.04 in total fees on $1,188 of gross revenue.

    On an annual plan at $990 (billed once), Stripe charges the fee once:
    $29.01, leaving $960.99. You net roughly the same — but only get one fee deduction
    instead of twelve.

    ## Annual vs. monthly billing: the fee math

    For a $99/month plan:

    | Billing | Annual gross | Annual fees | Annual net |
    |---------|-------------|------------|-----------|
    | Monthly | $1,188 | $38.04 | $1,149.96 |
    | Annual ($990) | $990 | $29.01 | $960.99 |

    Monthly billing generates $189 more gross revenue per year, and even after the extra
    fees, nets you $188.97 more per subscriber. This is why many SaaS products offer an
    annual discount of 15–20% — it's still financially favorable to the business through
    improved cash flow, not net payout advantage.

    ## Dunning and failed charges

    When a subscription renewal fails (insufficient funds, expired card), Stripe can
    automatically retry the charge on a configurable schedule. There is no fee for the
    failed attempt itself, but you don't receive the revenue. Third-party tools like
    Profitwell Retain improve recovery rates on failed payments by 40–60%.

    ## International subscribers

    Subscribers paying with cards issued outside the US incur an additional **1.5%
    cross-border fee** (bringing the total to 4.4% + $0.30). If a significant portion of
    your subscriber base is international, model your effective blended fee rate
    accordingly — use the calculator below.

    ## What about refunds?

    If you refund a subscriber, Stripe returns the percentage component (2.9%) but not
    the fixed $0.30. So on a full $99 refund, you lose $0.30 net.

- slug: stripe-vs-paypal-fees
  parent_tool: stripe-fee-calculator
  title: "Stripe vs PayPal Fees — Side-by-Side Comparison"
  description: "Exact fee comparison between Stripe and PayPal for standard transactions, subscriptions, and international payments in 2024."
  keywords: ["stripe vs paypal fees", "stripe or paypal cheaper", "paypal vs stripe comparison", "stripe paypal fee difference"]
  body: |
    Stripe and PayPal are the two most common payment processors for online businesses.
    Their standard rates look similar on the surface, but the details matter when you're
    optimizing margins.

    ## Standard transaction fees (US, domestic cards)

    | Processor | Rate | Fixed fee | Fee on $100 | Net on $100 |
    |-----------|------|-----------|------------|------------|
    | Stripe | 2.9% | $0.30 | $3.20 | **$96.80** |
    | PayPal (PayPal Checkout) | 3.49% | $0.49 | $3.98 | **$96.02** |
    | PayPal (advanced card) | 2.89% | $0.49 | $3.38 | **$96.62** |

    For a typical $100 transaction, Stripe is **$0.78 cheaper** than standard PayPal
    Checkout. Over $100k of revenue, that's a $780 difference.

    ## For subscriptions / recurring billing

    | Processor | Subscription rate | Notes |
    |-----------|------------------|-------|
    | Stripe Billing | 2.9% + $0.30 | Included; advanced dunning available via Stripe Radar |
    | PayPal Subscriptions | 3.49% + $0.49 | Higher per-transaction rate |

    Stripe is consistently cheaper for recurring SaaS subscriptions.

    ## International and cross-border fees

    | Processor | International fee | Total effective rate |
    |-----------|-----------------|---------------------|
    | Stripe | +1.5% | 4.4% + $0.30 |
    | PayPal | +1.5% | ~5.0% + $0.49 |

    ## Developer experience

    Stripe's API and documentation are widely regarded as superior for developers
    building custom checkout flows. PayPal's main advantage is brand recognition and
    the familiarity buyers have with "Pay with PayPal" — which can improve conversion
    rates in some B2C contexts.

    **Recommendation:** For SaaS, developer tools, and B2B products, Stripe is the
    better choice on fees, API quality, and ecosystem (Stripe Atlas, Stripe Tax, Stripe
    Billing). For marketplaces or B2C products where PayPal's checkout familiarity helps
    conversion, the additional fee may be worthwhile.

    Use the Stripe fee calculator above to model your exact net payout. For PayPal,
    enter 3.49% and $0.49 in the custom rate field.

- slug: stripe-fee-per-10k-revenue
  parent_tool: stripe-fee-calculator
  title: "How Much Does Stripe Take on $10,000 in Revenue?"
  description: "Exact Stripe fees on $10,000 of revenue, broken down by transaction size and card type."
  keywords: ["how much does stripe take per 10000", "stripe fees on 10000", "stripe transaction fee total", "stripe take rate"]
  body: |
    Stripe's fee on $10,000 of revenue depends entirely on how that $10,000 is spread
    across transactions — because the **$0.30 fixed fee per transaction** has a much
    larger impact on small payments than large ones.

    ## Fee breakdown by transaction size

    If your $10,000 comes from a single transaction:

    | Metric | Value |
    |--------|-------|
    | Gross revenue | $10,000 |
    | Stripe fee (2.9% + $0.30) | $290.30 |
    | Net payout | $9,709.70 |
    | Effective rate | 2.903% |

    If your $10,000 comes from 100 × $100 transactions:

    | Metric | Value |
    |--------|-------|
    | Gross revenue | $10,000 |
    | Stripe fees (2.9% + $0.30 × 100) | $320.00 |
    | Net payout | $9,680.00 |
    | Effective rate | 3.20% |

    If your $10,000 comes from 1,000 × $10 transactions:

    | Metric | Value |
    |--------|-------|
    | Gross revenue | $10,000 |
    | Stripe fees (2.9% + $0.30 × 1,000) | $590.00 |
    | Net payout | $9,410.00 |
    | Effective rate | 5.90% |

    ## Key insight: the $0.30 fixed fee is regressive

    On a $10 transaction, $0.30 is 3% on its own — meaning Stripe's effective rate is
    5.9% before the percentage component. On a $1,000 transaction, $0.30 is only 0.03%.

    If your average order value is low (under $20), consider:
    - Bundling purchases (e.g., credit top-ups rather than per-unit purchases)
    - Using Stripe's Link feature, which can reduce card-not-present fee rates for
      returning customers
    - Evaluating Paddle or Lemon Squeezy, whose all-in rates may work out cheaper for
      micro-transaction models

    Use the calculator above to enter your actual typical transaction amount and see
    the exact fee and net payout.

# ---- MRR calculator intent pages ----

- slug: saas-mrr-growth-benchmarks
  parent_tool: mrr-calculator
  title: "What Is a Good Monthly MRR Growth Rate for SaaS?"
  description: "MRR growth rate benchmarks by stage — seed, Series A, growth — and how to calculate your current growth rate."
  keywords: ["saas mrr growth rate", "good mrr growth rate", "saas monthly growth benchmark", "mrr growth percentage"]
  body: |
    MRR growth rate is the single number most investors, accelerators, and founders use
    to gauge the health of a SaaS business. But what's actually "good"?

    ## Growth rate benchmarks by stage

    | Stage | Monthly MRR growth | Annual growth equivalent |
    |-------|-------------------|------------------------|
    | Pre-product-market fit | 5–10% | 80–214% |
    | Early traction (seed) | 10–20% | 214–792% |
    | Y Combinator benchmark | 5–7% week-over-week | Implied ~20–30%/month |
    | Series A target | 15–25% | 435–1,355% ARR growth |
    | Series B+ scale | 5–10% | 80–214% |
    | Public SaaS (median) | 2–5% | 27–80% ARR |

    The YC "default alive" framework: at your current MRR growth rate and burn, will you
    become profitable before running out of money? The MRR calculator above can project
    this for you.

    ## How to calculate your MRR growth rate

    Month-over-month growth rate = ((MRR this month - MRR last month) / MRR last month) × 100

    If your MRR was $8,000 last month and is $9,000 this month:
    ((9,000 - 8,000) / 8,000) × 100 = **12.5% MoM growth**

    ## What drags down growth rate: net churn

    A 15% gross churn rate can completely offset strong new customer acquisition. If you're
    adding $2k in new MRR each month but losing $1.8k to churn, your *net* new MRR is only
    $200, regardless of how fast you're growing the top of the funnel.

    Use the churn impact calculator to see exactly how your churn rate is affecting your
    MRR trajectory.

# ---- LTV/CAC intent pages ----

- slug: ltv-cac-benchmarks-saas
  parent_tool: ltv-cac-calculator
  title: "LTV:CAC Ratio Benchmarks for SaaS Businesses"
  description: "Industry benchmarks for LTV:CAC ratio and CAC payback period by SaaS segment — SMB, mid-market, and enterprise."
  keywords: ["ltv cac ratio benchmark", "saas ltv cac industry benchmark", "good ltv cac saas", "cac payback period benchmark"]
  body: |
    LTV:CAC ratio and CAC payback period vary significantly by market segment.
    What's healthy at one stage or target market can be a red flag at another.

    ## Benchmarks by segment

    | Segment | LTV:CAC target | Payback period |
    |---------|---------------|---------------|
    | SMB SaaS (ACV < $5k) | 3:1 minimum | < 18 months |
    | Mid-market (ACV $5k–50k) | 4:1 target | < 12 months |
    | Enterprise (ACV > $50k) | 5:1+ target | < 18 months (longer sales cycle acceptable) |
    | PLG / product-led growth | 5:1+ | < 6 months |

    ## Why segment matters

    SMB SaaS has higher churn (3–5% monthly is common) and lower ACV, which means LTV is
    structurally lower. The 3:1 target is a floor, not a goal. The best SMB SaaS businesses
    achieve 5–8:1 through expansion revenue and below-average churn.

    Enterprise SaaS has longer sales cycles (CAC is higher) but also much lower churn
    (0.5–1% monthly is typical), so LTV is much higher. Even at 12–18-month payback,
    the lifetime value more than compensates.

    ## How to improve a poor LTV:CAC ratio

    **If LTV is too low:**
    - Reduce churn: each percentage point of monthly churn reduction has a multiplier
      effect on LTV (see the churn impact calculator)
    - Expand revenue: upsell, cross-sell, usage-based pricing
    - Improve gross margin: reduce hosting/API costs

    **If CAC is too high:**
    - Focus on highest-converting channels and cut underperforming ones
    - Invest in content and product-led growth to reduce paid acquisition dependence
    - Improve win rates: better sales process, stronger ICP definition

- slug: how-to-improve-ltv-cac
  parent_tool: ltv-cac-calculator
  title: "How to Improve Your LTV:CAC Ratio (Practical SaaS Playbook)"
  description: "Step-by-step playbook for improving LTV, reducing CAC, and achieving sustainable unit economics for your SaaS business."
  keywords: ["how to improve ltv cac ratio", "improve saas unit economics", "reduce cac saas", "increase ltv saas"]
  body: |
    A poor LTV:CAC ratio is almost always fixable, but the fix depends on which side of
    the equation is the problem. Use the calculator above to identify whether your issue
    is high CAC, low LTV, or both.

    ## If your CAC is too high

    **1. Identify your best-performing acquisition channel**
    Most SaaS businesses have one channel that produces 70% of their new customers at
    30% of their acquisition cost. Track CAC by channel (paid, organic, referral, content)
    and aggressively shift budget toward the winner.

    **2. Improve sales conversion rates**
    A 10% improvement in demo-to-close rate cuts CAC by 10% without reducing marketing spend.
    Typical levers: clearer positioning, shorter sales cycles, better objection handling.

    **3. Invest in product-led growth**
    PLG funnels (freemium, free trial with activation) can reduce CAC to near-zero for the
    initial conversion and shift the "sale" to an upgrade conversation post-activation.
    HubSpot, Slack, and Notion are canonical examples.

    ## If your LTV is too low

    **1. Reduce monthly churn — by far the highest-leverage action**
    A 2% reduction in monthly churn (e.g., from 5% to 3%) increases LTV by 67%. No
    acquisition optimization comes close to this impact. Focus: better onboarding,
    proactive customer success, activation rate improvement.

    **2. Increase expansion MRR**
    Usage-based pricing, tier upgrades, and add-on features all increase the revenue you
    earn per customer over time without new acquisition cost.

    **3. Increase gross margin**
    If your COGS (hosting, infrastructure, third-party APIs) is eating into margin,
    improving infrastructure efficiency or renegotiating API pricing directly raises LTV.

# ---- Runway calculator intent pages ----

- slug: how-much-runway-before-raising
  parent_tool: runway-calculator
  title: "How Much Startup Runway Do You Need Before Raising?"
  description: "How many months of runway to have before starting a fundraise, and what burn rate signals investors want to see."
  keywords: ["how much runway before fundraising", "startup runway before raising", "how long runway saas", "minimum runway fundraise"]
  body: |
    The most common mistake founders make with fundraising is starting too late. By the
    time runway drops below six months, your negotiating position is weak and your options
    are narrow. Here's how to think about timing your raise.

    ## The fundraising math

    A seed or Series A round typically takes **3–6 months** from first meeting to term
    sheet, and another 4–8 weeks to close and receive the money. Under an optimistic
    scenario, you need 4–5 months of runway just to run the process. Under realistic
    conditions, 6–8 months.

    **Rule of thumb: start your fundraise when you have 12 months of runway left.**

    This gives you:
    - 6 months to run the fundraising process (meetings, follow-ups, negotiations)
    - 6 months of buffer if the process takes longer than expected
    - The psychological position to walk away from bad terms

    ## What burn rate signals to investors

    Investors look at burn rate not just as a survival clock, but as a signal of capital
    efficiency. High burn relative to revenue growth is a yellow flag. High burn with
    strong MRR growth and clear payback period is acceptable.

    Key metrics investors want before a Series A:
    - Monthly burn clearly explained and controllable
    - Path to profitability or next fundraise milestones visible
    - Burn multiple < 2x (i.e., you're burning no more than $2 for every $1 of net new ARR)

    ## Default Alive vs. Default Dead

    Paul Graham's "Default Alive or Default Dead" framework asks: at your current growth
    rate and burn rate, will you reach profitability before running out of cash — without
    raising?

    If yes: you're default alive. Fundraising is optional and you negotiate from strength.
    If no: you're default dead. Every month you don't raise increases the existential risk.

    Use the runway calculator above with your monthly revenue growth rate to see your
    default alive / default dead status.

