- slug: mirr-excel-formula
  parent_tool: mirr-calculator
  title: "MIRR in Excel: Formula, Examples, and Common Mistakes"
  description: "How to calculate MIRR in Excel using the built-in MIRR function — with examples, argument explanations, and common mistakes to avoid."
  keywords: ["mirr excel", "mirr formula excel", "how to calculate mirr in excel", "excel mirr function", "mirr example spreadsheet"]
  body: |
    Excel's built-in `MIRR` function makes the calculation straightforward — but there
    are a few gotchas worth knowing before you use it in a model.

    ## Excel MIRR syntax

    ```
    =MIRR(values, finance_rate, reinvest_rate)
    ```

    **values**: a range of cells containing the cash flows (Year 0 through Year N).
    The first value must be negative (initial investment).

    **finance_rate**: the interest rate you pay on negative cash flows (cost of
    borrowing). Use your WACC or cost of debt.

    **reinvest_rate**: the interest rate you earn on reinvested positive cash flows.
    Use a conservative rate — Treasury yield, savings rate, or opportunity cost.

    ## Example

    Cash flows: Year 0 = −$100,000, Year 1–4 = $30,000 each.
    Finance rate = 10%, Reinvest rate = 8%.

    ```
    =MIRR({-100000,30000,30000,30000,30000}, 10%, 8%)
    = 12.66%
    ```

    With standard IRR: `=IRR({-100000,30000,30000,30000,30000})` = 7.71%

    MIRR is lower here because the reinvest rate (8%) is lower than the IRR (7.71%...
    wait, that seems backwards. Let me correct: MIRR can be higher OR lower than IRR
    depending on the rates used. When reinvest rate < IRR, MIRR < IRR.)

    ## Common mistakes

    1. **Not including Year 0**: the values array must include the initial outflow
       at position 0. If you start from Year 1, the function gives wrong results.
    2. **Using the same rate for both arguments**: this reduces MIRR to a simple
       IRR approximation and defeats the purpose.
    3. **Mixing periods**: MIRR assumes annual periods unless you adjust. For
       monthly cash flows, divide annual rates by 12.

    Use the [MIRR calculator](/tools/mirr-calculator/) for a web-based version
    without needing Excel.

- slug: burn-rate-formula-startup
  parent_tool: cash-burn-by-department
  title: "Startup Burn Rate: Formula, Types, and How to Track It"
  description: "A complete guide to startup burn rate — gross vs net burn, how to calculate it, what investors expect, and how to track it monthly."
  keywords: ["startup burn rate formula", "how to calculate burn rate", "gross burn vs net burn", "burn rate monthly", "what is burn rate startup"]
  body: |
    Burn rate is one of the most important metrics for pre-profitability startups.
    Here is everything you need to know to calculate and track it correctly.

    ## The two burn rate formulas

    **Gross burn rate** = total monthly cash outflow
    Sum of all salaries, rent, software, marketing, contractors, and other expenses.

    **Net burn rate** = gross burn − monthly revenue
    The actual amount of cash you consume each month after revenue offset.

    **Runway** = cash on hand ÷ net burn rate

    ## Example

    Cash in bank: $2,000,000
    Monthly gross burn: $250,000
    Monthly revenue: $50,000
    Net burn: $250,000 − $50,000 = **$200,000/month**
    Runway: $2,000,000 ÷ $200,000 = **10 months**

    ## What investors look at

    - **Burn multiple** = net burn ÷ net new ARR. <1× is efficient; >3× is burning
      unsustainably.
    - **Runway** — standard expectation is 18+ months when closing a round.
    - **Month-over-month trend** — is net burn increasing (growth mode), flat
      (scaling), or decreasing (efficiency improvements)?

    ## How to track burn rate

    1. Export all transactions from your bank/accounting software monthly
    2. Categorise by department (engineering, sales, marketing, G&A)
    3. Compare gross burn, net burn, and runway month-over-month
    4. Tie to your ARR growth: burn multiple = net burn / net new ARR

    Use the [cash burn by department calculator](/tools/cash-burn-by-department/)
    to model your current burn composition and runway.

- slug: rule-of-40-saas-benchmark
  parent_tool: rule-of-40-calculator
  title: "Rule of 40 SaaS Benchmarks: What Score Should You Target?"
  description: "Rule of 40 benchmarks for early-stage, growth, and public SaaS companies — and how your score correlates with valuation multiples."
  keywords: ["rule of 40 benchmark", "rule of 40 saas", "what is a good rule of 40 score", "rule of 40 public saas", "rule of 40 valuation"]
  body: |
    The Rule of 40 is a framework used by SaaS investors to assess whether a company's
    growth rate and profitability are in healthy balance. Here is what different scores
    mean in practice.

    ## Rule of 40 formula

    **Score = Revenue growth rate (%) + Profit margin (%)**

    Where profit margin is typically EBITDA margin or FCF margin.

    A score of 40+ is considered "passing." A score above 60 is exceptional.

    ## Benchmarks by company stage

    | Stage | Median Rule of 40 | Top quartile |
    |-------|------------------|--------------|
    | Pre-Series A | 30–50 | 60+ |
    | Series A–B | 40–60 | 80+ |
    | Series C+ | 35–55 | 70+ |
    | Public SaaS | 30–50 | 60+ |

    ## Rule of 40 vs. valuation multiples (public SaaS)

    Companies scoring above 40 trade at ~7–12× ARR.
    Companies scoring above 60 trade at ~10–18× ARR.
    Companies below 40 typically trade at ~3–6× ARR.

    *Note: multiples compress during market downturns — these are approximate.*

    ## The tradeoff between growth and profitability

    Early-stage companies typically achieve Rule of 40 via growth (e.g. 100% growth
    at −60% margins). Mature SaaS companies achieve it via profitability (e.g. 20%
    growth at 25% FCF margin). Both paths are valid — what matters is the sum.

    Use the [Rule of 40 calculator](/tools/rule-of-40-calculator/) to compute your
    score and see where you stand.

- slug: irr-formula-excel
  parent_tool: irr-calculator
  title: "How to Calculate IRR in Excel (Formula + Examples)"
  description: "Step-by-step guide to using Excel's IRR function — including the formula, required inputs, common errors, and when to use XIRR instead."
  keywords: ["irr excel", "irr formula excel", "how to calculate irr in excel", "excel irr function", "xirr vs irr excel"]
  body: |
    Excel's `IRR` function is the fastest way to calculate Internal Rate of Return
    for conventional cash flows. Here is how to use it correctly.

    ## Excel IRR syntax

    ```
    =IRR(values, [guess])
    ```

    **values**: a range containing the cash flows (must include at least one negative
    and one positive value). Year 0 (initial investment) should be the first cell.

    **guess**: optional starting guess for the iteration (default 0.1 = 10%).
    Only needed if IRR returns `#NUM!` or you expect an unusual result.

    ## Example

    In cells A1:A5: -100000, 25000, 30000, 35000, 40000
    Formula: `=IRR(A1:A5)` → **7.66%**

    If your hurdle rate is 12%, this investment should be rejected (IRR < hurdle).

    ## XIRR vs. IRR

    Use `XIRR` when cash flows don't occur on regular annual intervals:
    ```
    =XIRR(values, dates)
    ```

    XIRR is more accurate for real-world investments where cash flows vary
    (e.g. quarterly distributions, irregular capital calls).

    ## Common errors

    - **#NUM!**: IRR couldn't converge. Try a different `guess` or check for
      multiple sign changes (use MIRR instead).
    - **Forgetting Year 0**: if you don't include the initial investment as a
      negative value in the first cell, IRR returns incorrect results.

    Use the browser-based [IRR calculator](/tools/irr-calculator/) for instant
    calculation without Excel.

- slug: wacc-discount-rate-dcf
  parent_tool: wacc-calculator
  title: "Using WACC as Your DCF Discount Rate: A Practical Guide"
  description: "How to use WACC as the discount rate in a DCF valuation — including how to estimate cost of equity for early-stage companies and common mistakes."
  keywords: ["wacc discount rate", "wacc dcf", "discount rate dcf valuation", "cost of equity startup", "wacc for startup dcf"]
  body: |
    WACC (Weighted Average Cost of Capital) is the standard discount rate in DCF
    (Discounted Cash Flow) valuations. Here is how to use it correctly and what to
    do when textbook inputs aren't available.

    ## WACC in DCF: the mechanics

    In a DCF model:
    **Value = Σ (Free Cash Flow_t / (1 + WACC)^t) + Terminal Value / (1 + WACC)^n**

    WACC represents the required return for the entire capital structure — both equity
    and debt holders. Discounting at WACC gives enterprise value; subtract net debt
    to get equity value.

    ## Estimating WACC for early-stage companies

    Private companies and startups lack public market data for cost of equity. Approaches:

    **CAPM approach**: Cost of equity = Risk-free rate + β × (Market premium)
    - Risk-free rate: 10-year US Treasury yield (~4.5% in 2024)
    - Equity risk premium: 5–6% (Damodaran historical)
    - Beta: use comparable public company betas (0.8–1.5 for SaaS)

    **VC hurdle approach**: use the fund's target IRR (25–40% for early stage) as the
    cost of equity. This reflects the actual required return for equity investors.

    **No debt (pre-revenue)**: WACC = cost of equity. No debt weighting needed.

    ## Common WACC mistakes

    1. **Using book value instead of market value** for equity and debt weights
    2. **Not adjusting for taxes** on the cost of debt component
    3. **Using WACC for highly levered or distressed companies** — use adjusted
       present value (APV) instead when debt levels change significantly over time

    Use the [WACC calculator](/tools/wacc-calculator/) to compute your blended
    cost of capital for DCF analysis.

- slug: arr-mrr-saas-reporting
  parent_tool: arr-mrr-converter
  title: "ARR vs MRR: Which Should Your SaaS Report to Investors?"
  description: "When to report ARR vs MRR to investors and board members — with guidance on which metric is appropriate at each stage and how to avoid common misreporting."
  keywords: ["arr vs mrr investors", "when to report arr mrr", "saas reporting arr mrr", "arr mrr board reporting", "arr calculation saas"]
  body: |
    Both ARR and MRR measure subscription revenue, but they're used in different
    contexts. Here is the convention that most investors and board members expect.

    ## ARR vs. MRR: the rule of thumb

    **Use ARR for**: investor updates, term sheet negotiations, valuations,
    public comparisons, and anything with an annual time horizon.

    **Use MRR for**: monthly operational reviews, churn analysis, growth rate
    tracking, sales team quotas, and finance budgeting.

    ## When does ARR = MRR × 12?

    Always — ARR is simply MRR × 12. The question is which frame of reference you
    use. Reporting "$100k ARR" and "$8,333 MRR" conveys the same underlying revenue.

    ## Common misreporting mistakes

    1. **Mixing one-time and recurring revenue**: ARR/MRR should only include
       contractually recurring revenue. One-time setup fees, professional services,
       and hardware are excluded.

    2. **Inflating with full-contract value**: a 3-year contract for $120k paid upfront
       is $40k ARR (the annual portion), not $120k ARR.

    3. **Counting trials or freemium users**: ARR/MRR is for paying customers only.

    4. **Not netting downgrades and churn**: net ARR = new ARR + expansion − churn −
       contraction. Gross ARR only counts new bookings.

    ## ARR milestones investors care about

    $1M ARR: the first significant proof-of-concept
    $3M ARR: transition from founder-led sales to first AEs
    $10M ARR: Series B territory, repeatable sales motion
    $30M+ ARR: growth equity / late stage

    Use the [ARR/MRR converter](/tools/arr-mrr-converter/) to convert between
    the two metrics instantly.

