    - Fixed fee = $0.49
    - **Total fee = $30.39 | You receive = $969.61**

    For PayPal Checkout: **$35.39 fee | $964.61 net**

    ## At what volume does PayPal offer lower rates?

    PayPal's **Merchant Rate** program reduces fees based on monthly sales volume:
    - $0–$3,000/month: 2.99% + $0.49 (standard)
    - $3,001–$10,000/month: 2.89% + $0.49
    - $10,001–$100,000/month: 2.79% + $0.49
