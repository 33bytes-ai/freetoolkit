# ---- Shopify fee intent pages ----

- slug: shopify-basic-vs-shopify-plan-fees
  parent_tool: shopify-fee-calculator
  title: "Shopify Basic vs Shopify Plan — Fee Difference and When to Upgrade"
  description: "Side-by-side fee comparison of Shopify Basic ($39/mo) and Shopify Standard ($105/mo) — when the upgrade pays for itself."
  keywords: ["shopify basic vs shopify plan", "shopify plan comparison fees", "shopify upgrade worth it", "shopify basic vs standard"]
  body: |
    Shopify has three main plans: **Basic** ($39/mo), **Shopify** ($105/mo), and
    **Advanced** ($399/mo). Each step up reduces transaction fees and card rates.

    ## Fee comparison table

    | | Basic ($39/mo) | Shopify ($105/mo) | Advanced ($399/mo) |
    |-|---------------|-----------------|-------------------|
    | **Shopify Payments rate** | 2.0% + 25¢ | 1.7% + 25¢ | 1.5% + 25¢ |
    | **3rd-party gateway fee** | 2.0% | 1.0% | 0.5% |
    | **Amex / intl card rate** | 3.5% | 3.5% | 3.5% |

    ## When does upgrading from Basic to Shopify pay off?

    The plan upgrade costs an extra **$66/month** ($105 − $39). The fee reduction
    is 0.3% on Shopify Payments transactions.

    **Break-even formula**: Monthly GMV where 0.3% savings = $66/month
    = **$22,000/month GMV** (with Shopify Payments)

    If your store does more than $22,000/month via Shopify Payments, upgrading to
    the Shopify plan saves you net money.

    ## When does upgrading from Shopify to Advanced pay off?

    Extra cost: **$294/month**. Fee reduction: 0.2% on Shopify Payments.
    Break-even: **$147,000/month GMV**

    Most stores upgrade to Advanced for the custom reporting and lower third-party
    gateway fee (0.5% vs 1.0%), not the card rate difference.

- slug: shopify-fees-vs-woocommerce
  parent_tool: shopify-fee-calculator
  title: "Shopify Fees vs WooCommerce — Total Cost Comparison"
  description: "Full cost breakdown comparing Shopify and WooCommerce — platform fee, transaction fee, hosting, and break-even GMV."
  keywords: ["shopify vs woocommerce fees", "shopify vs woocommerce cost", "shopify woocommerce comparison", "woocommerce shopify fee"]
  body: |
    Shopify and WooCommerce have fundamentally different cost structures. Shopify
    charges a predictable monthly fee; WooCommerce charges $0 platform fee but
    requires hosting and more maintenance.

    ## Monthly cost comparison

    | Cost component | Shopify Basic | WooCommerce |
    |----------------|--------------|-------------|
    | Platform fee | $39/mo | $0 |
    | Hosting | included | $10–25/mo |
    | Transaction fee (Stripe) | 2.0% (non-SP) or 0% (SP) | 0% |
    | Card processing (Stripe) | 2.0% + 25¢ (SP) | 2.9% + 30¢ |
    | Domain | ~$2/mo | ~$2/mo |
    | Maintenance / plugins | $0 | $10–50/mo |

    ## At what GMV does WooCommerce become cheaper?

    With Shopify Payments (no transaction fee) at $22k/month GMV on Basic:
    - Shopify: $39 + ($22,000 × 0.02) = $39 + $440 = **$479/mo**
    - WooCommerce + Stripe: $20 + ($22,000 × 0.029) = $20 + $638 = **$658/mo**

    At this volume, Shopify Basic with Shopify Payments is actually **cheaper** than
    WooCommerce + Stripe — because Shopify Payments (2.0% + 25¢) is cheaper than
    Stripe's standard rate (2.9% + 30¢).

    WooCommerce wins on:
    - **Flexibility**: unlimited customization, any hosting, full code ownership
    - **Very low volume**: under $5k/month where the platform fee dominates
    - **No transaction fees with any payment processor** (unlike Shopify's 2% for 3rd-party gateways)

    Use the Shopify fee calculator above to model your specific plan and volume.

- slug: shopify-payments-vs-stripe
  parent_tool: shopify-fee-calculator
  title: "Shopify Payments vs Stripe — Which Is Cheaper and When?"
  description: "Detailed fee comparison between Shopify Payments and a separate Stripe integration — with break-even GMV calculations."
  keywords: ["shopify payments vs stripe", "shopify payments fee vs stripe", "should i use shopify payments or stripe", "shopify stripe comparison"]
  body: |
    If you're on Shopify, you have two main card processing options: **Shopify Payments**
    (built in, eliminates the transaction fee) or **Stripe via third-party gateway**
    (standard Stripe rates but adds 0.5–2% Shopify transaction fee on top).

    ## Fee comparison: Shopify Payments vs Stripe on Shopify

    | Plan | Shopify Payments | Stripe + Shopify fee | Difference |
    |------|-----------------|---------------------|-----------|
    | Basic | 2.0% + 25¢ | 2.9% + 30¢ + 2.0% = 4.9% + 30¢ | +2.9% |
    | Shopify | 1.7% + 25¢ | 2.9% + 30¢ + 1.0% = 3.9% + 30¢ | +2.2% |
    | Advanced | 1.5% + 25¢ | 2.9% + 30¢ + 0.5% = 3.4% + 30¢ | +1.9% |

    **Shopify Payments is almost always cheaper** for stores primarily processing
    domestic US Visa/Mastercard. The Shopify transaction fee alone (2% on Basic) is
    a large penalty for using Stripe directly.

    ## When Stripe outside Shopify makes sense

    - You're migrating off Shopify and want to keep your Stripe customer data
    - You need Stripe-specific features (Radar, Connect, Issuing) not available in Shopify Payments
    - You're selling in a country where Shopify Payments isn't available
    - You have subscription revenue that Shopify Payments handles worse than Stripe Billing

    For most Shopify stores: **use Shopify Payments**. The transaction fee penalty
    for using Stripe is too high except in the specific cases above.

# ---- Break-even calculator intent pages ----

- slug: break-even-analysis-for-saas
  parent_tool: break-even-calculator
  title: "Break-Even Analysis for SaaS — How Many Customers Do You Need?"
  description: "How to calculate your break-even customer count for a SaaS product, including worked examples for different price points and infrastructure costs."
  keywords: ["break even analysis saas", "saas break even calculator", "how many customers to break even", "saas break even point"]
  body: |
    For a SaaS business, break-even analysis answers one question: **how many paying
    customers do I need to cover my fixed costs?** The math is simpler than it looks.

    ## The SaaS break-even formula

    **Break-even customers = Fixed monthly costs ÷ (Subscription price − Variable cost per customer)**

    Variable costs per SaaS customer are typically small: hosting ($0.50–$5/month),
    support time (pro-rated), and payment processing fees (~3%). For a $49/month product
    with $2 variable cost per customer:

    | Fixed Monthly Costs | Break-Even Customers | Break-Even MRR |
    |--------------------|--------------------|----------------|
    | $2,000 | 43 | $2,107 |
    | $5,000 | 107 | $5,243 |
    | $15,000 | 319 | $15,631 |
    | $50,000 | 1,064 | $52,136 |

    ## What counts as fixed cost?

    Include: founder salaries, contractor costs, SaaS tools subscriptions,
    server/infrastructure costs, office/coworking space, insurance, and
    accounting fees. Do not include payment processing fees or per-customer
    hosting — those are variable.

    ## The 10× rule for SaaS pricing

    If your break-even customer count feels impossibly high, your price is probably
    too low. Many SaaS founders use the 10× rule: price at roughly 10% of the annual
    value delivered. A tool saving a customer 5 hours/month at $100/hour = $6,000/year
    in value → $600/year ($50/month) is defensible pricing.

    Use our [Break-Even Calculator](/tools/break-even-calculator/) to find your exact
    break-even point, and our [MRR Calculator](/tools/mrr-calculator/) to model how
    long it takes to reach it.

- slug: break-even-point-for-ecommerce
  parent_tool: break-even-calculator
  title: "Break-Even Point for eCommerce — Units, Revenue, and Margin"
  description: "How to calculate your eCommerce break-even point in units sold and monthly revenue, with worked examples for product businesses with COGS and shipping."
  keywords: ["break even point ecommerce", "ecommerce break even calculator", "break even units sold", "product business break even"]
  body: |
    eCommerce break-even analysis is more complex than SaaS because you have both
    **fixed costs** (warehouse, staff, software) and **variable costs** (COGS, shipping,
    payment fees) that vary with each order.

    ## eCommerce break-even formula

    **Break-even units = Fixed monthly costs ÷ (Selling price − COGS − Variable costs per order)**

    Example: $30 product, $12 COGS, $3 shipping, $1.20 payment fee:

    - Contribution per order = $30 − $12 − $3 − $1.20 = **$13.80**
    - Fixed costs $8,000/month → Break-even = 8,000 ÷ 13.80 = **580 orders/month**
    - Break-even revenue = 580 × $30 = **$17,400/month**

    ## The impact of product margin on break-even

    Low-margin products require dramatically more volume to break even:

    | Gross Margin | Break-even at $8k fixed costs ($30 product) |
    |-------------|---------------------------------------------|
    | 60% ($18) | 444 orders / $13,320 revenue |
    | 46% ($13.80) | 580 orders / $17,400 revenue |
    | 33% ($10) | 800 orders / $24,000 revenue |
    | 20% ($6) | 1,333 orders / $40,000 revenue |

    ## Contribution margin vs gross margin

    Contribution margin includes all variable costs (shipping, payment fees,
    returns/refunds allowance). Gross margin only subtracts COGS. Always use
    contribution margin for break-even analysis — gross margin overstates your
    actual per-unit profit.

    Use our [Break-Even Calculator](/tools/break-even-calculator/) to model your
    exact numbers, and our [Profit Margin Calculator](/tools/profit-margin-calculator/)
    to track gross vs operating margin as you scale.

- slug: what-price-to-break-even
  parent_tool: break-even-calculator
  title: "What Price Do I Need to Break Even? — Reverse Break-Even Calculation"
  description: "How to calculate the minimum price you need to charge to break even on a product or service, given your fixed costs and expected sales volume."
  keywords: ["minimum price to break even", "break even pricing formula", "what price should I charge", "pricing to cover costs"]
  body: |
    Instead of asking "how many units to break even?" — sometimes you need to ask
    **"what price do I need to charge to break even at my expected sales volume?"**
    This is reverse break-even analysis.

    ## Reverse break-even formula

    **Minimum price = (Fixed costs ÷ Expected units) + Variable cost per unit**

    Example: $6,000 fixed monthly costs, expect to sell 200 units, $8 variable cost:

    - Minimum price = ($6,000 ÷ 200) + $8 = $30 + $8 = **$38/unit**

    At $38, you cover costs exactly (zero profit). Add your target margin on top:

    - For 20% profit margin: price = $38 ÷ (1 − 0.20) = **$47.50**
    - For 30% profit margin: price = $38 ÷ (1 − 0.30) = **$54.30**

    ## Why this matters for product pricing

    Many founders choose prices based on competitor benchmarks without checking
    whether those prices are actually profitable given their cost structure. If your
    costs are higher than competitors' (smaller production runs, higher shipping costs,
    premium materials), you need to either find a price-justified positioning or reduce costs.

    Use the [Break-Even Calculator](/tools/break-even-calculator/) to model different
    price points, and cross-check with the [Profit Margin Calculator](/tools/profit-margin-calculator/)
    to see net margin at each price.

# ---- VAT calculator intent pages ----

- slug: vat-rates-by-country-2024
  parent_tool: vat-calculator
  title: "VAT Rates by Country 2024 — UK, EU, Australia, Canada"
  description: "Complete list of standard VAT/GST rates by country for 2024, including reduced rates for essential goods and digital services rules."
  keywords: ["vat rates by country 2024", "vat rates europe", "uk vat rate", "gst rate australia", "eu vat rates"]
  body: |
    VAT (Value Added Tax), GST (Goods and Services Tax), and sales tax are all
    consumption taxes — but the rates, rules, and names vary by country. Here are
    the standard rates for the most common trading destinations.

    ## Standard VAT/GST rates 2024

    | Country | Standard Rate | Reduced Rate | Notes |
    |---------|--------------|--------------|-------|
    | United Kingdom | 20% | 5% | 0% on food, children's goods |
    | Germany | 19% | 7% | |
    | France | 20% | 5.5% / 10% | |
    | Italy | 22% | 10% / 5% | |
    | Spain | 21% | 10% | |
    | Netherlands | 21% | 9% | |
    | Sweden | 25% | 6% / 12% | Highest in EU |
    | Norway | 25% | 15% | Not EU |
    | Australia | GST 10% | N/A | Flat rate |
    | Canada | GST 5% | N/A | Plus provincial PST |
    | New Zealand | GST 15% | N/A | |
    | India | GST 18% | 5% / 12% | Multiple slabs |
    | United States | 0% (federal) | — | State sales tax only |

    ## Digital services VAT rules

    If you sell digital products (software, ebooks, SaaS subscriptions) to EU consumers,
    you must charge VAT at the customer's country rate — not your own country's rate.
    This applies even if you're based outside the EU. The EU One-Stop Shop (OSS) scheme
    simplifies this by letting you file one EU VAT return.

    UK has similar rules post-Brexit: non-UK businesses selling digital services to UK
    consumers must register for UK VAT if sales exceed £8,818/year.

    Use our [VAT Calculator](/tools/vat-calculator/) to add or remove VAT at any rate.

- slug: vat-on-digital-services
  parent_tool: vat-calculator
  title: "VAT on Digital Services — Rules for SaaS and Software Businesses"
  description: "How VAT applies to SaaS subscriptions, software, and digital products sold to UK and EU customers, including the OSS registration threshold."
  keywords: ["vat on digital services", "saas vat eu", "digital services vat rules", "vat on software subscriptions", "eu vat oss scheme"]
  body: |
    If you sell SaaS, software licenses, or other digital services, VAT rules are
    significantly more complex than selling physical goods. Here's what you need to know.

    ## EU digital services VAT (the "destination principle")

    Since 2015, digital services sold to EU consumers are taxed where the **customer**
    is located — not where you're based. This means:

    - A US-based SaaS charging a French consumer must charge French VAT (20%)
    - A UK-based SaaS charging a German business charges 0% (B2B reverse charge)
    - An Australian developer selling an app to Italian consumers must charge Italian VAT (22%)

    **EU OSS threshold**: If your total EU consumer digital sales exceed €10,000/year,
    you must register for VAT (either locally or via the EU One-Stop Shop). Below this
    threshold, you can apply your own country's VAT rate.

    ## B2B vs B2C — the crucial distinction

    The rules above apply to **B2C** (selling to consumers). For **B2B** (selling to
    other VAT-registered businesses), the reverse charge mechanism applies:
    - You charge 0% (or no VAT)
    - The business customer self-reports the VAT in their own country
    - You must obtain and verify their VAT registration number

    ## UK rules post-Brexit

    The UK operates its own digital services VAT regime. Non-UK businesses with UK
    digital sales above £8,818/year must register for UK VAT (currently 20%) and file
    UK VAT returns separately from EU VAT.

    Use our [VAT Calculator](/tools/vat-calculator/) to calculate the correct VAT amount
    for any rate, and check your country's tax authority website for current thresholds.

