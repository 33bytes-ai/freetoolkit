- slug: mrr-to-valuation-multiple
  parent_tool: mrr-calculator
  title: "What Is Your MRR Worth? SaaS Valuation Multiples"
  description: "How SaaS companies are valued relative to MRR and ARR — revenue multiples by growth rate, profitability, and company stage."
  keywords: ["saas mrr valuation", "saas arr multiple", "saas revenue multiple 2024", "what is mrr worth valuation"]
  body: |
    SaaS companies are valued as a multiple of ARR (Annual Recurring Revenue = MRR × 12).
    Understanding these multiples helps founders estimate company value, benchmark
    fundraising terms, and understand what growth rate is needed to justify a target valuation.

    ## Revenue multiples by stage (2024 environment)

    | Stage | ARR | Typical ARR Multiple | Notes |
    |-------|-----|---------------------|-------|
    | Pre-revenue / MVP | <$10k | N/A (team + market) | Valued on potential |
    | Early traction | $10k–$500k | 3–8× | Proof of concept |
    | Growth | $500k–$5M | 5–15× | PMF established |
    | Scale | $5M–$20M | 8–20× | Strong NRR, growth |
    | Late growth | $20M+ | 10–25× | Near-public quality |

    These are wide ranges because multiples depend heavily on growth rate, NRR, and
    gross margin. A company growing 150% YoY with 120% NRR commands a much higher
    multiple than one growing 30% with 95% NRR.

    ## The growth + margin premium

    The Rule of 40 score (growth rate + profit margin) strongly predicts the valuation
    multiple. Public SaaS data shows:
    - Rule of 40 < 20: ~6–8× ARR
    - Rule of 40 20–40: ~8–12× ARR
    - Rule of 40 40–60: ~12–18× ARR
    - Rule of 40 > 60: ~18–30× ARR

    Use our [MRR Calculator](/tools/mrr-calculator/) to calculate your current ARR, and
    our [Rule of 40 Calculator](/tools/rule-of-40-calculator/) to see where you stand.

- slug: annual-billing-impact-on-mrr
  parent_tool: mrr-calculator
  title: "Annual vs Monthly Billing — Impact on MRR and Cash Flow"
  description: "How offering annual subscriptions affects your MRR calculation, cash flow, and effective churn rate — including worked examples."
  keywords: ["annual billing vs monthly saas", "annual plans impact on mrr", "saas annual billing cashflow", "annual subscription mrr calculation"]
  body: |
    Offering annual billing alongside monthly is one of the highest-leverage decisions
    a SaaS founder can make. Here's the full picture of the tradeoffs.

    ## How annual billing is counted in MRR

    An annual subscriber paying $1,188/year ($99 × 12) contributes **$99 MRR** —
    the same as a monthly subscriber. Their ARR contribution is $1,188.

    The $1,188 received upfront is **deferred revenue** — you earn it $99/month
    as you deliver the service. From an MRR perspective, both billing types are identical.

    ## Cash flow advantage of annual billing

    The difference is pure cash flow and churn reduction:

    | Metric | Monthly billing | Annual billing |
    |--------|----------------|---------------|
    | Cash received today | $99 | $1,188 |
    | Churn risk this month | ~2–3% | ~0% (locked in) |
    | Effective annual churn | 24–36% | 5–15% |
    | Customer LTV | ~$1,200–2,475 | ~$2,000–4,000 |

    Annual subscribers churn at 5–10× lower rates because: (1) they're already
    committed, (2) they evaluated the product more carefully before buying, and
    (3) the renewal decision happens once a year rather than implicitly every month.

    ## Typical annual discount to offer

    Industry standard is a 10–20% discount for annual payment (equivalent to giving
    1–2 months free). This converts enough monthly subscribers to annual to improve
    cash position and reduce churn, while not unduly reducing revenue.

    Use our [MRR Calculator](/tools/mrr-calculator/) to model your revenue mix with
    different ratios of monthly vs annual subscribers.

- slug: saas-mrr-benchmarks-by-stage
  parent_tool: mrr-calculator
  title: "SaaS MRR Benchmarks — What Is Good MRR Growth by Stage?"
  description: "MRR growth benchmarks for SaaS companies from $0 to $1M MRR — monthly growth rates, time-to-targets, and what separates top quartile from average."
  keywords: ["saas mrr benchmarks", "good mrr growth rate", "saas mrr milestones", "how long to 1m mrr saas"]
  body: |
    Understanding what "good" MRR growth looks like at each stage helps founders
    set realistic targets and diagnose whether their growth is on track.

    ## MRR growth benchmarks by stage

    | MRR Stage | Top Quartile MoM Growth | Median MoM Growth | T2D3 Target |
    |-----------|------------------------|------------------|-------------|
    | $0 → $10k | 30–50%+ | 15–25% | 30%+ |
    | $10k → $50k | 20–30% | 10–20% | 20–25% |
    | $50k → $100k | 15–20% | 8–15% | 15–20% |
    | $100k → $500k | 10–15% | 5–10% | ~12% |
    | $500k+ MRR | 7–12% | 4–7% | ~8% |

    ## Time to common MRR milestones

    At a steady 15% monthly growth from $1k MRR:
    - $10k MRR: ~16 months
    - $50k MRR: ~26 months
    - $100k MRR: ~31 months

    Growth rates typically slow as you scale — early growth of 30%/month is much
    harder to sustain above $50k MRR as channel saturation increases.

    ## Leading indicators of MRR growth

    Track these weekly: new trial starts, trial-to-paid conversion rate, expansion
    revenue from upgrades, and net new MRR (new + expansion − churn). These predict
    next month's MRR before it appears in the headline number.

    Use our [MRR Calculator](/tools/mrr-calculator/) to track your monthly recurring
    revenue, and our [Churn Impact Calculator](/tools/churn-impact-calculator/) to
    model how churn affects your growth trajectory.

# ---- Runway calculator intent pages ----

- slug: startup-burn-rate-benchmarks
  parent_tool: runway-calculator
  title: "Startup Burn Rate Benchmarks — What Is a Good Burn Rate?"
  description: "Average monthly burn rates for startups by stage and team size, plus the burn multiple metric used by top-tier VCs to evaluate efficiency."
  keywords: ["startup burn rate benchmarks", "what is a good burn rate", "burn multiple saas", "monthly burn rate by stage"]
  body: |
    "Burn rate" is the net cash a startup spends each month (expenses minus revenue).
    Burn rates vary enormously by stage, team size, and location — but some benchmarks
    help founders calibrate whether their spending is appropriate.

    ## Typical monthly burn rates by stage

    | Stage | Team Size | Typical Monthly Burn |
    |-------|-----------|---------------------|
    | Pre-seed / solo | 1–2 people | $5k–$25k |
    | Seed | 3–8 people | $50k–$200k |
    | Series A | 10–25 people | $200k–$600k |
    | Series B | 25–60 people | $500k–$2M |
    | Series C+ | 60+ people | $1M–$5M+ |

    These are wide ranges. Fully-remote teams with experienced founders spend 30–50%
    less than SF/NYC-based teams with equivalent headcount.

    ## Burn multiple — the VC efficiency metric

    Burn multiple = Net cash burned ÷ Net new ARR. It measures how efficiently you're
    converting cash into revenue growth:

    - Under 1×: Exceptional (every dollar burned produces more than a dollar of ARR)
    - 1–1.5×: Good (Series A/B standard)
    - 1.5–2×: Acceptable
    - Above 2×: Concerning (review spending vs growth tradeoffs)

    ## The 18-month rule

    Most experienced startup advisors recommend maintaining at least 18 months of runway
    at all times. This gives you enough time to either raise a new round or achieve
    profitability if fundraising conditions worsen.

    Use our [Runway Calculator](/tools/runway-calculator/) to calculate your exact
    runway and model different burn scenarios.

- slug: default-alive-or-default-dead
  parent_tool: runway-calculator
  title: "Default Alive or Default Dead — Paul Graham's Startup Test"
  description: "How to calculate whether your startup is default alive (can reach profitability before running out of cash) or default dead — and what to do if you're default dead."
  keywords: ["default alive default dead startup", "paul graham default alive", "startup profitability calculator", "will startup run out of cash"]
  body: |
    Paul Graham introduced the "default alive / default dead" framework in 2015. It
    asks a single critical question: **at your current growth rate and burn rate, will
    you reach profitability before running out of money?**

    ## Calculating your status

    You're **default alive** if:
    - Your current revenue growth rate continues, AND
    - You reach monthly profitability (revenue > expenses) before your cash runs out

    You're **default dead** if you would run out of cash before reaching break-even
    at your current trajectory.

    ## Why it matters more than runway

    Runway alone is misleading because it assumes no revenue growth. A startup with
    $50k MRR, $80k monthly burn, 15% monthly revenue growth, and 12 months of cash
    reaches break-even in month 5 — it's default alive despite a negative-looking runway.

    ## The three levers

    If you're default dead, you have three options (ideally combined):
    1. **Reduce burn** — cut expenses, extend runway
    2. **Accelerate revenue** — focus entirely on sales and customer success
    3. **Raise capital** — extend runway to give the growth curve time to work

    Graham's advice: becoming default alive should be the immediate priority before
    anything else. Spending time on fundraising while default dead is backwards.

    Use our [Runway Calculator](/tools/runway-calculator/) to model your exact
    default alive / default dead status with your current numbers.

