    the revenue impact of different tier structures.

# ---- Employee turnover cost intent pages ----

- slug: true-cost-of-employee-turnover
  parent_tool: employee-turnover-cost-calculator
  title: "The True Cost of Employee Turnover (And How to Reduce It)"
  description: "Research-backed breakdown of what employee turnover actually costs — covering separation, vacancy, recruiting, onboarding, and productivity ramp."
  keywords: ["cost of employee turnover", "employee turnover cost", "true cost of losing an employee", "how much does employee turnover cost"]
  body: |
    Losing an employee costs between 50% and 200% of their annual salary. That range
    exists because most organisations only count the recruiting fee — and miss everything else.

    ## The five cost components

    **1. Separation costs** (~4% of salary)
    Exit interviews, HR processing, final payroll, unemployment insurance increase.

    **2. Vacancy costs** (daily rate × days to fill)
    Work either doesn't get done (lost output) or gets redistributed to teammates
    (hidden productivity tax). Average time to fill: 42 days across all roles;
    84 days for senior/specialised roles.

    **3. Recruiting costs** (~15% of salary)
    Agency fees run 15–25% for professional roles. In-house recruiting time averages
    80–100 hours per hire when you include sourcing, screening, interviews, and offers.

    **4. Onboarding costs** (~12% of salary)
    Formal training, documentation, manager time, IT setup, compliance training.

    **5. Ramp-to-productivity** (~25% of salary)
    A new hire typically reaches 80% productivity at 3–6 months. The gap between 100%
    and 80% productivity over that period is a real cost on your P&L.

    **Total: ~56–60% of annual salary for a mid-level role**
    For senior roles (director and above), multiply by 1.5–2×.

    Use the [employee turnover cost calculator](/tools/employee-turnover-cost-calculator/) to
    model what each departure actually costs your business.

# ---- IRR calculator intent pages ----

- slug: what-is-a-good-irr-for-a-startup
  parent_tool: irr-calculator
  title: "What Is a Good IRR for a Startup Investment?"
  description: "IRR benchmarks for startup investments, venture capital, and private equity — and how to interpret IRR alongside MOIC and payback period."
  keywords: ["what is a good irr", "irr benchmarks startup", "irr venture capital", "good irr for investment", "irr vs moic"]
  body: |
    IRR (Internal Rate of Return) benchmarks vary by stage, sector, and asset class.
    Here is what investors consider "good" across different contexts.

    ## IRR benchmarks by context

    | Context | Minimum acceptable IRR | Target IRR |
    |---------|----------------------|------------|
    | Angel / pre-seed | 30% | 50–100%+ |
    | Series A / VC | 25% | 40–60% |
    | Growth equity | 20% | 30–40% |
    | Private equity buyout | 15% | 20–30% |
    | Real estate development | 12% | 18–25% |
    | Public market hurdle | 8–12% | — |

    ## IRR vs. MOIC

    IRR is time-sensitive: a 3× return in 2 years = ~73% IRR; a 3× return in 6 years = ~20% IRR.
    MOIC (Multiple on Invested Capital) ignores time, so investors use both:
    - **IRR** to compare investments with different holding periods
    - **MOIC** to communicate magnitude of return to LPs

    ## When IRR misleads

    IRR assumes reinvestment at the same rate. For investments with large early cash flows
    (e.g. quick dividends), IRR overstates the blended return. Use MIRR (Modified IRR)
    when reinvestment rate differs materially from the project IRR.

    Use the [IRR calculator](/tools/irr-calculator/) to compute IRR and NPV for any
    cash flow series.

# ---- Payroll tax calculator intent pages ----

- slug: employer-payroll-tax-guide-us
  parent_tool: payroll-tax-calculator
  title: "US Employer Payroll Taxes: A 2024 Guide"
  description: "Complete guide to US federal employer payroll taxes — Social Security, Medicare, FUTA — with 2024 rates, wage bases, and calculation examples."
  keywords: ["employer payroll taxes", "federal payroll tax rates 2024", "fica employer share", "futa tax rate 2024", "how to calculate employer payroll taxes"]
  body: |
    As an employer in the US, you pay payroll taxes on top of every employee's gross salary.
    Here is what you owe and how it is calculated.

    ## Federal employer payroll taxes (2024)

    ### Social Security (OASDI) — 6.2%
    Rate: 6.2% on wages up to $168,600 (2024 wage base — confirm current year)
    The employee also pays 6.2%; total FICA = 12.4% split equally.

    ### Medicare — 1.45%
    Rate: 1.45% on all wages, no cap.
    The employee also pays 1.45% (+ 0.9% additional Medicare on wages above $200k for the employee only).

    ### FUTA (Federal Unemployment Tax) — 0.6%
    Rate: 6.0% on first $7,000 of each employee's wages.
    Most employers receive a 5.4% credit for paying state unemployment (SUTA), reducing the effective rate to **0.6%**.

    ## Example calculation: $80,000 salary

    | Tax | Calculation | Employer cost |
    |-----|-------------|--------------|
    | Social Security | $80,000 × 6.2% | $4,960 |
    | Medicare | $80,000 × 1.45% | $1,160 |
    | FUTA | $7,000 × 0.6% | $42 |
    | **Total** | | **$6,162** |

    Total employment cost = $80,000 + $6,162 = **$86,162**

    SUTA rates vary by state (0.1%–10%+) and prior layoff history. Always model your
    specific state rate separately.

    Use the [payroll tax calculator](/tools/payroll-tax-calculator/) to compute employer
    costs for any salary.

# ---- Weighted average calculator intent pages ----

- slug: when-to-use-weighted-average
  parent_tool: weighted-average-calculator
  title: "When to Use a Weighted Average (vs. Simple Average)"
  description: "A guide to when weighted averages give more accurate results than simple averages — with examples from finance, school grades, and business metrics."
  keywords: ["when to use weighted average", "weighted average vs simple average", "weighted average examples", "how to calculate weighted average"]
  body: |
    A weighted average is appropriate whenever observations have different levels of
    importance or represent different-sized groups. Here is when it matters.

    ## When weighted average ≠ simple average

    **Exam grades**: a final exam worth 40% of your grade should not count the same as
    a quiz worth 5%. Weighted average: `(Quiz × 5% + Final × 40% + ...) / total weight`.

    **Portfolio returns**: if 80% of your portfolio is in fund A (returned 12%) and 20%
    in fund B (returned 5%), your portfolio return is `0.8×12% + 0.2×5% = 10.6%`,
    not `(12% + 5%) / 2 = 8.5%`.

    **Customer satisfaction scores**: if enterprise customers (30% of revenue) rate you
    8/10 and SMB customers (70% of revenue) rate you 6/10, the revenue-weighted NPS
    is `0.3×8 + 0.7×6 = 6.6`, not `(8+6)/2 = 7`.

    **Average selling price across segments**: a product sold at $200 to 100 customers
    and $800 to 10 customers has an average ASP of `(100×$200 + 10×$800) / 110 = $254`,
    not `($200 + $800) / 2 = $500`.

    ## When simple average is fine

    Use a simple average when every observation carries equal importance and represents
    an equivalent "unit" — e.g. the average of 5 A/B test conversion rates where each
    test ran on the same sample size.

    Use the [weighted average calculator](/tools/weighted-average-calculator/) to
    compute weighted averages with automatic contribution percentages.

# ---- Gross profit margin calculator intent pages ----

- slug: gross-margin-vs-net-margin-explained
  parent_tool: gross-profit-margin-calculator
  title: "Gross Margin vs Net Margin: What's the Difference?"
  description: "A clear breakdown of gross margin vs net margin — what each measures, why they differ, and which one investors care about most."
  keywords: ["gross margin vs net margin", "difference between gross and net margin", "gross profit vs net profit", "profit margin explained"]
  body: |
    Gross margin and net margin are both profitability ratios, but they measure very
    different things. Confusing them is one of the most common mistakes in financial analysis.

    ## Gross margin

    **Gross Margin = (Revenue − COGS) / Revenue × 100**

    Gross margin only subtracts the direct costs of producing your goods or services
    (materials, direct labour, manufacturing overhead). It ignores all operating expenses.

    A high gross margin tells you: "for every dollar of revenue, this much is available
    to cover overhead and generate profit."

    ## Net margin

    **Net Margin = Net Income / Revenue × 100**

    Net margin subtracts everything: COGS, operating expenses (sales, marketing, R&D,
    G&A), interest, and taxes. It is the bottom-line profitability measure.

    ## Why they diverge

    A company can have a 75% gross margin but a −20% net margin if it is burning
    on growth investments. This is common in early-stage SaaS.

    Conversely, a retailer with a 25% gross margin might achieve a 10% net margin
    through extremely lean operations.

    ## Which do investors care about more?

    For SaaS: gross margin is primary. Investors use it to model long-term operating
    leverage — can the business eventually achieve 25–30%+ EBIT margins?

    For mature businesses: net margin and EBITDA matter more because the growth
    investment phase is behind them.

    Use the [gross profit margin calculator](/tools/gross-profit-margin-calculator/)
    to compute both gross profit and markup from your revenue and COGS.

# ---- MIRR calculator intent pages ----

- slug: mirr-vs-irr-which-to-use
  parent_tool: mirr-calculator
  title: "MIRR vs IRR: Which Should You Use for Capital Budgeting?"
  description: "A practical comparison of MIRR and IRR for capital budgeting decisions — when each is appropriate and why MIRR gives more realistic results."
  keywords: ["mirr vs irr", "modified irr vs irr", "when to use mirr", "capital budgeting irr mirr", "mirr explained"]
  body: |
    IRR is more commonly used, but MIRR is more realistic. Here is when and why to use
    each one.

    ## The reinvestment rate problem with IRR

    IRR implicitly assumes that all positive cash flows can be reinvested at the IRR
    itself. If a project has a 35% IRR, it assumes you can reinvest each year's returns
    at 35% — which is usually impossible.

    MIRR fixes this by separating the finance rate (cost of borrowing) from the
    reinvestment rate (your actual reinvestment opportunities).

    ## When to use MIRR over IRR

    1. **Multiple sign changes in cash flows** — projects that require capital injections
       mid-way can produce multiple mathematically valid IRRs. MIRR always returns a
       single value.
    2. **Comparing projects of different scale** — MIRR is better when you need to
       compare a $500K project to a $5M project with different cash flow patterns.
    3. **Sophisticated lenders or board members require it** — PE firms and sophisticated
       investors often prefer MIRR for realistic return modelling.

    ## When IRR is fine

    For simple, conventional cash flow patterns (one initial outflow followed by
    inflows), IRR and MIRR give similar results and IRR is more widely understood.

    Use the [MIRR calculator](/tools/mirr-calculator/) to compute MIRR with your
    choice of finance and reinvestment rates.

# ---- Cash burn by department intent pages ----

- slug: startup-burn-rate-optimization
  parent_tool: cash-burn-by-department
  title: "How to Optimize Your Startup's Burn Rate by Department"
  description: "A practical guide to analyzing and reducing startup burn rate — which departments to cut first, and how to extend runway without killing growth."
  keywords: ["startup burn rate", "how to reduce burn rate", "startup burn by department", "extend runway startup", "burn rate optimization"]
  body: |
    When runway shrinks, founders face the same question: where do we cut? Making random
    cuts across all departments rarely works. A department-level analysis shows you where
    cost reduction has the least growth impact.

    ## Step 1: Map burn by department

    Before cutting, understand your current burn composition. For most Series A–B SaaS:
    - Engineering: 40–50% of headcount cost
    - Sales: 20–30%
    - Marketing: 10–20%
    - G&A: 10–15%

    ## Step 2: Apply the ROI filter

    Not all departments have equal ROI. Ask for each: what revenue or product output does
    this cost generate, and on what timeline?

    **Sales and marketing**: high ROI if CAC payback < 18 months; cut demand gen before
    account executives.
    **Engineering**: rarely the right first cut unless you have product/market fit and
    are in pure monetisation mode.
    **G&A**: typically first to cut — contractors, software subscriptions, office costs.

    ## Step 3: Cut to extend, not to survive

    The goal of burn optimisation is to extend runway until your next value-creation
    milestone (ARR target, product launch, breakeven). Define the milestone first.
    Then cut to reach it with 3+ months buffer.

    ## Benchmark: healthy burn multiples by stage

    | Stage | Target burn multiple |
    |-------|---------------------|
    | Pre-revenue | N/A |
    | $0–1M ARR | 2–4× |
    | $1–5M ARR | 1.5–2.5× |
    | $5M+ ARR | <1.5× |

    Burn multiple = net burn / net new ARR added. <1× is world-class efficiency.

    Use the [cash burn by department calculator](/tools/cash-burn-by-department/) to
    model your current burn composition and runway.

